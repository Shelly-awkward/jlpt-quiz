<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N3 考前猜題 500</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP","Microsoft JhengHei",sans-serif;background:#eef2f0;color:#2b2b2b}
#app{max-width:720px;margin:0 auto;padding:16px 16px 48px}
h1{font-size:1.5rem;margin:16px 0 4px}
.sub{color:#7a8880;font-size:.95rem;margin-bottom:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:1.1rem;padding:14px 18px;width:100%;text-align:left;margin:6px 0;background:#fff;border:2px solid #d5e0da;color:#2b2b2b;line-height:1.5}
button:active{transform:scale(.99)}
.primary{background:#1d5c8a;color:#fff;border-color:#1d5c8a;text-align:center;font-weight:700}
.secondary{background:#fff;text-align:center}
.warn{background:#b5502a;color:#fff;border-color:#b5502a;text-align:center;font-weight:700}
.opt.correct{background:#d8ecf5;border-color:#1d5c8a;font-weight:700}
.opt.wrong{background:#fbe0d8;border-color:#b5502a}
.opt:disabled{cursor:default;opacity:1;color:#2b2b2b}
.opt.dim:disabled{opacity:.55}
.tag{display:inline-block;background:#dde8e2;color:#53685e;border-radius:999px;padding:3px 12px;font-size:.85rem;margin-bottom:10px}
.q{font-size:1.3rem;line-height:1.9;margin:6px 0 16px}
.q u{text-decoration:none;border-bottom:3px solid #b5502a;font-weight:700}
.exp{background:#eef6fb;border-left:4px solid #1d5c8a;border-radius:8px;padding:12px 14px;font-size:1rem;line-height:1.7;margin-top:12px}
.bar{height:8px;background:#d5e0da;border-radius:4px;overflow:hidden;margin:8px 0 16px}
.bar>div{height:100%;background:#1d5c8a;transition:width .3s}
.top{display:flex;justify-content:space-between;align-items:center;font-size:.95rem;color:#53685e}
.big{font-size:2.6rem;font-weight:800;text-align:center;margin:10px 0}
.stat{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #e2ebe6;font-size:1rem}
.mini{background:none;border:none;color:#7a8880;font-size:.9rem;width:auto;padding:6px 10px;text-decoration:underline}
.row{display:flex;gap:8px}
.chip{flex:1;text-align:center;font-size:1rem;padding:10px;background:#eef2f0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q=[
// ================= 漢字読み =================
{t:"漢字読み",q:"最近、この町の人口が<u>増えて</u>いる。",c:["ふえて","ぞうえて","まえて","うえて"],a:0,e:"増える（ふえる）＝增加。名詞：増加（ぞうか）。"},
{t:"漢字読み",q:"ダイエットして体重が3キロ<u>減った</u>。",c:["へった","げった","めった","けずった"],a:0,e:"減る（へる）＝減少。削る（けずる）＝削減，不同字。"},
{t:"漢字読み",q:"この川はとても<u>深い</u>ので、泳がないでください。",c:["ふかい","ふとい","ふるい","ひくい"],a:0,e:"深い（ふかい）＝深。太い（ふとい）粗；古い（ふるい）舊。"},
{t:"漢字読み",q:"この辺りの海は<u>浅い</u>ので、子どもでも遊べる。",c:["あさい","うすい","あらい","あまい"],a:0,e:"浅い（あさい）＝淺。薄い（うすい）＝薄。"},
{t:"漢字読み",q:"白いシャツがすぐ<u>汚れて</u>しまった。",c:["よごれて","こわれて","つかれて","ゆれて"],a:0,e:"汚れる（よごれる）＝弄髒。形容詞：汚い（きたない）。"},
{t:"漢字読み",q:"時計が<u>壊れて</u>動かなくなった。",c:["こわれて","くずれて","つぶれて","やぶれて"],a:0,e:"壊れる（こわれる）＝壞掉（機器等）。破れる（やぶれる）＝（布紙）破。"},
{t:"漢字読み",q:"横断歩道を<u>渡って</u>、まっすぐ行ってください。",c:["わたって","とおって","まわって","のぼって"],a:0,e:"渡る（わたる）＝過（馬路、橋）。通る（とおる）＝通過。"},
{t:"漢字読み",q:"京都では有名な旅館に<u>泊まった</u>。",c:["とまった","どまった","しまった","たまった"],a:0,e:"泊まる（とまる）＝住宿。止まる（とまる）同音＝停止，注意漢字。"},
{t:"漢字読み",q:"展示品に<u>触らないで</u>ください。",c:["さわらないで","すわらないで","かざらないで","くばらないで"],a:0,e:"触る（さわる）＝觸摸。座る（すわる）坐；飾る（かざる）裝飾。"},
{t:"漢字読み",q:"台風で庭の木の枝が<u>折れた</u>。",c:["おれた","よれた","ぬれた","ずれた"],a:0,e:"折れる（おれる）＝折斷。濡れる（ぬれる）＝淋濕。"},
{t:"漢字読み",q:"あの角を右に<u>曲がる</u>と、駅が見えます。",c:["まがる","さがる","あがる","ひろがる"],a:0,e:"曲がる（まがる）＝轉彎。下がる（さがる）下降。"},
{t:"漢字読み",q:"感謝の気持ちを言葉で<u>表した</u>。",c:["あらわした","おもてした","ひょうした","あらためした"],a:0,e:"表す（あらわす）＝表達。表（おもて）＝表面，名詞讀法。"},
{t:"漢字読み",q:"空に虹が<u>現れた</u>。",c:["あらわれた","くずれた","かくれた","うまれた"],a:0,e:"現れる（あらわれる）＝出現。隠れる（かくれる）＝躲藏。"},
{t:"漢字読み",q:"新しい単語をなかなか<u>覚えられない</u>。",c:["おぼえられない","かんがえられない","おしえられない","ささえられない"],a:0,e:"覚える（おぼえる）＝記住。教える（おしえる）＝教。"},
{t:"漢字読み",q:"猫が犬を見て<u>逃げて</u>いった。",c:["にげて","なげて","まげて","さげて"],a:0,e:"逃げる（にげる）＝逃跑。投げる（なげる）＝投擲，字形音都像要小心。"},
{t:"漢字読み",q:"子どもがボールを<u>投げて</u>遊んでいる。",c:["なげて","にげて","とげて","さげて"],a:0,e:"投げる（なげる）＝投、扔。逃げる（にげる）＝逃。"},
{t:"漢字読み",q:"道で財布を<u>拾って</u>、交番に届けた。",c:["ひろって","ひらって","はらって","やとって"],a:0,e:"拾う（ひろう）＝撿。「ひらう」是常見的錯誤讀法。"},
{t:"漢字読み",q:"注文した商品が今日<u>届いた</u>。",c:["とどいた","つづいた","ひびいた","かわいた"],a:0,e:"届く（とどく）＝送達。続く（つづく）持續；乾く（かわく）乾。"},
{t:"漢字読み",q:"事故で電車が<u>遅れて</u>いる。",c:["おくれて","おそれて","たおれて","つれて"],a:0,e:"遅れる（おくれる）＝遲到、誤點。恐れる（おそれる）＝害怕。"},
{t:"漢字読み",q:"間に合わないので、<u>急いで</u>ください。",c:["いそいで","およいで","さわいで","かせいで"],a:0,e:"急ぐ（いそぐ）＝趕快。泳ぐ（およぐ）游泳；騒ぐ（さわぐ）吵鬧。"},
{t:"漢字読み",q:"工事が予定どおり<u>進んで</u>いる。",c:["すすんで","つつんで","たのんで","ぬすんで"],a:0,e:"進む（すすむ）＝前進、進展。包む（つつむ）包；盗む（ぬすむ）偷。"},
{t:"漢字読み",q:"忘れ物に気づいて、家に<u>戻った</u>。",c:["もどった","まもった","のこった","とおった"],a:0,e:"戻る（もどる）＝返回。守る（まもる)遵守；残る（のこる）留下。"},
{t:"漢字読み",q:"兄は電車で大学に<u>通って</u>いる。",c:["かよって","とおって","つうって","むかって"],a:0,e:"通う（かよう）＝定期往返（上學上班）。通る（とおる）＝通過，同字不同讀。"},
{t:"漢字読み",q:"空港へ友達を<u>迎えに</u>行った。",c:["むかえに","そなえに","くわえに","ささえに"],a:0,e:"迎える（むかえる）＝迎接。備える（そなえる）＝準備防備。"},
{t:"漢字読み",q:"パーティーに友人を<u>招いた</u>。",c:["まねいた","ひらいた","かたむいた","のぞいた"],a:0,e:"招く（まねく）＝邀請。名詞：招待（しょうたい）。"},
{t:"漢字読み",q:"引っ越しの手伝いを友達に<u>頼んだ</u>。",c:["たのんだ","たよんだ","らいんだ","たすんだ"],a:0,e:"頼む（たのむ）＝拜託。頼る（たよる）＝依靠，注意送假名。"},
{t:"漢字読み",q:"せっかくの誘いだったが、<u>断った</u>。",c:["ことわった","こだわった","くわわった","だんわった"],a:0,e:"断る（ことわる）＝拒絕。こだわる＝講究、執著。"},
{t:"漢字読み",q:"母は私の留学をやっと<u>許して</u>くれた。",c:["ゆるして","ゆるんで","ゆすって","ゆれて"],a:0,e:"許す（ゆるす）＝允許、原諒。緩む（ゆるむ）＝鬆弛。"},
{t:"漢字読み",q:"遅刻したことを先生に<u>謝った</u>。",c:["あやまった","あやしんだ","あつまった","あたたまった"],a:0,e:"謝る（あやまる）＝道歉。誤る（あやまる）同音＝弄錯。"},
{t:"漢字読み",q:"突然の大きな音に<u>驚いた</u>。",c:["おどろいた","おどいた","きょういた","おろどいた"],a:0,e:"驚く（おどろく）＝吃驚。名詞：驚き。"},
{t:"漢字読み",q:"合格の知らせを聞いて、家族みんなが<u>喜んだ</u>。",c:["よろこんだ","ころんだ","よんだ","えらんだ"],a:0,e:"喜ぶ（よろこぶ）＝高興。転ぶ（ころぶ）跌倒；選ぶ（えらぶ）選。"},
{t:"漢字読み",q:"インターネットでいろいろな<u>情報</u>が手に入る。",c:["じょうほう","じょうぼう","せいほう","じょほう"],a:0,e:"情報（じょうほう）＝資訊。"},
{t:"漢字読み",q:"彼は海外で働いた<u>経験</u>がある。",c:["けいけん","けいげん","きょうけん","けけん"],a:0,e:"経験（けいけん）＝經驗。"},
{t:"漢字読み",q:"子どもの<u>教育</u>にお金がかかる。",c:["きょういく","きょいく","こういく","きょうえき"],a:0,e:"教育（きょういく）＝教育。注意長音きょう。"},
{t:"漢字読み",q:"この町は<u>歴史</u>のある建物が多い。",c:["れきし","りきし","れいし","れきしゅ"],a:0,e:"歴史（れきし）。力士（りきし）＝相撲選手，不同詞。"},
{t:"漢字読み",q:"大学で<u>政治</u>について勉強している。",c:["せいじ","せいち","しょうじ","せじ"],a:0,e:"政治（せいじ）。「治」在此讀じ。"},
{t:"漢字読み",q:"日本の<u>経済</u>は少しずつ回復している。",c:["けいざい","けいさい","きょうざい","けざい"],a:0,e:"経済（けいざい）。掲載（けいさい）＝刊登；教材（きょうざい），同音詞注意。"},
{t:"漢字読み",q:"<u>国際</u>会議が東京で開かれた。",c:["こくさい","こくざい","ごくさい","こくせい"],a:0,e:"国際（こくさい）＝國際。「際」讀清音さい。"},
{t:"漢字読み",q:"この会社は<u>貿易</u>の仕事をしている。",c:["ぼうえき","ぼうい","もうえき","ぼえき"],a:0,e:"貿易（ぼうえき）＝貿易。"},
{t:"漢字読み",q:"日本は自動車をたくさん<u>輸出</u>している。",c:["ゆしゅつ","ゆうしゅつ","しゅしゅつ","ゆしゅ"],a:0,e:"輸出（ゆしゅつ）——「輸」是短音ゆ，別唸成長音。"},
{t:"漢字読み",q:"この工場では自動車の部品を<u>製造</u>している。",c:["せいぞう","せぞう","せいそう","しょうぞう"],a:0,e:"製造（せいぞう）＝製造。清掃（せいそう）＝打掃，注意濁音。"},
{t:"漢字読み",q:"あの店ではパンを<u>販売</u>している。",c:["はんばい","はんまい","ばんばい","はんうり"],a:0,e:"販売（はんばい）＝販賣。"},
{t:"漢字読み",q:"この店は夜10時まで<u>営業</u>している。",c:["えいぎょう","えいごう","えぎょう","えいきょう"],a:0,e:"営業（えいぎょう）＝營業。影響（えいきょう）不同詞。"},
{t:"漢字読み",q:"進路について先生に<u>相談</u>した。",c:["そうだん","しょうだん","そうたん","そだん"],a:0,e:"相談（そうだん）＝商量。商談（しょうだん）＝商務洽談，不同詞。"},
{t:"漢字読み",q:"調査の結果を上司に<u>報告</u>した。",c:["ほうこく","ほこく","ほうごく","ぼうこく"],a:0,e:"報告（ほうこく）。注意長音ほう。"},
{t:"漢字読み",q:"駅の<u>案内</u>所で地図をもらった。",c:["あんない","あんうち","あない","あんに"],a:0,e:"案内（あんない）＝導覽、指引。"},
{t:"漢字読み",q:"新しい友達に妹を<u>紹介</u>した。",c:["しょうかい","しょかい","しょうがい","そうかい"],a:0,e:"紹介（しょうかい）＝介紹。障害（しょうがい）不同詞。"},
{t:"漢字読み",q:"結婚式に<u>招待</u>された。",c:["しょうたい","しょうだい","そうたい","しょたい"],a:0,e:"招待（しょうたい）＝邀請。早退（そうたい）＝早退，注意別混。"},
{t:"漢字読み",q:"どうぞ<u>遠慮</u>しないで食べてください。",c:["えんりょ","えんろ","おんりょ","えんりょう"],a:0,e:"遠慮（えんりょ）＝客氣。「慮」是短音りょ。"},
{t:"漢字読み",q:"痛みをずっと<u>我慢</u>していた。",c:["がまん","がばん","かまん","がめん"],a:0,e:"我慢（がまん）＝忍耐。画面（がめん）不同詞。"},
{t:"漢字読み",q:"みなさんのご協力に<u>感謝</u>します。",c:["かんしゃ","かんじゃ","がんしゃ","かんさ"],a:0,e:"感謝（かんしゃ）。患者（かんじゃ）＝病人，注意濁音差。"},
{t:"漢字読み",q:"弟は昆虫に<u>興味</u>を持っている。",c:["きょうみ","こうみ","きょうあじ","きょみ"],a:0,e:"興味（きょうみ）＝興趣。"},
{t:"漢字読み",q:"面接の前はだれでも<u>緊張</u>する。",c:["きんちょう","きんちょ","ぎんちょう","きんじょう"],a:0,e:"緊張（きんちょう）。近所（きんじょ）＝附近，不同詞。"},
{t:"漢字読み",q:"この道は夜になると<u>危険</u>だ。",c:["きけん","きげん","けけん","きせん"],a:0,e:"危険（きけん）＝危險。機嫌（きげん）＝心情，注意濁音。"},
{t:"漢字読み",q:"学校の<u>規則</u>を守りましょう。",c:["きそく","きぞく","ぎそく","きしょく"],a:0,e:"規則（きそく）。貴族（きぞく）＝貴族，注意清濁。"},
{t:"漢字読み",q:"新しい<u>法律</u>が国会で決まった。",c:["ほうりつ","ほりつ","ほうりち","ぼうりつ"],a:0,e:"法律（ほうりつ）。"},
{t:"漢字読み",q:"旅行の<u>準備</u>はもうできましたか。",c:["じゅんび","じゅんに","しゅんび","じゅび"],a:0,e:"準備（じゅんび）＝準備。"},
{t:"漢字読み",q:"レストランの席を<u>予約</u>しておいた。",c:["よやく","ようやく","やよく","よかく"],a:0,e:"予約（よやく）。ようやく＝終於（副詞），不同詞。"},
{t:"漢字読み",q:"10年後の自分の姿を<u>想像</u>してみた。",c:["そうぞう","そうそう","しょうぞう","そぞう"],a:0,e:"想像（そうぞう）。創造（そうぞう）同音＝創造，肖像（しょうぞう）＝肖像。"},
{t:"漢字読み",q:"会議の内容を<u>記録</u>に残した。",c:["きろく","きりょく","きこく","きらく"],a:0,e:"記録（きろく）。気力（きりょく）；帰国（きこく）；気楽（きらく）。"},
{t:"漢字読み",q:"夏休みの<u>計画</u>を立てた。",c:["けいかく","けいが","けかく","きかく"],a:0,e:"計画（けいかく）＝計畫。企画（きかく）＝企劃，不同詞。"},
{t:"漢字読み",q:"旅行の<u>目的</u>は温泉に入ることだ。",c:["もくてき","めてき","もくまと","もくちょう"],a:0,e:"目的（もくてき）。的（まと）是訓讀。"},
{t:"漢字読み",q:"事故の<u>原因</u>を調べている。",c:["げんいん","げんにん","がんいん","げいいん"],a:0,e:"原因（げんいん）。ん＋い的連接容易唸錯。"},
{t:"漢字読み",q:"試験の<u>結果</u>は来週発表される。",c:["けっか","けつが","けいか","けが"],a:0,e:"結果（けっか）促音。経過（けいか）＝經過；怪我（けが）＝受傷。"},
{t:"漢字読み",q:"この薬はすぐに<u>効果</u>が出る。",c:["こうか","きょうか","こうが","こか"],a:0,e:"効果（こうか）。強化（きょうか）不同詞。"},
{t:"漢字読み",q:"台風は交通に大きな<u>影響</u>を与えた。",c:["えいきょう","えいこう","えきょう","いんきょう"],a:0,e:"影響（えいきょう）。栄光（えいこう）＝榮耀。"},
{t:"漢字読み",q:"季節の<u>変化</u>を感じる。",c:["へんか","べんか","へんけ","かえか"],a:0,e:"変化（へんか）＝變化。"},
{t:"漢字読み",q:"子どもの<u>成長</u>は本当に早い。",c:["せいちょう","せいちょ","せちょう","じょうちょう"],a:0,e:"成長（せいちょう）＝成長。"},
{t:"漢字読み",q:"二つの商品の値段を<u>比較</u>した。",c:["ひかく","ひこう","びかく","ひきゃく"],a:0,e:"比較（ひかく）＝比較。飛行（ひこう）不同詞。"},

{t:"言い換え類義",q:"<u>現在</u>、この商品は売り切れです。",c:["今","昔","最初","将来"],a:0,e:"現在（げんざい）＝現在。"},
{t:"言い換え類義",q:"<u>将来</u>は医者になりたい。",c:["これから先","これまで","ときどき","前から"],a:0,e:"将来（しょうらい）＝未來。"},
{t:"言い換え類義",q:"漢字を<u>暗記する</u>のは大変だ。",c:["覚える","調べる","書く","読む"],a:0,e:"暗記（あんき）する＝背起來。"},
{t:"言い換え類義",q:"間違いがないか、もう一度<u>確認して</u>ください。",c:["確かめて","繰り返して","翻訳して","計算して"],a:0,e:"確認する＝確かめる。"},
{t:"言い換え類義",q:"日本の生活には<u>もう慣れた</u>。",c:["大丈夫になった","飽きてしまった","疲れてしまった","嫌になった"],a:0,e:"慣れる＝習慣了（不再感到困難）。"},
{t:"言い換え類義",q:"引っ越しの前に、荷物を<u>整理した</u>。",c:["片付けた","運んだ","捨てた","包んだ"],a:0,e:"整理（せいり）する＝整理＝片付ける。"},
{t:"言い換え類義",q:"彼はその話を聞いて<u>腹を立てた</u>。",c:["怒った","泣いた","喜んだ","笑った"],a:0,e:"腹を立てる＝生氣（慣用句）。"},
{t:"言い換え類義",q:"仕事が終わって<u>ほっとした</u>。",c:["安心した","緊張した","失望した","感動した"],a:0,e:"ほっとする＝鬆一口氣。"},
{t:"言い換え類義",q:"彼の話を聞いて<u>感心した</u>。",c:["立派だと思った","嫌だと思った","変だと思った","怖いと思った"],a:0,e:"感心（かんしん）する＝佩服。"},
{t:"言い換え類義",q:"授業の内容が<u>理解できなかった</u>。",c:["分からなかった","聞こえなかった","見えなかった","覚えなかった"],a:0,e:"理解（りかい）する＝分かる。"},
{t:"言い換え類義",q:"友達と駅で<u>別れた</u>。",c:["バイバイした","けんかした","出会った","話し合った"],a:0,e:"別れる（わかれる）＝分開道別。"},
{t:"言い換え類義",q:"宿題を<u>済ませて</u>から、テレビを見た。",c:["終わらせて","始めて","休んで","忘れて"],a:0,e:"済ませる（すませる）＝做完。"},
{t:"言い換え類義",q:"パーティーの費用はみんなで<u>負担した</u>。",c:["払った","集めた","貯めた","返した"],a:0,e:"負担（ふたん）する＝負擔（費用）。"},
{t:"言い換え類義",q:"詳しいことは<u>のちほど</u>説明します。",c:["あとで","いますぐ","かんたんに","くわしく"],a:0,e:"後ほど＝稍後。"},
{t:"言い換え類義",q:"この道は<u>常に</u>込んでいる。",c:["いつも","たまに","ときどき","めったに"],a:0,e:"常に（つねに）＝總是。"},
{t:"言い換え類義",q:"荷物を<u>受け取った</u>。",c:["もらった","送った","預けた","運んだ"],a:0,e:"受け取る（うけとる）＝收取。"},
{t:"言い換え類義",q:"この本は<u>役に立つ</u>。",c:["便利だ","高価だ","有名だ","丈夫だ"],a:0,e:"役に立つ（やくにたつ）＝有用。"},
{t:"言い換え類義",q:"彼女は<u>おとなしい</u>性格だ。",c:["静かな","元気な","明るい","厳しい"],a:0,e:"おとなしい＝文靜乖巧。"},
{t:"言い換え類義",q:"祖父は<u>丈夫だ</u>。",c:["健康だ","親切だ","有名だ","真面目だ"],a:0,e:"丈夫（じょうぶ）＝（身體）健壯；（物品）堅固。"},
{t:"言い換え類義",q:"時間に<u>余裕がある</u>ので、お茶でも飲もう。",c:["まだ十分ある","全然ない","少し足りない","ちょうどいい"],a:0,e:"余裕（よゆう）がある＝有餘裕。"},
{t:"言い換え類義",q:"わたしのアパートは駅から<u>離れて</u>いる。",c:["遠い","近い","見える","歩ける"],a:0,e:"離れている（はなれている）＝有段距離＝遠。"},
{t:"言い換え類義",q:"それは<u>めずらしい</u>名前ですね。",c:["あまりない","よくある","おかしい","なつかしい"],a:0,e:"珍しい（めずらしい）＝罕見。"},
{t:"言い換え類義",q:"部屋を<u>そうじした</u>。",c:["きれいにした","広くした","暗くした","暖かくした"],a:0,e:"掃除（そうじ）する＝打掃＝弄乾淨。"},
// ================= 用法 =================
{t:"用法",q:"「<u>遠慮</u>」の使い方として最もよいものは？",c:["店内でのたばこはご遠慮ください。","わからないことは遠慮に質問してください。","彼は遠慮が速くて、すぐ決める。","この道は遠慮していて、通れない。"],a:0,e:"遠慮（えんりょ）＝客氣、迴避。「ご遠慮ください」＝請勿。"},
{t:"用法",q:"「<u>我慢</u>」の使い方として最もよいものは？",c:["歯が痛かったが、朝まで我慢した。","彼は我慢な性格で、よく怒る。","電車が我慢して、遅刻した。","この料理は我慢な味がする。"],a:0,e:"我慢（がまん）する＝忍耐。"},
{t:"用法",q:"「<u>留守</u>」の使い方として最もよいものは？",c:["家に電話したが、留守のようだった。","かぎを留守にして、家に入れない。","彼は会社を留守した。","留守を忘れて出かけてしまった。"],a:0,e:"留守（るす）＝不在家。留守番＝看家。"},
{t:"用法",q:"「<u>迷子</u>」の使い方として最もよいものは？",c:["デパートで子どもが迷子になった。","道が複雑で、車が迷子した。","迷子な問題で、答えられなかった。","彼は人生に迷子している。"],a:0,e:"迷子（まいご）＝走失的孩子。迷子になる。"},
{t:"用法",q:"「<u>世話</u>」の使い方として最もよいものは？",c:["妹は犬の世話を毎日している。","日本の世話を勉強している。","この機械は世話が速い。","彼に世話を言われて、腹が立った。"],a:0,e:"世話（せわ）をする＝照顧。お世話になりました＝承蒙照顧。"},
{t:"用法",q:"「<u>挨拶</u>」の使い方として最もよいものは？",c:["近所の人に朝の挨拶をした。","わからない単語を挨拶した。","電車の時間を挨拶した。","部屋をきれいに挨拶した。"],a:0,e:"挨拶（あいさつ）＝打招呼、致詞。"},
{t:"用法",q:"「<u>夢中</u>」の使い方として最もよいものは？",c:["弟はゲームに夢中になっている。","昨日は夢中をたくさん見た。","夢中に寝てしまった。","将来の夢中は医者になることだ。"],a:0,e:"夢中（むちゅう）になる＝著迷、沉迷。"},
{t:"用法",q:"「<u>似合う</u>」の使い方として最もよいものは？",c:["その帽子、とても似合っていますね。","双子の顔はよく似合っている。","この答えは正解に似合っている。","彼と趣味が似合っている。"],a:0,e:"似合う（にあう）＝（穿戴）適合好看。長得像＝似ている。"},
{t:"用法",q:"「<u>足りる</u>」の使い方として最もよいものは？",c:["千円あれば、昼ご飯には足りる。","走ったので、足が足りた。","彼は背が足りて、高い。","この靴は足りて、はけない。"],a:0,e:"足りる（たりる）＝足夠。"},
{t:"用法",q:"「<u>空く</u>」の使い方として最もよいものは？",c:["午後なら席が空いています。","このかばんは空いて、持ちやすい。","彼は頭が空いて、成績がいい。","今日は空が空いて、気持ちがいい。"],a:0,e:"空く（あく）＝（座位、時間）空出來。手が空く＝有空。"},
{t:"用法",q:"「<u>誘う</u>」の使い方として最もよいものは？",c:["友達を映画に誘った。","質問に誘って答えた。","駅までの道を誘ってあげた。","仕事を誘って、休んだ。"],a:0,e:"誘う（さそう）＝邀約。"},
{t:"用法",q:"「<u>断る</u>」の使い方として最もよいものは？",c:["残業を頼まれたが、用事があったので断った。","ひもを断って、二つに分けた。","電気を断って、部屋を出た。","髪を短く断ってもらった。"],a:0,e:"断る（ことわる）＝拒絕。剪切用「切る」。"},
{t:"用法",q:"「<u>謝る</u>」の使い方として最もよいものは？",c:["約束を忘れて、友達に謝った。","プレゼントをもらって、謝った。","先生に道を謝った。","彼の成功を謝った。"],a:0,e:"謝る（あやまる）＝道歉。道謝＝感謝する/礼を言う。"},
{t:"用法",q:"「<u>褒める</u>」の使い方として最もよいものは？",c:["先生は彼の作文を褒めた。","失敗した部下を褒めて、叱った。","高い商品を褒めて、値段を下げてもらった。","彼は自分の失敗を褒めている。"],a:0,e:"褒める（ほめる）＝稱讚。"},
{t:"用法",q:"「<u>届ける</u>」の使い方として最もよいものは？",c:["拾った財布を交番に届けた。","荷物がやっと家に届けた。","手が棚の上まで届けた。","夢がついに届けた。"],a:0,e:"届ける（とどける）＝送交（他動詞）。自動詞是届く（とどく）。"},
{t:"用法",q:"「<u>見送る</u>」の使い方として最もよいものは？",c:["空港で帰国する友人を見送った。","テレビで映画を見送った。","窓から景色を見送った。","彼の意見を見送って賛成した。"],a:0,e:"見送る（みおくる）＝送行；（引申）暫緩。"},
{t:"用法",q:"「<u>迎える</u>」の使い方として最もよいものは？",c:["駅まで祖母を迎えに行った。","ボールを強く迎えて打った。","宿題を迎えてから遊ぶ。","朝ご飯を迎えて食べた。"],a:0,e:"迎える（むかえる）＝迎接。"},
{t:"用法",q:"「<u>預ける</u>」の使い方として最もよいものは？",c:["ホテルのフロントに荷物を預けた。","銀行からお金を預けて買い物した。","友達に本を預けてもらった。","質問を先生に預けた。"],a:0,e:"預ける（あずける）＝寄放。從銀行領錢是「下ろす」。"},
{t:"用法",q:"「<u>交換</u>」の使い方として最もよいものは？",c:["サイズが合わなかったので、大きいのと交換してもらった。","電車を交換して、会社へ行く。","朝と夜で気温が交換する。","彼と意見が交換で、けんかした。"],a:0,e:"交換（こうかん）する＝交換。轉乘＝乗り換える。"},
{t:"用法",q:"「<u>新鮮</u>」の使い方として最もよいものは？",c:["この店の魚は新鮮でおいしい。","新鮮な服を着て出かけた。","彼は新鮮に勉強している。","新鮮な時間に起きた。"],a:0,e:"新鮮（しんせん）＝新鮮（食材、空氣、感受）。"},
{t:"用法",q:"「<u>丁寧</u>」の使い方として最もよいものは？",c:["彼女は言葉づかいが丁寧だ。","この料理は丁寧な味がする。","丁寧な雨が降っている。","彼は足が丁寧で、速く走れる。"],a:0,e:"丁寧（ていねい）＝有禮貌、細心。"},
{t:"用法",q:"「<u>熱心</u>」の使い方として最もよいものは？",c:["彼は熱心に練習に取り組んでいる。","お湯が熱心になった。","今日は熱心な天気だ。","スープを熱心して飲んだ。"],a:0,e:"熱心（ねっしん）＝熱衷、認真投入。"},
{t:"用法",q:"「<u>不足</u>」の使い方として最もよいものは？",c:["最近、運動不足で体が重い。","この服は私に不足だ。","彼は不足な人で、信用できない。","駅まで不足で10分かかる。"],a:0,e:"不足（ふそく）＝不足（運動不足、寝不足、人手不足）。"},
{t:"用法",q:"「<u>混む</u>」の使い方として最もよいものは？",c:["連休なので、道が混んでいる。","スープに塩を混んで飲んだ。","風邪で鼻が混んでいる。","予定がたくさん混んで疲れた。"],a:0,e:"混む（こむ）＝擁擠。攪拌＝混ぜる（まぜる）。"},
{t:"用法",q:"「<u>渋滞</u>」の使い方として最もよいものは？",c:["事故で高速道路が渋滞している。","電車が渋滞して遅れた。","仕事が渋滞して帰れない。","のどが渋滞して声が出ない。"],a:0,e:"渋滞（じゅうたい）＝塞車，只用於道路交通。電車誤點＝遅延。"},
{t:"用法",q:"「<u>募集</u>」の使い方として最もよいものは？",c:["この店ではアルバイトを募集している。","古い切手を趣味で募集している。","わからない問題を先生に募集した。","旅行の写真を募集に撮った。"],a:0,e:"募集（ぼしゅう）＝公開招募。收集＝収集/集める。"},
{t:"用法",q:"「<u>営業</u>」の使い方として最もよいものは？",c:["この店は朝9時から営業している。","兄は毎日大学に営業している。","母は家で営業を作っている。","公園で子どもが営業している。"],a:0,e:"営業（えいぎょう）＝營業。"},
{t:"用法",q:"「<u>出張</u>」の使い方として最もよいものは？",c:["父は今週、大阪へ出張している。","日曜日に家族で出張に行った。","毎朝7時に家を出張する。","荷物を出張で送った。"],a:0,e:"出張（しゅっちょう）＝出差。旅遊＝旅行。"},
{t:"用法",q:"「<u>残業</u>」の使い方として最もよいものは？",c:["仕事が終わらなくて、毎日残業している。","ご飯を残業して、しかられた。","宿題が残業になってしまった。","電車に残業して、忘れ物をした。"],a:0,e:"残業（ざんぎょう）＝加班。"},
{t:"用法",q:"「<u>約束</u>」の使い方として最もよいものは？",c:["友達と3時に会う約束をした。","この本は面白いと約束が高い。","荷物を約束で送った。","彼の話は約束が長い。"],a:0,e:"約束（やくそく）＝約定。"},
{t:"用法",q:"「<u>予習</u>」の使い方として最もよいものは？",c:["明日の授業の予習をしてから寝る。","昨日習ったことを予習した。","天気を予習してから出かけた。","旅行の予習を旅行会社に頼んだ。"],a:0,e:"予習（よしゅう）＝預習。複習過去內容＝復習（ふくしゅう）。"},
{t:"用法",q:"「<u>遅刻</u>」の使い方として最もよいものは？",c:["寝坊して、学校に遅刻した。","電車が遅刻して、駅で待った。","仕事が遅刻まで終わらなかった。","時計が5分遅刻している。"],a:0,e:"遅刻（ちこく）＝（人）遲到。電車誤點＝遅れる/遅延；時鐘慢＝遅れている。"},
{t:"用法",q:"「<u>集合</u>」の使い方として最もよいものは？",c:["明日は8時に駅前に集合してください。","切手を集合するのが趣味だ。","雨が集合して、川になった。","データを集合して、レポートを書いた。"],a:0,e:"集合（しゅうごう）＝（人）集合。收集東西＝collect用「集める」。"},
{t:"用法",q:"「<u>身につける</u>」の使い方として最もよいものは？",c:["外国語は毎日練習して身につけるものだ。","新しい服を店で身につけた。","荷物を背中に身につけて運んだ。","名前を紙に身につけて書いた。"],a:0,e:"身につける＝學會（技能）；也可指穿戴，但試穿＝試着する。"},
{t:"用法",q:"「<u>おごる</u>」の使い方として最もよいものは？",c:["先輩が昼ご飯をおごってくれた。","母は花に水をおごっている。","先生は学生をおごって育てた。","彼は仕事をおごって休んだ。"],a:0,e:"おごる＝請客。"},
{t:"用法",q:"「<u>けち</u>」の使い方として最もよいものは？",c:["彼はけちで、一円も出したがらない。","この服はけちで、すぐ破れた。","今日はけちな天気だ。","けちな成績で合格した。"],a:0,e:"けち＝小氣（形容人）。"},
{t:"用法",q:"「<u>親しい</u>」の使い方として最もよいものは？",c:["彼女とは高校時代から親しい友人だ。","この機械の使い方に親しい。","親しい値段で買えた。","今日は親しい天気ですね。"],a:0,e:"親しい（したしい）＝親近（人際關係）。熟悉事物＝詳しい。"},
{t:"用法",q:"「<u>にぎやか</u>」の使い方として最もよいものは？",c:["祭りで町がにぎやかになった。","このコーヒーはにぎやかな味だ。","彼はにぎやかに勉強している。","にぎやかな痛みで眠れない。"],a:0,e:"にぎやか＝熱鬧。"},
{t:"用法",q:"「<u>そっくり</u>」の使い方として最もよいものは？",c:["あの兄弟は顔がそっくりだ。","部屋をそっくり掃除した。","雨がそっくり降っている。","そっくり勉強して合格した。"],a:0,e:"そっくり＝一模一樣。"},
{t:"用法",q:"「<u>わざと</u>」の使い方として最もよいものは？",c:["弟はわざと負けて、妹を喜ばせた。","わざと遠くから来てくれてありがとう。","電車がわざと遅れた。","わざと雨が降ってきた。"],a:0,e:"わざと＝故意。特地（勞駕）＝わざわざ。"},
{t:"用法",q:"「<u>それとも</u>」の使い方として最もよいものは？",c:["コーヒーにしますか。それとも紅茶にしますか。","雨が降った。それとも試合は続いた。","彼は優しい。それとも頭もいい。","疲れた。それとも早く寝よう。"],a:0,e:"それとも＝還是（二選一疑問）。"},
{t:"用法",q:"「<u>おかげ</u>」の使い方として最もよいものは？",c:["先生のおかげで、合格できました。","事故のおかげで、遅刻してしまった。","彼のおかげで、財布をなくした。","台風のおかげで、旅行が中止になった。"],a:0,e:"おかげで＝多虧（好結果）。壞結果用せいで。"},
{t:"用法",q:"「<u>たまたま</u>」の使い方として最もよいものは？",c:["駅でたまたま昔の友人に会った。","彼はたまたま勉強して、必ず合格する。","毎朝たまたま6時に起きている。","たまたまにお風呂に入る。"],a:0,e:"たまたま＝碰巧、偶然。"},

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return fmt(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return fmt(d)}
function dueList(){return S.wrong.filter(i=>!S.srs[i]||S.srs[i].due<=today())}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const app=document.getElementById('app');
const cats=[...new Set(Q.map(x=>x.t))];
if(window.speechSynthesis)speechSynthesis.getVoices();

function speakQ(qi){
  if(!window.speechSynthesis)return;
  const q=Q[qi];let t;
  const m=q.e.match(/完整句：([^（]+)/);
  if(m)t=m[1];
  else if(q.t==='用法')t=q.c[q.a];
  else t=q.q.replace(/<[^>]+>/g,'').replace(/（　）/g,q.c[q.a]);
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.9;
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.indexOf('ja')===0);
  if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function streak(){
  let n=0;
  for(let i=0;i<9999;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(S.stats.d[fmt(d)])n++;
    else if(i===0)continue;
    else break;
  }
  return n;
}

function statHtml(){
  let n=0,ok=0;
  Object.values(S.stats.d).forEach(v=>{ok+=v[0];n+=v[1]});
  if(!n)return '';
  const rows=Object.entries(S.stats.c).map(([c,[r,m]])=>`<div class="stat"><span>${c}</span><span>${r} / ${m}（${Math.round(r/m*100)}%）</span></div>`).join('');
  return `<div class="card"><div class="tag">學習儀表板</div>
  <div style="text-align:center;font-size:1.05rem;margin:6px 0 10px">🔥 連續 ${streak()} 天｜累計 ${n} 題｜正確率 ${Math.round(ok/n*100)}%</div>${rows}</div>`;
}

function home(){
  S.session=null;save();
  const due=dueList().length;
  let catBtns=cats.map(c=>{
    const n=Q.filter(x=>x.t===c).length;
    return `<button class="secondary" onclick="start('${c}')">${c}（${n} 題）</button>`;
  }).join('');
  app.innerHTML=`
  <h1>🎯 N3 考前猜題 500</h1>
  <div class="sub">共 ${Q.length} 題｜間隔複習｜進度自動儲存</div>
  <div class="card">
    <button class="primary" onclick="start('all')">▶ 全部 ${Q.length} 題（隨機出題）</button>
    <button class="warn" onclick="start('due')" ${due?'':'disabled style="opacity:.4"'}>📅 今日複習（${due} 題到期）</button>
    <button class="secondary" onclick="start('wrong')" ${S.wrong.length?'':'disabled style="opacity:.4"'}>✍ 全部錯題（${S.wrong.length} 題）</button>
    <button class="secondary" onclick="start('star')" ${S.star.length?'':'disabled style="opacity:.4"'}>⭐ 不熟收藏（${S.star.length} 題）</button>
    <button class="secondary" onclick="exportWrong()" ${S.wrong.length?'':'disabled style="opacity:.4"'}>📋 匯出錯題（貼給 AI 深入解說）</button>
    <button class="secondary" onclick="makeEpub()">📖 下載 EPUB 題庫（點註解看答案）</button>
  </div>
  ${statHtml()}
  <div class="card"><div class="tag">分類練習</div>${catBtns}</div>
  <button class="mini" onclick="if(confirm('確定清除錯題與複習排程？（儀表板統計會保留）')){S.wrong=[];S.srs={};save();home()}">清除錯題紀錄</button>
  <button class="mini" onclick="location.href='https://shelly-awkward.github.io/jlpt-quiz/'">→ N2 版測驗</button>`;
}

function start(mode){
  let idx;
  if(mode==='all')idx=Q.map((_,i)=>i);
  else if(mode==='due')idx=dueList();
  else if(mode==='wrong')idx=[...S.wrong];
  else if(mode==='star')idx=[...S.star];
  else idx=Q.map((_,i)=>i).filter(i=>Q[i].t===mode);
  if(!idx.length)return;
  shuffle(idx);
  S.session={mode,idx,pos:0,right:0,log:[]};
  save();renderQ();
}

const MODENAME={all:'綜合測驗',due:'今日複習',wrong:'錯題複習',star:'不熟收藏'};

function renderQ(){
  const s=S.session;
  if(s.pos>=s.idx.length)return end();
  const qi=s.idx[s.pos],q=Q[qi];
  const order=shuffle([0,1,2,3]);
  const opts=order.map((oi,k)=>`<button class="opt" id="o${k}" onclick="pick(${k})">${'ABCD'[k]}．${q.c[oi]}</button>`).join('');
  app.innerHTML=`
  <div class="top"><span>${MODENAME[s.mode]||s.mode}　${s.pos+1} / ${s.idx.length}</span><span>✔ ${s.right}　✘ ${s.pos-s.right}</span></div>
  <div class="bar"><div style="width:${s.pos/s.idx.length*100}%"></div></div>
  <div class="card">
    <span class="tag">${q.t}</span>
    <div class="q">${q.q}</div>
    ${opts}
    <div id="after"></div>
  </div>
  <button class="mini" onclick="if(confirm('中斷測驗回到首頁？（進度已儲存）')){home()}">回首頁</button>`;
  window._cur={qi,order};
}

function pick(k){
  const {qi,order}=window._cur,q=Q[qi],s=S.session;
  const ok=order[k]===q.a;
  for(let i=0;i<4;i++){
    const b=document.getElementById('o'+i);
    b.disabled=true;
    if(order[i]===q.a)b.classList.add('correct');
    else if(i===k)b.classList.add('wrong');
    else b.classList.add('dim');
  }
  if(ok){
    s.right++;
    if(s.mode==='due'||s.mode==='wrong'){
      const r=S.srs[qi]||{step:0,miss:1};
      r.step=(r.step||0)+1;
      if(r.step>=3){S.wrong=S.wrong.filter(x=>x!==qi);delete S.srs[qi];}
      else{r.due=addDays(r.step===1?3:7);S.srs[qi]=r;}
    }
  }else{
    if(!S.wrong.includes(qi))S.wrong.push(qi);
    const r=S.srs[qi]||{step:0,miss:0};
    r.step=0;r.miss=(r.miss||0)+1;r.due=addDays(1);S.srs[qi]=r;
  }
  const tk=today();
  S.stats.d[tk]=S.stats.d[tk]||[0,0];S.stats.d[tk][1]++;if(ok)S.stats.d[tk][0]++;
  S.stats.c[q.t]=S.stats.c[q.t]||[0,0];S.stats.c[q.t][1]++;if(ok)S.stats.c[q.t][0]++;
  s.log.push({t:q.t,ok});
  s.pos++;save();
  const starred=S.star.includes(qi);
  document.getElementById('after').innerHTML=`
    <div class="exp">${ok?'⭕ 正解！':'❌ 正解是：'+q.c[q.a]}<br>💡 ${q.e}</div>
    <div class="row">
      <button class="chip" onclick="speakQ(${qi})">🔊 聽發音</button>
      <button class="chip" id="star" onclick="toggleStar(${qi})">${starred?'⭐ 已標記':'☆ 標記不熟'}</button>
    </div>
    <button class="primary" onclick="renderQ()">下一題 ▶</button>`;
  document.getElementById('after').scrollIntoView({behavior:'smooth',block:'end'});
}

function toggleStar(qi){
  const i=S.star.indexOf(qi);
  if(i>=0)S.star.splice(i,1);else S.star.push(qi);
  save();
  const b=document.getElementById('star');
  if(b)b.textContent=S.star.includes(qi)?'⭐ 已標記':'☆ 標記不熟';
}

function exportWrong(){
  let t='【N3 錯題清單 '+today()+'】共 '+S.wrong.length+' 題\n\n';
  S.wrong.forEach((qi,n)=>{
    const q=Q[qi],r=S.srs[qi]||{};
    t+=(n+1)+'. ['+q.t+'] '+q.q.replace(/<[^>]+>/g,' ')+'\n   正解：'+q.c[q.a]+(r.miss?'｜錯過 '+r.miss+' 次':'')+'\n';
  });
  t+='\n請針對以上錯題逐題深入解說：詞源或語感、易混淆選項辨析、記憶技巧、各補 2 個例句，最後分析我的弱點模式，並依此出 10 題變化題考我。';
  app.innerHTML=`<h1>📋 錯題清單</h1>
  <div class="sub">複製後貼到 Claude 對話，就能得到量身深入解說</div>
  <div class="card">
    <textarea id="ex" style="width:100%;height:45vh;font-size:.9rem;border:1px solid #d5e0da;border-radius:8px;padding:10px;font-family:inherit">${t}</textarea>
    <button class="primary" onclick="const x=document.getElementById('ex');x.select();x.setSelectionRange(0,999999);if(navigator.clipboard){navigator.clipboard.writeText(x.value).then(()=>alert('已複製！'))}else{document.execCommand('copy');alert('已複製！')}">全選並複製</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
}

// ================= EPUB =================
function crc32(d){
  let t=crc32.t;
  if(!t){t=crc32.t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}}
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
function zipStore(files){
  const parts=[],central=[];let off=0;
  files.forEach(f=>{
    const nb=f.nameBytes,d=f.data,crc=crc32(d);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0x0800,true);
    lh.setUint32(14,crc,true);lh.setUint32(18,d.length,true);lh.setUint32(22,d.length,true);
    lh.setUint16(26,nb.length,true);
    parts.push(new Uint8Array(lh.buffer),nb,d);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0x0800,true);
    ch.setUint32(16,crc,true);ch.setUint32(20,d.length,true);ch.setUint32(24,d.length,true);
    ch.setUint16(28,nb.length,true);ch.setUint32(42,off,true);
    central.push(new Uint8Array(ch.buffer),nb);
    off+=30+nb.length+d.length;
  });
  let cdSize=0;central.forEach(u=>cdSize+=u.length);
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);eo.setUint16(8,files.length,true);eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true);eo.setUint32(16,off,true);
  const out=new Uint8Array(off+cdSize+22);let p=0;
  parts.concat(central,[new Uint8Array(eo.buffer)]).forEach(u=>{out.set(u,p);p+=u.length});
  return out;
}
function buildEpub(){
  const enc=new TextEncoder();
  const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fix=s=>escq(s).replace(/&lt;(\/)?(u|b)&gt;/g,'<$1$2>').replace(/&lt;br\s*\/?&gt;/g,'<br/>');
  const wrap=(title,body)=>'<?xml version="1.0" encoding="utf-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja"><head><title>'+title+'</title><style>body{line-height:1.8}.q{margin:0 0 1.5em 0}.a{font-size:.9em}aside{font-size:.9em;border-top:1px dotted #999;padding-top:.3em;margin-top:.5em}u{text-decoration:none;border-bottom:2px solid #000;font-weight:bold}</style></head><body>'+body+'</body></html>';
  const chapters=[],files=[];
  cats.forEach((cat,ci)=>{
    const qs=[];Q.forEach((q,i)=>{if(q.t===cat)qs.push({q,i})});
    let body='<h1>'+cat+'（'+qs.length+'題）</h1>',notes='';
    qs.forEach((x,n)=>{
      const ord=shuffle([0,1,2,3]);
      const letter='ABCD'[ord.indexOf(x.q.a)];
      const opts=ord.map((oi,k)=>'ABCD'[k]+'．'+fix(x.q.c[oi])).join('<br/>');
      body+='<div class="q"><p><b>'+(n+1)+'．</b>'+fix(x.q.q)+'</p><p>'+opts+'</p><p class="a"><a epub:type="noteref" href="#n'+x.i+'">▶ 答案・解說</a></p></div>';
      notes+='<aside id="n'+x.i+'" epub:type="footnote"><p><b>'+(n+1)+'．正解：'+letter+'．'+fix(x.q.c[x.q.a])+'</b><br/>'+fix(x.q.e)+'</p></aside>';
    });
    body+='<h2>解答・解説一覧</h2>'+notes;
    chapters.push({href:'c'+ci+'.xhtml',title:cat});
    files.push({name:'OEBPS/c'+ci+'.xhtml',text:wrap(cat,body)});
  });
  const title=document.title;
  const nav=wrap('目次','<nav epub:type="toc"><h1>目次</h1><ol>'+chapters.map(c=>'<li><a href="'+c.href+'">'+c.title+'</a></li>').join('')+'</ol></nav>');
  const opf='<?xml version="1.0" encoding="utf-8"?>\n<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">urn:uuid:jlpt-quiz-'+Date.now()+'</dc:identifier><dc:title>'+title+'</dc:title><dc:language>ja</dc:language><meta property="dcterms:modified">'+new Date().toISOString().replace(/\.\d+Z$/,'Z')+'</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>'+chapters.map((c,i)=>'<item id="c'+i+'" href="'+c.href+'" media-type="application/xhtml+xml"/>').join('')+'</manifest><spine>'+chapters.map((c,i)=>'<itemref idref="c'+i+'"/>').join('')+'</spine></package>';
  const container='<?xml version="1.0" encoding="utf-8"?>\n<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';
  const list=[{name:'mimetype',text:'application/epub+zip'},{name:'META-INF/container.xml',text:container},{name:'OEBPS/content.opf',text:opf},{name:'OEBPS/nav.xhtml',text:nav}].concat(files);
  return zipStore(list.map(f=>({nameBytes:enc.encode(f.name),data:enc.encode(f.text)})));
}
function makeEpub(){
  const blob=new Blob([buildEpub()],{type:'application/epub+zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=document.title.replace(/\s+/g,'')+'.epub';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
}

function end(){
  const s=S.session;
  const pct=Math.round(s.right/s.idx.length*100);
  const byCat={};
  s.log.forEach(l=>{byCat[l.t]=byCat[l.t]||[0,0];byCat[l.t][1]++;if(l.ok)byCat[l.t][0]++});
  const rows=Object.entries(byCat).map(([c,[r,n]])=>`<div class="stat"><span>${c}</span><span>${r} / ${n}（${Math.round(r/n*100)}%）</span></div>`).join('');
  const msg=pct>=80?'💮 素晴らしい！這個水準上考場沒問題':pct>=60?'👍 及格線附近，把錯題本刷熟就穩了':'💪 先別灰心，錯題就是你的提分空間';
  const due=dueList().length;
  app.innerHTML=`
  <h1>測驗結束</h1>
  <div class="card">
    <div class="big">${pct}<span style="font-size:1.2rem">分</span></div>
    <div style="text-align:center;color:#53685e">答對 ${s.right} / ${s.idx.length} 題　${msg}</div>
  </div>
  <div class="card"><div class="tag">本次各類正確率</div>${rows}</div>
  <div class="card">
    <button class="warn" onclick="start('due')" ${due?'':'disabled style="opacity:.4"'}>📅 今日複習（${due} 題）</button>
    <button class="secondary" onclick="exportWrong()" ${S.wrong.length?'':'disabled style="opacity:.4"'}>📋 匯出錯題給 AI 解說</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
  S.session=null;save();
}

if(S.session&&S.session.pos<S.session.idx.length){
  const s=S.session;
  app.innerHTML=`<h1>🎯 N3 考前猜題 500</h1>
  <div class="card">
    <div style="margin-bottom:10px">偵測到上次未完成的測驗（${s.pos} / ${s.idx.length} 題）</div>
    <button class="primary" onclick="renderQ()">▶ 繼續上次測驗</button>
    <button class="secondary" onclick="home()">放棄，回首頁</button>
  </div>`;
}else home();
</script>
