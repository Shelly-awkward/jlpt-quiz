// ================= 聴解・課題理解 =================
{t:"聴解・課題理解",s:"男：会議の資料、もうコピーした？／女：はい、20部。でも部長がグラフを差し替えるとおっしゃっていて、新しいデータがまだ届いていないんです。／男：じゃ、コピーはやり直しだな。データが来たらすぐ差し替えて刷り直して。古いのはシュレッダーにかけておいて。／女：わかりました。じゃ、まず古いほうを処分しますね。",q:"質問：女の人はこのあとまず何をしますか。",c:["古い資料をシュレッダーにかける","新しいデータを部長に送る","資料を20部コピーする","グラフを作り直す"],a:0,e:"最後一句「まず古いほうを処分します」。重印要等新資料到。"},
{t:"聴解・課題理解",s:"女：来週の出張、新幹線の切符はもう取った？／男：うん、行きは取れたんだけど、帰りが満席で。／女：じゃあ、帰りは飛行機にしたら？夕方の便ならまだ空いてるはずよ。／男：そうだね。ホテルはもう予約してあるから、あとはそれだけだ。",q:"質問：男の人はこのあと何をしますか。",c:["帰りの飛行機を予約する","ホテルを予約する","行きの切符を買う","出張を延期する"],a:0,e:"「あとはそれだけ」＝帰りの飛行機。去程票已買、飯店已訂。"},
{t:"聴解・課題理解",s:"男：もしもし、山田眼科ですが、明日10時にご予約の田中様でいらっしゃいますか。／女：はい、そうです。／男：申し訳ありません。院長が急用で、明日の午前が休診になりまして。明日の午後3時か、あさっての同じ時間はいかがでしょうか。／女：明日の午後は仕事が…。じゃ、あさってでお願いします。",q:"質問：女の人はいつ病院に行きますか。",c:["あさっての午前10時","明日の午前10時","明日の午後3時","あさっての午後3時"],a:0,e:"「あさっての同じ時間」＝原預約同時段＝午前10時。"},
{t:"聴解・課題理解",s:"女：新人歓迎会の店、決まった？／男：候補は二つ。駅前の居酒屋と、会社の近くのイタリアン。／女：人数が多いから、個室のあるほうがいいんじゃない？／男：個室があるのは居酒屋のほうだね。じゃ、そっちで20人、仮予約しておくよ。／女：お願い。あ、その前に部長の都合だけ確認しておいて。日にちが変わるかもしれないから。",q:"質問：男の人はこのあとまず何をしますか。",c:["部長の都合を確認する","居酒屋を仮予約する","イタリアンの店を見に行く","参加者の人数を数える"],a:0,e:"「その前に部長の都合だけ確認しておいて」——課題理解最愛考「まず」的順序翻轉。"},
{t:"聴解・課題理解",s:"男：このプリンター、また紙が詰まってる。／女：さっき直したばかりなのに。何回も詰まるなら、業者を呼んだほうがいいかな。／男：その前に、裏のカバーを開けて、破れた紙が残っていないか見てみて。それでだめなら修理だね。／女：わかった、やってみる。",q:"質問：女の人はこのあとまず何をしますか。",c:["カバーを開けて紙が残っていないか確認する","修理の業者に電話する","新しいプリンターを注文する","印刷用紙を補充する"],a:0,e:"「その前に〜見てみて」→先自行檢查，不行才叫修理。"},
{t:"聴解・課題理解",s:"女：部長、企画書に目を通していただけましたか。／男：ああ、読んだよ。内容はいいんだが、コストの試算が甘いな。ここを具体的な数字で示してくれれば、役員会に出せる。／女：承知しました。では数字を詰めて、あしたの朝までに再提出します。",q:"質問：女の人は企画書をどう直しますか。",c:["コストの試算を具体的な数字にする","タイトルを分かりやすくする","ページ数を減らす","図表を増やす"],a:0,e:"「試算が甘い」「具体的な数字で示して」＝唯一の修正点。内容はいい＝不用改。"},
{t:"聴解・課題理解",s:"男：レポートの提出、あしたまでだったよね。／女：うん。でも先生が、参考文献のリストがない人は受け取らないって言ってたよ。／男：えっ、本文はできてるけど、リストはまだだ。／女：書式は学部のサイトに見本があるから、それを見て作るといいよ。",q:"質問：男の人はこのあと何をしますか。",c:["サイトの見本を見て参考文献リストを作る","レポートの本文を書く","先生に締め切りの延長を頼む","図書館で本を借りる"],a:0,e:"本文已完成，缺的是参考文献リスト→照網站範本做。"},
{t:"聴解・課題理解",s:"女：あ、雨が降ってきた。洗濯物、外に干したままだ。／男：僕が取り込むよ。君は先に買い物に行っちゃって。夕方はスーパーが混むから。／女：ありがとう。じゃ、車を使うね。",q:"質問：男の人はこのあと何をしますか。",c:["洗濯物を取り込む","買い物に行く","車を運転する","洗濯をやり直す"],a:0,e:"分工：男＝收衣服、女＝開車買菜。"},
{t:"聴解・課題理解",s:"男：課長、来月の展示会のポスターができました。／女：うん…写真はいいけど、日時の文字が小さくて遠くから見えないわね。それに、会場までの地図も入れてほしいの。／男：わかりました。文字を大きくして、地図を追加します。色はこのままでいいですか。／女：ええ、色は今のままで。",q:"質問：男の人はポスターをどう直しますか。",c:["日時の文字を大きくして、地図を加える","写真を差し替えて、色を変える","色を明るくして、文字を減らす","地図を削って、写真を大きくする"],a:0,e:"修正2点＝文字大きく＋地図追加。写真と色はそのまま。"},
{t:"聴解・課題理解",s:"女：（留守番電話）もしもし、佐藤です。あしたの打ち合わせですが、先方のご都合で2時から4時に変更になりました。場所は同じ、本社の5階です。それから、前回の議事録を3部印刷して持ってきてください。よろしくお願いします。",q:"質問：メッセージを聞いた人は、あした何を持っていかなければなりませんか。",c:["前回の議事録を3部","企画書を3部","名刺を3枚","今回の資料を5部"],a:0,e:"「議事録を3部印刷して持ってきて」。5階は場所、不是部数——數字混淆是聽解定番。"},
{t:"聴解・課題理解",s:"男：すみません、この靴、昨日買ったんですが、サイズが小さくて。交換できますか。／女：かしこまりました。レシートはお持ちですか。／男：あ、家に忘れてきました。／女：レシートがないと交換できない決まりでして…。お手数ですが、お持ちいただけますか。",q:"質問：男の人は靴を交換するために、何をしなければなりませんか。",c:["レシートを持ってもう一度店に来る","靴の箱を持ってくる","領収書を再発行してもらう","別の店舗に問い合わせる"],a:0,e:"「レシートがないと交換できない」→回家拿收據再來。"},
{t:"聴解・課題理解",s:"女：ゼミの合宿、宿はもう決まった？／男：うん、湖のそばのホテル。あとはバスの手配だけ。／女：バスなら、大学の生協で頼むと安いよ。ただ、申し込みは出発の1週間前までだって。／男：もう10日前だ！今日中に電話しなきゃ。",q:"質問：男の人は今日中に何をしますか。",c:["生協にバスの申し込みをする","ホテルを予約する","合宿の日程を変える","参加者を集める"],a:0,e:"住宿已定，剩巴士。期限は1週間前＝あと3日→今日申込。"},
{t:"聴解・課題理解",s:"男：来週の面接、何を準備すればいいかな。／女：会社のことは調べた？／男：ホームページは読んだよ。／女：じゃあ、あとは志望動機を自分の言葉で言えるように練習することね。私が面接官役をやってあげる。／男：助かる。じゃ、今晩お願い。",q:"質問：男の人は今晩何をしますか。",c:["友達を相手に面接の練習をする","会社のホームページを読む","履歴書を書き直す","スーツを買いに行く"],a:0,e:"HP已讀完→剩下的準備＝模擬面接（女生當面試官）。"},
{t:"聴解・課題理解",s:"女：課長、体調が悪いので、午後は早退させていただきたいのですが。／男：それはいけないね。病院には行くの？／女：はい、駅前の内科に。／男：じゃあ、3時の会議の資料は山本さんに引き継いでおいて。それだけ頼むよ。／女：はい、渡してから失礼します。",q:"質問：女の人は早退する前に何をしますか。",c:["会議の資料を山本さんに引き継ぐ","病院に電話で予約する","3時の会議に出席する","診断書を提出する"],a:0,e:"「渡してから失礼します」＝先交接資料再走。"},
{t:"聴解・課題理解",s:"男：この書類、ハンコが課長のしかないけど、部長のもいるんじゃない？／女：あ、ほんとだ。部長は今日、出張で…。／男：確か夕方には戻るって言ってたよ。／女：じゃあ、戻られたらすぐお願いできるように、机の上に置いて、メモを付けておきます。",q:"質問：女の人はこのあと何をしますか。",c:["書類にメモを付けて部長の机に置く","課長にもう一度ハンコをもらう","書類を出張先に郵送する","あしたまで何もしない"],a:0,e:"部長傍晚回來→放桌上附メモ等他蓋章。"},
{t:"聴解・課題理解",s:"女：もしもし、ガス会社ですか。給湯器のお湯が出なくて。／男：確認ですが、キッチンのお湯も出ませんか。／女：はい、どこも出ません。／男：では、点検に伺います。あすの午前と午後、どちらがよろしいですか。／女：午前は用事があるので、午後お願いします。",q:"質問：ガス会社の人はいつ来ますか。",c:["あしたの午後","今日の午後","あしたの午前","今日の夜"],a:0,e:"「あすの午前と午後」の二択→女の人は午後を選択。"},
{t:"聴解・課題理解",s:"男：発表のスライド、できた？／女：うん。でも持ち時間15分に対して、枚数が多すぎる気がして。30枚あるの。／男：1分2枚が限度って言うから、半分くらいに絞ったほうがいいね。細かいデータの表は配布資料に回したら？／女：そうする。",q:"質問：女の人はこのあとスライドをどうしますか。",c:["半分ほどに減らして、細かい表は配布資料にする","30枚すべて作り直す","発表時間を延ばしてもらう","表をすべて削除する"],a:0,e:"30枚→半分に絞る＋表は配布資料へ。刪除≠移到配布資料。"},
{t:"聴解・課題理解",s:"女：週末のバーベキュー、天気が心配ね。／男：予報だと降水確率60％だって。／女：じゃあ、中止にする？／男：いや、屋根付きの会場に変更しよう。キャンセル料がかかる前に、今日中に今の会場に連絡して、それから新しい所を予約するよ。",q:"質問：男の人はこのあとまず何をしますか。",c:["今の会場にキャンセルの連絡をする","屋根付きの会場を予約する","天気予報をもう一度確認する","バーベキューを中止にする"],a:0,e:"順序：先取消現會場（今日中、キャンセル料の前）→再訂新場地。"},
{t:"聴解・課題理解",s:"男：（店内アナウンス）ご来店のお客様に申し上げます。本日、駐車場が大変混み合っております。お帰りの際は、レジにて駐車券をご提示ください。2時間分の無料処理をいたします。なお、5,000円以上お買い上げのお客様は、サービスカウンターにて3時間まで無料となります。",q:"質問：6,000円買い物をした客は、駐車を3時間無料にするためにどうしますか。",c:["サービスカウンターで駐車券を出す","レジで駐車券を出す","駐車場の係員に申し出る","何もしなくてよい"],a:0,e:"5,000円以上＝サービスカウンターで3時間。レジは2時間まで。"},
{t:"聴解・課題理解",s:"女：あのう、粗大ごみの回収をお願いしたいんですが。ベッドを一つ。／男：はい。回収は毎週水曜です。コンビニで回収券を1,200円分買っていただいて、ベッドに貼って、当日の朝8時までに家の前に出してください。／女：わかりました。予約は必要ですか。／男：ベッドのような大きい物は、前日までにお電話ください。",q:"質問：女の人が回収の前日までにしなければならないことは何ですか。",c:["電話で予約する","回収券を貼って外に出す","ベッドを解体しておく","市役所に書類を出す"],a:0,e:"「前日までに」対応するのは電話予約。券を貼って出すのは「当日の朝8時まで」。"},
{t:"聴解・課題理解",s:"男：山口さん、頼んでいた翻訳、どう？／女：あと3ページです。今日中には終わります。／男：実は先方が、あしたの朝一番に欲しいと言い出して。悪いけど、終わったらすぐ、確認用に私にメールで送ってくれる？印刷はこっちでやるから。／女：わかりました。",q:"質問：女の人は翻訳が終わったら、まず何をしますか。",c:["男の人にメールで送る","印刷して製本する","先方に直接届ける","残りの3ページを外注する"],a:0,e:"「終わったらすぐ〜メールで送って」。印刷は男の人の担当。"},
{t:"聴解・課題理解",s:"女：田中君、悪いんだけど、会議室の予約、木曜の午後に変更してくれない？／男：木曜ですね。何時からですか。／女：2時から2時間。それと、人数が5人から8人に増えたから、広いほうの部屋でお願い。／男：大会議室ですね。空いているか見てみます。",q:"質問：男の人はどんな予約を取りますか。",c:["木曜の2時から2時間、大会議室","木曜の2時から2時間、小会議室","水曜の2時から2時間、大会議室","木曜の5時から2時間、大会議室"],a:0,e:"三条件：木曜／2時から2時間／広いほう（大会議室）。人数5→8は部屋選択の理由。"},
{t:"聴解・課題理解",s:"男：あーあ、財布を落としちゃった。／女：えっ、どこで？／男：たぶん電車の中。カードも入ってたんだ。／女：じゃあ、まずカード会社に電話して止めてもらいなさいよ。悪用されたら大変。駅への問い合わせはそのあとでいいから。",q:"質問：男の人はこのあとまず何をしますか。",c:["カード会社に電話してカードを止める","駅に問い合わせる","警察に届けを出す","新しい財布を買う"],a:0,e:"「まず〜止めてもらいなさい」「駅への問い合わせはそのあと」。"},
{t:"聴解・課題理解",s:"女：来客用のお茶菓子、切らしてるの。悪いけど、買ってきてくれる？／男：いいですよ。いつもの和菓子屋のですか。／女：それが、今日のお客様は洋菓子がお好きだそうなの。駅ビルの洋菓子店で、日持ちより見た目が華やかなものを選んで。／男：わかりました。",q:"質問：男の人はどんなお菓子を買いますか。",c:["洋菓子店の見た目が華やかなもの","いつもの和菓子屋のもの","日持ちする洋菓子","駅ビルの和菓子"],a:0,e:"客人喜歡洋菓子＋「日持ちより見た目」＝華やか優先。"},
{t:"聴解・課題理解",s:"男：引っ越しの見積もり、二社から来たよ。／女：どうだった？／男：A社は8万円で段ボール50箱付き。B社は7万円だけど、箱は自分で用意しなきゃならない。／女：箱を買ったら5千円はかかるし、手間も考えたらA社かな。／男：そうだね。じゃ、そっちに決めて連絡するよ。",q:"質問：男の人はこのあと何をしますか。",c:["A社に依頼の連絡をする","B社に依頼の連絡をする","段ボールを買いに行く","もう一社見積もりを取る"],a:0,e:"比較後A社に決定→「そっちに決めて連絡する」。"},
{t:"聴解・課題理解",s:"女：もしもし、7時に4名で予約した中村ですが、1人増えて5名になりそうなんです。／男：5名様ですね。あいにく個室は4名様まででして、テーブル席なら5名様でご用意できますが。／女：じゃあ、テーブル席でお願いします。時間は変わりません。",q:"質問：店の人はどんな席を用意しますか。",c:["7時にテーブル席を5名分","7時に個室を5名分","8時にテーブル席を4名分","7時に個室を4名分"],a:0,e:"人数4→5、個室不可→テーブル席。時間は変更なし。"},
{t:"聴解・課題理解",s:"男：（図書館で）すみません、この本の続きの巻を探しているんですが、棚にはなくて。／女：お調べします。…2巻は貸出中ですね。ご予約いただければ、返却され次第お電話でお知らせします。／男：お願いします。あ、電話よりメールがいいんですが。／女：では、こちらの用紙にメールアドレスをご記入ください。",q:"質問：男の人はこのあと何をしますか。",c:["用紙にメールアドレスを書く","2巻を棚に探しに行く","電話番号を伝える","別の図書館に行く"],a:0,e:"預約通知改用メール→填寫用紙。"},
{t:"聴解・課題理解",s:"女：課長への出張報告、メールでいいのかな。／男：うちの部は、報告書の形にして紙で出す決まりだよ。様式は共有フォルダーに入ってる。／女：そうなんだ。じゃ、それをダウンロードして書きます。／男：出す前に、領収書も忘れずに貼っておいてね。",q:"質問：女の人はまず何をしますか。",c:["共有フォルダーから様式をダウンロードする","課長にメールを送る","領収書を経理に出す","出張の予定を立てる"],a:0,e:"先取様式→填写→貼收據→提出。第一步是下載様式。"},
{t:"聴解・課題理解",s:"男：新しいパソコン、設定できた？／女：メールはできたんだけど、プリンターがつながらなくて。／男：ドライバーは入れた？メーカーのサイトから落とすんだよ。／女：あ、それはまだ。CDがないから困ってたの。／男：今はみんなサイトからだよ。型番で検索してみて。",q:"質問：女の人はこのあと何をしますか。",c:["メーカーのサイトでドライバーを探す","CDを買いに行く","メールの設定をする","新しいプリンターを注文する"],a:0,e:"問題＝ドライバー未安裝→官網下載（用型番検索）。"},
{t:"聴解・課題理解",s:"女：あのう、あしたの健康診断、何か注意することはありますか。／男：はい。前日の夜9時からは何も食べないでください。水は構いません。それから、当日は朝の薬も飲まずに、持ってきて受付で見せてください。／女：わかりました。",q:"質問：女の人は当日の朝、薬をどうしますか。",c:["飲まずに持ってきて受付で見せる","いつもどおり飲んでから来る","半分だけ飲む","家に置いてくる"],a:0,e:"「飲まずに、持ってきて受付で見せて」＝三つの動作を全部満たす選択肢。"},
{t:"聴解・課題理解",s:"男：車の修理の見積もり、10万円だって。／女：高いわね。買い替えも考えたら？もう10年乗ってるし。／男：うーん、でも急には決められないよ。／女：じゃ、とりあえず修理はまだ頼まないで、週末に販売店で新車の値段だけ見てこない？それから決めましょう。／男：そうだな。",q:"質問：二人は週末に何をしますか。",c:["販売店で新車の値段を見る","車を修理に出す","車を売りに行く","レンタカーを借りる"],a:0,e:"修理は保留→先看新車價格再決定。"},
{t:"聴解・課題理解",s:"女：（受付で）セミナーの受付はこちらですか。／男：はい。お名前の札を胸に付けて、資料を受け取って、会場へお入りください。前のほうの席は講師の関係者席ですので、一般の方は3列目から後ろへお願いします。／女：わかりました。",q:"質問：女の人はどの席に座りますか。",c:["3列目から後ろの席","1列目の席","2列目の席","どこでも好きな席"],a:0,e:"前2列＝関係者席、一般は「3列目から後ろ」。"},
{t:"聴解・課題理解",s:"男：ベランダの植木、葉が黄色くなってきたんだけど。／女：水のやりすぎじゃない？土が乾いてから水をやるのが基本よ。／男：毎日たっぷりやってたよ。／女：それが原因ね。しばらく水を控えて、様子を見て。それでも戻らなかったら、植え替えましょう。",q:"質問：男の人はこのあとどうしますか。",c:["水やりを控えて様子を見る","毎日水をたっぷりやる","すぐに植え替える","肥料を足す"],a:0,e:"原因＝澆太多水→先控水觀察，沒改善才換盆。"},
{t:"聴解・課題理解",s:"女：（駅のアナウンス）ただいま、強風のため、海岸線は上下線とも運転を見合わせております。復旧の見込みは立っておりません。お急ぎのところ恐れ入りますが、山手線へお回りいただくか、駅前より路線バスをご利用ください。なお、振替輸送を実施しておりますので、切符をお持ちの方はそのままご乗車いただけます。",q:"質問：海岸線の切符を持っている人は、バスに乗るときどうすればいいですか。",c:["切符をそのまま使って乗る","新しくバスの切符を買う","窓口で払い戻しを受けてから乗る","バスには乗れない"],a:0,e:"「振替輸送を実施〜切符をお持ちの方はそのままご乗車いただけます」。"},
{t:"聴解・課題理解",s:"男：あれ、宅配ボックスがいっぱいで、荷物が入らなかったみたいだ。不在票が入ってる。／女：再配達、頼まなきゃね。あしたは一日家にいるから、午前中にしてもらったら？／男：わかった。ウェブで申し込むよ。そのほうが電話より早いし。",q:"質問：男の人はこのあと何をしますか。",c:["ウェブであしたの午前の再配達を申し込む","電話で今日の再配達を頼む","宅配ボックスを空ける","営業所へ荷物を取りに行く"],a:0,e:"手段＝ウェブ、時間＝あしたの午前中。"},
{t:"聴解・課題理解",s:"女：同窓会の会費、集まりはどう？／男：まだ半分くらいかな。振り込みだと手数料がかかるって不評でさ。／女：じゃあ、当日受付で現金払いもできるようにしたら？その代わり、出欠の返事だけは今週中にもらわないと、店に人数を伝えられないよ。／男：そうだね。みんなにその2点をメールするよ。",q:"質問：男の人はメールで何を知らせますか。",c:["当日現金払いも可能なことと、出欠の返事の期限","会費の値上げと、店の場所","振込先の変更と、日程の変更","幹事の交代と、会費の免除"],a:0,e:"「その2点」＝現金払いOK＋出欠は今週中。"},
{t:"聴解・課題理解",s:"男：名刺がもうすぐなくなりそうなんですが。／女：発注は総務のシステムからよ。ただ、今月から部署名が変わったでしょう。古いデータのまま頼まないように、まず登録情報を直してから注文してね。／男：あ、危なかった。ありがとうございます。",q:"質問：男の人は名刺を注文する前に何をしますか。",c:["システムの登録情報を新しい部署名に直す","総務に電話で頼む","古い名刺を全部処分する","デザインを選び直す"],a:0,e:"「まず登録情報を直してから注文」。部署名変更がポイント。"},
{t:"聴解・課題理解",s:"女：もしもし、予約していた歯医者ですが、急に都合が悪くなって。あさってに変えていただけますか。／男：あさってですと、午前は11時、午後は4時に空きがございます。／女：午前は会議があるので、午後で。／男：では、あさっての4時にお待ちしております。",q:"質問：女の人はいつ歯医者に行きますか。",c:["あさっての午後4時","あさっての午前11時","あしたの午後4時","今日の午後4時"],a:0,e:"改約→あさって、午前×（会議）→午後4時。"},
{t:"聴解・課題理解",s:"男：レンタカーの予約、したよ。土曜の朝9時から。／女：ありがとう。免許証、忘れないでね。／男：うん。あと、店の人が、出発前にガソリンが満タンか一緒に確認するから、9時より15分早く来てくれって。／女：じゃ、8時45分に店の前で待ち合わせね。",q:"質問：二人は土曜日、何時に店に行きますか。",c:["8時45分","9時","9時15分","8時30分"],a:0,e:"9時出発だが「15分早く」＝8時45分集合。"},
{t:"聴解・課題理解",s:"女：先輩の退職祝い、何がいいと思う？／男：お酒はどうかな。好きだって聞いたことがある。／女：それが、最近健康のためにやめたらしいのよ。／男：じゃあ、趣味の登山で使えるものは？水筒とか。／女：いいわね。じゃ、あした山道具の店を見に行きましょう。",q:"質問：二人は先輩に何を贈ることにしましたか。",c:["登山で使える水筒などの道具","好きだと聞いたお酒","健康食品の詰め合わせ","旅行券"],a:0,e:"酒→已戒（陷阱）。改送登山用品。"},
{t:"聴解・課題理解",s:"男：先輩、この案内状、目を通していただけますか。／女：どれ。…あ、日付が去年のままになってるわよ。それに、社名の「株式会社」の位置が前と後ろで揺れてる。会社の正式名称に統一して。／男：すみません、すぐ直します。",q:"質問：男の人は案内状のどこを直しますか。",c:["日付と社名の表記","住所と電話番号","宛名と挨拶文","フォントと色"],a:0,e:"指摘2点＝日付（去年のまま）＋社名表記の統一。"},
{t:"聴解・課題理解",s:"女：あっ、家の鍵がない！／男：かばんの中は見た？／女：見た。ポケットも。最後に使ったのは今朝、家を出るとき…あ、ジムに行ったんだった。／男：じゃ、ロッカーかもしれないよ。閉まる前に電話してみたら？／女：そうする。",q:"質問：女の人はこのあとまず何をしますか。",c:["ジムに電話して鍵を探してもらう","家に戻って探す","警察に届ける","鍵屋を呼ぶ"],a:0,e:"推理：最後可能落在ジムのロッカー→先打電話問。"},
{t:"聴解・課題理解",s:"男：来月の社内研修、参加者がまだ10人しか集まってなくて。定員は30人なんですが。／女：案内はどうやって出したの？／男：全社メールで一回だけです。／女：メールは埋もれるのよね。各部の朝礼で口頭でも案内してもらったら？部長会で私から頼んであげる。／男：ありがとうございます。では、案内用の短い原稿を作ってお渡しします。",q:"質問：男の人はこのあと何をしますか。",c:["朝礼での案内用の原稿を作る","全社メールをもう一度送る","定員を10人に減らす","研修を延期する"],a:0,e:"「案内用の短い原稿を作ってお渡しします」＝男の人の次の行動。"},
{t:"聴解・課題理解",s:"女：（電話）お世話になっております。注文した椅子なんですが、届いたら脚が一本曲がっていて。／男：申し訳ございません。すぐに交換品をお送りします。お手元の商品は、恐れ入りますが、交換品の箱に入れて、配達員にお渡しください。伝票はこちらで用意します。／女：わかりました。",q:"質問：女の人は曲がった椅子をどうしますか。",c:["交換品の箱に入れて配達員に渡す","自分で店に持っていく","粗大ごみに出す","伝票を書いて送り返す"],a:0,e:"「交換品の箱に入れて、配達員にお渡しください」。伝票は店側が用意。"},
{t:"聴解・課題理解",s:"男：週末の写真展、搬入は金曜の夜だよね。額に入れた作品は全部で12点。／女：会場の壁の都合で、飾れるのは10点までだって、さっき連絡が来たの。／男：えっ、じゃあ2点減らさないと。／女：ええ。どれを外すか、今夜中に決めて主催者にメールしなきゃ。",q:"質問：二人は今夜中に何をしますか。",c:["外す2点を決めて主催者にメールする","作品を2点買い足す","会場の壁を広げてもらう","搬入を土曜に変更する"],a:0,e:"12点→10点まで→今夜選出要撤的2点並通知主催者。"},
{t:"聴解・課題理解",s:"女：新製品の発表会、司会の台本はできたんだけど、時間を計ったら5分もオーバーしてて。／男：どこか削れそう？／女：製品の歴史の部分が長いのよね。／男：そこはパンフレットにも書いてあるから、思い切って全部カットしていいよ。その分、実演の時間を守って。／女：わかった。",q:"質問：女の人は台本をどう直しますか。",c:["製品の歴史の部分を全部削る","実演の時間を短くする","司会を二人に増やす","発表会の時間を延ばす"],a:0,e:"削る対象＝歴史の部分（パンフに載っている）。実演は守る。"},
{t:"聴解・課題理解",s:"男：あのう、この電子レンジ、保証期間内なんですが、動かなくなって。／女：かしこまりました。保証書はお持ちですか。／男：はい、これです。／女：ありがとうございます。修理には2週間ほどかかります。完了しましたらお電話しますので、この控えを持って受け取りにいらしてください。",q:"質問：男の人は修理が終わったら、何を持って店に行きますか。",c:["渡された控え","保証書","レシート","電子レンジの箱"],a:0,e:"「この控えを持って受け取りに」。保証書は既に提出済み。"},
{t:"聴解・課題理解",s:"女：課長、来週の新人研修の会場ですが、申し込んだ部屋が工事で使えなくなったそうです。／男：困ったな。同じビルに代わりの部屋は？／女：小さい部屋なら空いていると。ただ、定員40人のところ、参加者は45人でして。／男：じゃあ、研修を午前と午後の2回に分けよう。名簿を半分にして、対象者に時間を連絡して。",q:"質問：女の人はこのあと何をしますか。",c:["名簿を分けて参加者に時間を連絡する","大きい会場を新しく探す","参加者を40人に減らす","工事の日程を変えてもらう"],a:0,e:"解決策＝2回に分ける→「名簿を半分にして、対象者に時間を連絡して」。"},
{t:"聴解・課題理解",s:"男：もしもし、パスポートの申請について伺いたいんですが、必要なものは何でしょうか。／女：申請書、戸籍謄本、写真、本人確認書類です。写真は6か月以内に撮影したものに限ります。／男：写真、去年撮ったのがあるんですが。／女：それはお使いいただけませんね。撮り直してください。",q:"質問：男の人は申請の前に何をしなければなりませんか。",c:["写真を撮り直す","戸籍謄本を書き直す","申請書を郵送する","去年の写真を探す"],a:0,e:"写真は6か月以内限定→去年のは不可→撮り直し。"},
{t:"聴解・課題理解",s:"女：ねえ、ベビーカー、電車に持ち込むとき、たたまなきゃいけないのかな。／男：この鉄道会社のサイトには、たたまなくていいって書いてあるよ。ただ、車両の端のスペースに止めて、ブレーキをかけてくださいって。／女：わかった。じゃ、乗ったら端に行くね。",q:"質問：女の人は電車の中でベビーカーをどうしますか。",c:["車両の端に止めてブレーキをかける","たたんで網棚に載せる","ドアの前に置く","駅に預ける"],a:0,e:"たたむ必要なし＋「端のスペース＋ブレーキ」。"},
{t:"聴解・課題理解",s:"男：田中さん、この請求書、金額が見積もりと違うんだけど。／女：本当ですね。1万円多い…。／男：先方に確認してくれる？こっちのミスかもしれないから、責めるような言い方はしないで。事実の確認だけね。／女：はい、では先方に電話で確認します。",q:"質問：女の人はどのように確認しますか。",c:["責めずに、事実だけを電話で確認する","間違いを強く指摘する","メールで抗議文を送る","支払いを止めると伝える"],a:0,e:"指示＝「責めるような言い方はしないで。事実の確認だけ」。"},
{t:"聴解・課題理解",s:"女：山田さん、来週の商品撮影、モデルさんの衣装はそろった？／男：はい。ただ、青のワンピースだけ、サイズ違いが届いてしまって。／女：撮影は火曜よ。間に合う？／男：業者は、あした発送すれば月曜に着くと言っています。今日中に交換の手続きをします。",q:"質問：男の人は今日中に何をしますか。",c:["衣装の交換手続きをする","モデルを変更する","撮影を延期する","青以外の衣装を注文する"],a:0,e:"「今日中に交換の手続きをします」。月曜到着→火曜撮影に間に合う。"},
{t:"聴解・課題理解",s:"男：来月から自転車通勤にしようと思うんだ。／女：会社に届け出た？自転車通勤は保険の加入証明がいるのよ。／男：えっ、そうなの。／女：まず保険に入って、証明書のコピーを総務に出すの。許可が出るまでは電車で来てね。",q:"質問：男の人は自転車通勤を始める前に、まず何をしますか。",c:["自転車保険に入って証明書を総務に出す","新しい自転車を買う","駐輪場を契約する","電車の定期を解約する"],a:0,e:"手順：保険加入→証明書提出→許可。それまでは電車。"},
{t:"聴解・課題理解",s:"女：（美容院で）今日はどうなさいますか。／男：全体に短くしてください。あと、白髪が目立ってきたので染めたいんですが。／女：カットとカラーですと2時間半ほどかかりますが、お時間は大丈夫ですか。／男：あ、3時に約束が…。今1時だから…じゃあ、今日はカットだけにして、カラーは予約を取って後日お願いします。",q:"質問：男の人は今日、何をしますか。",c:["カットだけする","カットとカラーをする","カラーだけする","予約だけして帰る"],a:0,e:"2時間半→3時の約束に間に合わない→今日はカットのみ、カラーは後日。"},
{t:"聴解・課題理解",s:"男：部長、来期の予算案ですが、広告費を2割増やしたいと考えています。／女：根拠は？／男：ネット広告の効果が数字で出ています。こちらの資料に。／女：分かった。ただ、役員会に出すなら、増やす分どこを削るかもセットで示さないと通らないわよ。そこを補って、金曜までに出し直して。",q:"質問：男の人は予算案をどう直しますか。",c:["削減する項目を加えて金曜までに出し直す","広告費をさらに増やす","ネット広告の資料を削る","役員会の日程を変える"],a:0,e:"「増やす分どこを削るかもセットで」＋「金曜までに出し直して」。"},
{t:"聴解・課題理解",s:"女：あのう、この駐車場、月ぎめの契約をしたいんですが。／男：ありがとうございます。空きは2階の奥だけでして、車の高さは155センチまでですが、大丈夫ですか。／女：うちの車、160センチあります…。／男：でしたら、系列の第2駐車場なら高さ制限がありません。歩いて5分ほどですが。／女：じゃ、そちらを見てから決めます。",q:"質問：女の人はこのあとまず何をしますか。",c:["第2駐車場を見に行く","2階の奥を契約する","車を買い替える","ほかの会社の駐車場を探す"],a:0,e:"高さ超過→系列の第2駐車場を「見てから決めます」。"},
{t:"聴解・課題理解",s:"男：先生、レポートのテーマ、「日本の食文化」で書きたいんですが。／女：範囲が広すぎるわね。それでは図書館の本の丸写しになりがちよ。地域か時代か、どちらかに絞りなさい。／男：じゃあ、江戸時代の江戸の食文化にします。／女：いいでしょう。まず参考文献を3冊選んで、リストを来週見せて。",q:"質問：男の人は来週までに何をしますか。",c:["参考文献を3冊選んでリストを見せる","レポートを完成させる","テーマをもう一度変える","図書館の本を丸写しする"],a:0,e:"「まず参考文献を3冊選んで、リストを来週見せて」。"},
{t:"聴解・課題理解",s:"女：（電話）もしもし、佐川さん？ごめん、今日の飲み会、急な残業で30分ほど遅れそうなの。／男：了解。じゃ、先に始めてるよ。店、分かる？／女：駅の北口のほうよね。／男：そう。ビルの5階。エレベーターを降りて右側。着いたら僕の携帯に電話して。席まで迎えに行くから。",q:"質問：女の人は店に着いたら、何をしますか。",c:["男の人の携帯に電話する","受付で名前を言う","席を探して歩き回る","店の外で待つ"],a:0,e:"「着いたら僕の携帯に電話して。席まで迎えに行く」。"},
{t:"聴解・課題理解",s:"男：課の忘年会だけど、幹事は君にお願いしたいんだ。／女：はい。予算はどのくらいで？／男：一人5千円以内。それから、今年は部長が退職される年だから、最後に花束を渡したい。会費とは別に、みんなから500円ずつ集めてくれる？／女：わかりました。では、まず皆さんに集金の案内を出します。",q:"質問：女の人はまず何をしますか。",c:["花束代の集金の案内を出す","店を予約する","花束を注文する","部長に日程を聞く"],a:0,e:"「まず皆さんに集金の案内を出します」＝女の人自身の宣言。"},
{t:"聴解・課題理解",s:"女：このアンケート、回収率が3割しかなくて。／男：紙で配ってるんだっけ。／女：ええ、社内便で。／男：今どき紙はね…。ウェブのフォームにして、メールでリンクを送ったら？スマホでも答えられるようにすれば、倍にはなるよ。／女：やってみます。締め切りも1週間延ばします。",q:"質問：女の人はアンケートをどうしますか。",c:["ウェブフォームにして締め切りを1週間延ばす","紙のまま配る枚数を増やす","回収箱を各階に置く","質問の数を半分にする"],a:0,e:"改善2点＝ウェブ化（スマホ対応）＋締め切り延長。"},
{t:"聴解・課題理解",s:"男：もしもし、山川ホテルですか。15日に予約した鈴木ですが、禁煙の部屋に変えていただきたくて。／女：申し訳ございません。15日は禁煙室が満室でございます。喫煙室の消臭対応でしたら可能ですが。／男：うーん、においに敏感なので…。16日なら空いていますか。／女：16日は禁煙室をご用意できます。／男：じゃあ、日にちを変えます。",q:"質問：男の人はどうすることにしましたか。",c:["予約を16日に変えて禁煙室に泊まる","15日に喫煙室に泊まる","15日に消臭対応の部屋に泊まる","予約を取り消す"],a:0,e:"15日禁煙室×→16日なら○→「日にちを変えます」。"},
{t:"聴解・課題理解",s:"女：発送用の段ボール、在庫が切れそうです。／男：じゃ、いつもの業者に発注しておいて。／女：それが、値上げの連絡が来ていて、1枚あたり20円高くなるそうです。／男：2割の値上げか…。他社の見積もりも取って、比べてから決めよう。発注はその後で。／女：わかりました。",q:"質問：女の人はこのあとまず何をしますか。",c:["他社から見積もりを取る","いつもの業者に発注する","段ボールの使用をやめる","在庫を数え直す"],a:0,e:"「他社の見積もりも取って、比べてから」「発注はその後で」。"},
{t:"聴解・課題理解",s:"男：（薬局で）この薬、1日3回、食後に飲んでください。それから、こちらの白いほうは痛いときだけで結構です。ただし、1日2回までにしてください。／女：痛くなかったら飲まなくていいんですね。／男：はい。あと、この薬を飲む間は、アルコールは控えてくださいね。",q:"質問：白い薬はどのように飲みますか。",c:["痛いときだけ、1日2回まで","毎食後に1日3回","寝る前に1回","アルコールと一緒に"],a:0,e:"白い薬＝頓服（痛いときだけ）＋上限1日2回。もう一方が1日3回食後。"},
{t:"聴解・課題理解",s:"女：町内会の夏祭り、太鼓の演奏を頼んでいた団体が、来られなくなったって。／男：えっ、目玉なのに。代わりを探さないと。／女：近くの高校に和太鼓部があるの。顧問の先生の連絡先なら、うちの息子が知ってるはずよ。／男：じゃ、息子さんに聞いて、私から先生に電話してみるよ。",q:"質問：男の人はこのあとまず何をしますか。",c:["息子さんから先生の連絡先を聞く","高校に直接行く","太鼓の団体に謝る","祭りを中止する"],a:0,e:"手順：先向息子拿連絡方式→再打給老師。"},
{t:"聴解・課題理解",s:"男：新しい掃除機、どこに置く？／女：今までの場所だと、コードが届かなくて。／男：これはコードレスだから、どこでもいいんだよ。ただ、充電用の台をコンセントの近くに固定しないと。／女：じゃあ、廊下の物置の中はどう？中にコンセントがあるし、見た目もすっきりするわ。／男：いいね、そうしよう。",q:"質問：二人は充電用の台をどこに置きますか。",c:["廊下の物置の中","今までの場所","居間のテレビの横","玄関のそば"],a:0,e:"条件＝コンセント近く＋見た目→物置の中に決定。"},
{t:"聴解・課題理解",s:"女：課長、営業先へ持っていくサンプルですが、新色を3点でよろしいですか。／男：うん。ああ、待って。先方は定番色の在庫を気にしていたから、定番の2色も加えて5点にしよう。／女：かしこまりました。では5点、箱に詰めておきます。",q:"質問：女の人はサンプルを何点用意しますか。",c:["5点","3点","2点","8点"],a:0,e:"新色3＋定番2＝5点。数字の足し算は聴解の定番。"},
{t:"聴解・課題理解",s:"男：日曜の草野球、グラウンドは取れた？／女：抽選に外れちゃった。でも、隣町の河川敷なら空きがあるって。／男：あそこは予約がいらないんだっけ。／女：先着順よ。朝8時に係の人が来て受け付けるから、その前に並ばないと。／男：じゃ、当日は7時半に現地集合ってみんなに伝えるよ。",q:"質問：男の人はみんなに何と伝えますか。",c:["日曜の朝7時半に河川敷に集合","日曜の朝8時に隣町の駅に集合","抽選に当たったので予定どおり","野球は中止になった"],a:0,e:"受付8時→その前に並ぶ→7時半現地集合。"},
{t:"聴解・課題理解",s:"女：レシピどおりに作ったのに、ケーキがふくらまなかったの。／男：卵はちゃんと泡立てた？／女：電動じゃなくて、手の泡立て器で5分くらい。／男：それじゃ足りないよ。角が立つまで、倍は混ぜないと。あと、粉を入れたら混ぜすぎないこと。次はその2点に気をつけて。",q:"質問：女の人は次にケーキを作るとき、何に気をつけますか。",c:["卵を十分に泡立て、粉は混ぜすぎない","卵を減らして粉を増やす","オーブンの温度を上げる","焼く時間を倍にする"],a:0,e:"2点＝泡立て不足の解消＋粉を入れた後は混ぜすぎない。"},
{t:"聴解・課題理解",s:"男：あのう、市民マラソンに申し込んだんですが、当日の受付は何時からですか。／女：スタートの1時間前、朝7時からです。ゼッケンは事前に郵送しますので、当日は忘れずにお持ちください。受付では参加賞のTシャツをお渡しします。／男：ゼッケンを忘れたら？／女：本人確認のうえ再発行しますが、時間がかかりますので、お気をつけて。",q:"質問：男の人は大会当日、何を持っていきますか。",c:["郵送されてきたゼッケン","参加賞のTシャツ","申込書のコピー","健康診断書"],a:0,e:"ゼッケン＝事前郵送、当日持参。Tシャツは受付で「もらう」もの。"},
{t:"聴解・課題理解",s:"女：あ、しまった。プレゼン、あしたなのにノートパソコンの画面が映らない。／男：プロジェクターとの接続？それとも画面そのもの？／女：画面そのものが真っ暗なの。／男：それは修理に出すしかないな。あしたは会議室の備え付けのパソコンを使いなよ。データをUSBメモリーに移しておけば大丈夫。／女：そうする。",q:"質問：女の人はあしたのプレゼンのために、何をしておきますか。",c:["データをUSBメモリーに移す","パソコンを修理に出す","プロジェクターを借りる","プレゼンを延期する"],a:0,e:"あしたへの備え＝データをUSBへ（備え付けPCを使用）。修理は別途。"},
// ================= 聴解・ポイント理解 =================
{t:"聴解・ポイント理解",s:"男：おはよう。あれ、目が赤いよ。遅くまで勉強？／女：ううん、勉強は早めに切り上げたの。でも、隣の部屋の工事の音がうるさくて、朝方まで眠れなくて。／男：それはつらいね。試験前なのに。",q:"質問：女の人はどうして目が赤いのですか。",c:["工事の音で眠れなかったから","夜遅くまで勉強したから","泣いていたから","アレルギーだから"],a:0,e:"「勉強は早めに切り上げた」で選項2を否定→原因は工事の音。"},
{t:"聴解・ポイント理解",s:"女：新しいスマホにしたんだ。／男：どこのにしたの？前と同じメーカー？／女：ううん、変えた。デザインは前のが好きだったんだけど、カメラの性能がね。子どもの運動会をきれいに撮りたくて。／男：なるほど、それが決め手か。",q:"質問：女の人はどうしてメーカーを変えましたか。",c:["カメラの性能がいいから","デザインが好きだから","値段が安いから","画面が大きいから"],a:0,e:"デザインは「前のが好き」＝逆方向の情報。決め手＝カメラ。"},
{t:"聴解・ポイント理解",s:"男：昼、いつもの定食屋に行かない？／女：あそこ、今月いっぱいで閉店だって。／男：ええっ、味は評判よかったのに。／女：ご主人が高齢で、後を継ぐ人がいないんだって。建物も古いしね。／男：残念だなあ。",q:"質問：定食屋はどうして閉店するのですか。",c:["店主が高齢で後継者がいないから","味の評判が落ちたから","建物が取り壊されるから","客が減ったから"],a:0,e:"主因＝高齢＋後継者なし。「建物も古いし」は補足。"},
{t:"聴解・ポイント理解",s:"女：課長、顔色が悪いですね。／男：うん、ゆうべ、遅くまで資料を作っててね。／女：お疲れさまです。今日は早く帰れそうですか。／男：それが、夕方から本社で会議なんだ。まあ、あしたは休みだから、何とかなるよ。",q:"質問：男の人はどうして顔色が悪いのですか。",c:["夜遅くまで資料を作っていたから","会議で叱られたから","風邪をひいたから","朝ご飯を食べていないから"],a:0,e:"「ゆうべ、遅くまで資料を作ってて」。会議はこれから（夕方）。"},
{t:"聴解・ポイント理解",s:"男：この店、いつも行列だね。／女：テレビで紹介されたのもあるけど、一番は、注文を受けてからパンを焼くことみたいよ。焼きたてが食べられるの、この辺じゃここだけだもの。／男：なるほど、それは並ぶわけだ。",q:"質問：店に行列ができる一番の理由は何ですか。",c:["注文を受けてから焼くパンが食べられるから","テレビで紹介されたから","値段が安いから","駅から近いから"],a:0,e:"「〜のもあるけど、一番は」＝典型的な言い換え。テレビは副次的理由。"},
{t:"聴解・ポイント理解",s:"女：週末の登山、私、やっぱりやめておくわ。／男：どうして？天気は良さそうだよ。／女：先週痛めた膝がまだ本調子じゃなくて。無理して皆に迷惑をかけたくないの。／男：そうか。じゃ、次回は一緒に行こう。",q:"質問：女の人はどうして登山に行かないのですか。",c:["膝の調子が悪いから","天気が悪そうだから","仕事が入ったから","登山が嫌いになったから"],a:0,e:"天気は「良さそう」＝否定材料。理由＝膝。"},
{t:"聴解・ポイント理解",s:"男：あれ、駅前の駐輪場、ガラガラだね。前は満車だったのに。／女：料金が倍になったのよ、先月から。みんな少し歩いた所の安いほうに移ったみたい。／男：便利さより値段か。",q:"質問：駐輪場が空いているのはどうしてですか。",c:["料金が値上がりしたから","閉鎖が決まったから","新しい駅ができたから","自転車に乗る人が減ったから"],a:0,e:"「料金が倍になった」→利用者は安い方へ流出。"},
{t:"聴解・ポイント理解",s:"女：ゆうべのコンサート、どうだった？／男：演奏は最高だったよ。ただ、席がね…。一番後ろで、舞台がほとんど見えなかった。／女：音は？／男：音はむしろ良かったんだ。だから目を閉じて聴いてたよ。",q:"質問：男の人はコンサートの何が不満でしたか。",c:["舞台がよく見えなかったこと","演奏の質が低かったこと","音が悪かったこと","チケットが高かったこと"],a:0,e:"演奏＝最高、音＝むしろ良い→不満は視界のみ。"},
{t:"聴解・ポイント理解",s:"男：木村さん、最近、営業成績がすごく伸びてるね。何かあったの？／女：お客様への説明を変えたんです。製品の機能じゃなくて、それを使うと毎日がどう変わるかを話すようにしたら、反応が全然違って。／男：なるほど、伝え方か。",q:"質問：女の人の成績が伸びたのはどうしてですか。",c:["製品を使った後の生活の変化を話すようにしたから","値引きを大きくしたから","訪問の回数を増やしたから","新製品が発売されたから"],a:0,e:"機能ではなく「毎日がどう変わるか」を語る＝伝え方の転換。"},
{t:"聴解・ポイント理解",s:"女：あら、お弁当？外食やめたの？／男：うん。節約もあるんだけど、健康診断で塩分を控えるように言われてさ。外だとどうしても味が濃くなるから。／女：えらいわね。",q:"質問：男の人が弁当を持ってくる一番の理由は何ですか。",c:["塩分を控えるように言われたから","お金を貯めたいから","料理が趣味だから","近くに店がないから"],a:0,e:"「節約もあるんだけど」＝副次。主因＝健診で塩分指導。"},
{t:"聴解・ポイント理解",s:"男：あの新しいドラマ、見てる？／女：1話で挫折しちゃった。俳優は好きなんだけど、話の展開が遅すぎて。／男：ああ、確かに前半はゆっくりだね。3話から急に面白くなるんだけどな。",q:"質問：女の人はどうしてドラマを見るのをやめましたか。",c:["話の展開が遅かったから","俳優が嫌いだから","放送時間が合わないから","結末を知ってしまったから"],a:0,e:"俳優は「好き」＝ひっかけ。理由＝展開が遅い。"},
{t:"聴解・ポイント理解",s:"女：田中さん、会社を辞めるんですって。／男：えっ、待遇に不満でも？／女：ううん、実家の旅館を継ぐことにしたそうよ。お父様が倒れられて。／男：そうか。それなら仕方ないな。",q:"質問：田中さんはどうして会社を辞めるのですか。",c:["実家の旅館を継ぐことにしたから","待遇に不満があるから","転職先が決まったから","自分の体調を崩したから"],a:0,e:"待遇不満は「ううん」で否定。倒れたのは父＝きっかけ、辞める理由＝旅館を継ぐ。"},
{t:"聴解・ポイント理解",s:"男：このマンション、家賃のわりに空き部屋が多いですね。／女：ええ。建物は新しいんですが、坂の上で、駅から15分も歩くんです。それで敬遠されるようで。／男：なるほど。眺めはいいのに、もったいないですね。",q:"質問：マンションに空き部屋が多いのはどうしてですか。",c:["駅から遠くて坂道だから","家賃が高すぎるから","建物が古いから","眺めが悪いから"],a:0,e:"建物は新しい、眺めはいい＝すべて逆。理由＝坂の上＋駅徒歩15分。"},
{t:"聴解・ポイント理解",s:"女：あーあ、せっかくの旅行が台無し。／男：どうしたの。／女：楽しみにしてた美術館、行ってみたら改装中で休館だったの。ホームページには何も書いてなかったのに。／男：それはついてなかったね。",q:"質問：女の人はどうしてがっかりしているのですか。",c:["美術館が改装中で入れなかったから","飛行機が欠航したから","ホテルの予約を間違えたから","天気が悪かったから"],a:0,e:"「改装中で休館」＝直接原因。"},
{t:"聴解・ポイント理解",s:"男：部長、例の契約、先方が急に渋り始めたそうですね。／女：ええ。うちの条件じゃなくて、あちらの社内の事情よ。役員が代わって、投資に慎重になってるの。／男：では、条件を変えても意味がないですね。／女：そう。今は待つしかないわ。",q:"質問：契約が進まないのはどうしてですか。",c:["先方の新しい役員が投資に慎重だから","こちらの条件が厳しすぎるから","価格が折り合わないから","書類に不備があったから"],a:0,e:"「うちの条件じゃなくて、あちらの社内の事情」＝選項2の否定＋正解の提示。"},
{t:"聴解・ポイント理解",s:"女：息子さん、サッカーやめたんですって？／男：ええ。けがとかじゃなくて、吹奏楽をやりたいって言い出しましてね。文化祭で先輩の演奏を聴いて、心を打たれたようで。／女：あら、素敵な理由じゃない。",q:"質問：息子さんはどうしてサッカーをやめましたか。",c:["吹奏楽をやりたくなったから","けがをしたから","勉強が忙しいから","チームメートとけんかしたから"],a:0,e:"「けがとかじゃなくて」＝先否定，正解は吹奏楽への転向。"},
{t:"聴解・ポイント理解",s:"男：今度の社員旅行、参加者が少ないんだって？／女：ええ。日程が3連休と重なってるのよ。家族と過ごしたい人は、そっちを優先するわよね。／男：行き先は人気の温泉なのにね。",q:"質問：社員旅行の参加者が少ないのはどうしてですか。",c:["日程が連休と重なっているから","行き先に人気がないから","費用が高いから","仕事が忙しいから"],a:0,e:"行き先は「人気の温泉」＝逆。原因＝3連休と重複。"},
{t:"聴解・ポイント理解",s:"女：あの八百屋さん、また値下げしてる。大丈夫かしら。／男：ああ、あれはね、隣に大型スーパーができたからだよ。対抗してるんだ。／女：体力勝負ね。",q:"質問：八百屋が値下げをしているのはどうしてですか。",c:["近くに大型スーパーができたから","野菜が豊作だから","閉店セールをしているから","品物が古くなったから"],a:0,e:"「隣に大型スーパーができたから。対抗してる」。"},
{t:"聴解・ポイント理解",s:"男：レポート、手書き指定なんだって？めずらしいね。／女：先生いわく、書き写すだけでも頭に残るからって。それと、ネットの文章の丸写し対策もあるみたい。／男：なるほどね。大変だけど。",q:"質問：先生がレポートを手書きにさせる理由は何ですか。",c:["記憶に残ることと、丸写しの対策","パソコンが使えない学生がいるから","字の練習をさせたいから","昔からの伝統だから"],a:0,e:"理由2点＝頭に残る＋丸写し対策。両方を含む選択肢を選ぶ。"},
{t:"聴解・ポイント理解",s:"女：あれ、エアコンつけないの？暑いのに。／男：それが、リモコンの電池が切れてて。本体のボタンでもつくんだけど、風量が調節できないんだ。／女：じゃ、私、コンビニで電池買ってくるわ。",q:"質問：男の人はどうしてエアコンをつけていないのですか。",c:["リモコンの電池が切れているから","エアコン本体が故障しているから","電気代を節約しているから","暑くないから"],a:0,e:"本体は動く（ボタンでつく）→故障ではなく電池切れ。"},
{t:"聴解・ポイント理解",s:"男：来月から、社員食堂のメニューが変わるらしいよ。／女：どうして？／男：野菜を増やして塩分を減らすんだって。健康診断の結果が悪い社員が多かったらしい。／女：味が薄くなるのは寂しいけど、体にはいいわね。",q:"質問：食堂のメニューが変わるのはどうしてですか。",c:["健康診断の結果が悪い社員が多かったから","食材の値段が上がったから","調理師が代わったから","アンケートで人気がなかったから"],a:0,e:"改変の背景＝健診結果の悪化→野菜増・減塩。"},
{t:"聴解・ポイント理解",s:"女：森さん、新しい趣味を始めたんですって？／男：ええ、そば打ちを。定年後の楽しみにと思って。それに、手先を使うのは頭にもいいと聞いたので。／女：食べる楽しみもありますしね。",q:"質問：男の人がそば打ちを始めた理由は何ですか。",c:["定年後の楽しみと、頭の健康のため","医者に強く勧められたから","そば屋を開業したいから","家族に頼まれたから"],a:0,e:"理由2点＝定年後の楽しみ＋手先を使うと頭にいい。"},
{t:"聴解・ポイント理解",s:"男：あれ、山本さん、席にいないね。／女：今日は在宅勤務よ。お子さんが熱を出したとかで、看病しながら仕事するって。／男：そうか。じゃ、この件はメールで送っておこう。急ぎじゃないし。",q:"質問：山本さんはどうして在宅勤務をしていますか。",c:["子どもが熱を出したから","電車が止まっているから","自分が体調を崩したから","会社が工事中だから"],a:0,e:"「お子さんが熱を出した」＝本人ではなく子ども。選項3がひっかけ。"},
{t:"聴解・ポイント理解",s:"女：この公園、平日なのに人が多いですね。／男：ええ。先月、雑誌の「桜の名所特集」に載ったんですよ。それからは県外からも来るようになって。／女：地元だけの静かな公園だったのに、有名になっちゃいましたね。",q:"質問：公園に人が増えたのはどうしてですか。",c:["雑誌の特集で紹介されたから","入園料が無料になったから","新しい遊具ができたから","駅が近くにできたから"],a:0,e:"「雑誌の特集に載った」→県外からも来園。"},
{t:"聴解・ポイント理解",s:"男：あしたの待ち合わせ、駅の北口だったよね。／女：それがね、北口は工事中で通れないの。改札を出て南口に来てくれる？噴水の前で。／男：南口の噴水前ね。時間は3時のまま？／女：ええ、変わらないわ。",q:"質問：二人はあした、どこで会いますか。",c:["南口の噴水の前","北口の改札","北口の噴水の前","駅の中の喫茶店"],a:0,e:"北口＝工事中→南口噴水前へ変更。時間は3時のまま。"},
{t:"聴解・ポイント理解",s:"女：文化祭の飾り付け、予算はいくら使えるの？／男：全体で3万円。でも印刷代に1万円は取っておきたいから、飾りは2万円までかな。／女：わかった。じゃ、2万円以内で材料を考えるね。",q:"質問：飾りに使えるお金はいくらですか。",c:["2万円","3万円","1万円","4万円"],a:0,e:"全体3万−印刷1万＝飾り2万。数字の引き算。"},
{t:"聴解・ポイント理解",s:"男：あしたの見学、9時に工場の入り口集合だって。／女：あ、でも受付で名札をもらうのに10分かかるから、参加者には10分前に来るように伝えてって言われたよ。／男：じゃ、みんなには8時50分って言っておくよ。",q:"質問：参加者は何時に集まりますか。",c:["8時50分","9時","9時10分","8時40分"],a:0,e:"9時集合−10分前＝8時50分。"},
{t:"聴解・ポイント理解",s:"女：もしもし、そちらの店に、けさ、傘を忘れたようなんですが。青い折りたたみです。／男：少々お待ちください。…青の折りたたみ傘、お預かりしています。／女：よかった。今日の夜、取りに伺います。／男：閉店は8時ですので、それまでにお願いします。",q:"質問：女の人は何を忘れましたか。",c:["青い折りたたみ傘","黒い長い傘","青い手袋","買い物袋"],a:0,e:"「青い折りたたみ」＝色＋形状の両方が一致する選択肢。"},
{t:"聴解・ポイント理解",s:"男：健康のために何か始めたんだって？／女：ええ、朝のジョギング。最初は30分走ってたんだけど、膝を痛めそうになって、今は速歩きに変えたの。それでも汗はかくわよ。",q:"質問：女の人は今、何をしていますか。",c:["朝の速歩き","朝のジョギング30分","夜の水泳","ジムの筋トレ"],a:0,e:"「今は」がキーワード。ジョギング→速歩きに変更済み。"},
{t:"聴解・ポイント理解",s:"女：新しいオフィス、どう？／男：うん、前より狭くなったけど、駅直結だから通勤は楽になったよ。雨の日も濡れないし。／女：それは何よりね。",q:"質問：男の人は新しいオフィスの何に満足していますか。",c:["駅に直結していて通勤が楽なこと","前より広くなったこと","家賃が安いこと","眺めがいいこと"],a:0,e:"狭くなった＝マイナス。満足点＝駅直結。"},
{t:"聴解・ポイント理解",s:"男：会議の日程だけど、水曜の午後はどう？／女：水曜は工場の視察が入ってて。木曜なら一日空いてます。／男：僕は木曜の午前は来客があるな。じゃ、木曜の午後2時でどう？／女：はい、大丈夫です。",q:"質問：会議はいつになりましたか。",c:["木曜の午後2時","水曜の午後2時","木曜の午前10時","金曜の午後2時"],a:0,e:"水曜×（視察）、木曜午前×（来客）→木曜午後2時。"},
{t:"聴解・ポイント理解",s:"女：資料の誤字、直しておいたわよ。3ページの「経費」が「軽費」になってたの。／男：ありがとうございます。何度も見たのに気づかなかった。／女：自分で書いたものって、思い込みで読んじゃうのよね。",q:"質問：女の人は何を直しましたか。",c:["3ページの漢字の間違い","グラフの数字","ページの順番","表紙の日付"],a:0,e:"経費→軽費という誤字（3ページ）。"},
{t:"聴解・ポイント理解",s:"男：夏休み、どこか行くの？／女：北海道に行こうと思ってたんだけど、飛行機が高くて。それで、電車で行ける金沢にしたの。／男：ああ、金沢もいい所だよ。",q:"質問：女の人は夏休みにどこへ行きますか。",c:["金沢","北海道","京都","沖縄"],a:0,e:"北海道＝当初の案（機票太貴放棄）。決定＝金沢。"},
{t:"聴解・ポイント理解",s:"女：お宅の犬、おとなしいですね。／男：ええ、でも最初からじゃないんですよ。保護犬で、来たばかりのころは人を怖がって、ほえてばかりで。妻が半年かけて、少しずつ慣らしたんです。／女：愛情の力ですね。",q:"質問：犬がおとなしくなったのはどうしてですか。",c:["奥さんが時間をかけて慣らしたから","生まれつきおとなしい性格だから","訓練学校に通わせたから","年を取ったから"],a:0,e:"「最初からじゃない」＝生まれつき説の否定。妻が半年かけて慣らした。"},
{t:"聴解・ポイント理解",s:"男：この写真、よく撮れてるね。プロみたいだ。／女：ありがとう。実は、機材は普通のスマホなの。ただ、朝の5時に起きて、光がいちばんきれいな時間に撮ったのよ。／男：道具より時間帯か。",q:"質問：写真がきれいに撮れた一番の理由は何ですか。",c:["光のきれいな早朝に撮ったから","高級なカメラを使ったから","加工アプリを使ったから","特別な場所で撮ったから"],a:0,e:"機材＝普通のスマホ→道具説の否定。決め手＝時間帯（光）。"},
{t:"聴解・ポイント理解",s:"女：会社の近くに新しいジムができたけど、入らないの？／男：見学には行ったんだ。設備は新しくてよかったんだけど、更衣室が狭くてね。仕事帰りの時間帯は順番待ちになるらしい。それがちょっと。／女：毎日のことだと気になるわね。",q:"質問：男の人がジムに入らない理由は何ですか。",c:["更衣室が狭くて混雑するから","会費が高いから","設備が古いから","家から遠いから"],a:0,e:"設備は「新しくてよかった」＝逆。ネック＝更衣室の狭さと順番待ち。"},
{t:"聴解・ポイント理解",s:"男：あの喫茶店、長居する学生が減ったと思わない？／女：席に「勉強は2時間まで」って札が置かれたのよ。強く注意する代わりに、やんわりね。／男：なるほど、けんかにならないやり方だ。",q:"質問：店は長居を減らすために何をしましたか。",c:["席に時間制限の札を置いた","学生の入店を断った","飲み物の値段を上げた","席の数を減らした"],a:0,e:"「勉強は2時間まで」の札＝穏やかな対策。"},
{t:"聴解・ポイント理解",s:"女：部長、あしたの面接、私も同席するんでしょうか。／男：うん、頼むよ。私は志望動機や経歴を聞くから、君は現場の視点で、実務の質問をしてくれ。技術的なことは君のほうが詳しいから。／女：承知しました。",q:"質問：女の人は面接で何を担当しますか。",c:["実務や技術についての質問","志望動機についての質問","会社の説明","給与の交渉"],a:0,e:"分担：部長＝志望動機・経歴／女の人＝実務・技術。"},
{t:"聴解・ポイント理解",s:"男：駅前の本屋、リニューアルしたんだって？／女：ええ。売り場の半分がカフェになったの。本を買う前に、席で読んで選べるのよ。／男：へえ、ゆっくり選べるのはいいね。",q:"質問：リニューアルした本屋では何ができますか。",c:["買う前に本をカフェの席で読んで選べる","本を無料で借りられる","24時間買い物ができる","古本を売ることができる"],a:0,e:"「買う前に、席で読んで選べる」＝新しいサービス。"},
{t:"聴解・ポイント理解",s:"女：きのうの停電、大丈夫だった？／男：うん、うちは30分くらいで復旧したよ。ただ、冷凍庫のアイスが全部溶けちゃって。／女：あら。うちは冷凍庫を開けなかったから無事だったわ。",q:"質問：男の人の家では、停電で何が起きましたか。",c:["アイスが溶けてしまった","パソコンが壊れた","水が出なくなった","エアコンが故障した"],a:0,e:"被害＝冷凍庫のアイス。停電自体は30分で復旧。"},
{t:"聴解・ポイント理解",s:"男：森さんの送別会、プレゼントは決まった？／女：候補はコーヒーメーカーだったんだけど、もう持ってるらしくて。それで、旅行好きだから、軽くて丈夫なスーツケースにしたわ。／男：それは喜ばれそうだ。",q:"質問：送別会のプレゼントは何になりましたか。",c:["スーツケース","コーヒーメーカー","旅行券","コーヒー豆"],a:0,e:"コーヒーメーカー＝既に所有→スーツケースに変更。"},
{t:"聴解・ポイント理解",s:"女：この植物、育てやすいですか。／男：ええ、水は週に1回で十分です。ただ、直射日光に弱いので、窓から少し離れた明るい場所に置いてください。／女：週1回、日陰気味ですね。覚えました。",q:"質問：この植物はどこに置くのがいいですか。",c:["窓から少し離れた明るい場所","直射日光の当たる窓際","暗い押し入れの中","屋外のベランダ"],a:0,e:"直射日光に弱い→窓際×。明るい場所＝暗い所も×。"},
{t:"聴解・ポイント理解",s:"男：来週の台風、上陸しそうだね。イベントはどうする？／女：屋外の予定だったけど、市民ホールが借りられたから、そっちでやるわ。規模は縮小して、出店はなし。ステージだけ。／男：中止にならないだけよかったよ。",q:"質問：イベントはどうなりましたか。",c:["市民ホールに移して規模を縮小して行う","予定どおり屋外で行う","中止になった","来月に延期になった"],a:0,e:"変更2点＝会場（ホール）＋規模縮小（出店なし）。中止・延期ではない。"},
{t:"聴解・ポイント理解",s:"女：息子の自転車、また大きいのに買い替えなきゃ。すぐ大きくなるんだから。／男：買うより、レンタルはどう？月々千円で、サイズが合わなくなったら交換できるサービスがあるよ。／女：あら、それなら無駄がないわね。詳しく教えて。",q:"質問：女の人はどんなサービスに興味を持ちましたか。",c:["サイズ交換ができる自転車の月額レンタル","中古自転車の買い取り","自転車の修理保険","電動自転車の試乗会"],a:0,e:"月々千円＋サイズ交換可のレンタル。"},
{t:"聴解・ポイント理解",s:"男：課長、プレゼンの結果、どうでした？／女：採用よ。ただ、条件付きでね。予算を1割削ること、それから開始を1か月早めること。この2点をのめば進めていいって。／男：厳しいですが、やりましょう。",q:"質問：企画はどんな条件で採用されましたか。",c:["予算の1割削減と、開始の1か月前倒し","予算の倍増と人員の追加","開始の延期と規模の縮小","外部業者への委託"],a:0,e:"条件2点＝予算1割減＋開始を早める。「のむ」＝接受條件。"},
{t:"聴解・ポイント理解",s:"女：あなた、健康診断の結果、どうだった？／男：おおむね良好。ただ、コレステロールがやや高めで、「運動と食事に注意」って。再検査ではないけどね。／女：じゃ、今夜から揚げ物は控えめね。",q:"質問：男の人の検査結果はどうでしたか。",c:["おおむね良好だが、コレステロールがやや高め","すぐに再検査が必要","すべての項目が正常","入院が必要なほど悪い"],a:0,e:"「おおむね良好。ただ〜やや高め」「再検査ではない」。"},
{t:"聴解・ポイント理解",s:"男：新入社員の佐藤君、もう席にいないけど。／女：営業の同行研修よ。今週は先輩と一日中外回り。来週からは内勤で、見積書の作り方を学ぶの。／男：現場を先に見せる方針なんだね。",q:"質問：佐藤君は今週、何をしていますか。",c:["先輩と外回りの同行研修","見積書の作成の練習","本社での座学研修","長期の休暇"],a:0,e:"今週＝外回り／来週＝内勤（見積書）。時間詞の聞き分け。"},
{t:"聴解・ポイント理解",s:"女：ごめん、遅れそう。電車が止まってて。／男：事故？／女：ううん、線路に動物が入ったんだって。安全確認で10分くらいって放送してる。／男：了解。ゆっくりおいで。",q:"質問：電車が止まっているのはどうしてですか。",c:["線路に動物が入ったから","人身事故があったから","大雪が降ったから","停電したから"],a:0,e:"「事故？」「ううん」で否定→動物の侵入＋安全確認。"},
{t:"聴解・ポイント理解",s:"男：この曲、なんでこんなに売れてるんだろう。／女：歌詞よ。就職や引っ越しで故郷を離れた人の気持ちを、飾らない言葉で歌ってるの。私も泣いちゃった。／男：メロディーより言葉の力か。",q:"質問：曲が売れている理由は何ですか。",c:["歌詞が聞く人の共感を呼ぶから","メロディーが明るいから","有名な映画の主題歌だから","ダンスが流行しているから"],a:0,e:"「歌詞よ」＝即答。離郷者の気持ち＋飾らない言葉。"},
{t:"聴解・ポイント理解",s:"女：アルバイト、変えたんだって？／男：うん。前の店は時給はよかったんだけど、シフトが前日にならないと分からなくて。新しい所は時給は少し下がったけど、1か月先まで決まるから、予定が立てやすいんだ。",q:"質問：男の人が新しいアルバイトを選んだ理由は何ですか。",c:["シフトが早く決まって予定が立てやすいから","時給が高いから","家から近いから","まかないが付くから"],a:0,e:"時給は「少し下がった」→選項2はひっかけ。決め手＝シフトの確定が早い。"},
{t:"聴解・ポイント理解",s:"男：発表の順番、決まった？／女：ええ。最初が鈴木さん、次が私。あなたは休憩を挟んで3番目よ。／男：昼の直後じゃなくてよかった。眠くなる時間だからね。",q:"質問：男の人は何番目に発表しますか。",c:["3番目","1番目","2番目","最後"],a:0,e:"鈴木→女の人→（休憩）→男の人＝3番目。"},
{t:"聴解・ポイント理解",s:"女：あしたのハイキング、天気はどう？／男：午前は晴れ。ただ、夕方から雨になるって。／女：じゃ、下山を早めて、3時には駅に戻るようにしましょう。",q:"質問：あしたの天気はどうなると言っていますか。",c:["午前は晴れて、夕方から雨","一日中晴れ","朝から雨","午後から雪"],a:0,e:"午前晴れ＋夕方から雨→3時までに下山という対応。"},
{t:"聴解・ポイント理解",s:"男：この掃除機、2万8千円か。ちょっと予算オーバーだな。／女：（店員）今日は家電の日で、レジで1割引きになりますよ。それに古い掃除機を下取りに出せば、さらに2千円引きです。／男：じゃあ、2万3千円ちょっとか。それなら買います。",q:"質問：男の人はいくらぐらいで掃除機を買いますか。",c:["2万3千円ぐらい","2万8千円","2万5千円","2万円ちょうど"],a:0,e:"28,000×0.9＝25,200−2,000＝23,200円≒2万3千円ちょっと。"},
{t:"聴解・ポイント理解",s:"女：市民プールって月曜休みだっけ？／男：先月までね。今月から休みは第1・第3火曜に変わったよ。月曜に行って閉まってた人が多かったからかな、掲示が大きく出てた。",q:"質問：今のプールの休みはいつですか。",c:["第1・第3火曜日","毎週月曜日","毎週火曜日","第2・第4月曜日"],a:0,e:"月曜休み＝「先月まで」の旧情報。今月から第1・第3火曜。"},
{t:"聴解・ポイント理解",s:"男：郊外に引っ越したんだって？通勤、大変じゃない？／女：1時間かかるわ。でも、在宅勤務が週4日になったから、出社は週1日だけ。それなら、家が広くて家賃が安いほうを取ろうって。",q:"質問：女の人が引っ越した一番の理由は何ですか。",c:["在宅勤務が増えて、通勤する日が減ったから","会社が郊外に移転したから","家族が増えたから","駅に近い家が見つかったから"],a:0,e:"週1出社なら通勤1時間も許容→広くて安い家を優先できる。"},
{t:"聴解・ポイント理解",s:"女：午後の定例会議、私、欠席します。／男：おや、めずらしい。／女：取引先でトラブルがあって、これから謝罪に伺うことになったんです。議事録は後で読みますので。／男：分かった。こっちは任せて。",q:"質問：女の人が会議を欠席するのはどうしてですか。",c:["取引先へ謝罪に行くから","体調が悪いから","出張中だから","別の会議と重なったから"],a:0,e:"「トラブルがあって、これから謝罪に伺う」。"},
{t:"聴解・ポイント理解",s:"男：（社内放送）業務連絡です。先週出荷した製品番号A102に、部品の緩みが見つかりました。事故の報告はありませんが、対象製品はすべて回収し、無償で部品を交換します。営業部は本日中に、担当のお客様へ電話でご連絡ください。",q:"質問：製品を回収するのはどうしてですか。",c:["部品に緩みが見つかったから","色に不良があったから","事故が多発したから","法律が変わったから"],a:0,e:"「部品の緩みが見つかった」。事故は「報告はありません」＝未発生。"},
{t:"聴解・ポイント理解",s:"女：あら、川田君、今ごろ出社？／男：すみません。目覚ましはかけたんですが、ゆうべスマホの充電を忘れて、電源が切れてたんです。／女：アラームごと沈黙ってわけね。古い目覚まし時計も併用したら？",q:"質問：男の人が遅刻したのはどうしてですか。",c:["スマホの電源が切れてアラームが鳴らなかったから","電車が遅れたから","夜遅くまで仕事をしていたから","道が渋滞していたから"],a:0,e:"目覚ましはかけた＋充電忘れ→電源オフ→アラーム沈黙。"},
{t:"聴解・ポイント理解",s:"男：お昼、今日は外に行かないの？／女：ええ。午後一番の会議の資料がまだ途中で。コンビニのパンで済ませるわ。／男：じゃ、何か買ってこようか。／女：ありがとう。サンドイッチをお願い。",q:"質問：女の人はどうして外に食べに行かないのですか。",c:["会議の資料がまだできていないから","お金を節約したいから","外は雨が降っているから","ダイエットをしているから"],a:0,e:"「資料がまだ途中で」＝時間がない。"},
{t:"聴解・ポイント理解",s:"女：おじいさん、80歳には見えませんね。お元気で。／男：ええ。本人いわく、秘訣は畑仕事だそうです。毎朝2時間、体を動かして、取れた野菜を近所に配って回る。それが運動にも生きがいにもなってるみたいで。",q:"質問：おじいさんの元気の秘訣は何ですか。",c:["毎朝の畑仕事","高価なサプリメント","週3回の水泳","孫との同居"],a:0,e:"「秘訣は畑仕事」＝運動＋生きがいの両方。"},
{t:"聴解・ポイント理解",s:"男：あの弁当屋の名物、から揚げ弁当がメニューから消えてたよ。／女：ああ、油の値段が上がりすぎて、今の値段では出せないんだって。値上げすると客が離れるから、いっそやめたらしいわ。",q:"質問：から揚げ弁当をやめたのはどうしてですか。",c:["油の高騰で今の値段では売れないから","人気がなくなったから","調理師が辞めたから","健康志向に合わせたから"],a:0,e:"油の値上がり＋値上げすれば客が離れる→いっそ中止。"},
{t:"聴解・ポイント理解",s:"女：山下君、テニス部から写真部に移ったんだって。／男：けがでもした？／女：ううん。文化祭で撮影係をやって、写真の面白さに目覚めたんだって。腕もいいらしいよ。",q:"質問：山下君が写真部に移ったのはどうしてですか。",c:["撮影係をして写真の面白さに目覚めたから","けがをしたから","テニスの練習が厳しすぎたから","友達に誘われたから"],a:0,e:"けが説は「ううん」で否定。きっかけ＝文化祭の撮影係。"},
{t:"聴解・ポイント理解",s:"男：試験前なのに、図書館の席が取れなくてさ。／女：3階の郷土資料室、知ってる？あそこ、いつも空いてるのよ。静かだし。みんな2階の学習室にばかり行くから。／男：それは穴場だね。今度からそうするよ。",q:"質問：女の人が勧めた場所はどこですか。",c:["3階の郷土資料室","2階の学習室","1階のロビー","地下の書庫"],a:0,e:"穴場＝3階郷土資料室。2階学習室は混む場所。"},
{t:"聴解・ポイント理解",s:"女：（電話）先日そちらで買ったセーターなんですが、一度も着ていないのに、袖の縫い目がほどけていて。／男：申し訳ございません。レシートと商品をお持ちいただければ、返金か交換、どちらでも対応いたします。／女：じゃあ、同じ物の新しいのがあれば、交換でお願いします。",q:"質問：女の人はどうすることにしましたか。",c:["同じ商品と交換してもらう","お金を返してもらう","自分で縫って直す","別の商品に買い替える"],a:0,e:"返金か交換の二択→「交換でお願いします」。"},
{t:"聴解・ポイント理解",s:"男：最近、朝5時起きなんだって？よく続くね。／女：夜だと急な誘いや残業で潰れるでしょ。朝は誰にも邪魔されないから、資格の勉強がはかどるのよ。／男：なるほど、朝は予定が狂わないか。",q:"質問：女の人が朝に勉強する理由は何ですか。",c:["朝は邪魔が入らず、計画どおり勉強できるから","朝のほうが記憶力がいいから","夜は眠くなってしまうから","家族に勧められたから"],a:0,e:"夜＝誘いや残業で潰れる／朝＝誰にも邪魔されない。"},
{t:"聴解・ポイント理解",s:"女：花見の場所、今年も川沿いの公園？／男：あそこは今年、桜の木の治療で半分立ち入り禁止なんだ。だから城跡公園にしたよ。桜の数はあっちのほうが多いしね。",q:"質問：今年の花見はどこでしますか。",c:["城跡公園","川沿いの公園","会社の屋上","駅前の広場"],a:0,e:"川沿い＝立入禁止（木の治療）→城跡公園へ変更。"},
{t:"聴解・ポイント理解",s:"男：おやじの料理教室、応募が定員の3倍だって。／女：すごい人気。どうして？／男：定年後の男性がターゲットでね。「妻に頼らず一食作れるように」っていう実用性が受けたらしい。基礎の基礎から教えるのも安心なんだって。",q:"質問：料理教室が人気の理由は何ですか。",c:["定年後の男性向けに、基礎から実用的に教えるから","有名なシェフが教えるから","受講料が無料だから","高級な食材が使えるから"],a:0,e:"ターゲット設定＋実用性＋基礎から＝人気の理由。"},
{t:"聴解・ポイント理解",s:"女：昨年度の売り上げデータ、どこにあるか知ってる？／男：紙のファイルは処分したよ。全部スキャンして、共有サーバーの「アーカイブ」フォルダーに入ってる。年度別になってるから、すぐ見つかるよ。",q:"質問：データは今、どこにありますか。",c:["共有サーバーのアーカイブフォルダー","紙のファイル棚","男の人の机の引き出し","倉庫の段ボール"],a:0,e:"紙は処分済み→スキャンしてサーバーの「アーカイブ」に。"},
{t:"聴解・ポイント理解",s:"男：（管理人の放送）お知らせします。来週月曜から金曜まで、外壁の塗装工事を行います。期間中、ベランダに洗濯物は干せません。乾燥機か室内干しをお願いします。なお、月曜と火曜は足場の組み立てで音が大きくなります。",q:"質問：工事の期間中、住民ができないことは何ですか。",c:["ベランダに洗濯物を干すこと","部屋の窓を開けること","エレベーターを使うこと","駐車場に車を止めること"],a:0,e:"「ベランダに洗濯物は干せません」→乾燥機か室内干し。"},
{t:"聴解・ポイント理解",s:"女：店長、新メニューの反応はどうですか。／男：若い人には好評だよ。ただ、年配のお客様には量が多いって言われてね。来月から、値段を下げた小盛りサイズも出すことにしたよ。",q:"質問：店は来月から何をしますか。",c:["小盛りサイズを追加する","新メニューを中止する","全体の値段を上げる","若者向けの店に改装する"],a:0,e:"年配客の「量が多い」に対応→小盛り（値段も下げる）を追加。"},
// ================= 聴解・即時応答 =================
{t:"聴解・即時応答",s:"女：この書類、あしたまでにやっていただけると助かるんですが。",q:"質問：最も適切な応答はどれですか。",c:["承知しました。あしたの午前中にはお出しします。","はい、助かりました。","あしたまでにいただけますか。","それは助かりませんね。"],a:0,e:"依頼への承諾＋具体的な返答。〜と助かる＝婉曲な依頼。"},
{t:"聴解・即時応答",s:"男：例の件、部長のお耳に入れておいたほうがいいんじゃない？",q:"質問：最も適切な応答はどれですか。",c:["そうですね。早めにご報告しておきます。","部長は耳がいいですから。","いえ、聞こえていないと思います。","お耳を貸してください。"],a:0,e:"耳に入れる＝知らせる、報告する。慣用句の理解。"},
{t:"聴解・即時応答",s:"女：お忙しいところ恐れ入りますが、少々お時間よろしいでしょうか。",q:"質問：最も適切な応答はどれですか。",c:["ええ、構いませんよ。どうぞ。","はい、忙しいです。","恐れ入りました。","お時間をありがとう。"],a:0,e:"時間を求める前置き→許可の返事が自然。"},
{t:"聴解・即時応答",s:"男：昨日は飲みすぎちゃって、今朝は頭がガンガンするよ。",q:"質問：最も適切な応答はどれですか。",c:["ほどほどにしないと、体に障りますよ。","頭がいいんですね。","それはにぎやかですね。","もっとガンガン飲みましょう。"],a:0,e:"ガンガンする＝頭痛。体に障る＝傷身。"},
{t:"聴解・即時応答",s:"女：この企画、思い切って白紙に戻すことになったの。",q:"質問：最も適切な応答はどれですか。",c:["えっ、あんなに準備したのに残念ですね。","白い紙をお持ちしましょうか。","戻ってきてよかったですね。","じゃあ、印刷しておきます。"],a:0,e:"白紙に戻す＝一切歸零。字面理解の選択肢がひっかけ。"},
{t:"聴解・即時応答",s:"男：山田さんって、口が堅いから安心して相談できるよ。",q:"質問：最も適切な応答はどれですか。",c:["ええ、彼なら秘密を漏らす心配はないですね。","歯も丈夫らしいですよ。","口が悪いのは困りますね。","よくしゃべる人ですからね。"],a:0,e:"口が堅い＝守得住秘密。選項4は正反対。"},
{t:"聴解・即時応答",s:"女：すみません、道に迷ってしまって。中央病院へはどう行けばいいでしょうか。",q:"質問：最も適切な応答はどれですか。",c:["この道をまっすぐ行って、二つ目の信号を右です。","お大事になさってください。","病院は今日は混んでいますよ。","迷うのはよくないですね。"],a:0,e:"道を聞かれた→道順を答える。お大事に＝對病人說的話。"},
{t:"聴解・即時応答",s:"男：今度のプロジェクト、君に白羽の矢が立ったよ。",q:"質問：最も適切な応答はどれですか。",c:["私がですか。精いっぱい務めます。","矢は危ないですね。","誰が当たったんですか。","白い羽根をありがとうございます。"],a:0,e:"白羽の矢が立つ＝被選中（担当に指名される）。"},
{t:"聴解・即時応答",s:"女：課長ったら、私の提案、頭ごなしに否定するのよ。",q:"質問：最も適切な応答はどれですか。",c:["聞く耳を持ってほしいよね。","頭をお大事に。","否定されなくてよかったね。","頭がいい課長だね。"],a:0,e:"頭ごなしに＝不由分說。共感の返答が自然。"},
{t:"聴解・即時応答",s:"男：新しい仕事はどう？もう慣れた？",q:"質問：最も適切な応答はどれですか。",c:["ええ、おかげさまで、だいぶ要領がつかめてきました。","いいえ、新しくありません。","仕事はまだ決まっていません。","慣れないでください。"],a:0,e:"要領をつかむ＝抓到訣竅。おかげさまで＝寒暄定番。"},
{t:"聴解・即時応答",s:"女：申し訳ありません。納品が一日遅れてしまいそうです。",q:"質問：最も適切な応答はどれですか。",c:["一日なら何とかなります。確実にお願いしますね。","納品はもう結構です。","遅れてよかったです。","早すぎて困ります。"],a:0,e:"遅延の連絡→許容＋念押し。"},
{t:"聴解・即時応答",s:"男：ここだけの話なんだけど、来月、転勤になりそうなんだ。",q:"質問：最も適切な応答はどれですか。",c:["えっ、そうなんですか。誰にも言いません。","じゃあ、みんなに知らせておきますね。","ここではない話ですね。","大きな声で話しましょう。"],a:0,e:"ここだけの話＝要保密。"},
{t:"聴解・即時応答",s:"女：ちょっと手を貸してもらえない？この棚、動かしたいの。",q:"質問：最も適切な応答はどれですか。",c:["いいよ。どこに動かすの？","手を洗ってからにして。","棚なら売っていますよ。","動かないでください。"],a:0,e:"手を貸す＝幫忙。承諾＋確認。"},
{t:"聴解・即時応答",s:"男：面接、どうだった？手応えはあった？",q:"質問：最も適切な応答はどれですか。",c:["うん、聞かれたことには全部きちんと答えられたよ。","手はたたかなかったよ。","応募はこれからだよ。","面接官になったよ。"],a:0,e:"手応え＝（成功しそうな）確かな感觸。"},
{t:"聴解・即時応答",s:"女：会議の資料、部数が足りないみたいなんですが。",q:"質問：最も適切な応答はどれですか。",c:["すみません、すぐ追加でコピーします。","多すぎましたか。","資料は読まなくていいです。","会議は中止です。"],a:0,e:"不足の指摘→追加コピーで対応。"},
{t:"聴解・即時応答",s:"男：田中君、最近、仕事が板についてきたね。",q:"質問：最も適切な応答はどれですか。",c:["ありがとうございます。皆さんのご指導のおかげです。","板は使っていませんが。","まだ板の上には乗れません。","机のほうが好きです。"],a:0,e:"板につく＝（工作、姿態）越來越到位。褒め言葉→感謝で返す。"},
{t:"聴解・即時応答",s:"女：あのう、この席、空いてますか。",q:"質問：最も適切な応答はどれですか。",c:["ええ、どうぞ。","いいえ、私は座っています。","席を立ってください。","空はよく晴れていますね。"],a:0,e:"空席の確認→どうぞ。"},
{t:"聴解・即時応答",s:"男：例の交渉、どうにか話がまとまったよ。",q:"質問：最も適切な応答はどれですか。",c:["お疲れさまでした。ほっとしましたね。","話が長かったですね。","まとまらなくて残念です。","交渉はこれからですか。"],a:0,e:"話がまとまる＝達成協議。ねぎらいの返答。"},
{t:"聴解・即時応答",s:"女：風邪気味だったら、無理しないで早く帰ってね。",q:"質問：最も適切な応答はどれですか。",c:["ありがとうございます。お言葉に甘えて、そうさせていただきます。","風邪は気のせいです。","無理して帰ります。","もう帰ってきました。"],a:0,e:"お言葉に甘えて＝恭敬不如從命。"},
{t:"聴解・即時応答",s:"男：この見積もり、もう一声、何とかなりませんか。",q:"質問：最も適切な応答はどれですか。",c:["では、あと3パーセントお引きいたします。","声を大きくします。","もう一度歌います。","見積もりは無料です。"],a:0,e:"もう一声＝再降一點價（交渉用語）。"},
{t:"聴解・即時応答",s:"女：先週お願いした件、その後いかがなっておりますでしょうか。",q:"質問：最も適切な応答はどれですか。",c:["ただいま確認しておりまして、あすにはお返事いたします。","その件は初耳です。","先週は忙しかったです。","いかがも何もありません。"],a:0,e:"進捗の催促→現状＋期限を答えるのがビジネスの型。"},
{t:"聴解・即時応答",s:"男：君の説明はいつも的を射ていて、分かりやすいよ。",q:"質問：最も適切な応答はどれですか。",c:["恐れ入ります。励みになります。","的は苦手なんです。","弓道をやっていましたから。","説明はしていませんが。"],a:0,e:"的を射る＝切中要點。褒められた→謙虚に感謝。"},
{t:"聴解・即時応答",s:"女：今日は私がごちそうするわ。遠慮しないで。",q:"質問：最も適切な応答はどれですか。",c:["いいんですか。じゃあ、お言葉に甘えます。","私も遠慮しません、私が払います。","ごちそうを作りましたか。","お金を貸してください。"],a:0,e:"おごりの申し出→お言葉に甘える。"},
{t:"聴解・即時応答",s:"男：あーあ、もう少しのところで契約を逃したよ。",q:"質問：最も適切な応答はどれですか。",c:["惜しかったですね。次はきっと取れますよ。","逃げ足が速いですね。","契約おめでとうございます。","もう少し逃げましょう。"],a:0,e:"逃す＝錯失。慰め＋励ましの返答。"},
{t:"聴解・即時応答",s:"女：コピー機の調子が悪いみたいで、変な音がするんです。",q:"質問：最も適切な応答はどれですか。",c:["じゃ、業者に点検を頼みましょう。","いい音楽ですね。","音を大きくしましょう。","調子がいいなら安心です。"],a:0,e:"不具合の報告→点検の手配。"},
{t:"聴解・即時応答",s:"男：来週の歓迎会、君も顔を出せる？",q:"質問：最も適切な応答はどれですか。",c:["ええ、少し遅れますが、伺います。","顔は洗ってあります。","出せるのは手だけです。","歓迎はしていません。"],a:0,e:"顔を出す＝出席、露臉。"},
{t:"聴解・即時応答",s:"女：この間の失敗、まだ気に病んでるの？",q:"質問：最も適切な応答はどれですか。",c:["うん、どうしても引きずっちゃって。","病気じゃないよ。","失敗はしていないよ。","君こそ気に病んでるの？"],a:0,e:"気に病む＝耿耿於懷。引きずる＝走不出來。"},
{t:"聴解・即時応答",s:"男：すみません、この電車、中央駅に止まりますか。",q:"質問：最も適切な応答はどれですか。",c:["いえ、快速ですので、次の駅でお乗り換えください。","電車は急に止まると危ないですよ。","中央駅はいい駅ですね。","切符を拝見します。"],a:0,e:"停車駅の質問→止まらない＋乗り換え案内。"},
{t:"聴解・即時応答",s:"女：部長のスピーチ、長引いてるね。予定をだいぶ過ぎてるよ。",q:"質問：最も適切な応答はどれですか。",c:["うん、後の予定が押しちゃうね。","スピーチは短かったね。","部長は早口だからね。","もう終わったんだね。"],a:0,e:"押す＝（時程）延遲。長引く発言への相づち。"},
{t:"聴解・即時応答",s:"男：この資料、ざっとでいいから目を通しておいて。",q:"質問：最も適切な応答はどれですか。",c:["わかりました。あとで確認しておきます。","目が痛いので無理です。","ざっと捨てておきます。","この道は通れませんでした。"],a:0,e:"目を通す＝過目。ざっと＝大致瀏覽即可。"},
{t:"聴解・即時応答",s:"女：昇進おめでとう！これからますます忙しくなるわね。",q:"質問：最も適切な応答はどれですか。",c:["ありがとう。身が引き締まる思いだよ。","忙しいのは君のほうだよ。","昇進はお断りしました。","これから暇になる予定だよ。"],a:0,e:"身が引き締まる＝深感責任重大。祝賀への定番の返し。"},
{t:"聴解・即時応答",s:"男：あの店、味は抜群なんだけど、いかんせん場所が不便でね。",q:"質問：最も適切な応答はどれですか。",c:["おいしくても、行きにくいと足が遠のきますね。","場所は覚えなくていいですよ。","味が悪いのは残念ですね。","便利な店はお嫌いですか。"],a:0,e:"いかんせん＝無奈。足が遠のく＝漸漸不去。"},
{t:"聴解・即時応答",s:"女：週末の勉強会、急で悪いんだけど、司会をお願いできない？",q:"質問：最も適切な応答はどれですか。",c:["急ですね…。でも、私でよければやります。","司会は要らないと思います。","週末は勉強しません。","悪いのはあなたです。"],a:0,e:"急な依頼→ためらいつつ承諾。私でよければ＝謙遜の受け方。"},
{t:"聴解・即時応答",s:"男：課長、この案はコスト面から見て、いささか無理があるかと。",q:"質問：最も適切な応答はどれですか。",c:["そうか。では、代わりの案はあるか。","無理は体に毒だよ。","面から見ないでくれ。","コストは食べられないよ。"],a:0,e:"いささか＝些か、稍微。婉曲な反対→代案を求めるのが自然な流れ。"},
{t:"聴解・即時応答",s:"女：今日の飲み会、二次会はどうする？",q:"質問：最も適切な応答はどれですか。",c:["あしたも早いから、今日は一次会で失礼するよ。","二次会から参加したよ。","一次会はなかったよ。","三次会だけ行くよ。"],a:0,e:"二次会の相談→都合を理由に辞退。"},
{t:"聴解・即時応答",s:"男：会議室の予約、先を越されちゃったよ。",q:"質問：最も適切な応答はどれですか。",c:["じゃ、別の部屋を探しましょう。","越えられてよかったですね。","先に走ったんですね。","予約は要りませんよ。"],a:0,e:"先を越される＝被搶先。→代替案を探す。"},
{t:"聴解・即時応答",s:"女：この件は、私に任せていただけませんか。",q:"質問：最も適切な応答はどれですか。",c:["じゃ、思い切ってやってみて。","ええ、私が任されました。","その件は存じません。","任せてもらえませんか。"],a:0,e:"任せてほしいという申し出→委ねる返事。"},
{t:"聴解・即時応答",s:"男：ゆうべの地震、結構揺れたね。大丈夫だった？",q:"質問：最も適切な応答はどれですか。",c:["ええ、棚の本が少し落ちたぐらいで。","地震は来ませんでしたよ。","ゆうべはよく眠れました。","揺れたのは気のせいです。"],a:0,e:"安否の確認→被害の程度を答える。"},
{t:"聴解・即時応答",s:"女：お約束の時間より早く着いてしまったのですが。",q:"質問：最も適切な応答はどれですか。",c:["構いませんよ。どうぞお入りください。","では、遅れてください。","お約束はしていません。","もっと早く来てください。"],a:0,e:"早着の断り→受け入れる返事。"},
{t:"聴解・即時応答",s:"男：この計画、絵に描いた餅にならないといいけど。",q:"質問：最も適切な応答はどれですか。",c:["実現できるように、具体策を詰めましょう。","餅はお正月に食べましょう。","絵がお上手なんですね。","おいしそうな計画ですね。"],a:0,e:"絵に描いた餅＝畫餅充飢、空談。→具体化で応じる。"},
{t:"聴解・即時応答",s:"女：すみません、注文した料理がまだ来ないんですが。",q:"質問：最も適切な応答はどれですか。",c:["申し訳ありません。すぐ厨房に確認してまいります。","お客様がお作りください。","もう召し上がったはずですが。","ご注文は受けていません。"],a:0,e:"料理の催促→謝罪＋確認が接客の型。"},
{t:"聴解・即時応答",s:"男：報告書の件、課長にこっぴどく絞られたよ。",q:"質問：最も適切な応答はどれですか。",c:["元気出して。次で挽回しよう。","絞ると小さくなるよね。","課長は力が強いからね。","褒められてよかったね。"],a:0,e:"絞られる＝被狠狠訓斥。挽回（ばんかい）＝扳回。"},
{t:"聴解・即時応答",s:"女：お荷物、お持ちしましょうか。",q:"質問：最も適切な応答はどれですか。",c:["ありがとうございます。でも軽いので大丈夫です。","はい、持ってあげます。","荷物はどこですか。","お願いに行きます。"],a:0,e:"申し出への丁寧な断り。"},
{t:"聴解・即時応答",s:"男：新商品の売れ行き、うなぎ登りだってね。",q:"質問：最も適切な応答はどれですか。",c:["ええ、生産が追いつかないほどです。","うなぎは高いですからね。","登り坂は大変ですね。","売れなくて残念です。"],a:0,e:"うなぎ登り＝直線上昇。"},
{t:"聴解・即時応答",s:"女：（ホテルで）あしたの朝、モーニングコールをお願いできますか。7時に。",q:"質問：最も適切な応答はどれですか。",c:["かしこまりました。7時にお電話いたします。","朝は電話に出られません。","コーヒーは7時にお持ちします。","7時に起こしてください。"],a:0,e:"依頼の復唱＋承諾。"},
{t:"聴解・即時応答",s:"男：締め切りまであと3日か。背水の陣だな。",q:"質問：最も適切な応答はどれですか。",c:["ええ、もう後がないですから、全力でやりましょう。","水は背中に悪いですよ。","陣地はどこですか。","あと3年ありますよ。"],a:0,e:"背水の陣＝背水一戰、沒有退路。"},
{t:"聴解・即時応答",s:"女：この間はごちそうさまでした。おいしかったです。",q:"質問：最も適切な応答はどれですか。",c:["いえいえ、お口に合ってよかったです。","ごちそうしてください。","おいしくなかったですか。","この間って、いつですか。"],a:0,e:"お礼への返し：お口に合う＝合胃口。"},
{t:"聴解・即時応答",s:"男：君、顔色がすぐれないね。今日はもう上がったら？",q:"質問：最も適切な応答はどれですか。",c:["すみません。では、お先に失礼します。","顔は洗いました。","二階に上がります。","課長こそ顔色がいいですね。"],a:0,e:"上がる＝（職場から）下班。気遣いを受けて退社。"},
{t:"聴解・即時応答",s:"女：来月の家賃、少し待っていただけないでしょうか。",q:"質問：最も適切な応答はどれですか。",c:["事情によりますね。まず話を聞かせてください。","家賃は来月から無料です。","待つのは得意です。","もう払いましたよ。"],a:0,e:"支払い猶予の依頼→事情の確認。"},
{t:"聴解・即時応答",s:"男：あの二人、犬猿の仲だから、同じチームは避けたほうがいいよ。",q:"質問：最も適切な応答はどれですか。",c:["そうですね。別々の班にしましょう。","犬と猿を飼っているんですね。","動物園の話ですか。","仲がいいなら安心ですね。"],a:0,e:"犬猿の仲＝水火不容。"},
{t:"聴解・即時応答",s:"女：企画書、何度書き直しても、しっくりこないのよね。",q:"質問：最も適切な応答はどれですか。",c:["一度寝かせて、あした見直したら？","しっかりしてるからいいじゃない。","来ないなら電話してみたら？","書き直さなければいいのに。"],a:0,e:"しっくりこない＝總覺得不對勁。寝かせる＝擱置沉澱。"},
{t:"聴解・即時応答",s:"男：今週は連日残業で、もうくたくただよ。",q:"質問：最も適切な応答はどれですか。",c:["少しは体を休めないと、もたないよ。","くたくた煮はおいしいよね。","残業代がたくさんもらえていいなあ。","今週は暇なんだね。"],a:0,e:"くたくた＝筋疲力盡。もたない＝撐不住。"},
{t:"聴解・即時応答",s:"女：山本さんの送別の言葉、涙なしには聞けなかったわ。",q:"質問：最も適切な応答はどれですか。",c:["本当に。心のこもったスピーチだったね。","泣かなくてよかったね。","涙は体にいいらしいよ。","聞こえなかったの？"],a:0,e:"涙なしには聞けない＝聽了不禁落淚。共感の相づち。"},
{t:"聴解・即時応答",s:"男：すみません、両替をお願いしたいんですが。千円札を百円玉に。",q:"質問：最も適切な応答はどれですか。",c:["かしこまりました。少々お待ちください。","お札は使えません。","百円玉を千円札にですね。","お金は大切にしましょう。"],a:0,e:"選項3は方向が逆＝聞き取りのひっかけ。"},
{t:"聴解・即時応答",s:"女：例の件、根回しはもう済んでるの？",q:"質問：最も適切な応答はどれですか。",c:["ええ、関係部署には話を通してあります。","木の根は掘っていません。","庭はもう回りました。","根性なら誰にも負けません。"],a:0,e:"根回し＝事前疏通。話を通す＝打好招呼。"},
{t:"聴解・即時応答",s:"男：プレゼン資料、この図は蛇足じゃないかな。",q:"質問：最も適切な応答はどれですか。",c:["確かに。思い切って削りましょう。","蛇は出てきませんが。","足のある蛇は珍しいですね。","もっと図を増やしましょう。"],a:0,e:"蛇足＝多餘。→削除で応じる。選項4は正反対。"},
{t:"聴解・即時応答",s:"女：部長、本日はお招きいただき、ありがとうございます。",q:"質問：最も適切な応答はどれですか。",c:["よく来てくれたね。ゆっくりしていって。","招いた覚えはないが。","お礼なら受け取れないよ。","私も招かれた側なんだ、実は君に。"],a:0,e:"招待への感謝→歓迎の言葉。"},
{t:"聴解・即時応答",s:"男：あの新人、飲み込みが早くて助かるよ。",q:"質問：最も適切な応答はどれですか。",c:["ええ、一を聞いて十を知るタイプですね。","早食いは体に悪いですよ。","飲み物が好きなんですね。","飲み込んだら危ないですよ。"],a:0,e:"飲み込みが早い＝領悟力強。一を聞いて十を知る＝聞一知十。"},
{t:"聴解・即時応答",s:"女：今度の連休、どこも予約でいっぱいだって。",q:"質問：最も適切な応答はどれですか。",c:["じゃ、近場でのんびりするしかないね。","連休を予約しておいたよ。","いっぱいなら入れるね。","どこも空いていてよかった。"],a:0,e:"満室→近場（きんば）で過ごす提案。"},
{t:"聴解・即時応答",s:"男：この件、口を挟むようで悪いんだけど、一言いいかな。",q:"質問：最も適切な応答はどれですか。",c:["ええ、ぜひご意見を聞かせてください。","口には何も挟まっていませんよ。","歯に何か挟まったんですか。","一言では足りませんよ。"],a:0,e:"口を挟む＝插嘴（自謙の前置き）→意見を歓迎する返事。"},
{t:"聴解・即時応答",s:"女：資格試験、あと一歩のところで落ちちゃった。",q:"質問：最も適切な応答はどれですか。",c:["惜しかったね。その悔しさをばねに頑張って。","一歩歩けばよかったのに。","合格おめでとう。","試験は歩いて行くものだよ。"],a:0,e:"あと一歩＝差一點。悔しさをばねに＝化不甘為動力。"},
{t:"聴解・即時応答",s:"男：週末の清掃活動、ボランティアが足りないんだって。",q:"質問：最も適切な応答はどれですか。",c:["じゃ、私も参加しようかな。","掃除は嫌いじゃなかったの？","足なら2本あります。","ボランティアは有料ですか。"],a:0,e:"人手不足の話→参加の申し出が自然。"},
{t:"聴解・即時応答",s:"女：この服、私には少し派手じゃないかしら。",q:"質問：最も適切な応答はどれですか。",c:["そんなことないよ。よく似合ってる。","派手なのは性格でしょう。","服は買わないほうがいいよ。","地味な人には地味な服だね。"],a:0,e:"不安の表明→打ち消し＋褒め言葉。"},
{t:"聴解・即時応答",s:"男：例の企画、上からゴーサインが出たよ。",q:"質問：最も適切な応答はどれですか。",c:["やった！さっそく準備に取りかかりましょう。","上を見ても何もありませんよ。","信号は青でしたか。","中止になって残念です。"],a:0,e:"ゴーサイン＝批准、放行。"},
{t:"聴解・即時応答",s:"女：お手数ですが、折り返しお電話いただけますか。",q:"質問：最も適切な応答はどれですか。",c:["承知しました。会議が終わり次第、お電話します。","電話を折ってはいけません。","手数料はいくらですか。","こちらこそ、お電話をお待ちしています。"],a:0,e:"折り返し＝回電。〜次第＝一～就。"},
{t:"聴解・即時応答",s:"男：引っ越しの荷造り、はかどってる？",q:"質問：最も適切な応答はどれですか。",c:["それが、思い出の品に見入っちゃって、全然進まないんだ。","はかりは持っていないよ。","荷物は作らない主義なんだ。","引っ越しはやめたら？"],a:0,e:"はかどる＝進展順利。見入る＝看得入神。"},
{t:"聴解・即時応答",s:"女：先方から、納期を前倒ししてほしいと連絡がありました。",q:"質問：最も適切な応答はどれですか。",c:["急だな。工場のラインと相談してみるよ。","じゃ、後ろに倒しておいて。","納期はもう過ぎたはずだよ。","先方に納品してもらおう。"],a:0,e:"前倒し＝提前。生産ラインとの調整で応じる。"},
{t:"聴解・即時応答",s:"男：この頃、物忘れがひどくてね。年かな。",q:"質問：最も適切な応答はどれですか。",c:["メモを取る習慣をつけるといいですよ。","忘れ物は交番へどうぞ。","お年玉がほしいですね。","物は忘れるためにあります。"],a:0,e:"物忘れの悩み→実用的な助言。"},
{t:"聴解・即時応答",s:"女：あのう、写真を撮っていただけませんか。このボタンを押すだけですので。",q:"質問：最も適切な応答はどれですか。",c:["いいですよ。はい、チーズ。","ボタンなら服に付いていますよ。","写真は撮られたくないんです。","押し売りはお断りです。"],a:0,e:"撮影の依頼→承諾＋かけ声。選項3は撮る／撮られるの取り違え。"},
{t:"聴解・即時応答",s:"男：今期の目標、なんとか達成できたよ。",q:"質問：最も適切な応答はどれですか。",c:["お見事！頑張った甲斐があったね。","達成できなくて残念だね。","目標が低かったんだね。","来期はもう来ないよ。"],a:0,e:"甲斐（かい）がある＝沒有白費。祝福の返答。"},
// ================= 聴解・概要理解 =================
{t:"聴解・概要理解",s:"女：皆さん、勉強の効率を上げたいなら、まず睡眠を見直してください。眠っている間に、脳は昼間の記憶を整理して定着させます。夜遅くまで問題集を解くより、思い切って寝てしまうほうが、翌日の記憶の残り方が違います。勉強時間を増やす前に、睡眠時間を削らないこと。これが今日一番お伝えしたいことです。",q:"質問：講師が最も言いたいことは何ですか。",c:["効率のためには睡眠時間を削らないことが大切だ","問題集は夜に解くのが効果的だ","勉強時間はできるだけ増やすべきだ","昼寝は記憶に悪い影響がある"],a:0,e:"「これが今日一番お伝えしたいこと」の直前＝睡眠時間を削らない。"},
{t:"聴解・概要理解",s:"男：本日も当店をご利用いただき、ありがとうございます。ただいま、青果売り場では、今朝入荷した地元産のトマトを特別価格でご提供しております。数に限りがございますので、お早めにお求めください。なお、レジ袋は有料となっております。マイバッグのご持参にご協力ください。",q:"質問：この放送で最も伝えたいことは何ですか。",c:["地元産トマトの特売の案内","レジ袋の値上げの知らせ","閉店時間の変更","駐車場の混雑の案内"],a:0,e:"主目的＝トマト特売。レジ袋は「なお」以下の付け足し。"},
{t:"聴解・概要理解",s:"男：先月の売り上げは目標を上回りました。皆さんの努力に感謝します。ただ、私が今日話したいのは数字のことではありません。先週、お客様から一通の手紙をいただきました。故障の対応に来た社員の丁寧な説明に感動した、という内容です。売り上げは結果にすぎません。こうした一つ一つの信頼の積み重ねこそが、我が社の財産です。",q:"質問：社長が最も言いたいことは何ですか。",c:["顧客との信頼の積み重ねこそが会社の財産だ","売り上げ目標をさらに上げたい","故障の件数を減らすべきだ","お客様の手紙を増やしたい"],a:0,e:"「話したいのは数字のことではありません」→信頼の積み重ね＝財産。"},
{t:"聴解・概要理解",s:"女：今日の天気です。日中は広い範囲で晴れますが、夕方から大気の状態が不安定になり、山沿いを中心に、にわか雨や雷雨の恐れがあります。お帰りが遅くなる方は、折りたたみ傘があると安心です。あすは高気圧に覆われ、行楽日和となるでしょう。",q:"質問：今日の天気について、正しいものはどれですか。",c:["日中は晴れるが、夕方から雨の恐れがある","一日中雨が降り続く","朝から雷雨になる","夜から雪になる"],a:0,e:"日中晴れ→夕方から不安定。あすは行楽日和＝好天。"},
{t:"聴解・概要理解",s:"男：（留守番電話）もしもし、佐藤です。ごめん、あしたの映画なんだけど、急に出勤になっちゃって行けなくなったんだ。チケットは無駄にしたくないから、代わりに妹さんとか、誰か誘ってもらえないかな。お金は今度会ったときでいいから。本当にごめん。また連絡します。",q:"質問：男の人が伝えたいことは何ですか。",c:["映画に行けなくなったので、代わりの人を誘ってほしい","映画の上映時間が変わった","チケット代をすぐ返してほしい","自分の妹と映画に行くことにした"],a:0,e:"急な出勤→欠席＋「誰か誘ってもらえないかな」＝主旨。"},
{t:"聴解・概要理解",s:"男：歴史を学ぶ意味は、年号を覚えることではありません。過去の人々が、限られた情報の中でどう判断し、どこで間違えたのかを追体験することにあります。同じ構造の問題は、形を変えて現代にも現れます。歴史は暗記科目ではなく、いわば判断力の訓練場なのです。",q:"質問：教授は歴史を学ぶ意味をどのように考えていますか。",c:["過去の判断を追体験して、判断力を鍛えること","年号を正確に覚えること","昔の文化を懐かしむこと","現代とは無関係な知識を増やすこと"],a:0,e:"「暗記科目ではなく、判断力の訓練場」。"},
{t:"聴解・概要理解",s:"女：ウォーキングを始める方に、一つだけ注意していただきたいことがあります。それは、最初から張り切りすぎないことです。初日に1万歩も歩くと、膝を痛めて三日坊主になりがちです。まずは15分、物足りないくらいでやめておく。この「物足りなさ」が、あしたも歩きたいという気持ちを作るのです。",q:"質問：話し手が最も伝えたいことは何ですか。",c:["最初は物足りない程度に抑えたほうが長続きする","毎日1万歩を目標にすべきだ","膝が痛いときは歩いてはいけない","ウォーキングは朝が効果的だ"],a:0,e:"「張り切りすぎない」「物足りなさが〜気持ちを作る」。"},
{t:"聴解・概要理解",s:"男：当社が皆さんに求めるのは、完璧な人材ではありません。失敗を恐れずに手を挙げ、失敗から学べる人です。入社3年間は、成果よりも挑戦の回数を評価します。安定を求める方には物足りないかもしれませんが、成長したい方には、これ以上ない環境だと自負しています。",q:"質問：この会社が新入社員に求めるものは何ですか。",c:["失敗を恐れず挑戦し、そこから学ぶ姿勢","入社直後からの高い成果","安定を重視する堅実さ","完璧な専門知識"],a:0,e:"「完璧な人材ではありません」＝選項4の否定。成果より挑戦の回数。"},
{t:"聴解・概要理解",s:"女：（音声ガイド）この絵は、画家が晩年に故郷を思って描いた一枚です。手前の少年は画家自身だと言われています。注目していただきたいのは、空の色です。夕焼けの赤に、わずかに紫が混ぜられています。これは当時の絵の具では非常に高価な色で、画家がこの絵にかけた思いの深さがうかがえます。",q:"質問：ガイドが特に注目してほしいと言っているのはどこですか。",c:["空の色","少年の服装","川の流れ","額縁の装飾"],a:0,e:"「注目していただきたいのは、空の色です」。"},
{t:"聴解・概要理解",s:"男：市民の皆様にお知らせします。来週月曜日から、市役所本庁舎の耐震工事が始まります。工事期間中、住民票などの証明書の発行は、駅前の市民サービスセンターでも受け付けます。本庁舎の窓口は混雑が予想されますので、ぜひサービスセンターをご利用ください。",q:"質問：この放送の主な目的は何ですか。",c:["証明書の発行が駅前のセンターでもできることを知らせる","工事の騒音について謝る","市役所の閉鎖を知らせる","住民票の料金の変更を知らせる"],a:0,e:"工事は背景。本題＝駅前センターの利用案内。"},
{t:"聴解・概要理解",s:"女：営業のコツ？そうね、一つ挙げるなら、売ろうとしないことかな。変に聞こえるでしょう。でも、お客様は売り込みの匂いに敏感なの。それより、お客様の困りごとを聞いて、解決策を一緒に考える。結果として、商品が必要なら買ってくださるし、必要ないなら無理に売らない。その誠実さが、長い付き合いを生むのよ。",q:"質問：先輩が考える営業のコツは何ですか。",c:["売り込むより、客の困りごとの解決を一緒に考えること","とにかく熱心に商品を売り込むこと","値引きを大きくすること","訪問の回数を増やすこと"],a:0,e:"「売ろうとしないこと」＝逆説的なコツ。誠実さが長い付き合いを生む。"},
{t:"聴解・概要理解",s:"男：よく「話し上手になりたい」と言われますが、私ども噺家がまず仕込まれるのは、実は「間」です。言葉を並べる速さではなく、黙る場所と長さ。お客様が頭の中で情景を描く時間を差し上げる。これができて初めて、同じ話が何倍も面白くなるんでございます。",q:"質問：噺家が話の面白さの鍵だと言っているものは何ですか。",c:["黙る場所と長さ、つまり「間」","話すスピードの速さ","声の大きさ","身振り手振り"],a:0,e:"「まず仕込まれるのは『間』」。速さは否定されている。"},
{t:"聴解・概要理解",s:"女：「エコは我慢」というイメージを、まず捨ててください。断熱を良くした家は、光熱費が下がるうえに快適です。マイボトルは節約になり、自転車通勤は健康にいい。環境への配慮は、生活の質を下げるどころか、むしろ上げるものが多いのです。無理な我慢は続きません。自分が得をする形から始めるのが、長続きの秘訣です。",q:"質問：話し手が勧めるエコの始め方はどれですか。",c:["自分の得になる形から始める","生活の質を下げて我慢する","高価な設備を一度にそろえる","車の使用を完全にやめる"],a:0,e:"「エコは我慢」の否定＋「得をする形から始める」。"},
{t:"聴解・概要理解",s:"男：（車内放送）本日もご利用くださいまして、ありがとうございます。この列車は、のぞみ号、東京行きです。途中の停車駅は、名古屋、新横浜、品川です。なお、3号車と7号車の間は自由席となっております。車内での携帯電話のご使用は、デッキでお願いいたします。",q:"質問：この列車について正しいものはどれですか。",c:["名古屋、新横浜、品川に止まる東京行きである","各駅に止まる大阪行きである","すべての座席が指定席である","携帯電話は座席で自由に使える"],a:0,e:"行き先＋停車駅の聞き取り。自由席あり；電話はデッキで。"},
{t:"聴解・概要理解",s:"女：薬を処方すると、「症状が消えたのでやめました」という方がいらっしゃいます。実はこれが一番危ないのです。特に抗生物質は、症状が消えても菌が残っていることがあり、中途半端にやめると、薬の効かない菌を育ててしまいます。処方された分は、必ず最後まで飲み切ってください。",q:"質問：医師が最も伝えたいことは何ですか。",c:["処方された薬は最後まで飲み切るべきだ","症状が消えたら薬をやめてよい","抗生物質はなるべく飲まないほうがいい","薬は多めにもらっておくべきだ"],a:0,e:"「必ず最後まで飲み切ってください」。途中でやめる＝一番危ない。"},
{t:"聴解・概要理解",s:"男：本の売れ行きは、実は表紙で大きく変わります。同じ内容でも、装丁を変えただけで売り上げが数倍になった例は珍しくありません。「中身で勝負」と言いたいところですが、手に取ってもらえなければ、中身は読まれません。表紙は本の顔であると同時に、最初の招待状なんです。",q:"質問：書店員は表紙をどのようなものだと言っていますか。",c:["読者を本へ招く入り口のようなもの","内容とは無関係な飾り","値段を決めるための要素","作家の趣味の表れ"],a:0,e:"「本の顔」「最初の招待状」＝読者を招き入れるもの。"},
{t:"聴解・概要理解",s:"男：いいか、あしたの試合、相手は格上だ。だがな、向こうはうちを研究していない。つまり、思い切ってぶつかれるのはうちのほうだ。失うものはない。緊張するのは向こうに任せて、お前たちは楽しんでこい。全力で楽しんだ結果なら、負けても俺は何も言わない。",q:"質問：監督が選手に最も伝えたいことは何ですか。",c:["失うものはないから、思い切って楽しんでこい","絶対に勝たなければならない","相手を徹底的に研究しろ","負けたら練習を倍にする"],a:0,e:"「楽しんでこい」「負けても俺は何も言わない」＝プレッシャーを外す激励。"},
{t:"聴解・概要理解",s:"女：こちらの掃除機、吸引力はどのメーカーにも負けません。ただ、正直に申し上げますと、音は少し大きめです。集合住宅で夜に掃除をされる方には、こちらの静音タイプをお勧めします。吸引力はやや落ちますが、夜9時以降でも気兼ねなくお使いいただけます。",q:"質問：店員は夜に掃除をする客に、どちらを勧めていますか。",c:["音の静かなタイプ","吸引力の強いタイプ","一番値段の安いタイプ","一番新しいタイプ"],a:0,e:"夜＋集合住宅→静音タイプ。吸引力は妥協点として説明。"},
{t:"聴解・概要理解",s:"男：新郎の田中君とは、入社以来10年の付き合いです。彼のすごさは、失敗した後輩を絶対に人前で叱らないことです。必ず別室で、しかも最初に「大丈夫か」と聞く。仕事の腕より、この人柄こそが、彼の一番の財産だと私は思っています。花子さん、彼はきっといい家庭を築きますよ。",q:"質問：スピーチでは新郎のどんな点を褒めていますか。",c:["後輩を思いやる人柄","仕事の処理の速さ","営業成績のよさ","ユーモアのセンス"],a:0,e:"「仕事の腕より、この人柄こそが一番の財産」。"},
{t:"聴解・概要理解",s:"女：非常食というと、乾パンのような特別な物を思い浮かべますね。でも、私がお勧めするのは「ローリングストック」。普段食べている缶詰やレトルトを少し多めに買い、食べたら買い足す。これだけです。特別な準備は要らず、賞味期限切れの心配もない。備蓄は、日常の延長で考えるのが長続きのこつです。",q:"質問：話し手が勧める備蓄の方法はどれですか。",c:["普段の食品を多めに買い、食べながら補充する","乾パンを大量に保管する","賞味期限の長い物だけを買う","非常時に買いに行く"],a:0,e:"ローリングストック＝日常の延長の備蓄法。"},
{t:"聴解・概要理解",s:"男：最近、館内での飲食についてのお問い合わせが増えています。当館では、ふた付きの飲み物に限り、閲覧席でお飲みいただけます。食べ物は、1階の休憩スペースのみでお願いします。本を汚さないためのルールですので、ご理解とご協力をお願いいたします。",q:"質問：この図書館でできることはどれですか。",c:["ふた付きの飲み物を閲覧席で飲むこと","閲覧席で弁当を食べること","館内のどこでも自由に飲食すること","2階でお菓子を食べること"],a:0,e:"飲み物＝ふた付きなら閲覧席OK。食べ物＝1階休憩スペースのみ。"},
{t:"聴解・概要理解",s:"女：面接で緊張しない方法をよく聞かれますが、緊張はなくすものではなく、味方につけるものです。適度な緊張は、集中力を高めてくれます。「緊張してはいけない」と思うほど、人は緊張します。「緊張している、ちょうどいい」と受け入れてしまう。これだけで、体はずいぶん楽になりますよ。",q:"質問：話し手は緊張をどうすればいいと言っていますか。",c:["なくそうとせず、受け入れて味方につける","深呼吸で完全に消す","緊張しないように強く念じる","面接の回数を減らす"],a:0,e:"「なくすものではなく、味方につけるもの」。念じるほど緊張する＝選項3の逆効果。"},
{t:"聴解・概要理解",s:"男：片付けの相談で一番多いのは「収納が足りない」という悩みです。でも、プロの目から見ると、収納が足りない家はほとんどありません。物が多すぎるだけです。収納家具を買い足すのは、実は逆効果。入れ物が増えれば、物も増えます。まず減らす。収納を考えるのは、その後です。",q:"質問：話し手の考えに合うものはどれですか。",c:["収納を増やす前に、まず物を減らすべきだ","収納家具をもっと買い足すべきだ","物は多いほうが暮らしが豊かだ","収納が足りない家がほとんどだ"],a:0,e:"「まず減らす。収納を考えるのは、その後」。家具の買い足し＝逆効果。"},
{t:"聴解・概要理解",s:"女：おいしいコーヒーの入れ方ですか。豆や道具の話の前に、一つだけ。それは、入れる直前に豆をひくことです。コーヒーの香りは、ひいた瞬間から逃げ始めます。どんな高級な豆でも、ひいて一週間たてば、香りは半分以下。逆に言えば、普通の豆でも、ひきたてなら見違えますよ。",q:"質問：店主が一番大切だと言っていることは何ですか。",c:["入れる直前に豆をひくこと","高級な豆を使うこと","高価な道具をそろえること","湯の温度を正確に測ること"],a:0,e:"「豆や道具の話の前に、一つだけ」＝ひきたて最優先。"},
{t:"聴解・概要理解",s:"男：（添乗員）皆様、明朝は6時にロビー集合です。早いですが、朝焼けの富士山は、この時間にしか見られません。お部屋の鍵はフロントにお預けください。朝食は、戻ってから8時にレストランで。なお、山頂付近は真夏でも冷えますので、上着を一枚お持ちください。",q:"質問：客があしたの朝、持っていくものは何ですか。",c:["上着","朝食","部屋の鍵","カメラの三脚"],a:0,e:"鍵＝フロントに預ける；朝食＝戻ってから；持参するのは上着。"},
{t:"聴解・概要理解",s:"女：犬や猫の不調は、飼い主さんの「いつもと違う」という直感が、一番のセンサーです。食欲、歩き方、目の輝き。数値に表れる前に、日々見ている方だけが気づける変化があります。「気のせいかも」と思っても、どうぞ遠慮なく連れてきてください。早すぎる受診というものは、ありません。",q:"質問：獣医が飼い主に伝えたいことは何ですか。",c:["いつもと違うと感じたら、遠慮なく受診してほしい","数値に出ない症状は心配ない","受診は年に一回で十分だ","不調は自然に治るのを待つべきだ"],a:0,e:"「早すぎる受診というものは、ありません」＝ためらわず来院を。"},
{t:"聴解・概要理解",s:"男：住宅火災で亡くなる方の多くは、実は炎ではなく煙にやられます。そして火災の煙は、上へ、驚くほどの速さで広がります。逃げるときは、姿勢を低く、口と鼻をぬれたタオルなどで覆って。エレベーターは絶対に使わず、階段で避難してください。",q:"質問：火事のとき、してはいけないことはどれですか。",c:["エレベーターで避難すること","姿勢を低くすること","口と鼻を覆うこと","階段で逃げること"],a:0,e:"「エレベーターは絶対に使わず」。他の3つは正しい避難行動。"},
{t:"聴解・概要理解",s:"女：うちのトマトが甘いのには、種明かしがあります。水をぎりぎりまで与えないんです。トマトは水が足りないと、実を守ろうと糖分をため込みます。かわいそうに見えるかもしれませんが、この「適度な試練」が味を作る。人間の子育てと似ている、と言ったら言いすぎでしょうかね。",q:"質問：トマトが甘くなる理由は何だと言っていますか。",c:["水を控えることで、実が糖分をため込むから","水をたっぷり与えているから","特別な肥料を使っているから","新しい品種だから"],a:0,e:"「水をぎりぎりまで与えない」→糖分をため込む＝適度な試練。"},
{t:"聴解・概要理解",s:"男：時間になりましたので始めます。本日の議題は、来年度の新製品計画です。お手元の資料は事前にお読みいただいている前提で、説明は省略します。今日は報告の場ではなく、決める場です。各案の賛否と、その理由だけを、お一人3分以内でお願いします。",q:"質問：この会議はどのように進められますか。",c:["資料の説明を省き、各自が賛否と理由を短く述べる","資料を最初から読み上げる","報告だけをして決定はしない","時間無制限で自由に討論する"],a:0,e:"説明省略＋「決める場」＋一人3分以内。"},
{t:"聴解・概要理解",s:"女：（駅の放送）お客様にお願い申し上げます。ホームでの歩きながらのスマートフォンのご使用は、大変危険です。実際に、線路への転落事故も起きております。ご使用の際は、必ず立ち止まって、黄色い線の内側でお願いいたします。皆様のご協力をお願い申し上げます。",q:"質問：この放送は何を頼んでいますか。",c:["スマートフォンは立ち止まって使うこと","スマートフォンの電源を切ること","ホームの中を走らないこと","切符を事前に用意すること"],a:0,e:"禁止ではなく「立ち止まって、黄色い線の内側で」＝使用方法の依頼。"},
{t:"聴解・概要理解",s:"男：卒業生の皆さん、これからの人生では、正解のない問いに何度も出会います。学校のテストと違って、選択肢も採点者もいません。そのとき支えになるのは、点数ではなく、「自分はこう考えて、こう選んだ」と言える経験の積み重ねです。どうか、自分の頭で選ぶことから逃げないでください。",q:"質問：校長が卒業生に最も伝えたいことは何ですか。",c:["自分の頭で考えて選ぶことから逃げないでほしい","テストの点数を大切にしてほしい","正解のある問題だけを選んでほしい","他人の評価に従ってほしい"],a:0,e:"「自分の頭で選ぶことから逃げないでください」＝結びの呼びかけ。"},
{t:"聴解・概要理解",s:"女：続いてはこちら、電気圧力鍋です。材料を入れてボタンを押すだけ。火を使わないので、そばを離れても大丈夫。仕事から帰ってボタン一つ、お風呂から上がるころには、煮込み料理が完成しています。忙しい方の「もう一品」を、この一台が引き受けます。",q:"質問：この商品の一番の売りは何ですか。",c:["ボタン一つで、そばにいなくても料理ができること","値段が安いこと","デザインが美しいこと","プロの味が学べること"],a:0,e:"「ボタンを押すだけ」「そばを離れても大丈夫」＝時短・放置調理。"},
{t:"聴解・概要理解",s:"男：レジ袋、ペットボトルと、目に見えるごみに注目が集まりますが、実は衣類の廃棄も深刻です。安く買って、数回着て捨てる。この流れが、大量の資源を消費しています。長く着られる一着を選ぶこと。買う枚数を減らすこと。地味ですが、これが最も効果のある対策です。",q:"質問：研究者が勧める対策はどれですか。",c:["長く着られる服を選び、買う量を減らす","流行の服を安く買う","レジ袋だけ減らせば十分だ","服をこまめに洗濯する"],a:0,e:"「長く着られる一着」＋「枚数を減らす」＝地味だが最有効。"},
{t:"聴解・概要理解",s:"女：悩みを相談されたとき、多くの人はすぐに助言をしようとします。でも、相談する側が本当に求めているのは、答えより先に「わかってもらえた」という実感です。まずは最後まで聞く。意見はそのあと、求められたら言う。この順番を守るだけで、あなたは「相談してよかった」と言われる人になれます。",q:"質問：カウンセラーが勧める相談の受け方はどれですか。",c:["まず最後まで聞き、助言は求められてからする","すぐに的確な助言をする","相手の話を途中で整理してあげる","自分の経験談を先に話す"],a:0,e:"順番＝聞く→（求められたら）意見。求められているのは共感の実感。"},
{t:"聴解・概要理解",s:"女：（旅館の女将）当館は山の中の一軒宿でございます。テレビはございません。携帯の電波も、正直、弱うございます。ですが、それを不便と取るか、ぜいたくと取るか。川の音と鳥の声だけの一晩を、どうぞお楽しみくださいませ。",q:"質問：女将はこの宿のどんなところを勧めていますか。",c:["何もない静けさを楽しめるところ","最新の設備がそろっているところ","テレビ番組が充実しているところ","通信環境がいいところ"],a:0,e:"不便を「ぜいたく」と読み替える提案。川の音と鳥の声＝静けさ。"},
{t:"聴解・概要理解",s:"男：物価の上昇、いわゆるインフレは、悪者のように語られがちです。しかし、緩やかな物価上昇は、賃金の上昇を伴えば、経済が健康に回っている印でもあります。問題は、物価だけが上がって賃金が上がらない状態です。ニュースで物価の数字を見るときは、賃金の数字とセットで見る。これが経済を読む基本です。",q:"質問：話し手が勧める経済ニュースの見方はどれですか。",c:["物価と賃金の数字をセットで見る","物価の数字だけを見る","インフレはすべて悪だと考える","経済ニュースは見ないでおく"],a:0,e:"「物価の数字を見るときは、賃金の数字とセットで」。"},
{t:"聴解・概要理解",s:"女：切り花を長持ちさせるこつは、毎日の水替えと、茎を少し切り戻すことです。茎の先は一日で傷み、水を吸い上げにくくなります。斜めに1センチ。これだけで、花の寿命は目に見えて変わります。高い延命剤より、まずこの一手間です。",q:"質問：花を長持ちさせるために大切なことは何ですか。",c:["毎日水を替えて、茎を少し切ること","延命剤をたくさん使うこと","日光に長く当てること","花瓶を大きくすること"],a:0,e:"「水替え＋切り戻し」。延命剤より一手間が先。"},
{t:"聴解・概要理解",s:"男：（映画監督）今回の映画、実は台本にないせりふが、いくつも本編に残っています。役者が役として生きた瞬間に、ふと出た言葉です。台本は設計図ですが、映画は生き物でして。設計図どおりに完成した建物より、現場で生まれた偶然のほうが、時に真実を写すんです。",q:"質問：監督が大切にしているものは何ですか。",c:["撮影現場で偶然生まれた本物の瞬間","台本を一字も変えないこと","有名な役者を起用すること","撮影を予定どおり終えること"],a:0,e:"「現場で生まれた偶然のほうが、時に真実を写す」。台本＝設計図にすぎない。"},
{t:"聴解・概要理解",s:"女：子どもがけんかを始めると、大人はすぐ仲裁したくなります。でも、私たちはまず見守ります。おもちゃの取り合いも、順番の言い争いも、子どもにとっては交渉の練習だからです。手や足が出そうになったら、そこで初めて間に入る。けんかは、育ちの教材でもあるんです。",q:"質問：保育士はけんかにどう対応すると言っていますか。",c:["基本は見守り、危なくなったら間に入る","すぐに止めて両方を叱る","勝ち負けを決めてあげる","親を呼んで対応してもらう"],a:0,e:"けんか＝交渉の練習・育ちの教材→見守りが基本。"},
{t:"聴解・概要理解",s:"男：台風10号は、あす夜、この地方に最も接近する見込みです。雨と風は、あすの昼過ぎから急に強まります。避難や買い物、雨戸の補強といった備えは、動きやすい今夜からあすの午前中までに済ませてください。暗くなってから、風の中での作業は、かえって危険です。",q:"質問：話し手が最も伝えたいことは何ですか。",c:["台風への備えはあすの午前中までに済ませるべきだ","台風は上陸しない見込みだ","避難は夜になってからでよい","雨戸の補強は必要ない"],a:0,e:"「備えは〜あすの午前中までに」。暗くなってからの作業＝かえって危険。"},

Q.forEach(x=>{if(x.p!==undefined)x.q=PASS[x.p]+'<br><br><b>問い：</b>'+x.q;});
// ================= App =================
const LS='n1rquiz_v1';
let S;
try{S=JSON.parse(localStorage.getItem(LS))||{}}catch(e){S={}}
S.wrong=S.wrong||[];S.srs=S.srs||{};S.star=S.star||[];S.stats=S.stats||{d:{},c:{}};
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return fmt(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return fmt(d)}
function dueList(){return S.wrong.filter(i=>!S.srs[i]||S.srs[i].due<=today())}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const app=document.getElementById('app');
const cats=[...new Set(Q.map(x=>x.t))];
if(window.speechSynthesis)speechSynthesis.getVoices();

function playScript(qi){
  if(!window.speechSynthesis)return;
  const q=Q[qi];if(!q.s)return;
  speechSynthesis.cancel();
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.indexOf('ja')===0);
  q.s.split('／').forEach(line=>{
    const male=/^男/.test(line);
    const t=line.replace(/^[^：]{1,6}：/,'');
    const u=new SpeechSynthesisUtterance(t);
    u.lang='ja-JP';u.rate=0.9;u.pitch=male?0.8:1.25;
    if(v)u.voice=v;
    speechSynthesis.speak(u);
  });
}

function speakQ(qi){
  const q=Q[qi];
  if(q.s)return playScript(qi);
  if(!window.speechSynthesis)return;
  const t=q.q.replace(/<[^>]+>/g,'');
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.9;
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.indexOf('ja')===0);
  if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function streak(){
  let n=0;
  for(let i=0;i<9999;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(S.stats.d[fmt(d)])n++;
    else if(i===0)continue;
    else break;
  }
  return n;
}

function statHtml(){
  let n=0,ok=0;
  Object.values(S.stats.d).forEach(v=>{ok+=v[0];n+=v[1]});
  if(!n)return '';
  const rows=Object.entries(S.stats.c).map(([c,[r,m]])=>`<div class="stat"><span>${c}</span><span>${r} / ${m}（${Math.round(r/m*100)}%）</span></div>`).join('');
  return `<div class="card"><div class="tag">學習儀表板</div>
  <div style="text-align:center;font-size:1.05rem;margin:6px 0 10px">🔥 連續 ${streak()} 天｜累計 ${n} 題｜正確率 ${Math.round(ok/n*100)}%</div>${rows}</div>`;
}

function home(){
  S.session=null;save();
  const due=dueList().length;
  let catBtns=cats.map(c=>{
    const n=Q.filter(x=>x.t===c).length;
    return `<button class="secondary" onclick="start('${c}')">${c}（${n} 題）</button>`;
  }).join('');
  app.innerHTML=`
  <h1>🎧 N1 読解・聴解 500</h1>
  <div class="sub">読解 250＋聴解 250｜聽解先按 ▶️ 聽語音再作答｜進度自動儲存</div>
  <div class="card">
    <button class="primary" onclick="start('all')">▶ 全部 ${Q.length} 題（隨機出題）</button>
    <button class="warn" onclick="start('due')" ${due?'':'disabled style="opacity:.4"'}>📅 今日複習（${due} 題到期）</button>
    <button class="secondary" onclick="start('wrong')" ${S.wrong.length?'':'disabled style="opacity:.4"'}>✍ 全部錯題（${S.wrong.length} 題）</button>
    <button class="secondary" onclick="start('star')" ${S.star.length?'':'disabled style="opacity:.4"'}>⭐ 不熟收藏（${S.star.length} 題）</button>
    <button class="secondary" onclick="exportWrong()" ${S.wrong.length?'':'disabled style="opacity:.4"'}>📋 匯出錯題（貼給 AI 深入解說）</button>
    <button class="secondary" onclick="makeEpub()">📖 下載 EPUB 題庫（點註解看答案）</button>
  </div>
  ${statHtml()}
  <div class="card"><div class="tag">分類練習</div>${catBtns}</div>
  <button class="mini" onclick="if(confirm('確定清除錯題與複習排程？（儀表板統計會保留）')){S.wrong=[];S.srs={};save();home()}">清除錯題紀錄</button>
  <button class="mini" onclick="location.href='n1.html'">→ N1 語言知識 500</button>
  <button class="mini" onclick="location.href='https://shelly-awkward.github.io/jlpt-quiz/'">→ N2 版測驗</button>
  <button class="mini" onclick="location.href='https://shelly-awkward.github.io/jlpt-quiz/n3.html'">→ N3 版測驗</button>`;
}

function start(mode){
  let idx;
  if(mode==='all')idx=Q.map((_,i)=>i);
  else if(mode==='due')idx=dueList();
  else if(mode==='wrong')idx=[...S.wrong];
  else if(mode==='star')idx=[...S.star];
  else idx=Q.map((_,i)=>i).filter(i=>Q[i].t===mode);
  if(!idx.length)return;
  shuffle(idx);
  S.session={mode,idx,pos:0,right:0,log:[]};
  save();renderQ();
}

const MODENAME={all:'綜合測驗',due:'今日複習',wrong:'錯題複習',star:'不熟收藏'};

function renderQ(){
  const s=S.session;
  if(s.pos>=s.idx.length)return end();
  const qi=s.idx[s.pos],q=Q[qi];
  const order=shuffle([0,1,2,3]);
  const opts=order.map((oi,k)=>`<button class="opt" id="o${k}" onclick="pick(${k})">${'ABCD'[k]}．${q.c[oi]}</button>`).join('');
  const longQ=q.q.length>140?' long':'';
  const playBtn=q.s?`<button class="play" onclick="playScript(${qi})">▶️ 音声を再生（可重複播放）</button>`:'';
  app.innerHTML=`
  <div class="top"><span>${MODENAME[s.mode]||s.mode}　${s.pos+1} / ${s.idx.length}</span><span>✔ ${s.right}　✘ ${s.pos-s.right}</span></div>
  <div class="bar"><div style="width:${s.pos/s.idx.length*100}%"></div></div>
  <div class="card">
    <span class="tag">${q.t}</span>
    ${playBtn}
    <div class="q${longQ}">${q.q}</div>
    ${opts}
    <div id="after"></div>
  </div>
  <button class="mini" onclick="if(confirm('中斷測驗回到首頁？（進度已儲存）')){home()}">回首頁</button>`;
  window._cur={qi,order};
}

function pick(k){
  const {qi,order}=window._cur,q=Q[qi],s=S.session;
  const ok=order[k]===q.a;
  for(let i=0;i<4;i++){
    const b=document.getElementById('o'+i);
    b.disabled=true;
    if(order[i]===q.a)b.classList.add('correct');
    else if(i===k)b.classList.add('wrong');
    else b.classList.add('dim');
  }
  if(ok){
    s.right++;
    if(s.mode==='due'||s.mode==='wrong'){
      const r=S.srs[qi]||{step:0,miss:1};
      r.step=(r.step||0)+1;
      if(r.step>=3){S.wrong=S.wrong.filter(x=>x!==qi);delete S.srs[qi];}
      else{r.due=addDays(r.step===1?3:7);S.srs[qi]=r;}
    }
  }else{
    if(!S.wrong.includes(qi))S.wrong.push(qi);
    const r=S.srs[qi]||{step:0,miss:0};
    r.step=0;r.miss=(r.miss||0)+1;r.due=addDays(1);S.srs[qi]=r;
  }
  const tk=today();
  S.stats.d[tk]=S.stats.d[tk]||[0,0];S.stats.d[tk][1]++;if(ok)S.stats.d[tk][0]++;
  S.stats.c[q.t]=S.stats.c[q.t]||[0,0];S.stats.c[q.t][1]++;if(ok)S.stats.c[q.t][0]++;
  s.log.push({t:q.t,ok});
  s.pos++;save();
  const starred=S.star.includes(qi);
  document.getElementById('after').innerHTML=`
    ${q.s?'<div class="scr">📜 スクリプト：'+q.s+'</div>':''}
    <div class="exp">${ok?'⭕ 正解！':'❌ 正解是：'+q.c[q.a]}<br>💡 ${q.e}</div>
    <div class="row">
      <button class="chip" onclick="speakQ(${qi})">🔊 ${q.s?'再聽一次':'聽發音'}</button>
      <button class="chip" id="star" onclick="toggleStar(${qi})">${starred?'⭐ 已標記':'☆ 標記不熟'}</button>
    </div>
    <button class="primary" onclick="renderQ()">下一題 ▶</button>`;
  document.getElementById('after').scrollIntoView({behavior:'smooth',block:'end'});
}

function toggleStar(qi){
  const i=S.star.indexOf(qi);
  if(i>=0)S.star.splice(i,1);else S.star.push(qi);
  save();
  const b=document.getElementById('star');
  if(b)b.textContent=S.star.includes(qi)?'⭐ 已標記':'☆ 標記不熟';
}

function exportWrong(){
  let t='【N1 読解・聴解 錯題清單 '+today()+'】共 '+S.wrong.length+' 題\n\n';
  S.wrong.forEach((qi,n)=>{
    const q=Q[qi],r=S.srs[qi]||{};
    t+=(n+1)+'. ['+q.t+'] '+q.q.replace(/<[^>]+>/g,' ')+'\n'+(q.s?'   スクリプト：'+q.s+'\n':'')+'   正解：'+q.c[q.a]+(r.miss?'｜錯過 '+r.miss+' 次':'')+'\n';
  });
  t+='\n請針對以上錯題逐題深入解說：文章或對話的邏輯結構、我可能誤讀的地方、關鍵詞語、干擾選項為何錯，最後分析我的読解／聴解弱點模式，並依此出 5 題變化題考我。';
  app.innerHTML=`<h1>📋 錯題清單</h1>
  <div class="sub">複製後貼到 Claude 對話，就能得到量身深入解說</div>
  <div class="card">
    <textarea id="ex" style="width:100%;height:45vh;font-size:.9rem;border:1px solid #e3ddd2;border-radius:8px;padding:10px;font-family:inherit">${t}</textarea>
    <button class="primary" onclick="const x=document.getElementById('ex');x.select();x.setSelectionRange(0,999999);if(navigator.clipboard){navigator.clipboard.writeText(x.value).then(()=>alert('已複製！'))}else{document.execCommand('copy');alert('已複製！')}">全選並複製</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
}

// ================= EPUB =================
function crc32(d){
  let t=crc32.t;
  if(!t){t=crc32.t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}}
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
function zipStore(files){
  const parts=[],central=[];let off=0;
  files.forEach(f=>{
    const nb=f.nameBytes,d=f.data,crc=crc32(d);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0x0800,true);
    lh.setUint32(14,crc,true);lh.setUint32(18,d.length,true);lh.setUint32(22,d.length,true);
    lh.setUint16(26,nb.length,true);
    parts.push(new Uint8Array(lh.buffer),nb,d);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0x0800,true);
    ch.setUint32(16,crc,true);ch.setUint32(20,d.length,true);ch.setUint32(24,d.length,true);
    ch.setUint16(28,nb.length,true);ch.setUint32(42,off,true);
    central.push(new Uint8Array(ch.buffer),nb);
    off+=30+nb.length+d.length;
  });
  let cdSize=0;central.forEach(u=>cdSize+=u.length);
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);eo.setUint16(8,files.length,true);eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true);eo.setUint32(16,off,true);
  const out=new Uint8Array(off+cdSize+22);let p=0;
  parts.concat(central,[new Uint8Array(eo.buffer)]).forEach(u=>{out.set(u,p);p+=u.length});
  return out;
}
function buildEpub(){
  const enc=new TextEncoder();
  const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fix=s=>escq(s).replace(/&lt;(\/)?(u|b)&gt;/g,'<$1$2>').replace(/&lt;br\s*\/?&gt;/g,'<br/>');
  const wrap=(title,body)=>'<?xml version="1.0" encoding="utf-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja"><head><title>'+title+'</title><style>body{line-height:1.8}.q{margin:0 0 1.5em 0}.a{font-size:.9em}aside{font-size:.9em;border-top:1px dotted #999;padding-top:.3em;margin-top:.5em}u{text-decoration:none;border-bottom:2px solid #000;font-weight:bold}</style></head><body>'+body+'</body></html>';
  const chapters=[],files=[];
  cats.forEach((cat,ci)=>{
    const qs=[];Q.forEach((q,i)=>{if(q.t===cat)qs.push({q,i})});
    let body='<h1>'+cat+'（'+qs.length+'題）</h1>',notes='';
    qs.forEach((x,n)=>{
      const ord=shuffle([0,1,2,3]);
      const letter='ABCD'[ord.indexOf(x.q.a)];
      const opts=ord.map((oi,k)=>'ABCD'[k]+'．'+fix(x.q.c[oi])).join('<br/>');
      const scr=x.q.s?'【音声スクリプト】'+fix(x.q.s)+'<br/><br/>':'';
      body+='<div class="q"><p><b>'+(n+1)+'．</b>'+scr+fix(x.q.q)+'</p><p>'+opts+'</p><p class="a" id="r'+x.i+'"><a epub:type="noteref" href="#n'+x.i+'">▶ 答案・解說</a></p></div>';
      notes+='<aside id="n'+x.i+'" epub:type="footnote"><p><b>'+(n+1)+'．正解：'+letter+'．'+fix(x.q.c[x.q.a])+'</b><br/>'+fix(x.q.e)+'　<a href="#r'+x.i+'">↩ 返回第'+(n+1)+'題</a></p></aside>';
    });
    body+='<h2>解答・解説一覧</h2>'+notes;
    chapters.push({href:'c'+ci+'.xhtml',title:cat});
    files.push({name:'OEBPS/c'+ci+'.xhtml',text:wrap(cat,body)});
  });
  const title=document.title;
  const nav=wrap('目次','<nav epub:type="toc"><h1>目次</h1><ol>'+chapters.map(c=>'<li><a href="'+c.href+'">'+c.title+'</a></li>').join('')+'</ol></nav>');
  const opf='<?xml version="1.0" encoding="utf-8"?>\n<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">urn:uuid:jlpt-quiz-'+Date.now()+'</dc:identifier><dc:title>'+title+'</dc:title><dc:language>ja</dc:language><meta property="dcterms:modified">'+new Date().toISOString().replace(/\.\d+Z$/,'Z')+'</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>'+chapters.map((c,i)=>'<item id="c'+i+'" href="'+c.href+'" media-type="application/xhtml+xml"/>').join('')+'</manifest><spine>'+chapters.map((c,i)=>'<itemref idref="c'+i+'"/>').join('')+'</spine></package>';
  const container='<?xml version="1.0" encoding="utf-8"?>\n<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';
  const list=[{name:'mimetype',text:'application/epub+zip'},{name:'META-INF/container.xml',text:container},{name:'OEBPS/content.opf',text:opf},{name:'OEBPS/nav.xhtml',text:nav}].concat(files);
  return zipStore(list.map(f=>({nameBytes:enc.encode(f.name),data:enc.encode(f.text)})));
}
function makeEpub(){
  const blob=new Blob([buildEpub()],{type:'application/epub+zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=document.title.replace(/\s+/g,'')+'.epub';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
}
