<script>
// 中文読解共用文章（p:索引 參照）
const PASS=[
"【文章】かつて教育の目的は、知識を頭の中に蓄えることだった。書物が貴重で、情報を持つこと自体が力だった時代の名残である。しかし、誰もが手のひらの端末で世界中の知識に触れられる今、単なる暗記の価値は下がり続けている。<br>では、学校は不要になったのか。私はむしろ逆だと考える。情報が洪水のようにあふれる時代だからこそ、その真偽を見極め、組み合わせ、自分の問いを立てる力——いわば「知識の使い方」を学ぶ場が必要になる。それは独学では身につきにくい。異なる考えを持つ他者と議論し、間違いを訂正される経験の中でしか、思考の偏りは矯正されないからだ。<br>教育の中心は「何を知っているか」から「知っていることで何ができるか」へ移りつつある。教師の役割も、知識の伝達者から、学びの伴走者へと変わっていくだろう。",
"【文章】「何のために働くのか」と問われれば、多くの人はまず生活のためと答えるだろう。それは正直な答えであり、恥じる必要はどこにもない。ただ、長い職業人生を振り返った人々の話を聞くと、興味深い共通点がある。記憶に残っているのは給料日のことではなく、誰かに感謝された瞬間や、難しい仕事をやり遂げた朝の空気だというのだ。<br>賃金は労働の対価として欠かせない。しかし人間は、対価だけでは長く走り続けられない生き物でもある。自分の仕事が誰かの役に立っているという実感——手応えと呼んでもいい——が、日々の労働に<u>意味の糸を通す</u>。<br>だから、もし今の仕事が空しく感じられるなら、辞める前に一度、自分の仕事の先にいる「誰か」の顔を思い浮かべてみるといい。見えなかった意味が、案外近くに落ちているかもしれない。",
"【文章】和食の味の土台は出汁（だし）である。昆布と鰹節からとる出汁は、それ自体が主役になることはないが、あらゆる料理の背後で味の骨格を支えている。興味深いのは、出汁の「うま味」が長い間、西洋の味覚理論では正式な味と認められていなかったことだ。甘味、塩味、酸味、苦味の四つで味は説明できるとされ、うま味が第五の基本味として国際的に認知されたのは、ようやく二十世紀の終わりになってからである。<br>自分たちの舌が確かに感じているものが、理論の側に存在しない。そのとき日本の料理人たちは、理論に合わせて味を捨てるのではなく、味に合わせて理論が変わるのを待った。<br>科学は万能ではなく、常に現実の後を追いかける。日常の実感を安易に手放すべきではないという教訓を、私はこの小さな椀の中に見る。",
"【文章】高齢者向けの製品開発で陥りがちな失敗は、「高齢者専用」を前面に出しすぎることだという。文字を大きくし、機能を減らし、「シニア向け」と銘打った途端、当の高齢者が手に取らなくなる。誰しも、自分を「弱者」と認定する商品は使いたくないのだ。<br>成功している製品は、むしろ逆の発想から生まれている。握力が弱くても開けやすい容器は、荷物で手がふさがった若者にも便利だ。段差のない床は、車椅子の人だけでなく、掃除ロボットにも都合がいい。特定の誰かのための配慮が、結果としてすべての人の使いやすさにつながる。これがユニバーサルデザインの本質である。<br>「高齢者のため」の技術は、実は年齢を問わない「人間のため」の技術なのだ。配慮を特別扱いにせず、当たり前の設計に溶け込ませること。そこに成熟した社会の姿がある。",
"【文章】「書くことは考えることだ」とよく言われるが、これは比喩ではない。頭の中の考えは、自分では整理されているつもりでも、実は霧のように曖昧なまま漂っている。文章にしようとして初めて、論理の飛躍や根拠の欠落が姿を現す。<u>書けない部分こそ、考えていなかった部分なのだ</u>。<br>だから私は、考えがまとまってから書くのではなく、まとめるために書くことを勧めたい。下手でもいいから書き始める。行き詰まったら、そこが自分の思考の現在地である。消しては書き、書いては消す。この往復運動の中で、霧は少しずつ形を結んでいく。<br>優れた文章家が優れた思想家でもあるのは、偶然ではない。彼らは書くという行為を通じて、人より多く考えているのである。",
"【文章】日本の伝統芸能には「間（ま）」という独特の概念がある。能楽師は動きを止めている時間にこそ神経を注ぐといい、落語家は沈黙の長さで客席の笑いを操る。音や動きが「ない」時間が、単なる空白ではなく、表現の一部として機能しているのだ。<br>これは芸能に限った話ではない。日本家屋の床の間は、物を置かないことで空間を引き締める。手紙の余白、会話の間合い。埋め尽くさないことが、かえって埋められた部分を生かす。<br>効率を尊ぶ現代は、この「間」を無駄とみなして削っていく。動画は倍速で見られ、沈黙は気まずさとして嫌われる。だが、間を失った表現は、休符のない楽譜のようなものだ。すべての音が鳴り続ける音楽を、人は音楽と感じられるだろうか。「何もない」時間の豊かさを、私たちはもう一度見直してもよいのではないか。",
"【文章】全国紙が部数を減らす中、一部の地方紙が健闘している。理由を尋ねると、ある編集長の答えは明快だった。「全国のニュースはネットで足ります。うちにしか書けないのは、読者が暮らす半径十キロの物語です」。<br>小学校の統合、商店街の閉店、堤防の工事。全国的には些細な出来事が、当事者にとっては人生を左右する大事件である。大手メディアが「多くの人に関わること」を追うなら、地方紙は「少数の人に深く関わること」を拾う。この分業は、情報があふれる時代にこそ価値を増す。<br>ネットの海には、意外なことに「近所の情報」がほとんど落ちていない。世界中のニュースが読める時代に、最も手に入りにくいのが足元の情報だという<u>逆説</u>。地方紙の生きる道は、この逆説の中にある。",
"【文章】工場の事故調査で「作業員の不注意」という結論ほど危険なものはない、と失敗学の専門家は言う。個人を責めて処分すれば、調査はそこで終わる。だが、同じ持ち場に別の人間が立てば、いずれ同じ事故が起きる。<br>注意力は有限であり、人間は必ず間違える。この前提に立てば、問うべきは「なぜ注意しなかったか」ではなく、「なぜ一度の不注意が事故に直結する仕組みになっていたか」である。ボタンの配置、確認の手順、警報の設計。事故の芽は、たいてい仕組みの側に埋まっている。<br>個人の責任追及は、一見厳しく、実は安易である。仕組みの欠陥と向き合うことは、一見遠回りで、実は唯一の再発防止策なのだ。",
"【文章】子どもは「なぜ空は青いの」「なぜ働かなきゃいけないの」と、大人が答えに窮する問いを平気で投げてくる。忙しい親はつい「そういうものなの」と切り上げてしまうが、<u>この一言は思いのほか高くつく</u>。問いを封じられた経験を重ねた子どもは、やがて問うこと自体をやめてしまうからだ。<br>大切なのは、正解を返すことではない。「いい質問だね、なんでだろうね」と、一緒に立ち止まってみせることだ。親が答えを知らないことは、少しも恥ではない。むしろ、大人も知らないことがあると知るのは、子どもにとって世界が広がる発見である。<br>問う力は、あらゆる学びの出発点だ。答えを与える教育から、問いを育てる教育へ。その第一歩は、家庭の何気ない会話の中にある。",
"【文章】コンビニエンスストアは、もはや単なる小売店ではない。公共料金の支払い、宅配便の受け渡し、証明書の発行。災害時には物資の供給拠点となり、深夜の明かりは防犯灯の役割さえ果たす。民間企業でありながら、事実上の社会インフラになっているのだ。<br>だが、この便利さは危うい土台の上に載っている。24時間の営業は人手不足で維持が難しくなり、地方では採算割れで撤退する店舗が相次ぐ。店が消えた地域では、買い物だけでなく、行政サービスへの入り口まで一緒に失われる。<br>企業の論理では、儲からない店を閉めるのは当然である。しかし社会の論理では、そこに暮らす人々の生活線が切れる。インフラ化した民間サービスをどう支えるか。コンビニの問題は、これからの公共のあり方を問う試金石である。",
"【文章】「よろしかったでしょうか」「お名前様」。接客の現場では、文法的に疑わしい過剰な敬語が増え続けている。言葉の乱れと片付けるのは簡単だが、背景には働き手の切実な事情がある。客からの理不尽な叱責を避けるため、防具を重ねるように丁寧さを積み増していくのだ。<br>敬語には相手を敬う機能と、自分を守る機能がある。過剰敬語は後者が肥大した結果であり、いわば<u>言葉のインフレ</u>である。インフレが進むと、通貨と同じで言葉の価値も下がる。標準的な丁寧語では「ぞんざい」に聞こえるようになり、さらに過剰な表現が必要になる。<br>この悪循環を止められるのは、話し手ではなく聞き手の側だろう。普通の丁寧さを普通に受け取る余裕が客の側にあれば、防具はもともと必要ないのだから。",
"【文章】日本では年間数百万トンの食品が、まだ食べられる状態で捨てられている。その一因が「3分の1ルール」と呼ばれる商習慣である。賞味期限までの期間を三等分し、最初の3分の1を過ぎると小売店に納品できず、次の3分の1を過ぎると店頭から撤去される。期限内であっても、である。<br>このルールは、鮮度を重んじる消費者への配慮から生まれた。つまり、廃棄の山を築いているのは、企業だけでなく、棚の奥から新しい日付の商品を選ぶ<u>私たち自身の手でもある</u>。<br>幸い、見直しの動きは始まっている。納品期限を緩和する企業や、期限の近い商品を割引して売り切る店も増えた。制度の改革と消費者の意識、その両輪がそろって初めて、廃棄の山は小さくなっていくだろう。",
"【文章】学校の運動部活動が転換期を迎えている。長時間の練習が当たり前だった時代は終わり、休養日を義務づける指針も定められた。「練習量が減れば弱くなる」という危惧の声は根強い。だが、スポーツ科学の知見は逆を示している。成長期の体に過度な練習は故障のもとであり、技術の定着にはむしろ休息が欠かせない。<br>問題の核心は、練習量そのものより「練習の質」への無関心にあった。目的の曖昧な反復練習を何時間続けても、上達への寄与は薄い。短い時間で何をどう鍛えるかを設計する力が、指導者に問われている。<br><u>限られた時間は、制約ではなく工夫の母である</u>。部活動改革は、日本のスポーツが「根性」から「科学」へ脱皮できるかどうかの試金石といえる。",
"【文章】騒音対策というと、音を減らすことばかりが考えられがちだ。しかし音の研究者によれば、人が「うるさい」と感じるかどうかは、音量だけでは決まらないという。同じ大きさでも、川のせせらぎは心地よく、工事の音は不快である。意味のない機械音や、自分で制御できない音ほど、人は苦痛に感じるのだ。<br>この知見は都市設計に応用され始めている。駅前広場に水の流れる音を導入して雑踏の音をやわらげたり、公園の木々で風の音を作り出したりする試みである。不快な音を消すのではなく、快い音を重ねることで音の風景全体を整える。「引き算」だけでなく<u>「足し算」の発想</u>だ。<br>目を閉じれば、街には固有の音の風景がある。景観と同じように「音の景観」を設計する視点が、これからの都市には求められるだろう。",
"【文章】翻訳アプリの精度が上がるにつれ、「もう外国語を学ぶ必要はない」という声を聞くようになった。旅行や簡単な商談なら、確かに機械で事足りる場面は増えるだろう。<br>それでも外国語学習が無意味になるとは、私には思えない。言葉を学ぶことは、単に意味を交換する技術の習得ではないからだ。相手の言語で挨拶を試みるとき、そこには「あなたの文化に敬意を持っている」という無言のメッセージが宿る。たどたどしい発音が、時に流暢な機械翻訳より深く相手の心を開くのは、そのためだ。<br>機械翻訳と外国語学習は、置き換え合う関係ではなく、役割の異なる道具になっていくのだろう。情報の伝達は機械に任せ、心の距離を縮める仕事は、これからも人間の舌に残される。",
"【文章】伝統工芸の世界で後継者不足が深刻だという話は、もう何十年も繰り返されてきた。だが現場を歩くと、単純な「なり手不足」とは違う風景が見えてくる。志望者はいるのだ。問題は、彼らが食べていけないことにある。<br>修業中の収入はわずかで、一人前になっても作品が売れる保証はない。「好きだけでは続かない」と去っていった若者を、私は何人も知っている。つまり後継者問題の正体は、職人の育成の問題である以上に、工芸品が適正な価格で売れる市場をどう作るかという経済の問題なのだ。<br>技を継ぐ意志と、暮らしを立てる現実。この二つを両立させる仕組み——例えば修業期間の公的支援や、海外市場の開拓——なしに、「若者よ、伝統を守れ」と呼びかけるのは、あまりに無責任だろう。",
"【文章】昆虫食が世界的に注目されている。牛や豚に比べ、昆虫は少ない飼料と水で育ち、温室効果ガスの排出も格段に少ない。人口増加による食糧危機への備えとして、国際機関も推奨する「合理的な」たんぱく源である。<br>だが、合理性だけで食卓は変わらない。食は文化であり、何を「食べ物」とみなすかは理屈ではなく感情が決めるからだ。エビは食べられるのにコオロギに抵抗があるのは、栄養学の問題ではなく、慣れとイメージの問題である。<br>実際、普及に成功している例は、姿を残した昆虫料理ではなく、粉末にしてクッキーやパンに練り込む方法だという。文化の壁は、正論で突き破るものではなく、生活の中に少しずつ溶かし込むもの。昆虫食の未来は、この知恵にかかっている。",
"【文章】江戸の町は、世界でもまれな循環型社会だったといわれる。紙くずは買い集められて再生紙になり、灰は肥料として農村へ売られ、古着は仕立て直されて何代も着られた。壊れた鍋や傘を修理して回る専門の職人が、路地を行き交っていた。<br>注目すべきは、これが「環境意識」の産物ではなかったことだ。資源が乏しく、輸入にも頼れない社会では、捨てずに使い切ることが単純に経済的だった。倫理ではなく損得が、循環を支えていたのである。<br>ここに現代への示唆がある。「地球のために我慢する」型の環境運動は、善意に頼る分だけ長続きしにくい。リサイクルや省エネが「得になる」仕組みを設計できたとき、循環型社会は説教なしに回り始めるはずだ。",
"【文章】理想のリーダー像は時代とともに変わる。かつては、先頭に立ってぐいぐい引っ張る「機関車型」が求められた。だが、変化が速く正解の見えない今の時代、一人の判断に全員が従う組織はかえって脆い。<br>近年注目されるのは、「支える型」のリーダーである。自ら答えを出す代わりに、メンバーが力を発揮できる環境を整え、障害を取り除くことに徹する。判断の権限は現場に近いところへ渡す。リーダーの仕事は「命じること」から「引き出すこと」へ移った。<br>ただし、これはリーダーが楽になったという意味ではない。命令は一瞬で済むが、人が育つのを待ち、任せて口を出さない我慢は、はるかに強い自制心を要求する。支える型のリーダーシップとは、権力の放棄ではなく、より高度な統率の形なのである。",
"【文章】「孤独」と「孤立」は似て非なる言葉である。孤独は一人でいるときの主観的な感覚であり、豊かな創造の時間にもなり得る。読書も思索も、上質な孤独の中でしか深まらない。一方の孤立は、困ったときに頼れる相手がいないという客観的な状態を指す。問題にすべきは後者だ。<br>やっかいなことに、孤立は本人の目にも周囲の目にも見えにくい。仕事があるうちは同僚がいて、危機は退職や病気を機に一気に表面化する。「あの人は一人が好きだから」という周囲の思い込みが、支援の手をさらに遅らせる。<br>孤独を楽しむ権利は守られるべきである。同時に、いざというとき頼れる糸を、細くてもいいから社会の側が張っておく。この二つは矛盾しない。むしろ、安心して孤独を楽しめる社会とは、孤立への備えが整った社会のことなのだ。",
"【文章】若者の投票率の低さを嘆く声は多い。「政治への無関心」と一括りにされがちだが、調査を見ると様子は少し違う。社会問題への関心はむしろ高い。環境や貧困の話題には敏感に反応し、寄付やボランティアには積極的だ。彼らが冷めているのは政治そのものではなく、「選挙で何かが変わる」という実感に対してである。<br>考えてみれば無理もない。有権者に占める高齢層の比率は年々高まり、政策は自然と多数派に向く。「どうせ数で負ける」という諦めが、足を投票所から遠ざける。そしてまた投票率が下がり、若者向けの政策が減る。悪循環である。<br>この循環を破る鍵は、逆説的だが「それでも投票に行く」こと以外にない。政治家は当選のために票を読む。若者の投票率が数ポイント上がるだけで、無視できない集団として政策の視野に入ってくるのだから。",
"【文章】電子書籍が普及しても、紙の本は生き残ると私は考えている。両者は同じ「本」でありながら、体験の質が異なるからだ。<br>電子書籍の強みは検索と携帯性にある。数千冊を持ち歩き、目当ての一文を瞬時に探し出せる。実用書や資料との相性は抜群だ。一方、紙の本には「厚みの感覚」がある。残りのページの重みが物語の終わりを予感させ、読み終えた本が本棚に並ぶことで、読書の履歴が目に見える形で堆積していく。<br>道具の進化は、古い道具を必ずしも駆逐しない。写真が絵画を、テレビがラジオを消さなかったように、新旧の道具はそれぞれ得意な場面に落ち着いていく。問うべきは「どちらが勝つか」ではなく、「どちらを、いつ使うか」なのだろう。",
"【文章】高速道路の渋滞の多くは、事故や工事ではなく「自然渋滞」である。緩い上り坂などで先頭の車がわずかに減速すると、後続車は車間を詰めすぎているため、より強くブレーキを踏む。この減速の波が後方へ増幅されながら伝わり、数キロ後ろでは完全な停止になる。渋滞とは、いわば道路の上を後ろ向きに伝わる「波」なのだ。<br>興味深いのは、この波を個人の運転で打ち消せることである。十分な車間距離を取った車は、前方の減速を緩やかな速度調整で吸収し、波を後ろに伝えない。「車間を詰めれば早く着く」という直感に反し、ゆとりある車間こそが全体の流れを速くする。<br>渋滞学の教訓は運転にとどまらない。個々の「急ぎ」が全体を遅らせ、個々の「ゆとり」が全体を救う。この構造は、仕事の詰め込みすぎで機能不全に陥る組織にも、そのまま当てはまるように思える。",
"【文章】「ほめて育てる」が教育の合言葉になって久しい。しかし現場の教師からは、ほめられないと動けない子が増えたという戸惑いの声も聞く。ほめ言葉が「報酬」になると、子どもは報酬のために行動するようになり、報酬が見込めない課題を避け始める。善意の声かけが、挑戦への意欲をむしろ細らせるのだ。<br>心理学では、これを外発的動機づけによる内発的動機づけの侵食と呼ぶ。絵を描くのが好きだった子に、描くたびにごほうびを与え続けると、やがてごほうびなしには描かなくなる、という有名な実験がある。<br>では、ほめてはいけないのか。そうではない。問題は、何をほめるかである。結果や才能ではなく、本人が工夫した点や粘った過程を、具体的な言葉で認める。評価ではなく「見ていたよ」という関心の表明。これなら報酬にはならず、子どもの内側の火を消すこともない。",
"【文章】行列のできる店には、さらに人が並ぶ。「並んでいるからには、うまいに違いない」。この推論は一見合理的である。自分に情報がないとき、他人の行動を手がかりにするのは、生き物としての知恵でもある。<br>だが、この知恵には落とし穴がある。並んでいる一人一人が、実は誰も味を知らず、ただ前の人の判断を信じているだけだとしたら。根拠は連鎖の先頭にしかなく、そこが間違っていれば、行列全体が<u>誤りを増幅する装置</u>になる。金融市場のバブルも、SNSの炎上も、構造はこの行列と同じだ。<br>他人の判断を参考にするなとは言わない。ただ、「みんなが選んでいる」は「正しい」の証明ではない、と知っておくこと。行列に並ぶ前に一度だけ、「私は何を根拠にこれを選ぶのか」と自問する習慣が、群れの誤りから自分を守る最後の砦になる。",
"【文章】ふとした香りが、何十年も前の記憶を鮮やかに呼び覚ますことがある。石けんの匂いで祖母の家の洗面所が、雨上がりの土の匂いで小学校の帰り道が、突然目の前に立ち上がる。この現象は、嗅覚が脳の中で記憶や感情を司る部位と直結していることに由来するという。視覚や聴覚の情報が理性のフィルターを経由するのに対し、匂いは<u>検問なしで感情の中枢に届く</u>のだ。<br>だからこそ、香りの記憶は言葉にしにくい。「懐かしい」としか言えないのに、胸の奥は確かに揺れている。写真は撮れず、録音もできない。保存の手段がないことが、かえって香りの記憶を純粋なまま保っているのかもしれない。<br>記録があふれる時代に、記録できないものだけが持つ鮮度がある。香りは、その最後の聖域なのだろう。",
"【文章】動物園の役割は、珍しい動物を見せる娯楽から大きく変わりつつある。現代の動物園が掲げる使命は主に四つ——種の保存、調査研究、教育、そしてレクリエーションである。絶滅の恐れがある動物を繁殖させ、野生に返す試みは、その象徴といえる。<br>展示の思想も変わった。狭い檻に動物を収める「標本型」の展示から、生息地の環境を再現し、動物本来の行動を引き出す「行動展示」へ。来園者は芸をする動物ではなく、木々の間を跳び、水に潜る、ありのままの姿に出会う。<br>それでも、動物を囲いの中に置くこと自体への批判は消えない。動物園はその問いから逃げるべきではないだろう。「ここでしか守れない命がある」と胸を張れる園だけが、囲いの存在を正当化できる。娯楽施設から保全の砦へ。動物園は今、その途上にある。",
"【文章】災害のニュースを見て、いてもたってもいられず現地に向かう。その気持ちは尊い。だが、善意がそのまま力になるとは限らないのが、災害支援の難しさである。<br>発生直後の被災地は、道路も宿も物資も限られている。準備のないボランティアが押し寄せれば、渋滞を悪化させ、貴重な食料と寝場所を消費し、受け入れ側の手間を増やす。「支援に来たはずが、支援される側になる」という笑えない事態も起きる。<br>経験者は口をそろえて言う。行く前にボランティアセンターの募集状況を確認し、装備と食料は自分で完結させ、指示に従って動くこと。そして、直後の混乱期を過ぎた後も、復旧は何か月も続く。熱が冷めた頃にこそ人手は足りなくなる。善意を本当に届けたいなら、<u>「今すぐ」より「長く」</u>を考えるべきなのだ。",
"【文章】人生百年時代といわれ、社会人の「学び直し」が推奨されている。だが、資格取得や講座の受講率はなかなか上がらない。時間とお金の不足が理由に挙げられるが、より根深いのは「学び＝若い時期に終えるもの」という思い込みではないか。<br>学校教育の記憶が、学びのイメージを固定している。教室、試験、成績。あの窮屈さをもう一度と思えば、腰が重くなるのも当然だ。しかし大人の学びは本来もっと自由である。試験もなければ、比べられる同級生もいない。昨日の自分より一歩進めば、それで十分に成功なのだ。<br>幸い、入り口は増えている。夜間や週末の講座、無料のオンライン教材。図書館という古くて頼れる味方もいる。必要なのは、まとまった時間や大金ではなく、「学びを取り戻すのに遅すぎることはない」という、ただ一つの認識の転換なのかもしれない。",
"【文章】箸を上手に使う人は、箸の先まで神経が通っているかのように振る舞う。熟練した大工にとって、かんなは手の延長である。脳科学はこの感覚を裏付けている。道具を使い込むと、脳は道具の先端までを「自分の身体」として扱うようになるという。<br>この「身体の拡張」は、道具が手になじむまでの反復練習を経て初めて起こる。逆に言えば、使いこなす前に次々と道具を替える人は、いつまでも道具と「他人」のままだ。新製品が出るたびに買い替えるより、一つの道具と長く付き合うほうが、技は深まる。<br>スマートフォンも、いまや現代人の拡張された身体だろう。ただし箸やかんなと違うのは、こちらが道具に合わせて行動を変えさせられる場面が多いことだ。道具を身体化するのか、道具に飼いならされるのか。その境目を見極める目が、道具の時代を生きる私たちには要る。",
"【文章】一流旅館の接客は、客が口に出す前に動くという。廊下ですれ違うときの荷物の量から、夕食の進み具合から、客の状態を読み、頼まれる前に布団を整え、お茶を替える。「言われてからやるのはサービス、言われる前にやるのがおもてなし」と、ある女将は語った。<br>ただし、先回りには危うさもある。読みが外れれば、押し付けになる。静かに過ごしたい客に話しかけ、放っておいてほしい客の世話を焼く。おもてなしと押し付けの境界線は、観察の精度にある。よく見ること、そして自分の「良かれ」を疑うこと。<br>相手の望みを想像し、しかも想像を過信しない。この繊細な均衡は、接客業に限らず、あらゆる人間関係の要諦でもあるだろう。",
"【文章】わずか十七音の俳句が、なぜ豊かな世界を描けるのか。秘密は「省略」にある。俳句は説明をしない。感情を表す言葉を並べなくても、季節の景色と一つの動きだけで、静けさや寂しさが立ち上がる。<br>語られない部分は、読み手が自分の経験で埋める。つまり俳句は、作者が半分を作り、読み手が残り半分を完成させる<u>共同作業</u>なのだ。すべてを説明する文章が読み手を受け身にするのに対し、俳句は読み手を創作に参加させる。<br>この構造は、余白の多い日本画や、削ぎ落とした能の舞台とも通じる。「言い尽くさない」ことは、未完成ではなく、相手への信頼の表明である。受け手の想像力を信じるからこそ、作り手は筆を止められるのだ。",
"【文章】キャッシュレス決済の便利さに、いまさら異を唱えるつもりはない。会計は速く、記録は自動で残り、財布は軽くなった。ただ、現金と違う点が一つある。お金を「使った」という痛みが薄れることだ。<br>行動経済学によれば、人は現金を手放すとき、軽い苦痛を感じるという。この痛みが、無駄遣いへの天然のブレーキだった。画面をかざすだけの決済は、ブレーキのない自転車のように滑らかに、そして止まりにくい。子どもの金銭教育を心配する声が出るのも、当然だろう。<br>とはいえ、時計の針は戻らない。必要なのは、失われた「痛み」を別の形で補うこと。支出の通知をこまめに確認する、月の上限を決めて可視化する。道具が奪った感覚は、仕組みで取り戻すしかないのである。",
"【文章】子ども食堂と聞くと、貧困家庭の子どもに食事を提供する場所、と思われがちだ。実際の風景はもう少し広い。多くの食堂は、経済状況を問わず誰でも歓迎する。共働きで夕食が一人になる子、子育てに疲れた親、話し相手のいない高齢者。安い食事を囲んで、多世代が同じ食卓につく。<br>あえて対象を限定しないのには理由がある。「貧しい子のための場所」と看板を掲げれば、そこに通うこと自体が貧困の証明になり、最も来てほしい子が来られなくなるからだ。誰でも来られる場所だからこそ、本当に困っている子も紛れて来られる。<br>支援とは、支援と気づかれない形で届けるのが最も難しく、最も優しい。子ども食堂のにぎやかな食卓は、その知恵の結晶である。",
"【文章】海洋プラスチックごみの映像は衝撃的だ。だが、レジ袋の有料化やストローの紙化だけで問題が解決すると考えるのは早計である。日本のプラスチックごみに占めるレジ袋の割合はごくわずかで、大半は容器や包装である。<br>それでも象徴的な取り組みに意味がないわけではない。毎日の買い物で「袋は要りません」と言うたびに、人は自分を「環境に配慮する人間」と再定義する。この小さな自己認識の変化が、より大きな行動——過剰包装の商品を避ける、詰め替え製品を選ぶ——への入り口になる。<br>制度の設計者が本当に狙うべきは、レジ袋の削減量そのものではなく、この心理的な連鎖である。入り口の先に道が続いていなければ、儀式は儀式で終わる。次の一手が問われている。",
"【文章】全国で空き家が増え続けている。人口が減るのだから当然に見えるが、話はそう単純ではない。空き家の多くは、持ち主が分かっていながら放置されている。解体すれば費用がかかるうえ、更地にすると固定資産税が上がる。壊すより放っておくほうが「合理的」になる制度のゆがみが、廃屋の列を生んでいるのだ。<br>放置された家は、景観を損ねるだけでなく、倒壊や放火の危険を地域に広げる。一軒の廃屋が隣家の資産価値を下げ、人離れをさらに加速させる。個人の選択の集積が、地域全体の損失になる典型例である。<br>近年、税制の見直しや、自治体による改修補助、空き家を店舗や住居として活用する動きも出てきた。「壊す」「放置する」の二択から、「生かす」という第三の道へ。空き家は、負の遺産にも地域の資源にもなり得る。分かれ目は制度の設計にある。",
"【文章】「笑う門には福来る」は、単なる縁起言葉ではないらしい。笑いが免疫の働きを高め、痛みを和らげ、ストレスホルモンを減らすことを示す研究が積み重なっている。注目すべきは、作り笑いでも一定の効果が確認されていることだ。楽しいから笑うだけでなく、笑うから楽しくなる。<u>感情と表情の道は、双方向に通じている</u>。<br>医療や介護の現場では、この知見を生かした「笑いの処方」も試みられている。落語の鑑賞会、笑いヨガ。薬と違って副作用はなく、費用もほとんどかからない。<br>もちろん、笑いは万能薬ではない。それでも、確実に言えることが一つある。深刻な顔で悩み続けることに、医学的な効能は何一つ確認されていない、ということだ。",
"【文章】テレビと動画の時代に、ラジオが静かに聴き直されている。理由の一つは「ながら」に強いことだ。画面を見る必要がないから、家事や運転、作業をしながら耳だけで付き合える。目を奪い合う競争から、ラジオだけが降りている。<br>もう一つは距離感である。パーソナリティは「皆さん」ではなく「あなた」に語りかける。深夜、イヤホンの中の声は、大観衆への放送というより一対一の会話に近い。孤独な時間に寄り添う媒体として、ラジオは最初から設計されていたかのようだ。<br>最新の技術が最良とは限らない。古い媒体は、新しい媒体が失ったものを照らし出す鏡になる。ラジオの復権は、私たちが「見ること」に疲れ、「聴くこと」の親密さを恋しがっている証拠なのかもしれない。",

{t:"読解・短文",q:"【文章】安さだけを追い求める消費行動は、回り回って自分の首を絞めることになりかねない。企業は価格競争に勝つためにコストを削り、そのしわ寄せは働く人の賃金に及ぶ。そして賃金が上がらなければ、人々はますます安さを求める。この悪循環を断ち切るには、「良いものに適正な対価を払う」という意識を、消費者の側が取り戻す必要がある。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["消費者が適正な価格を受け入れることが悪循環の解消につながる","企業はもっと価格競争に力を入れるべきだ","賃金を上げれば物価は自然に下がる","安い商品を選ぶのは賢い消費行動だ"],a:0,e:"末句「悪循環を断ち切るには〜消費者の側が」＝解方在消費者付出合理對價。"},
{t:"読解・短文",q:"【文章】習慣を変えたいなら、意志の力に頼ってはいけない。人間の意志は思いのほか弱く、疲れているときほど誘惑に負けやすい。それよりも、環境を変えることだ。菓子を買い置きしない、スマートフォンを寝室に持ち込まない。誘惑そのものを視界から消してしまえば、意志の力を使う場面自体が減るのである。<br><br><b>問い：</b>筆者が勧めているのはどのような方法か。",c:["誘惑に接する機会を減らすよう環境を整える方法","強い意志を持つよう自分を訓練する方法","疲れているときは判断を避ける方法","習慣を一度にすべて変える方法"],a:0,e:"「それよりも、環境を変えることだ」＋具體例（不囤零食、手機不進臥室）＝靠環境不靠意志。"},
{t:"読解・短文",q:"【文章】会議の目的は、結論を出すことだけではない。参加者が「自分も決定に関わった」と感じることにも意味がある。トップが一人で決めれば速いが、決定に関与しなかった人は、その実行に身が入らないものだ。遠回りに見える合意形成のプロセスは、実は実行段階での推進力を生む投資なのである。<br><br><b>問い：</b>筆者は会議での合意形成をどのようなものだと考えているか。",c:["実行段階の推進力を生み出す投資","結論を早く出すための手段","トップの決定を伝達する場","時間の無駄が多い形式的な儀式"],a:0,e:"末句直接定義：「実行段階での推進力を生む投資」。「遠回りに見える」＝看似繞路（讓步）→実は（轉折）。"},
{t:"読解・短文",q:"【文章】外国語を学ぶ最大の収穫は、流暢に話せるようになることではないかもしれない。別の言語の枠組みで世界を眺めたとき、母語では当たり前すぎて見えなかったものの輪郭が、ふと浮かび上がってくる。外国語学習とは、他者の言葉を手に入れる営みであると同時に、自分の言葉を再発見する営みでもあるのだ。<br><br><b>問い：</b>筆者によると、外国語学習のもう一つの意義とは何か。",c:["母語や自分のものの見方を見つめ直せること","流暢な会話力が身につくこと","外国の友人が増えること","翻訳の技術が向上すること"],a:0,e:"「自分の言葉を再発見する営み」＝重新看見母語／自身觀點。首句已否定「流暢に話せること」是最大收穫。"},
{t:"読解・短文",q:"【文章】この度は、弊社製品「スチームオーブンSX-10」の一部に不具合が確認されましたため、無償点検・修理を実施させていただくこととなりました。対象製品をお持ちのお客様は、恐れ入りますが下記フリーダイヤルまでご連絡ください。なお、本件による事故は現在までに報告されておりませんが、安全のため、点検完了までスチーム機能のご使用はお控えください。<br><br><b>問い：</b>対象製品を持っている人は、どうすればいいか。",c:["スチーム機能を使わずに、電話で点検を申し込む","直ちに製品の使用を全面的にやめる","販売店に製品を持ち込んで交換してもらう","修理費用を用意して連絡を待つ"],a:0,e:"要求：打免付費電話聯絡＋點検完成前別用「スチーム機能」（不是整台停用）。修理免費（無償），選項4錯。"},
{t:"読解・短文",q:"【文章】AIが人間の仕事を奪うという議論は、論点がずれていることが多い。歴史を振り返れば、技術は仕事を「消す」と同時に、新しい仕事を「生んで」きた。問うべきは仕事の総量ではなく、移行期に取り残される人をどう支えるかである。変化そのものを止めることはできない以上、変化に適応するための再教育の仕組みこそが急務だ。<br><br><b>問い：</b>筆者が最も重要だと考えていることは何か。",c:["変化に適応するための再教育の仕組みを整えること","AIの開発を法律で規制すること","仕事の総量を減らさないようにすること","技術の変化をできるだけ遅らせること"],a:0,e:"「〜こそが急務だ」＝筆者的主張所在。問うべきは総量ではなく「取り残される人をどう支えるか」。"},
{t:"読解・短文",q:"【文章】本を速く読む技術が人気だが、私は疑問に思う。優れた本は、読者の中に「問い」を残す。その問いを抱えたまま歩く時間にこそ、読書の本当の価値がある。一冊を三日で読み終えて忘れてしまうより、一か月かけて読み、その後何年も考え続けるほうが、はるかに豊かな読書と言えるのではないか。<br><br><b>問い：</b>筆者にとって「豊かな読書」とはどのようなものか。",c:["読んだ後も問いを抱えて考え続けるような読書","短期間で多くの本を読破する読書","内容を完全に記憶する読書","専門書を中心にした読書"],a:0,e:"「問いを抱えたまま歩く時間にこそ〜本当の価値」。首句「疑問に思う」表明反對速讀。"},
{t:"読解・短文",q:"【文章】地方の活性化というと、大型商業施設の誘致や観光開発が語られがちだ。しかし、外から持ち込んだにぎわいは、流行が去れば潮のように引いていく。持続的な活力は、その土地に既にある資源——人、歴史、風土——を住民自身が再発見するところからしか生まれない。派手さはなくとも、足元を掘る作業こそが遠回りのようで近道なのである。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["地域にもとからある資源を住民が生かすことが持続的な活性化につながる","大型施設の誘致こそ地方活性化の近道だ","観光開発には流行の分析が欠かせない","地方には活用できる資源がそもそも乏しい"],a:0,e:"「その土地に既にある資源を住民自身が再発見するところからしか生まれない」＝唯一解。しか〜ない＝限定。"},
{t:"読解・短文",q:"【文章】健康情報があふれる時代である。昨日まで体に良いとされた食品が、今日は悪者にされる。個々の研究結果に一喜一憂するのは賢明ではない。大切なのは、単一の食品に頼らず、多様なものを適量食べるという、昔から変わらない原則だ。退屈に聞こえるかもしれないが、科学が積み上げてきた結論は、案外この平凡な一文に集約される。<br><br><b>問い：</b>筆者が勧めているのはどれか。",c:["特定の食品に頼らず、多様な食品を適量とること","最新の研究結果に従って食品を選ぶこと","体に良いとされる食品を集中的にとること","昔ながらの食事だけを続けること"],a:0,e:"「単一の食品に頼らず、多様なものを適量」＝核心原則。「一喜一憂は賢明ではない」否定選項2。"},
{t:"読解・短文",q:"【文章】部下を褒めるとき、「センスがいい」と才能を褒めるより、「準備が丁寧だった」と過程を褒めるほうがよい。才能を褒められた人は失敗を恐れて挑戦を避けるようになるが、過程を褒められた人は努力そのものに価値を見いだし、難しい課題にも取り組み続けるからだ。褒め方ひとつで、人の成長曲線は変わる。<br><br><b>問い：</b>筆者によると、過程を褒められた人はどうなるか。",c:["努力に価値を感じ、難しい課題にも挑戦し続ける","失敗を恐れて慎重になる","自分の才能に自信を持つようになる","上司の評価を気にしなくなる"],a:0,e:"對比結構：才能を褒める→挑戦を避ける／過程を褒める→取り組み続ける。"},
{t:"読解・短文",q:"【文章】【スタッフ募集】カフェ「森の時計」では、ホールスタッフを募集しています。経験は問いませんが、土日どちらかに勤務できる方に限ります。勤務は週2日から応相談。まかない付き、交通費は月1万円まで支給。まずは下記アドレスに履歴書を添付のうえ、お気軽にご応募ください。面接は随時行います。<br><br><b>問い：</b>この求人に応募できるのはどんな人か。",c:["接客の経験はないが、土日のどちらかに勤務できる人","土日は休みたいが、平日なら毎日働ける人","メールを使わずに直接面接を受けたい人","交通費を全額支給してほしい人"],a:0,e:"「経験は問いません」＝無經驗可；「土日どちらかに勤務できる方に限ります」＝硬條件。応募方式限 email 附履歷。"},
{t:"読解・短文",q:"【文章】旅先で写真ばかり撮っていると、かえって旅の記憶が薄れる気がする。レンズ越しに風景を「記録」した安心感が、その場を全身で「体験」することを妨げるのだ。本当に心を動かされた瞬間には、人はカメラを構えることさえ忘れてしまう。撮らなかった風景ほど、なぜか鮮明に覚えているのは、そのためだろう。<br><br><b>問い：</b>撮らなかった風景をよく覚えているのはなぜだと筆者は考えているか。",c:["記録に頼らず、その場を全身で体験しているから","カメラの性能が足りなかったから","撮った写真を後で見返しているから","珍しい風景は印象に残りやすいから"],a:0,e:"「記録した安心感」が「体験」を妨げる→沒拍照＝全身體驗→記憶鮮明。"},
{t:"読解・短文",q:"【文章】敬語は相手との距離を測る物差しだとよく言われる。だが、敬語の本当の働きは、距離を「作る」ことにあるのではないか。あえて丁寧な言葉を使うことで、踏み込まれたくない領域を守る。親しい間柄でも敬語に切り替えることで、静かに抗議を伝える。敬語は上下関係の道具である以上に、自分を守る鎧でもあるのだ。<br><br><b>問い：</b>筆者は敬語をどのようなものだと考えているか。",c:["距離を作って自分を守る働きを持つもの","上下関係を示すためだけのもの","親しさを深めるためのもの","抗議のために使ってはいけないもの"],a:0,e:"末句「自分を守る鎧」＝比喻主旨。「上下関係の道具である以上に」＝不只是（選項2過窄）。"},
{t:"読解・短文",q:"【文章】【重要】システム更新のため、下記の期間、貸出・返却を含むすべての窓口業務を休止いたします。期間：2月20日（金）～2月23日（月）。なお、返却ポストは期間中もご利用いただけますが、返却処理はシステム再開後となりますので、返却期限が期間内にあたる方は、延滞扱いにはなりません。<br><br><b>問い：</b>この期間に返却期限が来る本を借りている人はどうなるか。",c:["期間中に返却できなくても延滞にはならない","必ず返却ポストに入れなければならない","延滞料金を支払わなければならない","システム再開後に本を借り直す必要がある"],a:0,e:"「延滞扱いにはなりません」＝明示不算逾期。返却ポスト是「可用」不是「必須」。"},
{t:"読解・短文",q:"【文章】名画の前で解説プレートばかり読んでいる人を見かける。作品より先に「正解」を求めてしまうのは、絵の見方に自信がないからだろう。だが、絵画の鑑賞に間違いなどない。まず自分の目で見て、何かを感じる。解説はその後で読めばいい。知識は感動を深める調味料にはなるが、感動の代わりにはならないのだから。<br><br><b>問い：</b>筆者は絵の鑑賞についてどう考えているか。",c:["まず自分の感覚で見て、知識は後から補えばよい","解説を読んでから見るほうが理解が深まる","専門知識がなければ鑑賞する意味がない","感動よりも知識のほうが重要だ"],a:0,e:"「まず自分の目で見て〜解説はその後で」。知識＝調味料（輔助），不能取代感動。"},
{t:"読解・短文",q:"【文章】「これまで大丈夫だったから、今度も大丈夫だろう」。災害時に避難が遅れる最大の原因は、この正常性バイアスと呼ばれる心理である。警報が出ても、人は無意識に「自分だけは例外だ」と思い込もうとする。だからこそ、避難の判断は「感覚」ではなく、あらかじめ決めておいた「基準」に従って機械的に行うべきなのだ。<br><br><b>問い：</b>筆者が「基準」に従って避難すべきだと言うのはなぜか。",c:["人の感覚は危険を過小評価しがちだから","警報は当てにならないことが多いから","避難訓練の機会が不足しているから","基準に従うことが法律の義務だから"],a:0,e:"正常性バイアス＝「自分だけは例外」的心理→感覺不可靠→需要事先定好的機械性基準。"},
{t:"読解・短文",q:"【文章】貴社ますますご隆盛のこととお慶び申し上げます。さて、弊社では創立50周年を記念し、業界の歩みを振り返る記念誌の刊行を予定しております。つきましては、長年お取引いただいております貴社に、ぜひご寄稿をお願いいたしたく存じます。ご多忙のところ恐縮ですが、2000字程度の原稿を5月末日までにお送りいただけますと幸いです。<br><br><b>問い：</b>この手紙の目的は何か。",c:["記念誌への原稿の執筆を依頼すること","創立50周年の式典に招待すること","新しい取引条件を提案すること","記念誌の購入を勧めること"],a:0,e:"「つきましては〜ご寄稿をお願いいたしたく」＝目的。寄稿（きこう）＝投稿供稿。"},
{t:"読解・短文",q:"【文章】SNSで発信される「充実した日常」は、編集された断片にすぎない。他人の舞台と自分の楽屋を比べて落ち込むのは、そもそも比較の対象が間違っている。画面の向こうの誰かも、写らない場所では平凡な、ときに退屈な日々を生きている。他人の編集後の人生と、自分の編集前の人生を比べてはいけないのだ。<br><br><b>問い：</b>筆者が最も言いたいことは何か。",c:["SNS上の姿と自分のありのままの日常を比べるのは無意味だ","SNSの利用時間を減らすべきだ","日常を充実させる努力が足りない人が多い","SNSでは正直に発信すべきだ"],a:0,e:"「編集後の人生と編集前の人生を比べてはいけない」＝比較對象根本錯誤。舞台／楽屋是比喻。"},
{t:"読解・短文",q:"【文章】「もう年だから」という言葉は、便利な言い訳になる。新しいことを覚えられないのは年のせい、挑戦しないのも年のせい。だが実際には、記憶力の衰えより、「覚えられないと思い込むこと」のほうが学習の妨げになるという研究もある。年齢は確かに制約だが、それを言い訳の隠れみのにした瞬間、人は実際の年齢より早く老いるのだ。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["年齢を言い訳にする姿勢こそが人を老いさせる","加齢による記憶力の低下は避けられない","高齢者は新しい挑戦を控えたほうがよい","若さを保つには運動が欠かせない"],a:0,e:"末句「言い訳の隠れみのにした瞬間〜早く老いる」＝主旨。研究顯示「思い込み」比記憶力衰退更礙事。"},
{t:"読解・短文",q:"【文章】専門家の役割は、白黒をはっきりつけることだと思われがちだ。しかし誠実な専門家ほど、「現時点では分からない」と言うことを恐れない。断定を避ける歯切れの悪さは、無知の表れではなく、知の限界を知っている証拠である。むしろ警戒すべきは、どんな問いにも即座に明快な答えを返す「専門家」のほうだ。<br><br><b>問い：</b>筆者によると、警戒すべきなのはどんな専門家か。",c:["どんな問いにも即座に断定的な答えを出す専門家","「分からない」と正直に言う専門家","メディアに出たがらない専門家","説明の歯切れが悪い専門家"],a:0,e:"「むしろ警戒すべきは〜のほうだ」直接點名。歯切れの悪さ＝誠實的證據（選項2、4是好專家）。"},
{t:"読解・短文",q:"【文章】テストの点数は、学力の一部を切り取った影絵のようなものだ。影絵は本体の形をある程度写すが、色も奥行きも伝えない。点数で測れない粘り強さや好奇心こそが、長い人生では点数以上に物を言う。問題は影絵が役に立たないことではなく、私たちが<u>影絵を本体と取り違えてしまう</u>ことにある。<br><br><b>問い：</b>下線部はどういうことか。",c:["点数を学力のすべてだと思い込むこと","テストの結果を記録しないこと","影絵の技術がまだ未熟なこと","点数で粘り強さを測ろうとすること"],a:0,e:"影絵＝點數（部分的投影）、本体＝真正的能力。取り違える＝誤把點數當成能力全貌。"},
{t:"読解・短文",q:"【文章】謝罪の言葉に「しかし」を続けてはいけない。「申し訳ない、しかし私にも事情があった」と言った瞬間、前半の謝罪は帳消しになる。聞き手の耳に残るのは弁解だけだ。本当に謝るなら、まず全面的に謝る。事情の説明は、相手の怒りが解けてから、相手に求められたときにすればよい。<br><br><b>問い：</b>筆者が勧める謝り方はどれか。",c:["まず弁解せずに謝り、説明は後で求められたらする","謝罪と同時に自分の事情も説明する","事情を先に説明してから謝る","謝罪の言葉を何度も繰り返す"],a:0,e:"「まず全面的に謝る」＋說明留到「相手に求められたとき」。しかし＝讓道歉歸零的地雷詞。"},
{t:"読解・短文",q:"【文章】在宅勤務の普及で、通勤という「強制的な区切り」が消えた。仕事と生活の境目が溶け、気づけば深夜までパソコンに向かっている人も少なくない。自由とは、自分で枠を作る責任とセットである。始業前の散歩、終業時の着替え——形だけでも「区切りの儀式」を持つことが、在宅時代の自衛策になる。<br><br><b>問い：</b>筆者が「区切りの儀式」を勧めるのはなぜか。",c:["仕事と生活の境目を自分で作る必要があるから","在宅勤務では運動不足になりやすいから","会社の規則で決められているから","通勤の時間がもったいないから"],a:0,e:"通勤消失＝失去強制的分界→境目が溶ける→需要自創儀式當作分界。散歩只是舉例，不是為了運動。"},
{t:"読解・短文",q:"【文章】【ご来場予定の皆様へ】4月6日開催予定の「春の陶器市」は、荒天が予想されるため、会場を市民公園から市民体育館に変更して開催いたします。開催時間に変更はありません。なお、体育館内は飲食禁止のため、予定しておりました屋台の出店は中止となります。駐車場は体育館裏の第2駐車場をご利用ください。<br><br><b>問い：</b>この案内の内容と合っているものはどれか。",c:["会場は変わるが、開催時間は予定どおりである","陶器市そのものが中止になった","屋台は体育館の中に移動して営業する","駐車場は市民公園のものを利用する"],a:0,e:"活動照辦只換場地；時間不變；屋台中止（因館內禁飲食）；停車場改第2駐車場。"},
{t:"読解・短文",q:"【文章】「科学的に証明された」という宣伝文句ほど、非科学的なものはない。科学は本来、反証の可能性に開かれた暫定的な営みであり、一つの実験で何かが永遠に「証明」されることはまれだからだ。断定の強さと科学的な確かさは、しばしば反比例する。売り文句が断定的であるほど、消費者は一歩引いて疑ってみる必要がある。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["断定的な宣伝ほど疑ってかかるべきだ","科学的に証明されたものは絶対に信頼できる","実験は一度行えば十分である","宣伝に科学用語を使うことは禁止すべきだ"],a:0,e:"「断定の強さと科学的な確かさは反比例」→越斬釘截鐵越可疑。科學＝暫定的、可被反證的。"},
{t:"読解・短文",q:"【文章】「言葉の乱れ」を嘆く声は、どの時代にもあった。平安の昔にも、若者の言葉遣いを憂う記述が残っている。言葉は生き物であり、変化しない言語は死んだ言語だけだ。とはいえ、変化をすべて容認せよという話ではない。伝えたい相手に伝わるかどうか——その一点こそが、言葉遣いを選ぶ際の実用的な基準になるだろう。<br><br><b>問い：</b>筆者が考える言葉遣いの基準は何か。",c:["相手に伝わるかどうか","辞書に載っているかどうか","伝統的な用法かどうか","若者が使っているかどうか"],a:0,e:"「その一点こそが〜基準になる」。前半承認語言會變，後半（とはいえ）給出實用判準。"},
{t:"読解・短文",q:"【文章】贈り物選びで大切なのは、値段でも珍しさでもなく、「相手の時間を想像すること」だと思う。相手の暮らしのどの場面で、それが使われるのか。朝の食卓か、夜の読書の傍らか。具体的な場面が思い浮かばない品は、どんなに高価でも、相手の生活に居場所を見つけられないまま棚の奥に眠ることになる。<br><br><b>問い：</b>筆者によると、よい贈り物とはどのようなものか。",c:["相手の生活で実際に使われる場面が想像できるもの","できるだけ高価で立派なもの","誰も持っていない珍しいもの","長く棚に飾っておけるもの"],a:0,e:"首句否定「値段」「珍しさ」，核心＝想像相手的生活場景。棚の奥に眠る＝失敗的禮物。"},
{t:"読解・短文",q:"【文章】先日、バスの中で杖をついた高齢の方に席を譲ろうとして、断られた。一瞬気まずかったが、考えてみれば当然のことだ。席を譲る行為は善意でも、相手には相手の事情と誇りがある。「譲ってあげる」ではなく「よろしければどうぞ」。善意を押し付けず、断る余地を残す言い方こそが、本当の思いやりなのだと学んだ。<br><br><b>問い：</b>筆者がこの経験から学んだことは何か。",c:["善意は相手が断れる形で示すのがよい","高齢者に席を譲る必要はない","席を譲るときは何も言わず立つべきだ","一度断られたら二度と譲らないほうがよい"],a:0,e:"「断る余地を残す言い方こそが本当の思いやり」＝尊重對方的事情與自尊。"},
{t:"読解・短文",q:"【文章】【社内通知】経費精算のルールが4月1日より一部変更になります。これまで紙の領収書の提出を必須としておりましたが、今後は電子データでの提出も可とします。ただし、金額が5万円を超える場合は、従来どおり紙の原本の提出が必要です。なお、提出期限は使用月の翌月10日までと変わりませんので、ご注意ください。<br><br><b>問い：</b>4月以降の経費精算について、正しいものはどれか。",c:["5万円以下なら電子データの領収書でも精算できる","金額にかかわらず電子データで提出できる","提出期限が翌月10日に変更された","紙の領収書は受け付けられなくなった"],a:0,e:"ただし書き＝超過5万要紙本原本→5万以下可電子。期限「変わりません」＝本來就是翌月10日。"},
{t:"読解・短文",q:"【文章】ベテランの職人は、道具の手入れに時間を惜しまない。それは単なる几帳面さではない。道具の状態に毎日触れることで、わずかな変化から自分の技の乱れに気づくのだという。道具を整えることは、自分を整えること。手入れとは、腕を磨く行為のもう一つの形なのだ。<br><br><b>問い：</b>職人にとって道具の手入れとはどのようなものか。",c:["自分の技を保ち、磨くための行為","几帳面な性格の表れ","道具を長持ちさせるだけの作業","親方から命じられた義務"],a:0,e:"「単なる几帳面さではない」否定選項2；「腕を磨く行為のもう一つの形」＝主旨。"},
{t:"読解・短文",q:"【文章】雨の日は気分が沈むと言う人は多い。だが、雨だからこそできることに目を向ければ、憂鬱は半減する。雨音を聞きながらの読書、普段は後回しにしている部屋の整理。天気は変えられないが、天気への向き合い方は自分で選べる。環境に気分を支配させるか、環境を利用するかは、結局のところ考え方ひとつである。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["天気は変えられなくても、受け止め方は自分で選べる","雨の日は外出を避けたほうがよい","天気が気分を決めるのは避けられない","晴れの日に予定を集中させるべきだ"],a:0,e:"「天気は変えられないが、向き合い方は選べる」＝核心句。選項3與主旨正好相反。"},
{t:"読解・短文",q:"【文章】電子辞書や検索の便利さは認めるが、紙の辞書には「寄り道」という効用がある。目当ての語を探す途中で、隣の見知らぬ語に目が留まる。この偶然の出会いが、語彙の世界を思いがけず広げてくれる。最短距離で答えに着く検索は、効率的である分だけ、道草の実りを失っているのかもしれない。<br><br><b>問い：</b>筆者によると、紙の辞書の効用とは何か。",c:["目的の語以外の語との偶然の出会いがあること","検索より速く引けること","より正確な情報が載っていること","目が疲れにくいこと"],a:0,e:"寄り道＝查詢途中瞄到旁邊生詞的「偶然の出会い」。速度是電子辭典的優勢，選項2反了。"},
{t:"読解・短文",q:"【文章】都市の街路樹は、景観のためだけにあるのではない。夏の歩道の温度を下げ、雨水を蓄え、排気ガスを吸着する。いわば「静かなインフラ」である。ところが予算削減の際、真っ先に削られるのは緑の管理費だ。効果が数字に表れにくいものから切られていく現実に、都市の貧しさの本質が見える気がする。<br><br><b>問い：</b>筆者は街路樹をどのようなものだと考えているか。",c:["目立たないが都市を支える基盤の一つ","景観を良くするための飾り","予算を圧迫するぜいたくな設備","効果を証明できない無駄なもの"],a:0,e:"「静かなインフラ」＝比喻：降溫、蓄水、吸廢氣的隱形基礎建設。首句已否定「景観のためだけ」。"},
{t:"読解・短文",q:"【文章】子どもの遊びから「危険」を完全に取り除こうとする風潮に、私は疑問を持つ。小さなけがを経験しながら、子どもは自分の体の限界と危険の見積もり方を学ぶ。転んだことのない子は、転び方を知らないまま大きくなる。本当に危険なのは、小さな危険をすべて奪われた子どもが、いつか大きな危険の前に立つことではないか。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["小さな危険の経験が、危険を判断する力を育てる","子どもの遊び場から危険を完全になくすべきだ","けがをさせないよう常に監視するのが親の務めだ","危険な遊びほど教育的な価値が高い"],a:0,e:"「小さなけがを経験しながら〜学ぶ」。選項4過度延伸——筆者沒說越危險越好。"},
{t:"読解・短文",q:"【文章】締め切りがあるから仕事は仕上がる。時間が無限にあれば完璧なものができるかといえば、むしろ逆で、人は選択肢を前に迷い続け、いつまでも完成に至らない。締め切りとは、「ここまでで一度形にする」という強制的な決断の装置である。不自由に見える制約が、実は創造の完成を支えているのだ。<br><br><b>問い：</b>筆者は締め切りをどのようなものだと考えているか。",c:["仕事を完成へ導く決断の仕組み","完璧な仕事を妨げる障害","守れなくても仕方のない目安","創造性を奪う不当な制約"],a:0,e:"「強制的な決断の装置」＋「創造の完成を支えている」＝正面評價。"},
{t:"読解・短文",q:"【文章】レシピどおりに作っても味が決まらないという相談をよく受ける。原因の多くは、材料でも腕でもなく「味見をしないこと」にある。塩加減は材料の状態や気温で毎回変わる。レシピは地図にすぎず、現在地を確かめるのは舌の仕事だ。<u>地図だけを見て歩けば、道に迷うのは当然である</u>。<br><br><b>問い：</b>下線部はここではどういうことか。",c:["味見をせず、レシピの分量だけに従って作ること","レシピを見ないで感覚だけで作ること","有名な店の味をそのまねること","材料の産地を確認しないで買うこと"],a:0,e:"地図＝レシピ、現在地の確認＝味見。只看地圖不看現在位置＝只照食譜不試味道。"},
{t:"読解・短文",q:"【文章】「余ったら貯金しよう」では、お金は貯まらない。人間は手元にある分だけ使ってしまう生き物だからだ。確実に貯めたいなら、給料が入った瞬間に一定額を別の口座に移し、残りで生活する「先取り」に切り替えることだ。意志の強さに頼る方法は、たいてい意志の弱さに敗れる。<br><br><b>問い：</b>筆者が勧める貯金の方法はどれか。",c:["先に一定額を取り分けて、残りのお金で生活する","毎月の支出を細かく記録する","月末に余った分をまとめて貯金する","強い意志を持って節約に励む"],a:0,e:"「先取り」＝薪水一進帳就先撥存。選項3是首句否定的做法；選項4是「たいてい敗れる」的方法。"},
{t:"読解・短文",q:"【文章】ペットを飼うことは、命を「所有」することではなく、命の時間を「預かる」ことだと思う。犬や猫の一生は人間より短い。その最期まで責任を持つ覚悟がないなら、かわいさだけで迎えるべきではない。飼い主に必要なのは、愛情と同じ重さの、覚悟という名の誠実さである。<br><br><b>問い：</b>筆者が飼い主に最も必要だと考えているものは何か。",c:["最期まで世話をし続ける覚悟","高価な飼育設備","動物についての専門知識","複数の動物を飼った経験"],a:0,e:"「最期まで責任を持つ覚悟」「愛情と同じ重さの覚悟」＝重複強調的關鍵詞。"},
{t:"読解・短文",q:"【文章】会議が煮詰まったとき、場を救うのは正論ではなく、しばしばユーモアである。笑いは対立の温度を下げ、固まった視点をほぐす。ただし、誰かを犠牲にする笑いは逆効果だ。優れたユーモアは人ではなく状況に向けられる。「われわれは今、見事に行き詰まっていますね」と言える人は、会議の隠れた功労者である。<br><br><b>問い：</b>筆者によると、優れたユーモアとはどのようなものか。",c:["人ではなく状況に向けられた笑い","正論を面白く言い換えた笑い","特定の人を軽くからかう笑い","事前に準備しておいた笑い"],a:0,e:"「優れたユーモアは人ではなく状況に向けられる」。誰かを犠牲にする笑い＝逆効果（選項3）。"},
{t:"読解・短文",q:"【文章】田中先生　いつもお世話になっております。市民大学講座係の佐藤です。この度、当講座では「暮らしの中の経済学」と題した連続講座を企画しており、ぜひ先生に第1回（7月12日）の講師をお願いできればと存じます。謝礼等の詳細は添付の依頼書をご覧ください。ご多用のところ恐縮ですが、6月10日までにご都合をお知らせいただけますと幸いです。<br><br><b>問い：</b>このメールを受け取った田中先生が、まずしなければならないことは何か。",c:["6月10日までに引き受けられるかどうか返事をする","7月12日に会場へ行く","講座全体の内容を企画する","謝礼の金額を決めて知らせる"],a:0,e:"期限明示：「6月10日までにご都合をお知らせ」。7月12日是演講日，不是回覆期限——日期陷阱。"},
{t:"読解・短文",q:"【文章】ネット上の評価は便利だが、星の数には現れない事情がある。低評価の中には、商品ではなく配送への不満や、使い方の誤解によるものも混じる。逆に、発売直後の高評価は期待の表明にすぎないことも多い。数字を鵜呑みにせず、その根拠となる文章を読む一手間が、評価を本当に役立てるための条件である。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["星の数だけでなく、評価の理由を読んで判断すべきだ","低評価が多い商品は避けたほうが安全だ","発売直後の評価が最も信頼できる","ネット上の評価は参考にする価値がない"],a:0,e:"「根拠となる文章を読む一手間」＝條件。首句「便利だが」表示不是全盤否定（選項4過度）。"},
{t:"読解・短文",q:"【文章】講義のノートをパソコンで取る学生が増えたが、手書きの学生のほうが内容の理解度が高いという研究がある。タイピングは速いため、聞いた言葉をそのまま打ち込める。一方、手書きは遅い。遅いからこそ、学生は要点を選び、自分の言葉に置き換えざるを得ない。この「変換」の過程こそが、理解を深める正体である。<br><br><b>問い：</b>手書きのほうが理解度が高いのはなぜか。",c:["書くのが遅い分、要点を選んで自分の言葉に直す作業が生じるから","タイピングより文字を丁寧に書くから","ノートを後で読み返しやすいから","パソコンは講義中に故障することがあるから"],a:0,e:"「遅いからこそ〜置き換えざるを得ない」＝逆轉的關鍵。慢＝優勢，因為逼出「変換」過程。"},
{t:"読解・短文",q:"【文章】安易な値引きは、目先の売り上げと引き換えに、二つの大切なものを失う。一つは利益、もう一つは「定価への信頼」である。一度でも大幅な値引きを経験した客は、次から定価で買うことをためらうようになる。価格を守ることは、商品の価値を守ることにほかならない。<br><br><b>問い：</b>筆者が安易な値引きに反対する理由は何か。",c:["利益だけでなく、定価への信頼まで失われるから","客の数が減ってしまうから","競合する他社に価格を知られるから","法律で禁止されているから"],a:0,e:"「二つの大切なもの」＝利益＋定価への信頼。降過價的客人不願再用定價買。"},
{t:"読解・短文",q:"【文章】都会の孤独は、人がいないことではなく、人が多すぎることから生まれる。満員電車で肩が触れ合う相手と、一言も言葉を交わさない。物理的な距離の近さと心理的な距離の遠さ。この落差こそが、都会特有の寂しさの正体だろう。逆説的だが、人混みの中でこそ、人は最も深い孤独を味わうのである。<br><br><b>問い：</b>筆者によると、都会特有の寂しさはどこから生まれるか。",c:["体は近くにいるのに心の距離は遠いという落差から","都市の人口が減り続けていることから","電車の混雑で体が疲れることから","一人暮らしの部屋が狭いことから"],a:0,e:"「物理的な距離の近さと心理的な距離の遠さ。この落差こそが〜正体」＝直接對應。"},
{t:"読解・短文",q:"【文章】方言は単なる地域のなまりではない。その土地の気候や暮らしが磨き上げた、精密な生活の道具である。雪国には雪の状態を言い分ける言葉が幾つもあり、漁師町には風の名前が細かく残る。方言が消えるとき、失われるのは言葉だけではない。その言葉でしか捉えられなかった世界の手触りも、一緒に消えていくのだ。<br><br><b>問い：</b>筆者は方言が消えることをどのようにとらえているか。",c:["その言葉でしか表せなかった世界の見え方も一緒に失われる","標準語が普及した結果であり仕方がない","新しい方言が生まれるので問題はない","観光資源が減ってしまうのが惜しい"],a:0,e:"末句：「世界の手触りも、一緒に消えていく」。雪與風的詞彙＝語言承載的細膩世界觀。"},
{t:"読解・短文",q:"【文章】成功談より失敗談のほうが役に立つ、とはよく言われる。だが、他人の失敗談を聞いて学べる人は案外少ない。「自分ならうまくやれる」という根拠のない自信が、教訓の吸収を妨げるからだ。失敗談を生かせるのは、それを「他人の物語」ではなく「明日の自分の可能性」として聞ける人だけである。<br><br><b>問い：</b>失敗談から学べるのはどのような人か。",c:["他人の失敗を自分にも起こり得ることとして聞ける人","多くの成功体験を持っている人","自分の能力に自信がある人","失敗した本人と親しい人"],a:0,e:"「明日の自分の可能性として聞ける人だけ」。根拠のない自信＝妨礙學習（選項3反）。"},
{t:"読解・短文",q:"【文章】「休む」ことに罪悪感を持つ人がいる。だが、休息は仕事の中断ではなく、仕事の一部である。集中力は消耗品であり、補給なしには枯渇する。優れた仕事人ほど、休み方が計画的だ。休むことをためらう人は、車の燃料計を見ずに走り続ける運転手に似ている。止まってから慌てても、遅いのである。<br><br><b>問い：</b>筆者は休息をどのようなものだと考えているか。",c:["仕事を続けるために欠かせない仕事の一部","仕事を終えた人へのごほうび","集中力のない人の言い訳","できるだけ短くすべき中断"],a:0,e:"「休息は仕事の中断ではなく、仕事の一部」＝直接定義。燃料計比喻：不補給就耗盡。"},
{t:"読解・短文",q:"【文章】どんな本を読めばいいかと聞かれたら、「今の自分に少しだけ難しい本」と答えることにしている。易しすぎる本は現状の確認にしかならず、難しすぎる本は挫折を生むだけだ。背伸びしてようやく届く高さの本こそが、読む力を一段引き上げてくれる。これは読書に限らず、あらゆる学びに通じる原則だろう。<br><br><b>問い：</b>筆者が勧めるのはどのような本か。",c:["今の実力より少しだけ難しい本","誰でも気軽に読める易しい本","専門家向けの難解な本","流行している話題の本"],a:0,e:"「少しだけ難しい」＝背伸びしてようやく届く高さ。太易＝原地踏步、太難＝挫折。"},
{t:"読解・短文",q:"【文章】空き巣の被害に遭いやすい家には共通点がある。それは立派な塀や植え込みで家の中が見えないことだ。一見、防犯に役立ちそうな目隠しが、実は侵入者に「隠れ場所」を提供してしまう。防犯の基本は隠すことではなく、見通しをよくすること。地域の目が届く家こそ、最も破られにくい家なのである。<br><br><b>問い：</b>本文の内容と合っているものはどれか。",c:["家の周囲の見通しをよくするほうが防犯に効果的だ","高い塀で家を囲むほど安全になる","空き巣は人通りの多い家を狙う","防犯カメラの設置が何より重要だ"],a:0,e:"高牆＝提供藏身處（反直覺）。「防犯の基本は〜見通しをよくすること」。"},
{t:"読解・短文",q:"【文章】「天職」は探して見つかるものではない、と私は思う。最初から心が躍る仕事など、めったにない。目の前の仕事に工夫を重ね、小さくても手応えを積み上げていくうちに、仕事のほうが少しずつ「自分の仕事」になっていく。天職とは出会うものではなく、育てるものなのだ。<br><br><b>問い：</b>筆者の考える「天職」とはどのようなものか。",c:["働きながら時間をかけて自分で育てていくもの","探し続ければいつか出会えるもの","最初から情熱を感じられるもの","生まれつきの才能で決まるもの"],a:0,e:"末句「出会うものではなく、育てるもの」＝主旨。首句已否定「探して見つかる」。"},
{t:"読解・短文",q:"【文章】書類の整理術の要諦は、「捨てる基準」を先に決めることに尽きる。「いつか使うかもしれない」を許せば、あらゆる紙が生き残ってしまう。私の基準は単純で、「再入手できるものは捨てる」。官公庁の資料も雑誌の記事も、今は大半がネットで再入手できる。手元に残すべきは、自分の書き込みのような、世界に一つしかないものだけでいい。<br><br><b>問い：</b>筆者が手元に残すべきだと考えているのはどのようなものか。",c:["捨てると二度と手に入らないもの","いつか使うかもしれないもの","官公庁が発行した公式の資料","お金を払って入手したもの"],a:0,e:"基準＝「再入手できるものは捨てる」→留下的是無法再取得的（如自己的筆記）。"},
{t:"読解・短文",q:"【文章】結婚式の招待状の返信には、細やかな作法がある。宛名の「行」を二重線で消して「様」に直す。「御出席」の「御」を消し、「出席」を丸で囲む。面倒に見えるこれらの作法は、要するに「相手を上に、自分を下に」という敬意の表現に貫かれている。形式の意味を知れば、作法は暗記ではなく理解の問題になる。<br><br><b>問い：</b>筆者が最も言いたいことは何か。",c:["返信の作法は敬意という一つの原理で理解できる","返信の作法は面倒なのでやめるべきだ","作法は理屈より暗記することが大切だ","招待状のやり取りは電子化すべきだ"],a:0,e:"「要するに〜敬意の表現に貫かれている」＋「暗記ではなく理解の問題」。"},
{t:"読解・短文",q:"【文章】役所の文書にあふれるカタカナ語への批判は根強い。「アジェンダ」は「議題」、「エビデンス」は「根拠」で事足りる場面も確かに多い。だが、すべてを日本語に置き換えればよいという話でもない。訳した途端にこぼれ落ちる概念の厚みもあるからだ。要は、聞き手に届くかどうかを基準に、語を選び分ける誠実さだろう。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["伝わるかどうかを基準に、カタカナ語と日本語を使い分けるべきだ","カタカナ語はすべて日本語に直すべきだ","役所の文書は専門家に通じればよい","新しい概念には必ずカタカナ語を使うべきだ"],a:0,e:"「だが〜という話でもない」雙向否定→基準は「聞き手に届くかどうか」。"},
{t:"読解・短文",q:"【文章】職場の雑談は、無駄話と切り捨てられがちだが、組織の潤滑油として侮れない働きをしている。何気ない会話の中で、人となりや仕事の状況が伝わり、いざというときに助けを求めやすい土壌ができる。雑談が消えた職場では、用件だけが行き交い、問題は深刻になるまで表面化しない。<br><br><b>問い：</b>筆者によると、雑談にはどのような働きがあるか。",c:["助けを求めやすい人間関係の土台を作る働き","仕事の効率を直接高める働き","会議の時間を短縮する働き","上司の権威を高める働き"],a:0,e:"「いざというときに助けを求めやすい土壌ができる」＝雑談的價值。無雑談→問題被悶到嚴重才爆發。"},
{t:"読解・短文",q:"【文章】翻訳とは、二つの言語の間で単語を置き換える作業ではない。原文が読者に与える体験を、別の言語で作り直す仕事である。だから優れた翻訳者は、原文に忠実であるために、あえて原文から離れることがある。一語一語は違っても、読後に残るものが同じなら、それは正確な翻訳なのだ。<br><br><b>問い：</b>筆者の考える「正確な翻訳」とはどのようなものか。",c:["読者が受け取る体験が原文と同じになる翻訳","単語を一つずつ正しく置き換えた翻訳","原文の語順を忠実に保った翻訳","注釈を細かく付けた翻訳"],a:0,e:"「読後に残るものが同じなら正確」。為忠實而刻意離開原文＝N1 愛考的逆説。"},
{t:"読解・短文",q:"【文章】「時間がない」が口癖の人は、たいてい時間の総量ではなく、時間の主導権を失っている。他人の依頼、通知、会議。自分の一日が他人の都合で埋め尽くされていくのを、ただ眺めているのだ。まず自分の予定を先に置き、残りを他人に開く。順序を逆にするだけで、同じ24時間の手応えはまるで違ってくる。<br><br><b>問い：</b>筆者が勧める時間の使い方はどれか。",c:["自分の予定を先に確保してから、他人の用件を入れる","他人からの依頼はすべて断る","会議や通知を減らすよう会社に求める","睡眠時間を削って使える時間を増やす"],a:0,e:"「まず自分の予定を先に置き、残りを他人に開く」。問題在主導權，不在總量。"},
{t:"読解・短文",q:"【文章】日本では褒められたとき、「いえいえ、まだまだです」と打ち消すのが謙虚とされてきた。だが、行き過ぎた謙遜は、褒めた相手の目利きを否定することにもなりかねない。「ありがとうございます。励みになります」。相手の言葉を受け取ったうえで感謝を返す——謙虚さと素直さは、両立できるのである。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["褒め言葉は受け止めたうえで感謝を伝えればよい","褒められたら必ず打ち消すのが礼儀だ","謙遜は日本の美徳なので変えるべきでない","褒め言葉は聞き流すのが大人の対応だ"],a:0,e:"過度謙遜＝否定對方的眼光。結論：謙虛與坦率可以並存。"},
{t:"読解・短文",q:"【文章】リサイクルは大切だが、「リサイクルするから大丈夫」という安心感が消費を増やすのなら本末転倒である。ごみ問題の優先順位は、まず出さない（リデュース）、次に繰り返し使う（リユース）、最後に資源に戻す（リサイクル）。三つのRは並列ではなく、順番にこそ意味がある。<br><br><b>問い：</b>筆者が最も言いたいことは何か。",c:["ごみはまず減らすことが最優先で、リサイクルは最後の手段だ","リサイクルの技術をもっと発展させるべきだ","三つのRはどれも同じ重要度で取り組むべきだ","リサイクルすれば消費を増やしても問題ない"],a:0,e:"「並列ではなく、順番にこそ意味がある」＝Reduce＞Reuse＞Recycle。選項3、4都被原文明確否定。"},
{t:"読解・短文",q:"【文章】長く続く老舗ほど、実は変化を恐れない。看板の味を守るために、仕入れ先を変え、製法を見直し、時代に合わせて甘さを調整する。「変わらない味」とは、何も変えないことではなく、変わり続ける世の中で同じ感動を再現し続けるための、絶え間ない変化の結果なのである。<br><br><b>問い：</b>筆者によると、老舗の「変わらない味」とはどのようなものか。",c:["同じ感動を保つために変化を重ねてきた結果","創業以来まったく製法を変えていない味","古い道具を使い続けることで出る味","流行を無視して守り抜いてきた味"],a:0,e:"逆説：不變的味道＝不斷改變的結果。選項2是字面直讀的陷阱。"},
{t:"読解・短文",q:"【文章】会議で的確な質問をする人は、実は入念に聞いている人である。質問は、相手の話の骨組みを理解して初めて成り立つ。逆に、何も質問が浮かばないのは、内容が完璧に理解できたからではなく、話を骨組みごと聞き流している場合が多い。<u>「良い質問」は、聞く力の成績表なのだ</u>。<br><br><b>問い：</b>下線部はどういうことか。",c:["質問の質は、どれだけ理解して聞いていたかを表すということ","質問の数が多いほど評価が上がるということ","質問しない人は理解が完璧だということ","良い質問には決まった型があるということ"],a:0,e:"好問題成立的前提＝理解話的骨架→質問品質反映聽的能力。選項3被原文直接否定。"},
{t:"読解・短文",q:"【文章】匿名は本来、弱い立場の人が声を上げるための盾である。内部告発や少数意見の表明は、匿名の保護なしには成り立たない。しかし同じ盾が、他人を攻撃する矛に転用されるとき、匿名の価値そのものが疑われることになる。問われているのは匿名という仕組みではなく、それを使う側の品位なのだ。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["問題は匿名の仕組みではなく、それを使う人の側にある","匿名の制度は廃止すべきだ","内部告発は実名で行うべきだ","匿名での批判も自由として全面的に認めるべきだ"],a:0,e:"盾／矛的比喻：同一機制可護弱者也可傷人→「問われているのは〜使う側の品位」。"},
{t:"読解・短文",q:"【文章】法隆寺の宮大工に伝わる口伝に「木は生育の方位のままに使え」というものがある。山の南斜面で育った木は建物の南側に、北で育った木は北側に。木材になっても木は「生きて」おり、育った環境と同じ向きに置かれてこそ、千年の重みに耐えるという。自然を支配するのではなく、自然の癖を読んで生かす。ここに日本の木造建築の知恵の核心がある。<br><br><b>問い：</b>この口伝が示す知恵とはどのようなものか。",c:["自然の性質を読み取り、それを生かして使うこと","木材は新しいものほど強いということ","建物は南向きに建てるのがよいということ","自然は人間の技術で支配できるということ"],a:0,e:"「自然を支配するのではなく、自然の癖を読んで生かす」＝核心。選項4正好相反。"},
{t:"読解・短文",q:"【文章】大人になってから始める習い事は、上達の速さを競う場ではない。仕事と違って、締め切りも評価もない。昨日できなかったことが今日ほんの少しできる。その小さな前進を自分だけの尺度で味わえることこそ、大人の学びの贅沢なのだと思う。人と比べた瞬間、この贅沢は色あせてしまう。<br><br><b>問い：</b>筆者が考える「大人の学びの贅沢」とは何か。",c:["自分だけの尺度で小さな上達を味わえること","仕事に役立つ技能が身につくこと","若い人より速く上達できること","評価や資格が手に入ること"],a:0,e:"「小さな前進を自分だけの尺度で味わえること」。跟人比較的瞬間就褪色→不比較是前提。"},
{t:"読解・短文",q:"【文章】【社告】平素より「月刊りんどう」をご愛読いただき、誠にありがとうございます。誠に勝手ながら、原材料費および輸送費の高騰に伴い、本誌の定価を4月号より880円から980円に改定させていただきます。なお、3月末日までに年間購読をお申し込みいただいた場合は、旧価格を適用いたします。今後とも変わらぬご愛読を賜りますようお願い申し上げます。<br><br><b>問い：</b>この社告の内容と合っているものはどれか。",c:["3月末までに年間購読を申し込めば、値上げ前の価格が適用される","4月号から定価が880円に変わる","年間購読者は全員100円引きになる","輸送費が下がったため価格を改定する"],a:0,e:"改定＝880→980（漲價）。「なお」之後是例外規定：3月底前訂年約適用舊價。"},
{t:"読解・短文",q:"【文章】スピーチの名言集から借りてきた言葉は、どんなに立派でも聞き手の心を素通りする。言葉に体温がないからだ。たどたどしくても、自分の経験から絞り出した言葉には、その人にしか語れない重みが宿る。雄弁とは技術ではなく、語るに足る経験と、それに向き合った時間の別名なのかもしれない。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["自分の経験から生まれた言葉こそが聞き手に届く","名言を多く引用したスピーチほど感動を呼ぶ","話し方の技術こそが雄弁の条件だ","流暢に話せない人は人前で話すべきでない"],a:0,e:"借來的話＝没有體溫、會穿過聽者的心。「雄弁とは技術ではなく〜経験〜の別名」。"},
{t:"読解・短文",q:"【文章】若者の「車離れ」は、しばしば経済的な理由で説明される。だが都市部の若者に話を聞くと、事情はもう少し複雑だ。カーシェアや配車サービスが整い、「使いたいときだけ使う」ことができるようになった今、所有そのものの魅力が薄れているのである。離れたのは車からではなく、「所有する」という価値観からなのかもしれない。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["若者は車そのものより「所有」という価値観から離れている","若者が車を買わないのは経済的な理由だけだ","地方の若者ほど車を買わなくなった","配車サービスの普及で車を所有する魅力が増した"],a:0,e:"末句直接點題。「だが」之後推翻了「経済的な理由」的通說（選項2）。"},
{t:"読解・短文",q:"【文章】子どもに図鑑を与えるなら、少し「難しすぎる」ものがいいと私は思う。読めない漢字、分からない用語。それらは障害ではなく、世界の広さの予告編である。すべてが理解できる本は安心だが、そこで世界は閉じてしまう。分からないものが残っている本だけが、「もっと知りたい」という扉を開けておいてくれる。<br><br><b>問い：</b>筆者が「難しすぎる図鑑」を勧める理由は何か。",c:["分からない部分が「もっと知りたい」という気持ちを引き出すから","難しい漢字の学習に役立つから","長く使えて経済的だから","全部理解できると子どもが自信を持つから"],a:0,e:"分からないもの＝「世界の広さの予告編」＝好奇心的入口。全懂的書反而讓世界關閉。"},
{t:"読解・短文",q:"【文章】朝型か夜型かは、本人の努力や怠惰の問題ではなく、体内時計の個人差、つまり体質である部分が大きいことが分かってきた。夜型の人間に早朝の会議で最高の成果を求めるのは、左利きの人に右手で書けと強いるのに似ている。働き方の多様化とは、勤務地や時間の柔軟さだけでなく、こうした体質の多様性への配慮も含むべきだろう。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["朝型夜型は体質の違いであり、働き方はそれに配慮すべきだ","夜型の人は努力して朝型に直すべきだ","朝型の人のほうが仕事の能力が高い","早朝の会議は成果が上がりやすい"],a:0,e:"「努力や怠惰の問題ではなく体質」＋左撇子比喻＝不該強求。選項2正是被否定的「努力論」。"},
{t:"読解・短文",q:"【文章】クレーム対応の第一歩は、事実の確認でも謝罪でもなく、「不快にさせたことへの共感」だと教えられた。相手がまず求めているのは、解決策より「分かってもらえた」という実感だからだ。共感を飛ばして正論や手続きに入ると、たとえ処理が正しくても、相手の感情はこじれたまま残る。<br><br><b>問い：</b>クレーム対応で最初にすべきことは何か。",c:["相手の不快な気持ちに共感を示すこと","事実関係を細かく確認すること","解決策をすぐに提示すること","会社の規則を丁寧に説明すること"],a:0,e:"首句明示：第一步＝共感（不是事実確認、不是謝罪）。対方要的是「分かってもらえた」的實感。"},
{t:"読解・短文",q:"【文章】伝統芸能の世界には「型破り」という言葉がある。型を破れるのは、型を完全に身につけた者だけだ。基本を知らないまま自由にやることは、型破りではなく「型なし」と呼ばれて区別される。独創とは、伝統の外側にあるのではなく、伝統を通り抜けた先にしか現れないものなのだろう。<br><br><b>問い：</b>「型破り」と「型なし」の違いは何か。",c:["型を身につけた者が破るのが型破り、基本がないのが型なし","破る型の数が多いか少ないかの違い","所属する流派の違い","演目が新しいか古いかの違い"],a:0,e:"「型を破れるのは、型を完全に身につけた者だけ」。独創＝穿過傳統之後才出現。"},
{t:"読解・短文",q:"【文章】メモの真の目的は、忘れないためではなく、安心して忘れるためにある。頭の中に「忘れてはいけない」事項を抱えたままでは、目の前の仕事に全力を注げない。紙に書き出した瞬間、脳はその見張り役から解放される。メモとは記録の道具である以上に、脳の作業台を空けるための道具なのだ。<br><br><b>問い：</b>筆者はメモの働きをどのようにとらえているか。",c:["覚えておく負担から脳を解放する働き","記憶力そのものを鍛える働き","アイデアを他人と共有する働き","過去の記録を正確に保存する働き"],a:0,e:"「安心して忘れるため」「脳の作業台を空ける」＝主旨。記録只是表面功能。"},
{t:"読解・短文",q:"【文章】行き詰まったら机を離れて歩け、と昔から言われる。単なる気分転換ではない。歩行のリズムが思考を規則的に揺らし、机の前では結びつかなかった記憶の断片同士が、ふとつながることがあるのだ。名案は探しに行って見つかるものではなく、歩いているとき、向こうからやってくるものらしい。<br><br><b>問い：</b>筆者によると、歩くことにはどのような効果があるか。",c:["ばらばらだった考えや記憶が結びつきやすくなる","体力がついて疲れにくくなる","気分転換になって仕事が好きになる","探していた答えを意識的に見つけられる"],a:0,e:"「記憶の断片同士が、ふとつながる」。「単なる気分転換ではない」否定選項3；名案は「向こうからやってくる」（非刻意尋找）否定選項4。"},
{t:"読解・短文",q:"【文章】優れた技術者が必ずしも優れた指導者になれないのは、「できること」と「教えられること」が別の能力だからである。長年の経験で身についた勘は、本人にとって当たり前すぎて、言葉にする必要がなかった。教えるとは、この無意識の技を一度意識の上に引きずり出し、言語化する作業である。それは新しい技術を習得するのに等しい労力を要する。<br><br><b>問い：</b>優れた技術者が指導に苦労するのはなぜか。",c:["無意識に身についた技を言葉にするのは別の能力だから","自分の技術を教えたくないと思っているから","教わる若手の能力が不足しているから","指導のための時間が与えられていないから"],a:0,e:"「できること」≠「教えられること」。言語化無意識的技＝等同學新技術的勞力。"},
{t:"読解・短文",q:"【文章】地図アプリの案内どおりに歩けば、迷わず目的地に着ける。だが、そうやって着いた場所を、私たちは驚くほど覚えていない。自分の頭で道を選び、間違え、引き返す。この試行錯誤こそが、土地の記憶を体に刻む作業だったのだ。便利さと引き換えに、私たちは「街を知る」機会を手放しているのかもしれない。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["迷いながら歩く試行錯誤が土地の記憶を作っていた","地図アプリの精度はまだ信頼できない","道に迷うのは単なる時間の無駄だ","案内どおりに歩くほうが街に詳しくなる"],a:0,e:"「試行錯誤こそが、土地の記憶を体に刻む作業」。便利さと引き換えに失去「街を知る」機會。"},
{t:"読解・短文",q:"【文章】災害のたびに募金詐欺が現れる。善意を利用する卑劣さは言うまでもないが、被害はお金だけにとどまらない。「どうせだまされるかもしれない」という不信感が広がれば、本物の支援団体への寄付までためらわれるようになる。募金詐欺が盗むのは、個人の財布の中身ではなく、社会の善意の総量なのである。<br><br><b>問い：</b>筆者が募金詐欺の最大の害だと考えているものは何か。",c:["社会全体の善意や信頼が損なわれること","多額の金銭的被害が出ること","支援団体の数が減ること","警察の捜査の負担が増えること"],a:0,e:"「財布の中身ではなく、社会の善意の総量」＝真正的損害。不信感→連正牌團體都募不到款。"},
{t:"読解・短文",q:"【文章】「降水確率30％」と聞いて傘を置いていく人は、確率の意味を誤解しているかもしれない。30％とは「雨が降らない」という予報ではなく、同じ気象条件が100回あれば30回は雨が降る、という意味である。大事な書類を持ち歩く日の30％と、近所への買い物の30％では、同じ数字でも取るべき行動は違う。確率は答えではなく、判断の材料にすぎない。<br><br><b>問い：</b>筆者が最も言いたいことは何か。",c:["確率は状況に応じた判断の材料として使うべきものだ","降水確率30％なら傘を持つ必要はない","天気予報の精度をもっと上げるべきだ","確率の計算方法を学校で教えるべきだ"],a:0,e:"「確率は答えではなく、判断の材料」。同じ30%，帶重要文件的日子與買菜的日子行動應不同。"},
{t:"読解・短文",q:"【文章】【町内会からのお知らせ】9月1日（日）午前10時より、防災訓練を実施します。今年は例年の消火訓練に加え、安否確認訓練を行います。当日午前10時に防災無線の放送が流れましたら、玄関先に「無事です」カード（回覧板に添付）を掲示してください。掲示のないお宅には、班長が声かけに伺います。雨天の場合も実施します。<br><br><b>問い：</b>住民が当日しなければならないことは何か。",c:["放送が流れたら玄関に「無事です」カードを掲示する","午前10時に公民館に集合する","消火器を各自購入しておく","雨天の場合は中止の連絡を待つ"],a:0,e:"要求＝聽到廣播後在玄關掲示カード。雨天「も実施」＝照辦，選項4錯。"},
{t:"読解・短文",q:"【文章】挨拶は、内容のない言葉のやり取りに見える。「おはよう」に情報量はほとんどない。だが、その乏しさこそが挨拶の本質である。伝えているのは言葉の中身ではなく、「私はあなたの存在に気づいていますよ」という承認の合図なのだ。だから挨拶を返されないことは、単に言葉を無視された以上の痛みを残す。<br><br><b>問い：</b>筆者によると、挨拶が伝えているものは何か。",c:["相手の存在を認めているという合図","その日の天気や体調の情報","仕事の進み具合の報告","目上の人への敬意だけ"],a:0,e:"「存在に気づいていますよ」という承認の合図＝本質。被無視＝存在被否定，所以特別痛。"},
{t:"読解・短文",q:"【文章】スライドに文章を書き込みすぎるのは、発表者の不安の表れである。全部書いておけば、忘れても読めばいい、という保険だ。だが聞き手は、読む声と書かれた文字が同じとき、話を聞くのをやめてしまう。スライドは台本ではなく看板である。要点だけを掲げ、説明は自分の言葉で語る。不安と引き換えに、聞き手の注意が手に入る。<br><br><b>問い：</b>筆者によると、発表用のスライドはどうあるべきか。",c:["要点だけを示し、説明は口頭で行うべきだ","話す内容をすべて書いておくべきだ","文字を大きくして読みやすくすべきだ","図やグラフは使わないほうがよい"],a:0,e:"「台本ではなく看板」＝比喻。全文照登→聽眾停止聽講。"},
{t:"読解・短文",q:"【文章】「常識を疑え」とよく言われるが、すべての常識を疑っていたら日常生活は一歩も進まない。信号の色の意味を毎朝疑う人はいない。大切なのは、疑う価値のある常識を見分けることだ。それは多くの場合、「昔からそうだから」以外に理由が見当たらない慣行の中に潜んでいる。<br><br><b>問い：</b>筆者によると、疑う価値があるのはどのような常識か。",c:["「昔からそうだから」という理由しかない慣行","交通ルールのような社会の決まり","科学的に証明された法則","新しく生まれたばかりの流行"],a:0,e:"信号＝不必疑的常識（選項2）。值得疑的＝找不到理由、只剩慣性的做法。"},
{t:"読解・短文",q:"【文章】旅の楽しみは三度ある、という。計画を立てるとき、旅をしているとき、そして思い出すときだ。中でも計画の時間は、費用もかからず、天気にも左右されない、最も自由な旅である。行けなかった旅の計画さえ、無駄にはならない。地図を眺めて過ごしたあの夜自体が、すでに小さな旅だったのだから。<br><br><b>問い：</b>筆者は旅の計画をどのようなものだと考えているか。",c:["それ自体が旅の楽しみの一つといえるもの","旅の失敗を防ぐための義務","実行しなければ無駄になるもの","専門家に任せたほうがよいもの"],a:0,e:"「最も自由な旅」「あの夜自体が、すでに小さな旅」。実行できなくても無駄にならない（選項3反）。"},
{t:"読解・短文",q:"【文章】品揃えは多いほど客に喜ばれる、と考えるのは早計である。ジャムの試食実験では、24種類を並べた売り場より、6種類の売り場のほうが購入率が10倍も高かった。選択肢が多すぎると、人は選ぶこと自体に疲れ、「選ばない」という選択に逃げ込む。売り手の親切が、買い手の負担になることもあるのだ。<br><br><b>問い：</b>本文の内容と合っているものはどれか。",c:["選択肢が多すぎると、かえって買われなくなることがある","品揃えは多いほど売り上げが伸びる","ジャムはどの店でも6種類に絞るべきだ","試食をさせると購入率が下がる"],a:0,e:"實驗：6種比24種購買率高10倍。選項3把實驗結果過度一般化——読解典型陷阱。"},
{t:"読解・短文",q:"【文章】取引先への言いにくい連絡——値上げ、納期の遅れ、断り——ほど、電話やメールで済ませたくなる。だが、悪い知らせこそ顔を見せて伝えるのが、結局は最も傷の浅い方法である。文字は冷たく増幅されて伝わり、憶測を呼ぶ。同じ内容でも、目の前で頭を下げる誠意は、その後の関係の修復を早めてくれる。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["悪い知らせほど直接会って伝えるほうがよい","悪い知らせはメールで記録を残すべきだ","良い知らせこそ直接伝えるべきだ","言いにくいことは伝えないほうがよい"],a:0,e:"「悪い知らせこそ顔を見せて」。文字會被放大解讀、引發臆測。"},
{t:"読解・短文",q:"【文章】会話の沈黙を恐れて、言葉で埋めようと焦る人は多い。だが、交渉の場では沈黙は武器にさえなる。こちらが黙れば、相手は間を持てあまし、しばしば譲歩や本音を口にして空白を埋めようとする。沈黙に耐える力は、雄弁に劣らぬ交渉の技術なのである。<br><br><b>問い：</b>筆者によると、交渉における沈黙にはどのような効果があるか。",c:["相手が沈黙を埋めようとして本音や譲歩を口にすることがある","相手に誠実な印象を与えられる","交渉を早く終わらせられる","こちらの要求を相手に忘れさせられる"],a:0,e:"「相手は間を持てあまし〜譲歩や本音を口にして空白を埋めようとする」＝沈黙的威力。"},
{t:"読解・短文",q:"【文章】商品名は短い詩のようなものだ。ある緑茶の商品名は、中身を何一つ説明していない。だが、茶の間で家族に呼びかける声を借りることで、飲む場面の温度まで一緒に運んでくる。機能を説明する名前は頭に届き、情景を呼び起こす名前は心に届く。長く愛される名前は、たいてい後者である。<br><br><b>問い：</b>筆者によると、長く愛される商品名とはどのようなものか。",c:["情景や気持ちを呼び起こす名前","機能を正確に説明する名前","外国語で作られたしゃれた名前","短くて発音しやすい名前"],a:0,e:"對比：説明機能→頭に届く／喚起情景→心に届く。愛される名前＝後者。"},
{t:"読解・短文",q:"【文章】人が一日に下せる決断の量には限りがある、と言われる。夕方に間食の誘惑に負けやすいのは、意志が弱いからではなく、決断力という資源を昼間のうちに使い果たしているからだ。毎日同じ服を着る経営者がいるのは、些細な決断を減らし、重要な決断に資源を残すための工夫である。<br><br><b>問い：</b>本文の内容と合っているものはどれか。",c:["決断力には限りがあるので、重要でない決断を減らす工夫が有効だ","夕方に誘惑に負けるのは性格の問題だ","決断力は使えば使うほど鍛えられる","服装に気を使う人ほど決断力がある"],a:0,e:"決断力＝有限資源。同じ服＝節約瑣碎決策、留給重要決策。"},
{t:"読解・短文",q:"【文章】聞き上手と呼ばれる人は、実はあまり質問をしない。相手の話を途中で折らず、相づちと表情だけで「続きをどうぞ」と伝える。人は十分に話し切ったとき、初めて他人の言葉を受け入れる余白ができる。説得の名人が聞き上手であるのは、偶然ではない。<br><br><b>問い：</b>説得の名人が聞き上手であるのはなぜか。",c:["人は話し切って初めて他人の言葉を受け入れられるから","質問を多くすると相手が疲れてしまうから","聞いている間に反論を組み立てられるから","話さないほうが賢く見えるから"],a:0,e:"「話し切ったとき、初めて〜受け入れる余白ができる」→先讓對方說完，說服才有效。"},
{t:"読解・短文",q:"【文章】無料のセミナーほど欠席率が高い、という話を聞いた。人は支払った金額で、その体験の価値を無意識に見積もる。タダで手に入れたものは、タダの扱いを受けるのだ。本気で学んでほしい講座にあえて料金を設定するのは、主催者の欲ではなく、参加者の本気を引き出す仕掛けでもある。<br><br><b>問い：</b>無料のセミナーの欠席率が高いのはなぜだと筆者は考えているか。",c:["人は払った金額でその体験の価値を見積もるから","無料の講座は内容の質が低いから","申し込みの手続きが複雑だから","会場が不便な場所にあるから"],a:0,e:"「タダで手に入れたものは、タダの扱いを受ける」。收費＝引出參加者認真度的機制。"},
{t:"読解・短文",q:"【文章】完璧主義は、しばしば「何もしない」ことの言い訳になる。完璧な条件、完璧な準備が整うまで始めない人は、永遠に始められない。仕事の質を最後に決めるのは、最初の完成度ではなく、公開後に重ねた改善の回数である。未完成でも世に出し、批判を浴びながら直していく勇気が、完璧主義の理想に最も近い場所へ人を運ぶ。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["まず形にして出し、改善を重ねるほうが質は高まる","完璧な準備が整うまで始めるべきではない","批判を避けることが仕事の質を守る","最初の完成度がすべてを決める"],a:0,e:"「質を決めるのは〜改善の回数」。逆説：不等完美才最接近完美。"},
{t:"読解・短文",q:"【文章】【エッセイコンテスト応募要項】テーマ：「私の転機」。字数：1200字以上1600字以内。未発表の作品に限ります。応募は一人一作品まで。原稿にはお名前を書かず、別紙の応募票に氏名・連絡先をご記入ください。締め切り：10月31日（当日消印有効）。入選作は当協会のウェブサイトで発表し、ご本人にも通知します。<br><br><b>問い：</b>応募の際の注意点として正しいものはどれか。",c:["原稿本体には名前を書いてはいけない","一人で何作品でも応募できる","過去に雑誌に載った作品も応募できる","11月1日の消印でも受け付けられる"],a:0,e:"「原稿にはお名前を書かず、別紙の応募票に」＝匿名審查。未発表限定；一人一作；当日消印有効＝10/31。"},
{t:"読解・短文",q:"【文章】遅刻の連絡で大事なのは、謝罪の言葉より「何時に着くか」という情報である。待つ側の困りごとは、あなたの遅刻そのものより、予定をどう組み直せばいいか分からないことだからだ。「すみません」を十回並べるより、「10時15分に着きます」の一言のほうが、相手への思いやりとしては上等である。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["遅刻の連絡では到着予定時刻を伝えることが最も重要だ","謝罪の言葉を尽くすことが最も重要だ","遅刻の理由を詳しく説明するべきだ","連絡するより急いで向かうべきだ"],a:0,e:"等待方真正的困擾＝無法重排行程→最需要的資訊是「何時到」。"},
{t:"読解・短文",q:"【文章】子どもへの読み聞かせは、字が読める年齢になったらやめてよい、というものではない。自分で読む力と、聞いて理解する力は別で、後者のほうが数年先を行く。つまり、耳からなら、自力では読めない豊かな物語の世界に触れられるのだ。読み聞かせの卒業を急ぐことは、その数年分の世界を子どもから取り上げることになる。<br><br><b>問い：</b>筆者が読み聞かせを続けるべきだと考える理由は何か。",c:["聞く力は読む力より先に育つので、耳からのほうが豊かな物語に触れられるから","子どもが字を覚えるのが早くなるから","親子の会話の時間が増えるから","読書の習慣が自然に身につくから"],a:0,e:"「聞いて理解する力〜のほうが数年先を行く」＝核心根拠。其他選項文中未提及。"},
{t:"読解・短文",q:"【文章】観光客の増加は地域に恩恵をもたらすが、生活道路の混雑やごみの散乱が住民の暮らしを圧迫するようでは、本末転倒である。観光は、住民の日常という土台の上に咲く花にすぎない。土台が痩せれば花も枯れる。持続可能な観光とは、訪れる人の満足と住む人の平穏を、同じ天秤にかけることから始まる。<br><br><b>問い：</b>筆者の考えに合うものはどれか。",c:["観光は住民の生活を守ることを前提に成り立つ","観光客を増やすことを最優先にすべきだ","観光と住民の生活は切り離して考えるべきだ","観光をやめて住民の生活だけを守るべきだ"],a:0,e:"花與土台的比喻：住民生活＝土台。「同じ天秤にかける」＝兩者並重，選項4過度。"},
// ================= 読解・中文 =================
{t:"読解・中文",p:0,q:"筆者によると、暗記の価値が下がったのはなぜか。",c:["誰もが簡単に知識に触れられるようになったから","書物がますます貴重になったから","学校の数が減り続けているから","教師の質が下がったから"],a:0,e:"「誰もが手のひらの端末で〜触れられる今」＝資訊取得成本崩落→純記憶貶值。"},
{t:"読解・中文",p:0,q:"筆者が、今の時代にこそ学校が必要だと考える理由は何か。",c:["他者との議論を通じてしか思考の偏りは直せないから","暗記には教師の指導が欠かせないから","端末の使い方を教える場が必要だから","独学は費用がかかりすぎるから"],a:0,e:"「それは独学では身につきにくい〜経験の中でしか、思考の偏りは矯正されない」。"},
{t:"読解・中文",p:0,q:"本文の内容と合っているものはどれか。",c:["教師の役割は知識の伝達者から学びの伴走者へ変わりつつある","学校の役割は今後なくなっていく","知識の暗記が今後ますます重要になる","思考力は独学だけで十分に育つ"],a:0,e:"末段原文。選項2是第二段開頭被「私はむしろ逆だ」否定的立場。"},
{t:"読解・中文",p:1,q:"職業人生を振り返った人々の記憶に残っているのは何だと述べられているか。",c:["感謝された瞬間や仕事をやり遂げた実感","初めての給料日の喜び","昇進や肩書きの変化","職場の人間関係の苦労"],a:0,e:"「給料日のことではなく、誰かに感謝された瞬間や〜やり遂げた朝の空気」。"},
{t:"読解・中文",p:1,q:"下線部「意味の糸を通す」とはどういうことか。",c:["日々の仕事に意味を感じさせてくれるということ","仕事の手順をつなげて効率化するということ","給料と労働を結びつけるということ","職場の人間関係をつなぐということ"],a:0,e:"主語是「役に立っているという実感」→為勞動賦予意義。糸を通す＝把散珠串起來的比喻。"},
{t:"読解・中文",p:1,q:"筆者が、仕事を空しく感じる人に勧めていることは何か。",c:["自分の仕事の先で助かっている人を思い浮かべること","思い切って早く転職すること","給料の高い仕事を探すこと","仕事以外の趣味を見つけること"],a:0,e:"「辞める前に一度〜『誰か』の顔を思い浮かべてみるといい」。"},
{t:"読解・中文",p:2,q:"出汁について、本文の内容と合っているものはどれか。",c:["主役にはならないが、料理全体の味を支えている","和食の中で最も目立つ主役である","西洋料理でも古くから使われてきた","昆布だけから作られる"],a:0,e:"「それ自体が主役になることはないが〜味の骨格を支えている」。昆布＋鰹節。"},
{t:"読解・中文",p:2,q:"「うま味」について正しいものはどれか。",c:["二十世紀の終わりに国際的に基本味と認められた","西洋の理論では最初から認められていた","甘味・塩味・酸味・苦味の一種である","日本国内でも最近まで知られていなかった"],a:0,e:"「第五の基本味として国際的に認知されたのは〜二十世紀の終わり」。長期不被西方理論承認。"},
{t:"読解・中文",p:2,q:"筆者がこの話から引き出している教訓は何か。",c:["理論で説明できなくても、日常の実感を安易に捨てるべきではない","科学の理論は常に正しいので従うべきだ","味の好みは人によって違うものだ","伝統的な料理法は変えてはいけない"],a:0,e:"「科学は〜現実の後を追いかける。日常の実感を安易に手放すべきではない」。"},
{t:"読解・中文",p:3,q:"「高齢者専用」を強調した製品が高齢者に使われないのはなぜか。",c:["自分を弱者だと認めるような商品は使いたくないから","文字が大きすぎて読みにくいから","機能が多すぎて操作が難しいから","価格が高く設定されているから"],a:0,e:"「誰しも、自分を『弱者』と認定する商品は使いたくない」。機能是「減らし」不是太多。"},
{t:"読解・中文",p:3,q:"筆者が挙げている成功例に共通することは何か。",c:["特定の人への配慮が、すべての人の使いやすさにつながっている","高齢者だけを対象に開発されている","最新技術をふんだんに使っている","価格を安く抑えている"],a:0,e:"容器與無段差地板的共通點：「特定の誰かのための配慮が、結果としてすべての人の使いやすさに」。"},
{t:"読解・中文",p:3,q:"筆者の考えに合うものはどれか。",c:["配慮は特別扱いにせず、当たり前の設計に溶け込ませるべきだ","高齢者向けとはっきり表示して販売すべきだ","若者向けと高齢者向けは分けて開発すべきだ","デザインより機能の多さを優先すべきだ"],a:0,e:"末段：「配慮を特別扱いにせず、当たり前の設計に溶け込ませること」＝成熟社會。"},
{t:"読解・中文",p:4,q:"下線部「書けない部分こそ、考えていなかった部分なのだ」とはどういうことか。",c:["文章にできない箇所は、思考が曖昧なままだったということ","文才がなければ考えも浅いということ","難しい内容は文章にしないほうがいいということ","書く技術は考える力と無関係だということ"],a:0,e:"文章化して初めて「論理の飛躍や根拠の欠落が姿を現す」→寫不出來＝沒想清楚。"},
{t:"読解・中文",p:4,q:"筆者が勧めている書き方はどれか。",c:["考えをまとめるために、まず書き始める","考えが完全にまとまってから書き始める","上手に書けるようになってから書く","一度書いたものは消さずに残す"],a:0,e:"「まとまってから書くのではなく、まとめるために書く」。消しては書き＝往復運動也被肯定。"},
{t:"読解・中文",p:4,q:"優れた文章家が優れた思想家でもあるのはなぜだと筆者は考えているか。",c:["書く行為を通じて人より多く考えているから","生まれつき頭がいい人が文章家になるから","多くの本を読んでいるから","有名になると発言の機会が増えるから"],a:0,e:"末句：「書くという行為を通じて、人より多く考えている」。"},
{t:"読解・中文",p:5,q:"伝統芸能における「間」とはどのようなものか。",c:["音や動きのない時間も表現の一部として働くもの","失敗を隠すための時間","観客を休ませるための時間","次の動きを準備する時間"],a:0,e:"「単なる空白ではなく、表現の一部として機能している」。能與落語的例子都指向此。"},
{t:"読解・中文",p:5,q:"「埋め尽くさないことが、かえって埋められた部分を生かす」の例として本文で挙げられているものはどれか。",c:["床の間や手紙の余白","倍速で見る動画","休符のない楽譜","効率的な会議の進め方"],a:0,e:"第二段舉例：床の間、手紙の余白、会話の間合い。倍速動画與無休止符樂譜是反例。"},
{t:"読解・中文",p:5,q:"筆者の考えに合うものはどれか。",c:["「何もない」時間の豊かさを見直すべきだ","沈黙は気まずいので避けるべきだ","動画は倍速で見るのが合理的だ","現代の効率主義は正しい方向に進んでいる"],a:0,e:"末句直接呼籲。倍速、嫌沈黙都是被批判的現象。"},
{t:"読解・中文",p:6,q:"健闘している地方紙の強みは何か。",c:["読者の暮らしに密着した身近な情報を書けること","全国のニュースを速く伝えられること","ネットより安く読めること","若い記者が多いこと"],a:0,e:"編集長の言葉：「うちにしか書けないのは〜半径十キロの物語」。全国新聞はネットで足りる。"},
{t:"読解・中文",p:6,q:"下線部「逆説」とはどういうことか。",c:["世界の情報は簡単に手に入るのに、足元の情報が最も手に入りにくいこと","新聞よりネットのほうが正確なこと","地方紙のほうが全国紙より部数が多いこと","ニュースが多すぎて読み切れないこと"],a:0,e:"前句：「世界中のニュースが読める時代に、最も手に入りにくいのが足元の情報」。"},
{t:"読解・中文",p:6,q:"本文の内容と合っているものはどれか。",c:["全国的には小さな出来事でも、当事者には人生を左右する大事件である","地方紙は大手メディアと同じニュースを追うべきだ","ネットには近所の情報があふれている","全国紙の部数は増え続けている"],a:0,e:"「全国的には些細な出来事が、当事者にとっては〜大事件」。選項3與原文「ほとんど落ちていない」相反。"},
{t:"読解・中文",p:7,q:"「作業員の不注意」という結論が危険なのはなぜか。",c:["原因の究明がそこで止まり、同じ事故が繰り返されるから","作業員のやる気が下がるから","会社の評判が悪くなるから","調査に時間がかかりすぎるから"],a:0,e:"「個人を責めて処分すれば、調査はそこで終わる」→別の人が立てば同じ事故。"},
{t:"読解・中文",p:7,q:"失敗学の前提となる考え方はどれか。",c:["人間は必ず間違えるものだ","訓練すれば人間は間違えなくなる","事故の原因はほとんど個人にある","注意力は鍛えれば無限に伸びる"],a:0,e:"「注意力は有限であり、人間は必ず間違える。この前提に立てば」。"},
{t:"読解・中文",p:7,q:"筆者の考えに合うものはどれか。",c:["再発防止には仕組みの欠陥と向き合うしかない","責任者を厳しく処分することが最も効果的だ","事故調査は早く終わらせるべきだ","警報や手順は事故と関係がない"],a:0,e:"末句：仕組みと向き合うことが「唯一の再発防止策」。個人追及＝「実は安易」。"},
{t:"読解・中文",p:8,q:"下線部「この一言は思いのほか高くつく」とはどういうことか。",c:["子どもが問うことをやめてしまうという大きな代償があるということ","子どもの教育費が高額になるということ","親が答えを調べるのに時間がかかるということ","子どもが同じ質問を繰り返すということ"],a:0,e:"直後の「からだ」句：問いを封じられた子どもは「問うこと自体をやめてしまう」。高くつく＝付出大代價。"},
{t:"読解・中文",p:8,q:"子どもの質問に対して筆者が勧める対応はどれか。",c:["一緒に立ち止まって疑問に向き合う姿勢を見せる","正しい答えを必ず調べて教える","答えられない質問は聞き流す","質問の数を制限する"],a:0,e:"「正解を返すことではない。〜一緒に立ち止まってみせることだ」。"},
{t:"読解・中文",p:8,q:"筆者の考えに合うものはどれか。",c:["問う力はあらゆる学びの出発点である","親は子どもの前で無知を隠すべきだ","答えを与える教育を強化すべきだ","難しい質問には大人が答えるべきだ"],a:0,e:"「問う力は、あらゆる学びの出発点だ」。親不知道≠恥，反而是孩子的發現。"},
{t:"読解・中文",p:9,q:"コンビニが「事実上の社会インフラ」だと言えるのはなぜか。",c:["小売のほかに行政・防災などの機能まで担っているから","全国どこにでも店舗があるから","国が経営に関与しているから","価格が安く庶民的だから"],a:0,e:"繳費、宅配、證明書發行、災時物資據點、防犯燈——超越小売店的機能。"},
{t:"読解・中文",p:9,q:"店舗の撤退が地域にもたらす影響として、本文で述べられているものはどれか。",c:["買い物に加えて、行政サービスへの入り口も失われる","家賃の相場が下がる","大型スーパーが進出してくる","住民の防災意識が高まる"],a:0,e:"「買い物だけでなく、行政サービスへの入り口まで一緒に失われる」。"},
{t:"読解・中文",p:9,q:"筆者は、コンビニの問題をどのような問題だととらえているか。",c:["民間が担う公共機能をどう支えるかという問題","一企業の経営戦略の問題","消費者のマナーの問題","都市と地方の対立の問題"],a:0,e:"「インフラ化した民間サービスをどう支えるか〜公共のあり方を問う試金石」。企業論理vs社会論理。"},
{t:"読解・中文",p:10,q:"過剰な敬語が増える背景として、筆者が挙げているものは何か。",c:["客からの叱責を避けて自分を守ろうとする働き手の事情","学校での敬語教育の不足","外国人客の増加","マニュアルの厳格化"],a:0,e:"「理不尽な叱責を避けるため、防具を重ねるように丁寧さを積み増していく」。"},
{t:"読解・中文",p:10,q:"下線部「言葉のインフレ」とはどういうことか。",c:["丁寧な表現が過剰になるほど、言葉の丁寧さの価値が下がっていくこと","敬語の種類が増えて覚えきれなくなること","言葉の意味が時代とともに変わること","話す速度がだんだん速くなること"],a:0,e:"通貨のインフレと同じ構造：供給過剰→価値下落→更に過剰な表現が必要という悪循環。"},
{t:"読解・中文",p:10,q:"この悪循環を止める鍵はどこにあると筆者は考えているか。",c:["普通の丁寧さを受け入れる聞き手（客）の側","もっと丁寧に話す話し手の側","敬語を簡略化する国の政策","接客マニュアルの改訂"],a:0,e:"「止められるのは、話し手ではなく聞き手の側」。客に余裕があれば防具は不要。"},
{t:"読解・中文",p:11,q:"「3分の1ルール」の説明として正しいものはどれか。",c:["賞味期限より前でも納品や販売が打ち切られる商習慣","賞味期限を3倍に延長する制度","食品の価格を3分の1にして売り切る仕組み","食品ロスの3分の1を再利用する取り組み"],a:0,e:"期限を三等分：過1/3不能納品、過2/3下架——「期限内であっても、である」。"},
{t:"読解・中文",p:11,q:"下線部について、廃棄の山を築いているのが「私たち自身の手でもある」と言えるのはなぜか。",c:["消費者の鮮度志向がこの商習慣を生み出したから","消費者が食べ残しを多く出すから","消費者が値引き商品を買わないから","消費者が賞味期限の表示を読まないから"],a:0,e:"ルールは「鮮度を重んじる消費者への配慮から生まれた」＋棚の奥から新しい日付を選ぶ行動。"},
{t:"読解・中文",p:11,q:"筆者の考えに合うものはどれか。",c:["制度の改革と消費者の意識の両方が必要だ","企業の努力だけで食品ロスは解決できる","賞味期限の制度を廃止すべきだ","値引き販売は食品の価値を下げるのでやめるべきだ"],a:0,e:"「制度の改革と消費者の意識、その両輪がそろって初めて」。"},
{t:"読解・中文",p:12,q:"練習時間の削減について、スポーツ科学の知見はどのようなものか。",c:["休息こそ技術の定着に必要で、過度な練習は故障を招く","練習量が減れば必ず競技力も落ちる","成長期ほど練習量を増やすべきだ","休養日は週に1日で十分だ"],a:0,e:"「だが、スポーツ科学の知見は逆を示している」以下。選項2是被推翻的「危惧の声」。"},
{t:"読解・中文",p:12,q:"筆者によると、これまでの部活動の問題の核心は何だったか。",c:["練習の質に無関心だったこと","練習時間が短すぎたこと","指導者の人数が足りなかったこと","生徒のやる気が低かったこと"],a:0,e:"「問題の核心は、練習量そのものより『練習の質』への無関心にあった」。"},
{t:"読解・中文",p:12,q:"下線部「限られた時間は、制約ではなく工夫の母である」とはどういうことか。",c:["時間が限られているからこそ、質を高める工夫が生まれるということ","時間はいくらあっても足りないということ","制約が多い部活動は廃止すべきだということ","母親の協力が部活動に欠かせないということ"],a:0,e:"短時間で何をどう鍛えるか設計する→限制催生工夫。"},
{t:"読解・中文",p:13,q:"人が音を「うるさい」と感じる要因について、本文の内容と合っているものはどれか。",c:["音量だけでなく、音の意味や自分で制御できるかどうかも関わる","音量が大きいかどうかだけで決まる","自然の音はすべてうるさく感じる","機械の音は静かなら快適に感じる"],a:0,e:"「音量だけでは決まらない」＋「意味のない機械音や、制御できない音ほど苦痛」。"},
{t:"読解・中文",p:13,q:"下線部「足し算」の発想とはどのようなものか。",c:["快い音を加えることで音の環境全体を整えること","音の種類を数えて管理すること","騒音の発生源を一つずつ取り除くこと","防音壁を追加で建設すること"],a:0,e:"「不快な音を消すのではなく、快い音を重ねる」。引き算＝消音、足し算＝加入水聲風聲。"},
{t:"読解・中文",p:13,q:"本文の内容と合っているものはどれか。",c:["これからの都市には「音の景観」を設計する視点が求められる","騒音対策は音を減らすことに集中すべきだ","水の音は雑踏の音より不快である","音の研究は都市設計にはまだ応用されていない"],a:0,e:"末句。駅前広場の水音等、応用は「始まっている」（選項4錯）。"},
{t:"読解・中文",p:14,q:"筆者は翻訳アプリをどのように評価しているか。",c:["旅行や簡単な用件では十分に役立つ","精度が低くまだ実用に耐えない","外国語学習を完全に不要にする","商談では一切使うべきでない"],a:0,e:"「旅行や簡単な商談なら、確かに機械で事足りる場面は増える」＝部分肯定。"},
{t:"読解・中文",p:14,q:"たどたどしい外国語が相手の心を開くことがあるのはなぜか。",c:["相手の文化への敬意が無言のうちに伝わるから","下手な発音が笑いを誘うから","機械より聞き取りやすいから","珍しくて印象に残るから"],a:0,e:"「あなたの文化に敬意を持っているという無言のメッセージが宿る。〜そのためだ」。"},
{t:"読解・中文",p:14,q:"筆者の考える機械翻訳と外国語学習の関係はどれか。",c:["互いに置き換えられない、役割の異なる道具になる","機械翻訳が外国語学習に取って代わる","外国語学習が機械翻訳を不要にする","両者は競争し合って発展する"],a:0,e:"「置き換え合う関係ではなく、役割の異なる道具」。情報伝達＝機械／心の距離＝人間。"},
{t:"読解・中文",p:15,q:"筆者によると、伝統工芸の後継者問題の正体は何か。",c:["工芸で生計を立てられる市場がないという経済の問題","若者の志望者が全くいないという問題","職人の指導方法が古いという問題","伝統への関心が薄れたという文化の問題"],a:0,e:"「志望者はいるのだ」→問題は「食べていけないこと」＝「経済の問題」。"},
{t:"読解・中文",p:15,q:"修業を諦めて去っていった若者たちの理由は何か。",c:["収入が少なく生活が成り立たないから","技術の習得が難しすぎたから","師匠との関係が悪かったから","都会の生活に憧れたから"],a:0,e:"「修業中の収入はわずか〜『好きだけでは続かない』と去っていった」。"},
{t:"読解・中文",p:15,q:"筆者の考えに合うものはどれか。",c:["生活を支える仕組みを作らずに伝統を守れと言うのは無責任だ","若者の根性が足りないのが最大の問題だ","伝統工芸は時代とともに消えても仕方がない","修業中の若者は収入を求めるべきではない"],a:0,e:"末句：「〜なしに、『若者よ、伝統を守れ』と呼びかけるのは、あまりに無責任」。"},
{t:"読解・中文",p:16,q:"昆虫が「合理的な」たんぱく源とされる理由は何か。",c:["少ない資源で育ち、環境への負荷も小さいから","味が牛や豚より優れているから","栄養価が他の食品の何倍もあるから","調理が簡単で保存もきくから"],a:0,e:"「少ない飼料と水で育ち、温室効果ガスの排出も格段に少ない」。"},
{t:"読解・中文",p:16,q:"エビは食べられるのにコオロギに抵抗があるのはなぜだと筆者は述べているか。",c:["慣れとイメージの問題だから","コオロギには毒があるから","栄養学的に劣っているから","味が全く違うから"],a:0,e:"「栄養学の問題ではなく、慣れとイメージの問題」。食べ物の範囲は感情が決める。"},
{t:"読解・中文",p:16,q:"筆者の考えに合うものはどれか。",c:["食文化の壁は、正論ではなく生活に溶け込ませることで越えられる","昆虫食は理屈で説得すれば普及する","昆虫は姿のまま料理するほうが受け入れられやすい","食糧危機が来れば人は自然に昆虫を食べる"],a:0,e:"「文化の壁は、正論で突き破るものではなく、生活の中に少しずつ溶かし込むもの」。成功例＝粉末練り込み（選項3反）。"},
{t:"読解・中文",p:17,q:"江戸の循環型社会を支えていたものは何だと筆者は述べているか。",c:["捨てずに使い切るほうが得だという経済的な理由","住民の高い環境意識","幕府による厳しい規制","仏教の教えに基づく倫理観"],a:0,e:"「『環境意識』の産物ではなかった」「倫理ではなく損得が、循環を支えていた」。"},
{t:"読解・中文",p:17,q:"江戸の町の様子として、本文の内容と合っているものはどれか。",c:["鍋や傘の修理を専門とする職人が町を回っていた","ごみはすべて海に捨てられていた","古着はすぐに燃やして処分された","紙は貴重で庶民は使えなかった"],a:0,e:"「壊れた鍋や傘を修理して回る専門の職人が、路地を行き交っていた」。紙くず→再生紙。"},
{t:"読解・中文",p:17,q:"筆者が現代の環境対策に求めているものは何か。",c:["環境に良い行動が得になるような仕組みの設計","国民への環境教育の徹底","我慢を美徳とする意識の育成","江戸時代の生活への回帰"],a:0,e:"「『得になる』仕組みを設計できたとき、循環型社会は説教なしに回り始める」。善意頼み＝長続きしない。"},
{t:"読解・中文",p:18,q:"「機関車型」のリーダーが今の時代に合わなくなったのはなぜか。",c:["正解の見えない時代に、一人の判断に頼る組織は脆いから","部下がついてこなくなったから","法律で規制されるようになったから","体力的に続かないから"],a:0,e:"「変化が速く正解の見えない今の時代、一人の判断に全員が従う組織はかえって脆い」。"},
{t:"読解・中文",p:18,q:"「支える型」のリーダーの仕事として、本文で述べられているものはどれか。",c:["メンバーが力を発揮できる環境を整え、障害を取り除くこと","すべての判断を自分で素早く下すこと","メンバーに細かく指示を出すこと","先頭に立って組織を引っ張ること"],a:0,e:"「環境を整え、障害を取り除くことに徹する」＋権限は現場へ。命じる→引き出す。"},
{t:"読解・中文",p:18,q:"筆者の考えに合うものはどれか。",c:["支える型のリーダーシップは、権力の放棄ではなく高度な統率の形だ","支える型になればリーダーの仕事は楽になる","命令するほうが我慢より難しい","権限は常にリーダーが握るべきだ"],a:0,e:"「楽になったという意味ではない」「権力の放棄ではなく、より高度な統率の形」。"},
{t:"読解・中文",p:19,q:"「孤独」と「孤立」の違いは何か。",c:["孤独は主観的な感覚で、孤立は頼れる相手がいない客観的な状態","孤独は悪いもので、孤立は良いもの","孤独は高齢者の、孤立は若者の問題","両者に違いはなく言い換えにすぎない"],a:0,e:"孤独＝主観的感覚（創造の時間にもなる）／孤立＝客観的状態。「問題にすべきは後者」。"},
{t:"読解・中文",p:19,q:"孤立が見えにくいのはなぜか。",c:["危機が起きるまで表面化せず、周囲も思い込みで気づかないから","本人が意図的に隠しているから","統計を取る方法がないから","孤立する人が少ないから"],a:0,e:"在職中は隠れ、退職・病気で一気に表面化＋「一人が好きだから」という思い込みが支援を遅らせる。"},
{t:"読解・中文",p:19,q:"筆者の考えに合うものはどれか。",c:["安心して孤独を楽しめる社会とは、孤立への備えが整った社会だ","孤独も孤立もなくすべきだ","一人が好きな人には支援は不要だ","孤立の問題は本人の責任である"],a:0,e:"末句。孤独を楽しむ権利と孤立への備えは「矛盾しない」。"},
{t:"読解・中文",p:20,q:"調査から見える若者の実像はどれか。",c:["社会問題への関心は高いが、選挙で変わるという実感が持てない","政治にも社会問題にも全く関心がない","寄付やボランティアにも消極的である","高齢者向けの政策を支持している"],a:0,e:"「関心はむしろ高い」＋冷めているのは「『選挙で何かが変わる』という実感に対して」。"},
{t:"読解・中文",p:20,q:"本文で述べられている「悪循環」とはどのようなものか。",c:["若者が投票しないので若者向け政策が減り、さらに投票しなくなること","政治家が高齢化して若者の声が届かないこと","投票所が減って投票しにくくなること","政策が複雑になって理解できなくなること"],a:0,e:"諦め→不投票→政策が多数派（高齢層）へ→更に諦め。"},
{t:"読解・中文",p:20,q:"筆者が悪循環を破る鍵だと考えているものは何か。",c:["若者自身がそれでも投票に行くこと","選挙制度を根本から変えること","高齢者の投票を制限すること","政治家の世代交代を待つこと"],a:0,e:"「『それでも投票に行く』こと以外にない」。投票率が数ポイント上がるだけで政策の視野に入る。"},
{t:"読解・中文",p:21,q:"電子書籍の強みとして本文で挙げられているものはどれか。",c:["検索のしやすさと持ち運びやすさ","目にやさしいこと","価格が安いこと","貸し借りがしやすいこと"],a:0,e:"「電子書籍の強みは検索と携帯性にある」。実用書・資料との相性が良い。"},
{t:"読解・中文",p:21,q:"紙の本の「厚みの感覚」とはどのようなものか。",c:["残りのページの量が、物語の進行を体で感じさせてくれること","装丁が豪華で所有欲を満たすこと","重いので持ち運びに苦労すること","印刷の質感が美しいこと"],a:0,e:"「残りのページの重みが物語の終わりを予感させ」＋読書履歴が本棚に堆積。"},
{t:"読解・中文",p:21,q:"筆者の考えに合うものはどれか。",c:["新旧の道具はそれぞれ得意な場面で使い分けられ共存していく","電子書籍がいずれ紙の本を駆逐する","紙の本がいずれ電子書籍を駆逐する","新しい道具は常に古い道具より優れている"],a:0,e:"写真と絵画、テレビとラジオの例。「どちらが勝つか」ではなく「どちらを、いつ使うか」。"},
{t:"読解・中文",p:22,q:"自然渋滞はどのようにして発生するか。",c:["わずかな減速が、車間の狭い後続車に増幅されながら伝わっていく","事故や工事で車線が減る","料金所で車が集中する","制限速度を守らない車が多い"],a:0,e:"「自然渋滞」＝事故や工事ではない。減速の波が後方へ増幅されて伝わる。"},
{t:"読解・中文",p:22,q:"渋滞の波を打ち消すのはどのような運転か。",c:["十分な車間距離を取り、緩やかな速度調整で減速を吸収する運転","前の車にぴったりついて走る運転","できるだけ速度を上げる運転","頻繁に車線を変更する運転"],a:0,e:"「十分な車間距離を取った車は〜波を後ろに伝えない」。車間を詰める直感は誤り。"},
{t:"読解・中文",p:22,q:"筆者が渋滞学から引き出している教訓は何か。",c:["個々のゆとりが全体の流れを良くする","急ぐ者が結局は勝つ","組織の問題は道路の問題とは別である","渋滞は技術の進歩で自然に解決する"],a:0,e:"「個々の『急ぎ』が全体を遅らせ、個々の『ゆとり』が全体を救う」→組織にも当てはまる。"},
{t:"読解・中文",p:23,q:"現場の教師が戸惑っているのはどのような現象か。",c:["ほめられないと動けない子どもが増えたこと","子どもがほめても喜ばなくなったこと","保護者がほめ方に注文をつけること","ほめる時間が足りないこと"],a:0,e:"「ほめられないと動けない子が増えたという戸惑いの声」。ほめ言葉が報酬化した結果。"},
{t:"読解・中文",p:23,q:"ごほうびの実験が示していることは何か。",c:["外からの報酬が、もともとの「好き」という気持ちを弱めてしまうこと","ごほうびは多いほど効果的であること","絵の才能は生まれつき決まっていること","子どもはごほうびでは動かないこと"],a:0,e:"外発的動機づけによる内発的動機づけの侵食。好きで描いていた子が、ごほうびなしには描かなくなる。"},
{t:"読解・中文",p:23,q:"筆者が勧めるほめ方はどれか。",c:["工夫や粘った過程を具体的な言葉で認め、関心を示す","結果が出たときに大きくほめる","才能を繰り返しほめて自信をつけさせる","ほめることを一切やめる"],a:0,e:"「結果や才能ではなく〜過程を、具体的な言葉で」「評価ではなく関心の表明」。選項4は「そうではない」と否定済み。"},
{t:"読解・中文",p:24,q:"行列に並ぶという行動の背後にある推論はどのようなものか。",c:["自分に情報がないとき、他人の行動を手がかりにする推論","早く並ぶほど得をするという推論","行列は店の宣伝であるという推論","待つ時間が長いほど満足するという推論"],a:0,e:"「並んでいるからには、うまいに違いない」＝他人の行動を情報として利用。"},
{t:"読解・中文",p:24,q:"行列が下線部「誤りを増幅する装置」になるのはどのようなときか。",c:["誰も自分の根拠を持たず、互いの判断を信じ合っているとき","行列が長くなりすぎたとき","店の味が実際に落ちたとき","並ぶ人の性格がせっかちなとき"],a:0,e:"「誰も味を知らず、ただ前の人の判断を信じているだけ」→根拠は先頭のみ、そこが間違えば全体が誤る。"},
{t:"読解・中文",p:24,q:"筆者が勧めていることは何か。",c:["選ぶ前に「自分は何を根拠に選ぶのか」と自問すること","他人の判断は一切参考にしないこと","行列のできる店には並ばないこと","SNSの情報を遮断すること"],a:0,e:"「参考にするなとは言わない」＋自問する習慣＝「群れの誤りから自分を守る最後の砦」。"},
{t:"読解・中文",p:25,q:"香りが古い記憶を鮮やかに呼び覚ますのはなぜか。",c:["嗅覚が、記憶や感情を司る脳の部位と直結しているから","香りは視覚より情報量が多いから","昔の香りは今より強かったから","人は香りを意識して記憶しているから"],a:0,e:"「嗅覚が〜記憶や感情を司る部位と直結していることに由来する」。"},
{t:"読解・中文",p:25,q:"下線部「検問なしで感情の中枢に届く」とはどういうことか。",c:["理性の処理を経ずに、直接感情を動かすということ","脳に届くまでの時間が最も速いということ","どんな匂いも良い記憶を呼び起こすということ","匂いの情報は失われないということ"],a:0,e:"対比：視覚・聴覚＝「理性のフィルターを経由」／匂い＝検問なし。検問＝理性フィルターの比喩。"},
{t:"読解・中文",p:25,q:"筆者の考えに合うものはどれか。",c:["記録できないことが、香りの記憶の純粋さを保っている","香りも技術が進めば記録できるようになるべきだ","香りの記憶は曖昧で信頼できない","写真のほうが香りより記憶を鮮明に残す"],a:0,e:"「保存の手段がないことが、かえって〜純粋なまま保っている」「記録できないものだけが持つ鮮度」。"},
{t:"読解・中文",p:26,q:"種の保存の取り組みの象徴として挙げられているものはどれか。",c:["絶滅の恐れがある動物を繁殖させ、野生に返す試み","珍しい動物を海外から輸入すること","動物に芸を仕込んで公開すること","入園料を保護団体に寄付すること"],a:0,e:"「絶滅の恐れがある動物を繁殖させ、野生に返す試みは、その象徴」。"},
{t:"読解・中文",p:26,q:"「行動展示」とはどのような展示か。",c:["生息地の環境を再現し、動物本来の行動を引き出す展示","動物に芸をさせて見せる展示","狭い檻で間近に観察させる展示","映像だけで動物を紹介する展示"],a:0,e:"標本型（狭い檻）→行動展示（環境再現＋ありのままの姿）という転換。"},
{t:"読解・中文",p:26,q:"筆者の考えに合うものはどれか。",c:["動物園は批判から逃げず、保全の実績で囲いの存在を正当化すべきだ","動物園への批判は的外れなので無視してよい","動物園はすべて廃止すべきだ","動物園は娯楽に徹するべきだ"],a:0,e:"「その問いから逃げるべきではない」「胸を張れる園だけが、囲いの存在を正当化できる」。"},
{t:"読解・中文",p:27,q:"準備のないボランティアが引き起こす問題として述べられているものはどれか。",c:["被災地の限られた資源を消費し、受け入れ側の負担を増やす","支援物資を盗んでしまう","被災者と衝突を起こす","デマを広めてしまう"],a:0,e:"渋滞悪化＋食料と寝場所の消費＋手間を増やす＝「支援される側になる」。"},
{t:"読解・中文",p:27,q:"経験者の助言と合っているものはどれか。",c:["募集状況を確認し、装備と食料は自分で完結させて指示に従う","思い立ったらすぐ現地に向かう","物資は現地で調達する","自分の判断で自由に活動する"],a:0,e:"三点セット：事前確認・自己完結・指示に従う。選項2〜4はすべて逆。"},
{t:"読解・中文",p:27,q:"下線部「『今すぐ』より『長く』」とはどういうことか。",c:["直後だけでなく、人手が減る復旧期にも支援を続けること","すぐに行かず、ゆっくり準備してから行くこと","短期間で多くの仕事をこなすこと","寄付を長期の分割払いにすること"],a:0,e:"「熱が冷めた頃にこそ人手は足りなくなる」→復旧は何か月も続く、長期の視点で。"},
{t:"読解・中文",p:28,q:"学び直しが進まない根深い理由として、筆者が挙げているものは何か。",c:["学びは若いうちに終えるものだという思い込み","講座の数が足りないこと","会社が学び直しを禁止していること","大人の記憶力の低下"],a:0,e:"時間とお金より「より根深いのは〜思い込みではないか」。"},
{t:"読解・中文",p:28,q:"大人の学びの特徴として筆者が述べているものはどれか。",c:["試験も比較する相手もなく、自分のペースで進めばよい","学校より厳しい自己管理が求められる","成績で評価されるので緊張感がある","若い頃より習得が速い"],a:0,e:"「試験もなければ、比べられる同級生もいない。昨日の自分より一歩進めば〜成功」。"},
{t:"読解・中文",p:28,q:"筆者が学び直しに最も必要だと考えているものは何か。",c:["遅すぎることはないという認識の転換","まとまった時間と資金","質の高い専門学校","会社からの命令"],a:0,e:"「必要なのは、まとまった時間や大金ではなく〜認識の転換」。"},
{t:"読解・中文",p:29,q:"脳科学が裏付けている「身体の拡張」とはどのような現象か。",c:["使い込んだ道具の先端までを、脳が自分の身体として扱う現象","運動によって筋肉が増える現象","道具が使う人の形に変形する現象","脳が道具の重さを忘れる現象"],a:0,e:"「道具を使い込むと、脳は道具の先端までを『自分の身体』として扱う」。箸・かんなの例。"},
{t:"読解・中文",p:29,q:"「いつまでも道具と『他人』のまま」なのはどのような人か。",c:["使いこなす前に次々と道具を替えてしまう人","一つの道具を長く使い続ける人","道具の手入れをしない人","高価な道具しか買わない人"],a:0,e:"身体化には反復練習が必要→なじむ前に買い替えれば永遠に他人。"},
{t:"読解・中文",p:29,q:"スマートフォンについて、筆者が注意を促していることは何か。",c:["道具に合わせて自分の行動を変えさせられていないか見極めること","古い機種を使い続けないこと","長時間の使用で視力を落とさないこと","高額な料金プランを避けること"],a:0,e:"「道具を身体化するのか、道具に飼いならされるのか。その境目を見極める目」。"},
{t:"読解・中文",p:30,q:"女将の言う「おもてなし」とはどのようなものか。",c:["客に言われる前に、相手の状態を読んで動くこと","客の注文にすばやく応えること","高価な料理や設備を提供すること","客と親しく会話をすること"],a:0,e:"「言われてからやるのはサービス、言われる前にやるのがおもてなし」。"},
{t:"読解・中文",p:30,q:"先回りの接客の危うさとして述べられているものはどれか。",c:["読みが外れると、客への押し付けになってしまうこと","従業員の負担が大きくなりすぎること","客がサービスに慣れて感謝しなくなること","コストがかかりすぎること"],a:0,e:"「読みが外れれば、押し付けになる」。静かにしたい客に話しかける例。"},
{t:"読解・中文",p:30,q:"筆者の考えに合うものはどれか。",c:["相手の望みを想像しつつ、その想像を過信しない均衡が大切だ","相手に確認してから動くのが最善だ","接客の技術は人間関係には応用できない","自分が良いと思うことは必ず相手にも良い"],a:0,e:"「想像し、しかも想像を過信しない。この繊細な均衡は〜人間関係の要諦」。選項4＝「良かれ」を疑え、の逆。"},
{t:"読解・中文",p:31,q:"俳句が豊かな世界を描ける秘密は何か。",c:["説明を省略し、読み手の想像に委ねること","難しい言葉を多く使うこと","感情を直接的な言葉で表すこと","音の数が多いこと"],a:0,e:"「秘密は『省略』にある。俳句は説明をしない」。感情語なしで静けさが伝わる。"},
{t:"読解・中文",p:31,q:"下線部「共同作業」とはどういうことか。",c:["作者が半分を作り、読み手が残り半分を自分の経験で完成させること","複数の俳人が一句を合作すること","師匠が弟子の句を添削すること","読者同士が感想を語り合うこと"],a:0,e:"「語られない部分は、読み手が自分の経験で埋める」＝読み手も創作に参加。"},
{t:"読解・中文",p:31,q:"「言い尽くさない」ことについて、筆者はどう考えているか。",c:["受け手の想像力への信頼の表明である","作品が未完成である証拠だ","作者の技術不足の表れだ","現代では通用しない古い美学だ"],a:0,e:"「未完成ではなく、相手への信頼の表明」。日本画の余白、能の舞台と同じ構造。"},
{t:"読解・中文",p:32,q:"現金を使うときの「痛み」は、どのような働きをしていたか。",c:["無駄遣いを抑える天然のブレーキ","貯金を増やす動機","買い物の楽しみを高める刺激","金銭感覚を狂わせる原因"],a:0,e:"「この痛みが、無駄遣いへの天然のブレーキだった」。"},
{t:"読解・中文",p:32,q:"キャッシュレス決済の問題点として筆者が挙げているものは何か。",c:["お金を使った実感が薄れ、支出に歯止めがかかりにくくなること","会計に時間がかかること","記録が残らないこと","停電のとき使えないこと"],a:0,e:"「ブレーキのない自転車のように滑らかに、そして止まりにくい」。速い・記録が残るのは利点。"},
{t:"読解・中文",p:32,q:"筆者が提案していることは何か。",c:["通知の確認や上限の可視化など、仕組みで「痛み」を補うこと","現金払いに戻すこと","キャッシュレス決済を規制すること","子どもにカードを持たせないこと"],a:0,e:"「時計の針は戻らない」→「道具が奪った感覚は、仕組みで取り戻すしかない」。"},
{t:"読解・中文",p:33,q:"実際の子ども食堂の様子はどのようなものか。",c:["経済状況を問わず、多世代が同じ食卓を囲んでいる","貧困家庭の子どもだけが利用している","高齢者は利用できない","有料の高級な食事を提供している"],a:0,e:"「経済状況を問わず誰でも歓迎」＋子ども・親・高齢者が同じ食卓。"},
{t:"読解・中文",p:33,q:"対象を貧困家庭に限定しない理由は何か。",c:["通うこと自体が貧困の証明になり、本当に困っている子が来られなくなるから","運営資金が足りないから","貧困家庭の数が把握できないから","法律で限定が禁止されているから"],a:0,e:"「看板を掲げれば〜貧困の証明になり、最も来てほしい子が来られなくなる」。"},
{t:"読解・中文",p:33,q:"「支援と気づかれない形で届ける」ことの例として合っているものはどれか。",c:["誰でも来られる場にして、困っている子も自然に混じって来られるようにする","支援金を匿名で銀行に振り込む","夜中にこっそり食料を届ける","支援の対象者を公表しない"],a:0,e:"「誰でも来られる場所だからこそ、本当に困っている子も紛れて来られる」＝この知恵の結晶。"},
{t:"読解・中文",p:34,q:"レジ袋の有料化だけでは問題が解決しないのはなぜか。",c:["プラスチックごみの大半はレジ袋以外の容器や包装だから","レジ袋を買う人が減らないから","紙のストローも環境に悪いから","海外のごみが流れ着くから"],a:0,e:"「レジ袋の割合はごくわずかで、大半は容器や包装」。"},
{t:"読解・中文",p:34,q:"筆者によると、象徴的な取り組みの意味はどこにあるか。",c:["自己認識を変え、より大きな行動への入り口になること","レジ袋の削減量が大きいこと","企業のイメージが良くなること","ごみの分別が簡単になること"],a:0,e:"「袋は要りません」→自分を「環境に配慮する人間」と再定義→過剰包装回避などへの入り口。"},
{t:"読解・中文",p:34,q:"制度の設計者が本当に狙うべきものは何だと筆者は述べているか。",c:["小さな行動から大きな行動へつながる心理的な連鎖","レジ袋の完全な廃止","違反者への罰則の強化","環境教育の義務化"],a:0,e:"「狙うべきは〜この心理的な連鎖」。入り口の先に道がなければ「儀式は儀式で終わる」。"},
{t:"読解・中文",p:35,q:"空き家が放置される制度上の理由は何か。",c:["解体には費用がかかり、更地にすると税金が上がるから","持ち主が誰か分からないから","解体の技術者が不足しているから","法律で解体が禁止されているから"],a:0,e:"「壊すより放っておくほうが『合理的』になる制度のゆがみ」。持ち主は「分かっていながら」放置。"},
{t:"読解・中文",p:35,q:"放置された空き家が地域にもたらす影響として述べられているものはどれか。",c:["危険と資産価値の低下が広がり、人離れが加速する","観光客が増えて騒がしくなる","地価が上がって若者が住めなくなる","税収が増えて財政が潤う"],a:0,e:"倒壊・放火の危険＋隣家の資産価値低下→人離れ加速。「個人の選択の集積が、地域全体の損失になる」。"},
{t:"読解・中文",p:35,q:"筆者の考えに合うものはどれか。",c:["制度の設計しだいで、空き家は地域の資源にもなり得る","空き家はすべて取り壊すべきだ","人口減少が原因なので対策のしようがない","空き家問題は個人の責任である"],a:0,e:"「負の遺産にも地域の資源にもなり得る。分かれ目は制度の設計にある」＝第三の道「生かす」。"},
{t:"読解・中文",p:36,q:"研究で確認されている笑いの効果はどれか。",c:["免疫の働きを高め、痛みやストレスを和らげる","視力を回復させる","記憶力を倍増させる","睡眠時間を減らしても平気にする"],a:0,e:"「免疫の働きを高め、痛みを和らげ、ストレスホルモンを減らす」。"},
{t:"読解・中文",p:36,q:"下線部「感情と表情の道は、双方向に通じている」とはどういうことか。",c:["楽しいから笑うだけでなく、笑うことで楽しくもなるということ","顔を見れば相手の感情が分かるということ","笑顔は世界共通だということ","感情は表情に出さないほうがいいということ"],a:0,e:"感情→表情だけでなく表情→感情の逆方向も通じる。作り笑いにも効果がある根拠。"},
{t:"読解・中文",p:36,q:"本文の内容と合っているものはどれか。",c:["作り笑いにも一定の効果が確認されている","笑いはあらゆる病気を治す万能薬である","笑いの処方には重い副作用がある","深刻に悩むことにも医学的な効能がある"],a:0,e:"「作り笑いでも一定の効果」。万能薬ではない（選項2）；副作用はなく（選項3）；深刻な顔に効能なし（選項4）。"},
{t:"読解・中文",p:37,q:"ラジオが「ながら」に強いのはなぜか。",c:["画面を見る必要がなく、耳だけで付き合えるから","放送時間が短いから","音質が他の媒体より良いから","無料で聴けるから"],a:0,e:"「画面を見る必要がないから、家事や運転〜をしながら」。目を奪い合う競争から降りている。"},
{t:"読解・中文",p:37,q:"ラジオの「距離感」の特徴として述べられているものはどれか。",c:["一対一の会話のような親密さで語りかけてくること","有名人と直接電話で話せること","全国どこでも同じ番組が聴けること","聴取者同士が交流できること"],a:0,e:"「『皆さん』ではなく『あなた』に語りかける」「一対一の会話に近い」。"},
{t:"読解・中文",p:37,q:"筆者はラジオの復権をどのようにとらえているか。",c:["人々が「聴くこと」の親密さを求めている表れ","一時的な懐古趣味にすぎない","テレビ業界の衰退の結果","技術の進歩がもたらした偶然"],a:0,e:"「『見ること』に疲れ、『聴くこと』の親密さを恋しがっている証拠」。古い媒体＝新しい媒体が失ったものを照らす鏡。"},
