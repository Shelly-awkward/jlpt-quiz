<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N2 考前猜題 500</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP","Microsoft JhengHei",sans-serif;background:#f4f1ea;color:#2b2b2b}
#app{max-width:720px;margin:0 auto;padding:16px 16px 48px}
h1{font-size:1.5rem;margin:16px 0 4px}
.sub{color:#8a8378;font-size:.95rem;margin-bottom:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:1.1rem;padding:14px 18px;width:100%;text-align:left;margin:6px 0;background:#fff;border:2px solid #e3ddd2;color:#2b2b2b;line-height:1.5}
button:active{transform:scale(.99)}
.primary{background:#2d6a4f;color:#fff;border-color:#2d6a4f;text-align:center;font-weight:700}
.secondary{background:#fff;text-align:center}
.warn{background:#b5502a;color:#fff;border-color:#b5502a;text-align:center;font-weight:700}
.opt.correct{background:#d8f0e0;border-color:#2d6a4f;font-weight:700}
.opt.wrong{background:#fbe0d8;border-color:#b5502a}
.opt:disabled{cursor:default;opacity:1;color:#2b2b2b}
.opt.dim:disabled{opacity:.55}
.tag{display:inline-block;background:#e9e2d4;color:#6b6353;border-radius:999px;padding:3px 12px;font-size:.85rem;margin-bottom:10px}
.q{font-size:1.3rem;line-height:1.9;margin:6px 0 16px}
.q u{text-decoration:none;border-bottom:3px solid #b5502a;font-weight:700}
.exp{background:#fdf6e3;border-left:4px solid #c9a227;border-radius:8px;padding:12px 14px;font-size:1rem;line-height:1.7;margin-top:12px}
.bar{height:8px;background:#e3ddd2;border-radius:4px;overflow:hidden;margin:8px 0 16px}
.bar>div{height:100%;background:#2d6a4f;transition:width .3s}
.top{display:flex;justify-content:space-between;align-items:center;font-size:.95rem;color:#6b6353}
.big{font-size:2.6rem;font-weight:800;text-align:center;margin:10px 0}
.stat{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #eee7da;font-size:1rem}
.mini{background:none;border:none;color:#8a8378;font-size:.9rem;width:auto;padding:6px 10px;text-decoration:underline}
.row{display:flex;gap:8px}
.chip{flex:1;text-align:center;font-size:1rem;padding:10px;background:#f4f1ea}
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q=[
// ================= 漢字読み =================
{t:"漢字読み",q:"彼の提案は会議でようやく<u>承認</u>された。",c:["しょうにん","じょうにん","しょうじん","そうにん"],a:0,e:"承認（しょうにん）＝核准、同意。"},
{t:"漢字読み",q:"最近、この地域では地震が<u>頻繁</u>に起きている。",c:["ひんぱん","びんはん","ひんはん","びんぱん"],a:0,e:"頻繁（ひんぱん）＝頻繁、屢次。注意是半濁音ぱん。"},
{t:"漢字読み",q:"彼は会社の要求を<u>拒否</u>した。",c:["きょひ","きょうひ","こひ","きょび"],a:0,e:"拒否（きょひ）＝拒絕。「拒」讀短音きょ。"},
{t:"漢字読み",q:"雨の日は<u>慎重</u>に運転してください。",c:["しんちょう","しんじゅう","じんちょう","しんちょ"],a:0,e:"慎重（しんちょう）＝謹慎。「重」在此讀ちょう。"},
{t:"漢字読み",q:"工事の騒音が睡眠を<u>妨げる</u>。",c:["さまたげる","さかたげる","ぼうげる","ふせげる"],a:0,e:"妨げる（さまたげる）＝妨礙。名詞形：妨害（ぼうがい）。"},
{t:"漢字読み",q:"政府は消費を<u>促す</u>政策を発表した。",c:["うながす","そくす","もよおす","ほどこす"],a:0,e:"促す（うながす）＝促使、催促。催す（もよおす）＝舉辦；施す（ほどこす）＝施行。"},
{t:"漢字読み",q:"昨夜の雨で地面がまだ<u>湿って</u>いる。",c:["しめって","じめって","しつって","ひたって"],a:0,e:"湿る（しめる）＝潮濕。名詞：湿気（しっけ）。"},
{t:"漢字読み",q:"あの子は年のわりにとても<u>賢い</u>。",c:["かしこい","けわしい","くやしい","かゆい"],a:0,e:"賢い（かしこい）＝聰明。険しい（けわしい）陡峭；悔しい（くやしい）不甘心。"},
{t:"漢字読み",q:"<u>惜しい</u>ところで試合に負けてしまった。",c:["おしい","くやしい","まぶしい","あやしい"],a:0,e:"惜しい（おしい）＝可惜。差一點就贏了的惋惜感。"},
{t:"漢字読み",q:"足りない分はアルバイトで<u>補って</u>いる。",c:["おぎなって","やしなって","ともなって","うかがって"],a:0,e:"補う（おぎなう）＝補足。養う（やしなう）扶養；伴う（ともなう）伴隨。"},
{t:"漢字読み",q:"子どものころから都会の生活に<u>憧れて</u>いた。",c:["あこがれて","おそれて","あきれて","うぬぼれて"],a:0,e:"憧れる（あこがれる）＝憧憬、嚮往。"},
{t:"漢字読み",q:"物価は今後も上昇する<u>傾向</u>にある。",c:["けいこう","けいこ","けんこう","きょうこう"],a:0,e:"傾向（けいこう）＝趨勢。健康（けんこう）是不同字。"},
{t:"漢字読み",q:"彼の説明は前と後で<u>矛盾</u>している。",c:["むじゅん","ぼうじゅん","むどん","もじゅん"],a:0,e:"矛盾（むじゅん）＝矛盾。矛（ほこ）與盾（たて）的典故。"},
{t:"漢字読み",q:"彼の返事は<u>曖昧</u>で、よく分からなかった。",c:["あいまい","あいみ","まいまい","あんまい"],a:0,e:"曖昧（あいまい）＝含糊不清。"},
{t:"漢字読み",q:"この料金にはサービス料が<u>含まれて</u>いる。",c:["ふくまれて","つつまれて","こくまれて","かこまれて"],a:0,e:"含む（ふくむ）＝包含。包む（つつむ）包裹；囲む（かこむ）圍繞。"},
{t:"漢字読み",q:"祝日を<u>除いて</u>、毎日営業しています。",c:["のぞいて","はぶいて","ぬいて","どけて"],a:0,e:"除く（のぞく）＝除去、除外。省く（はぶく）＝省略。"},
{t:"漢字読み",q:"兄は貿易会社に<u>就職</u>した。",c:["しゅうしょく","しゅしょく","じゅうしょく","しゅうしょう"],a:0,e:"就職（しゅうしょく）＝就業。注意長音位置。"},
{t:"漢字読み",q:"あの店はアルバイトを<u>募集</u>している。",c:["ぼしゅう","ぼうしゅう","もしゅう","ぼしゅ"],a:0,e:"募集（ぼしゅう）＝招募。「募」讀短音ぼ。"},
{t:"漢字読み",q:"不要なデータを<u>削除</u>してください。",c:["さくじょ","しょうきょ","さくじょう","けずじょ"],a:0,e:"削除（さくじょ）＝刪除。消去（しょうきょ）是另一個詞。"},
{t:"漢字読み",q:"部屋中におもちゃが<u>散らかって</u>いる。",c:["ちらかって","さらかって","ばらかって","ちりかって"],a:0,e:"散らかる（ちらかる）＝散亂一地。"},
{t:"漢字読み",q:"ご<u>迷惑</u>をおかけして申し訳ありません。",c:["めいわく","まいわく","めわく","みわく"],a:0,e:"迷惑（めいわく）＝麻煩、困擾。"},
{t:"漢字読み",q:"ガラスの<u>破片</u>でけがをしないように。",c:["はへん","はぺん","ひへん","はかけ"],a:0,e:"破片（はへん）＝碎片。"},
{t:"漢字読み",q:"彼は本当の気持ちを<u>隠して</u>いる。",c:["かくして","けして","のこして","おかして"],a:0,e:"隠す（かくす）＝隱藏。消す（けす）；残す（のこす）。"},
{t:"漢字読み",q:"庭に穴を<u>掘って</u>木を植えた。",c:["ほって","くって","さぐって","うめって"],a:0,e:"掘る（ほる）＝挖。探る（さぐる）探査；埋める（うめる）填埋。"},
{t:"漢字読み",q:"会社は赤字のため事業を<u>縮小</u>した。",c:["しゅくしょう","ちぢしょう","しゅくしょ","しゅうしゅく"],a:0,e:"縮小（しゅくしょう）＝縮小。動詞：縮む（ちぢむ）。"},
{t:"漢字読み",q:"<u>姿勢</u>を正しくして座りなさい。",c:["しせい","しぜい","すせい","しせつ"],a:0,e:"姿勢（しせい）＝姿勢。施設（しせつ）是設施。"},
{t:"漢字読み",q:"彼は<u>貧しい</u>家庭に生まれたが、努力して成功した。",c:["まずしい","とぼしい","けわしい","くるしい"],a:0,e:"貧しい（まずしい）＝貧窮。乏しい（とぼしい）＝缺乏（不同字）。"},
{t:"漢字読み",q:"親に<u>逆らって</u>、彼は留学を決めた。",c:["さからって","ぎゃくらって","さかのぼって","あらそって"],a:0,e:"逆らう（さからう）＝違抗。遡る（さかのぼる）追溯；争う（あらそう）爭執。"},
{t:"漢字読み",q:"輸入品が市場の大半を<u>占めて</u>いる。",c:["しめて","うらなって","せめて","つとめて"],a:0,e:"占める（しめる）＝佔據。占う（うらなう）＝占卜，同字不同讀音要小心。"},
{t:"漢字読み",q:"春には多くの観光客がこの町を<u>訪れる</u>。",c:["おとずれる","たずれる","ほうれる","おとなれる"],a:0,e:"訪れる（おとずれる）＝造訪。訪ねる（たずねる）也是拜訪，注意送假名不同。"},
{t:"漢字読み",q:"高原の<u>快い</u>風が吹いていた。",c:["こころよい","かいよい","すばやい","いさぎよい"],a:0,e:"快い（こころよい）＝舒暢、愉快。"},
{t:"漢字読み",q:"<u>険しい</u>山道を3時間も歩いた。",c:["けわしい","きびしい","あやしい","くわしい"],a:0,e:"険しい（けわしい）＝陡峭險峻。厳しい（きびしい）嚴格。"},
{t:"漢字読み",q:"彼女は日本の歴史に<u>詳しい</u>。",c:["くわしい","しょうしい","つましい","まぶしい"],a:0,e:"詳しい（くわしい）＝熟悉、詳細。名詞：詳細（しょうさい）。"},
{t:"漢字読み",q:"寒さで手の感覚が<u>鈍く</u>なった。",c:["にぶく","のろく","どんく","ゆるく"],a:0,e:"鈍い（にぶい）＝遲鈍。鈍る（にぶる）變鈍。"},
{t:"漢字読み",q:"運転免許証を<u>更新</u>する。",c:["こうしん","こうせい","きょうしん","さらしん"],a:0,e:"更新（こうしん）＝更新換發。更に（さらに）是訓讀。"},
// ================= 表記 =================
{t:"表記",q:"荷物を駅のロッカーに<u>あずける</u>。",c:["預ける","貯ける","領ける","存ける"],a:0,e:"預ける（あずける）＝寄放。預金（よきん）同字。"},
{t:"表記",q:"<u>こまかい</u>説明は後でします。",c:["細かい","組かい","詳かい","温かい"],a:0,e:"細かい（こまかい）＝細微、詳細。"},
{t:"表記",q:"店では新しいスタッフを<u>やとう</u>ことにした。",c:["雇う","庸う","傭う","属う"],a:0,e:"雇う（やとう）＝雇用。雇用（こよう）。"},
{t:"表記",q:"川に<u>そって</u>桜並木が続いている。",c:["沿って","添って","治って","浴って"],a:0,e:"沿う（そう）＝沿著（路線、河川）。添う（そう）＝陪伴、依偎。"},
{t:"表記",q:"エアコンで部屋を<u>あたためる</u>。",c:["暖める","温める","熱める","暑める"],a:0,e:"空間、氣溫用「暖」；食物、液體用「温」（スープを温める）。"},
{t:"表記",q:"このボタンを<u>おして</u>店員を呼んでください。",c:["押して","推して","圧して","抑して"],a:0,e:"押す（おす）＝按、推。推す（おす）＝推薦、推舉。"},
{t:"表記",q:"彼女はだれにでも<u>やさしい</u>。",c:["優しい","易しい","甘しい","柔しい"],a:0,e:"個性溫柔＝優しい；問題簡單＝易しい。"},
{t:"表記",q:"公園のごみを<u>ひろって</u>集めた。",c:["拾って","捨って","抬って","掃って"],a:0,e:"拾う（ひろう）＝撿。反義：捨てる（すてる）。"},
{t:"表記",q:"飛行機は定刻に<u>とうちゃく</u>した。",c:["到着","倒着","至着","致着"],a:0,e:"到着（とうちゃく）＝抵達。"},
{t:"表記",q:"<u>きゅうけい</u>時間は30分です。",c:["休憩","休慶","休契","休恵"],a:0,e:"休憩（きゅうけい）＝休息。"},
{t:"表記",q:"重い荷物を二階まで<u>はこぶ</u>。",c:["運ぶ","般ぶ","搬ぶ","輸ぶ"],a:0,e:"運ぶ（はこぶ）＝搬運。"},
{t:"表記",q:"招待状の<u>へんじ</u>を早めに出した。",c:["返事","変事","反事","帰事"],a:0,e:"返事（へんじ）＝回覆。"},
{t:"表記",q:"この仕事には<u>せんもん</u>の知識が必要だ。",c:["専門","専問","選門","全門"],a:0,e:"専門（せんもん）——「門」不是「問」，經典易錯字。"},
{t:"表記",q:"<u>かんきょう</u>問題に関心を持っている。",c:["環境","環況","還境","感境"],a:0,e:"環境（かんきょう）。"},
{t:"表記",q:"二人の意見は大きく<u>ことなって</u>いる。",c:["異なって","違なって","別なって","差なって"],a:0,e:"異なる（ことなる）＝不同。違う（ちがう）送假名不同。"},
{t:"表記",q:"書類は明日<u>ゆうそう</u>します。",c:["郵送","輸送","郵走","遊送"],a:0,e:"郵送（ゆうそう）＝郵寄。輸送（ゆそう）＝運輸，讀音不同。"},
{t:"表記",q:"危険を<u>さける</u>ため、夜の外出をやめた。",c:["避ける","裂ける","割ける","逃ける"],a:0,e:"避ける（さける）＝避開。裂ける（さける）＝裂開，同音不同字。"},
{t:"表記",q:"<u>あつい</u>辞書を毎日持ち歩いている。",c:["厚い","暑い","熱い","圧い"],a:0,e:"書本厚度＝厚い；天氣熱＝暑い；物體燙＝熱い。"},
{t:"表記",q:"長年の<u>しゅうかん</u>を変えるのは難しい。",c:["習慣","週間","習間","週慣"],a:0,e:"習慣（しゅうかん）＝習慣。週間（しゅうかん）＝一週期間，同音陷阱。"},
{t:"表記",q:"電気を<u>せつやく</u>するように心がけている。",c:["節約","切約","接約","説約"],a:0,e:"節約（せつやく）＝節省。"},
// ================= 語形成 =================
{t:"語形成",q:"来月、契約の内容を（　）検討することになった。",c:["再","更","復","両"],a:0,e:"再検討（さいけんとう）＝重新研議。接頭語「再〜」＝再次。"},
{t:"語形成",q:"この事件は（　）解決のままだ。",c:["未","不","無","非"],a:0,e:"未解決（みかいけつ）＝尚未解決。「未〜」＝還沒。"},
{t:"語形成",q:"今年の出生（　）は過去最低となった。",c:["率","量","割","度"],a:0,e:"出生率（しゅっしょうりつ）。接尾語「〜率」＝比率。"},
{t:"語形成",q:"その計画に実現（　）はあるのだろうか。",c:["性","力","式","風"],a:0,e:"実現性（じつげんせい）＝可行性。「〜性」＝性質。"},
{t:"語形成",q:"問題点を具体（　）に説明してください。",c:["的","式","状","風"],a:0,e:"具体的（ぐたいてき）。「〜的」構成な形容詞。"},
{t:"語形成",q:"行政手続きのオンライン（　）が進んでいる。",c:["化","変","移","転"],a:0,e:"オンライン化。「〜化」＝變成～的過程。"},
{t:"語形成",q:"彼女は忘れ（　）ので、何でもメモしている。",c:["っぽい","がち","ぎみ","むけ"],a:0,e:"忘れっぽい＝健忘。「〜っぽい」接動詞ます形＝容易～的性質。"},
{t:"語形成",q:"（　）カロリーの食品がよく売れている。",c:["低","小","短","軽"],a:0,e:"低カロリー（ていカロリー）。反義：高カロリー。"},
{t:"語形成",q:"会議には（　）外国の代表が出席した。",c:["諸","複","衆","多"],a:0,e:"諸外国（しょがいこく）＝各國。「諸〜」＝許多的。"},
{t:"語形成",q:"田中氏は当社の（　）社長を務めている。",c:["副","準","助","次"],a:0,e:"副社長（ふくしゃちょう）。「副〜」＝副的。"},
// ================= 文脈規定 =================
{t:"文脈規定",q:"約束の時間に（　）間に合った。",c:["ぎりぎり","だぶだぶ","のろのろ","ぶつぶつ"],a:0,e:"ぎりぎり＝勉強趕上、極限邊緣。だぶだぶ＝（衣服）寬鬆。"},
{t:"文脈規定",q:"（　）傘を電車の中に忘れてしまった。",c:["うっかり","がっかり","すっきり","ばったり"],a:0,e:"うっかり＝一不小心。がっかり＝失望；すっきり＝暢快。"},
{t:"文脈規定",q:"駅前で高校時代の友人に（　）会った。",c:["ばったり","ぐっすり","こっそり","はっきり"],a:0,e:"ばったり＝偶然撞見。こっそり＝偷偷地。"},
{t:"文脈規定",q:"昨日は疲れていたので、（　）眠れた。",c:["ぐっすり","じっと","そっと","ふらふら"],a:0,e:"ぐっすり眠る＝熟睡。固定搭配。"},
{t:"文脈規定",q:"（　）明日は試験の結果が発表される日だ。",c:["いよいよ","わざわざ","つくづく","うろうろ"],a:0,e:"いよいよ＝終於、即將到來。わざわざ＝特意。"},
{t:"文脈規定",q:"忙しいのは分かるが、（　）電話ぐらいはしてほしい。",c:["せめて","たとえ","まさか","いまさら"],a:0,e:"せめて＝至少（最低限度的期望）。"},
{t:"文脈規定",q:"（　）あの真面目な彼がうそをつくとは思わなかった。",c:["まさか","もしも","たしか","いずれ"],a:0,e:"まさか～とは思わなかった＝萬萬沒想到。固定呼應。"},
{t:"文脈規定",q:"久しぶりに会ったが、彼は（　）元気だった。",c:["相変わらず","次第に","いきなり","絶えず"],a:0,e:"相変わらず（あいかわらず）＝一如往常。"},
{t:"文脈規定",q:"（　）近くまで来たので、寄ってみました。",c:["たまたま","いちいち","そろそろ","のびのび"],a:0,e:"たまたま＝碰巧、剛好。"},
{t:"文脈規定",q:"彼に本を借りたことを（　）忘れていた。",c:["すっかり","ぴったり","めっきり","ゆっくり"],a:0,e:"すっかり忘れる＝忘得一乾二淨。"},
{t:"文脈規定",q:"シャワーを浴びたら気分が（　）した。",c:["さっぱり","ぼんやり","がっくり","うんざり"],a:0,e:"さっぱりする＝清爽舒暢。うんざり＝厭煩。"},
{t:"文脈規定",q:"今週は予定が（　）詰まっていて、休む暇もない。",c:["ぎっしり","ぐったり","こっそり","たっぷり"],a:0,e:"ぎっしり＝滿滿地（塞滿）。たっぷり＝充足（量多）。"},
{t:"文脈規定",q:"一日中歩き回って、（　）疲れてしまった。",c:["ぐったり","うっとり","きっぱり","ちゃっかり"],a:0,e:"ぐったり＝精疲力盡、癱軟。"},
{t:"文脈規定",q:"新しい制度を来年度から（　）することが決まった。",c:["導入","輸入","進入","介入"],a:0,e:"制度を導入（どうにゅう）する＝引進制度。輸入＝進口商品。"},
{t:"文脈規定",q:"会社は経費を（　）する方針を打ち出した。",c:["削減","削除","消去","縮小"],a:0,e:"経費を削減（さくげん）＝削減經費。削除＝刪除（資料、文字）。"},
{t:"文脈規定",q:"健康を（　）するために、毎朝走っている。",c:["維持","保存","持参","支持"],a:0,e:"健康を維持（いじ）する。保存＝保存（物品、檔案）。"},
{t:"文脈規定",q:"その案については、現在（　）中です。",c:["検討","見学","観察","診察"],a:0,e:"検討（けんとう）中＝研議中。商務必備字。"},
{t:"文脈規定",q:"台風のため、大会の開催が一週間（　）された。",c:["延期","延長","遅刻","停止"],a:0,e:"延期（えんき）＝延期舉行。延長＝時間拉長（不改期）。"},
{t:"文脈規定",q:"雨で運動会は（　）になった。",c:["中止","中断","停車","休止"],a:0,e:"中止（ちゅうし）＝取消不辦。中断＝中途暫停。"},
{t:"文脈規定",q:"この地方は水資源が（　）だ。",c:["豊富","豊作","富裕","満杯"],a:0,e:"資源が豊富（ほうふ）＝豐富。豊作＝（農作物）豐收。"},
{t:"文脈規定",q:"環境問題はますます（　）になっている。",c:["深刻","真剣","重大","濃厚"],a:0,e:"深刻（しんこく）＝（問題）嚴重。真剣＝認真的態度。"},
{t:"文脈規定",q:"工事は予定どおり（　）に進んでいる。",c:["順調","好調","快調","調子"],a:0,e:"順調（じゅんちょう）に進む＝順利進行。"},
{t:"文脈規定",q:"洗濯したら、セーターが（　）しまった。",c:["縮んで","畳んで","潰れて","薄れて"],a:0,e:"縮む（ちぢむ）＝縮水。"},
{t:"文脈規定",q:"かばんの底が（　）、中の物が落ちてしまった。",c:["破れて","壊れて","割れて","折れて"],a:0,e:"布、紙→破れる；機器→壊れる；玻璃→割れる；棒狀→折れる。"},
{t:"文脈規定",q:"シャツのボタンが（　）そうですよ。",c:["外れ","抜け","離れ","逃げ"],a:0,e:"ボタンが外れる（はずれる）＝鈕扣脫落。"},
{t:"文脈規定",q:"排水管が（　）、水が流れなくなった。",c:["詰まって","埋まって","混んで","塞いで"],a:0,e:"詰まる（つまる）＝堵塞。"},
{t:"文脈規定",q:"この薬は頭痛によく（　）。",c:["効く","治る","直す","働く"],a:0,e:"薬が効く（きく）＝藥有效。固定搭配。"},
{t:"文脈規定",q:"彼には冗談が（　）ので、話しにくい。",c:["通じない","伝わらず","届かない","通らない"],a:0,e:"冗談が通じる（つうじる）＝聽得懂玩笑。"},
{t:"文脈規定",q:"このホテルの部屋は海に（　）いて、眺めがいい。",c:["面して","向いて","対して","沿って"],a:0,e:"〜に面する（めんする）＝面向、臨。"},
{t:"文脈規定",q:"締め切りに間に合うかどうか、（　）なところだ。",c:["微妙","敏感","繊細","柔軟"],a:0,e:"微妙（びみょう）＝很難說、不好判斷。"},
// ================= 言い換え類義 =================
{t:"言い換え類義",q:"新商品は<u>たちまち</u>売り切れた。",c:["すぐに","だんだん","ようやく","たまに"],a:0,e:"たちまち＝立刻、轉眼間。"},
{t:"言い換え類義",q:"<u>とりあえず</u>、電話で報告しておきます。",c:["まず","必ず","改めて","詳しく"],a:0,e:"とりあえず＝姑且、先（做再說）。"},
{t:"言い換え類義",q:"<u>あらゆる</u>手段を試してみた。",c:["すべての","新しい","特別な","可能な"],a:0,e:"あらゆる＝所有的、一切的。"},
{t:"言い換え類義",q:"事故の原因は<u>依然として</u>不明だ。",c:["今もまだ","おそらく","実は","ほとんど"],a:0,e:"依然として（いぜんとして）＝依然、仍舊。"},
{t:"言い換え類義",q:"<u>やむを得ず</u>、旅行を中止した。",c:["しかたなく","思い切って","念のため","うっかり"],a:0,e:"やむを得ず＝不得已。＝仕方なく。"},
{t:"言い換え類義",q:"<u>案の定</u>、彼は遅刻してきた。",c:["思ったとおり","意外にも","偶然","残念ながら"],a:0,e:"案の定（あんのじょう）＝果不其然。"},
{t:"言い換え類義",q:"彼は<u>しょっちゅう</u>忘れ物をする。",c:["ひんぱんに","ときどき","めったに","たまに"],a:0,e:"しょっちゅう＝經常、老是。＝頻繁に。"},
{t:"言い換え類義",q:"それは非常に<u>まれな</u>ケースだ。",c:["ほとんどない","よくある","深刻な","単純な"],a:0,e:"まれ（稀）＝罕見。"},
{t:"言い換え類義",q:"<u>おおよそ</u>の費用を教えてください。",c:["だいたい","正確","最低限","合計"],a:0,e:"おおよそ＝大約。＝だいたい、約。"},
{t:"言い換え類義",q:"問題が見つかり次第、<u>直ちに</u>対応します。",c:["すぐに","慎重に","順番に","念入りに"],a:0,e:"直ちに（ただちに）＝立即。"},
{t:"言い換え類義",q:"夜道では<u>用心した</u>ほうがいい。",c:["気をつけた","急いだ","静かにした","近道した"],a:0,e:"用心する（ようじんする）＝小心、警惕。"},
{t:"言い換え類義",q:"一日中働いて、すっかり<u>くたびれた</u>。",c:["疲れた","慣れた","飽きた","太った"],a:0,e:"くたびれる＝疲憊。"},
{t:"言い換え類義",q:"彼は私の一言に<u>腹を立てた</u>ようだ。",c:["怒った","驚いた","笑った","悩んだ"],a:0,e:"腹を立てる＝生氣。慣用語。"},
{t:"言い換え類義",q:"<u>あいにく</u>その日は都合が悪いんです。",c:["残念ながら","幸いに","当然","偶然"],a:0,e:"あいにく＝不湊巧。"},
{t:"言い換え類義",q:"両者の実力には<u>わずかな</u>差しかない。",c:["少しの","大きな","明らかな","意外な"],a:0,e:"わずか＝僅僅、一點點。"},
{t:"言い換え類義",q:"それは<u>妥当な</u>判断だと思う。",c:["適切な","大胆な","慎重な","厳しい"],a:0,e:"妥当（だとう）＝妥當、恰當。"},
{t:"言い換え類義",q:"彼は何でも<u>誇張して</u>話す傾向がある。",c:["大げさに","早口で","詳しく","冷静に"],a:0,e:"誇張する（こちょうする）＝誇大。＝大げさに言う。"},
{t:"言い換え類義",q:"試験に落ちて、彼はひどく<u>落胆した</u>。",c:["がっかりした","びっくりした","ほっとした","いらいらした"],a:0,e:"落胆する（らくたんする）＝沮喪失望。"},
{t:"言い換え類義",q:"彼女は<u>常に</u>笑顔を忘れない。",c:["いつも","ときには","なるべく","最近"],a:0,e:"常に（つねに）＝總是。"},
{t:"言い換え類義",q:"祖母は<u>たびたび</u>うちに遊びに来る。",c:["何度も","ひとりで","久しぶりに","突然"],a:0,e:"たびたび＝屢次、常常。"},
// ================= 用法 =================
{t:"用法",q:"「<u>満員</u>」の使い方として最もよいものは？",c:["朝の電車は満員で、乗れないこともある。","ケーキを食べすぎて、お腹が満員だ。","今週は仕事の予定が満員だ。","コップに水が満員に入っている。"],a:0,e:"満員（まんいん）只用於「人擠滿場所、車輛」。肚子飽＝満腹；裝滿水＝いっぱい。"},
{t:"用法",q:"「<u>徹夜</u>」の使い方として最もよいものは？",c:["レポートの締め切りに間に合うように、徹夜で書き上げた。","毎晩、徹夜の11時に寝ることにしている。","日曜日は徹夜までゆっくり寝ていた。","徹夜の空には星がきれいに見える。"],a:0,e:"徹夜（てつや）＝整晚不睡。不是「深夜」的意思。"},
{t:"用法",q:"「<u>募集</u>」の使い方として最もよいものは？",c:["あの店では、アルバイトを募集している。","欲しかった本をやっと募集した。","彼は有名大学に募集された。","切手を趣味でたくさん募集している。"],a:0,e:"募集（ぼしゅう）＝公開招募（人員、作品）。收集東西＝収集。"},
{t:"用法",q:"「<u>心強い</u>」の使い方として最もよいものは？",c:["経験豊富な先輩が一緒なので、心強い。","彼は失敗しても泣かない心強い子だ。","このかばんは心強くて、10年使える。","彼女は心強くて、誰にでも親切だ。"],a:0,e:"心強い（こころづよい）＝（有依靠而）安心、有底氣。堅強＝気が強い／強い。"},
{t:"用法",q:"「<u>そそっかしい</u>」の使い方として最もよいものは？",c:["彼はそそっかしくて、よく書類を忘れてくる。","このスープはそそっかしい味がする。","風がそそっかしく吹いている。","彼女はそそっかしく勉強して合格した。"],a:0,e:"そそっかしい＝冒失、粗心大意（形容人的性格）。"},
{t:"用法",q:"「<u>迫る</u>」の使い方として最もよいものは？",c:["締め切りが迫っているので、焦っている。","朝ごはんに卵を迫って食べた。","彼は毎日ジムで体を迫っている。","ドアを強く迫って閉めた。"],a:0,e:"迫る（せまる）＝逼近（期限、危險）。"},
{t:"用法",q:"「<u>省く</u>」の使い方として最もよいものは？",c:["時間がないので、詳しい説明は省きます。","古くなった服を省いて捨てた。","電気を省くためにエアコンを消した。","彼をメンバーから省いた。"],a:0,e:"省く（はぶく）＝省略（步驟、說明、麻煩）。省電＝節約する；除名＝外す。"},
{t:"用法",q:"「<u>物足りない</u>」の使い方として最もよいものは？",c:["この料理はおいしいが、量が少なくて物足りない。","財布を忘れて、お金が物足りない。","この部屋は家具が物足りないので買おう。","彼は経験が物足りないので不合格だ。"],a:0,e:"物足りない（ものたりない）＝總覺得不夠滿足、差了點什麼。單純數量不足用「足りない」。"},
{t:"用法",q:"「<u>頼もしい</u>」の使い方として最もよいものは？",c:["息子は困った人を助ける、頼もしい青年に育った。","この辞書は頼もしいので毎日使う。","彼に仕事を頼もしいした。","頼もしいですが、窓を開けてもらえますか。"],a:0,e:"頼もしい（たのもしい）＝可靠、有出息（形容人）。"},
{t:"用法",q:"「<u>差し支え</u>」の使い方として最もよいものは？",c:["差し支えなければ、ご連絡先を教えていただけますか。","駅までの道を差し支えてください。","彼の意見に差し支えを感じて反対した。","荷物を棚に差し支えておいた。"],a:0,e:"差し支え（さしつかえ）＝不便、妨礙。「差し支えなければ」＝方便的話（客氣句型）。"},
{t:"用法",q:"「<u>見直す</u>」の使い方として最もよいものは？",c:["計画に無理がないか、もう一度見直すことにした。","窓から富士山を見直すことができる。","彼と駅でばったり見直した。","テレビで昨日の試合を見直した。"],a:0,e:"見直す（みなおす）＝重新檢視、重新評價。單純再看一次＝もう一度見る。"},
{t:"用法",q:"「<u>打ち合わせ</u>」の使い方として最もよいものは？",c:["明日の会議の前に、30分ほど打ち合わせをしましょう。","友達と公園で打ち合わせて遊んだ。","車と自転車が交差点で打ち合わせした。","二人の意見がぴったり打ち合わせた。"],a:0,e:"打ち合わせ（うちあわせ）＝事前商討、對接會議。"},
{t:"用法",q:"「<u>盛ん</u>」の使い方として最もよいものは？",c:["この地方は昔から農業が盛んだ。","今日は気分が盛んなので出かけよう。","彼は盛んな服を着てパーティーに来た。","お湯が盛んになったらお茶を入れよう。"],a:0,e:"盛ん（さかん）＝興盛、盛行（產業、活動）。"},
{t:"用法",q:"「<u>詰める</u>」の使い方として最もよいものは？",c:["旅行の荷物をスーツケースに詰めた。","毎晩、日記を詰めることにしている。","寒いので窓をしっかり詰めた。","彼は約束の時間に詰めて来た。"],a:0,e:"詰める（つめる）＝塞入、裝滿；也有「縮短間隔」之意。關窗＝閉める。"},
{t:"用法",q:"「<u>行方</u>」の使い方として最もよいものは？",c:["犯人の行方はまだ分かっていない。","この電車の行方は東京駅です。","彼は行方の広い人で、友達が多い。","将来の行方を先生に相談した。"],a:0,e:"行方（ゆくえ）＝去向、下落（行方不明）。電車終點＝行き先；未來方向＝進路。"},
// ================= 文法形式 =================
{t:"文法",q:"上司に直接頼まれたのだから、引き受けない（　）。",c:["わけにはいかない","はずがない","ことはない","ものではない"],a:0,e:"〜ないわけにはいかない＝（基於情理）不能不做。"},
{t:"文法",q:"社長の命令なので、その仕事はやら（　）を得ない。",c:["ざる","ない","ず","ぬ"],a:0,e:"〜ざるを得ない＝不得不。接動詞ない形去ない（する→せざるを得ない）。"},
{t:"文法",q:"ご利用（　）、注意事項を必ずお読みください。",c:["に際して","において","にとって","によって"],a:0,e:"〜に際して＝在～之際（正式場面）。"},
{t:"文法",q:"留学（　）、日本の文化に深く興味を持つようになった。",c:["をきっかけに","をはじめ","を中心に","をこめて"],a:0,e:"〜をきっかけに＝以～為契機。"},
{t:"文法",q:"詳しい日程が決まり（　）、ご連絡いたします。",c:["次第","とたん","ながら","うちに"],a:0,e:"ます形＋次第（しだい）＝一～就馬上。とたん接た形。"},
{t:"文法",q:"彼の無責任な発言は、とても理解し（　）。",c:["がたい","かねない","っこない","ようがある"],a:0,e:"〜がたい＝難以～（理解しがたい、信じがたい）。"},
{t:"文法",q:"申し訳ございませんが、その質問にはお答えし（　）。",c:["かねます","かねません","えません","がたいます"],a:0,e:"〜かねる＝（委婉拒絕）礙難～。注意肯定形かねます表「不能」。"},
{t:"文法",q:"そんなスピードで運転したら、事故を起こし（　）よ。",c:["かねない","かねる","がたい","っこない"],a:0,e:"〜かねない＝很可能發生（壞事）。かねる＝難以；方向相反。"},
{t:"文法",q:"先生のご指導の（　）、無事に合格できました。",c:["おかげで","せいで","ためか","くせに"],a:0,e:"おかげで＝多虧（好結果）；せいで＝都怪（壞結果）。"},
{t:"文法",q:"寝坊した（　）、大事な会議に遅れてしまった。",c:["せいで","おかげで","ようで","ままで"],a:0,e:"〜せいで＝因為～（導致壞結果）。"},
{t:"文法",q:"悪天候（　）、マラソン大会は予定どおり行われた。",c:["にもかかわらず","にかかわらず","もかまわず","はともかく"],a:0,e:"〜にもかかわらず＝儘管～卻。にかかわらず＝不論～都（前接名詞對比）。"},
{t:"文法",q:"経験の有無（　）、どなたでも応募できます。",c:["を問わず","を込めて","に限って","をもとに"],a:0,e:"〜を問わず（とわず）＝不論、不分。常接「男女、年齢、有無」。"},
{t:"文法",q:"彼は英語（　）、中国語もフランス語も話せる。",c:["はもとより","をはじめて","に限らせ","どころではなく"],a:0,e:"〜はもとより＝～自不用說，連…也。"},
{t:"文法",q:"このレストランは週末（　）、平日もいつも満席だ。",c:["に限らず","によらず","にすぎず","にわたらず"],a:0,e:"〜に限らず（かぎらず）＝不僅限於。"},
{t:"文法",q:"若い（　）、無理をすると体を壊しますよ。",c:["からといって","からには","おかげで","というより"],a:0,e:"〜からといって＝雖說～（但也不能）。後接否定或忠告。"},
{t:"文法",q:"彼は感謝する（　）、文句ばかり言っている。",c:["どころか","ばかりか","のみならず","うえに"],a:0,e:"〜どころか＝別說～（實際完全相反）。ばかりか後接同方向追加。"},
{t:"文法",q:"何時間も悩んだ（　）、結局買うのをやめた。",c:["あげく","ところ","おかげで","うえは"],a:0,e:"〜たあげく＝～到最後（多為負面或徒勞的結果）。"},
{t:"文法",q:"半年にわたる交渉の（　）、ようやく契約が成立した。",c:["末に","上に","際に","うちに"],a:0,e:"〜の末に（すえに）＝經過～最終。強調過程漫長。"},

const LS='n2quiz_v1';
let S;
try{S=JSON.parse(localStorage.getItem(LS))||{}}catch(e){S={}}
S.wrong=S.wrong||[];S.srs=S.srs||{};S.star=S.star||[];S.stats=S.stats||{d:{},c:{}};
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return fmt(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return fmt(d)}
function dueList(){return S.wrong.filter(i=>!S.srs[i]||S.srs[i].due<=today())}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const app=document.getElementById('app');
const cats=[...new Set(Q.map(x=>x.t))];
if(window.speechSynthesis)speechSynthesis.getVoices();

function speakQ(qi){
  if(!window.speechSynthesis)return;
  const q=Q[qi];let t;
  const m=q.e.match(/完整句：([^（]+)/);
  if(m)t=m[1];
  else if(q.t==='用法')t=q.c[q.a];
  else t=q.q.replace(/<[^>]+>/g,'').replace(/（　）/g,q.c[q.a]);
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.9;
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.indexOf('ja')===0);
  if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function streak(){
  let n=0;
  for(let i=0;i<9999;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(S.stats.d[fmt(d)])n++;
    else if(i===0)continue;
    else break;
  }
  return n;
}

function statHtml(){
  let n=0,ok=0;
  Object.values(S.stats.d).forEach(v=>{ok+=v[0];n+=v[1]});
  if(!n)return '';
  const rows=Object.entries(S.stats.c).map(([c,[r,m]])=>`<div class="stat"><span>${c}</span><span>${r} / ${m}（${Math.round(r/m*100)}%）</span></div>`).join('');
  return `<div class="card"><div class="tag">學習儀表板</div>
  <div style="text-align:center;font-size:1.05rem;margin:6px 0 10px">🔥 連續 ${streak()} 天｜累計 ${n} 題｜正確率 ${Math.round(ok/n*100)}%</div>${rows}</div>`;
}

function home(){
  S.session=null;save();
  const due=dueList().length;
  let catBtns=cats.map(c=>{
    const n=Q.filter(x=>x.t===c).length;
    return `<button class="secondary" onclick="start('${c}')">${c}（${n} 題）</button>`;
  }).join('');
  app.innerHTML=`
  <h1>🎯 N2 考前猜題 500</h1>

  </div>

  <button class="mini" onclick="location.href='https://shelly-awkward.github.io/jlpt-quiz/n3.html'">→ N3 版測驗</button>

  <button class="mini" onclick="location.href='n1r.html'">→ N1 読解・聴解 500</button>`;
}

function start(mode){
  let idx;
  if(mode==='all')idx=Q.map((_,i)=>i);
  else if(mode==='due')idx=dueList();
  else if(mode==='wrong')idx=[...S.wrong];
  else if(mode==='star')idx=[...S.star];
  else idx=Q.map((_,i)=>i).filter(i=>Q[i].t===mode);
  if(!idx.length)return;
  shuffle(idx);
  S.session={mode,idx,pos:0,right:0,log:[]};
  save();renderQ();
}

const MODENAME={all:'綜合測驗',due:'今日複習',wrong:'錯題複習',star:'不熟收藏'};

function renderQ(){
  const s=S.session;
  if(s.pos>=s.idx.length)return end();
  const qi=s.idx[s.pos],q=Q[qi];
  const order=shuffle([0,1,2,3]);
  const opts=order.map((oi,k)=>`<button class="opt" id="o${k}" onclick="pick(${k})">${'ABCD'[k]}．${q.c[oi]}</button>`).join('');
  app.innerHTML=`
  <div class="top"><span>${MODENAME[s.mode]||s.mode}　${s.pos+1} / ${s.idx.length}</span><span>✔ ${s.right}　✘ ${s.pos-s.right}</span></div>
  <div class="bar"><div style="width:${s.pos/s.idx.length*100}%"></div></div>
  <div class="card">
    <span class="tag">${q.t}</span>
    <div class="q">${q.q}</div>
    ${opts}
    <div id="after"></div>
  </div>
  <button class="mini" onclick="if(confirm('中斷測驗回到首頁？（進度已儲存）')){home()}">回首頁</button>`;
  window._cur={qi,order};
}

function pick(k){
  const {qi,order}=window._cur,q=Q[qi],s=S.session;
  const ok=order[k]===q.a;
  for(let i=0;i<4;i++){
    const b=document.getElementById('o'+i);
    b.disabled=true;
    if(order[i]===q.a)b.classList.add('correct');
    else if(i===k)b.classList.add('wrong');
    else b.classList.add('dim');
  }
  if(ok){
    s.right++;
    if(s.mode==='due'||s.mode==='wrong'){
      const r=S.srs[qi]||{step:0,miss:1};
      r.step=(r.step||0)+1;
      if(r.step>=3){S.wrong=S.wrong.filter(x=>x!==qi);delete S.srs[qi];}
      else{r.due=addDays(r.step===1?3:7);S.srs[qi]=r;}
    }
  }else{
    if(!S.wrong.includes(qi))S.wrong.push(qi);
    const r=S.srs[qi]||{step:0,miss:0};
    r.step=0;r.miss=(r.miss||0)+1;r.due=addDays(1);S.srs[qi]=r;
  }
  const tk=today();
  S.stats.d[tk]=S.stats.d[tk]||[0,0];S.stats.d[tk][1]++;if(ok)S.stats.d[tk][0]++;
  S.stats.c[q.t]=S.stats.c[q.t]||[0,0];S.stats.c[q.t][1]++;if(ok)S.stats.c[q.t][0]++;
  s.log.push({t:q.t,ok});
  s.pos++;save();
  const starred=S.star.includes(qi);
  document.getElementById('after').innerHTML=`
    <div class="exp">${ok?'⭕ 正解！':'❌ 正解是：'+q.c[q.a]}<br>💡 ${q.e}</div>
    <div class="row">
      <button class="chip" onclick="speakQ(${qi})">🔊 聽發音</button>
      <button class="chip" id="star" onclick="toggleStar(${qi})">${starred?'⭐ 已標記':'☆ 標記不熟'}</button>
    </div>
    <button class="primary" onclick="renderQ()">下一題 ▶</button>`;
  document.getElementById('after').scrollIntoView({behavior:'smooth',block:'end'});
}

function toggleStar(qi){
  const i=S.star.indexOf(qi);
  if(i>=0)S.star.splice(i,1);else S.star.push(qi);
  save();
  const b=document.getElementById('star');
  if(b)b.textContent=S.star.includes(qi)?'⭐ 已標記':'☆ 標記不熟';
}

function exportWrong(){
  let t='【N2 錯題清單 '+today()+'】共 '+S.wrong.length+' 題\n\n';
  S.wrong.forEach((qi,n)=>{
    const q=Q[qi],r=S.srs[qi]||{};
    t+=(n+1)+'. ['+q.t+'] '+q.q.replace(/<[^>]+>/g,' ')+'\n   正解：'+q.c[q.a]+(r.miss?'｜錯過 '+r.miss+' 次':'')+'\n';
  });
  t+='\n請針對以上錯題逐題深入解說：詞源或語感、易混淆選項辨析、記憶技巧、各補 2 個例句，最後分析我的弱點模式，並依此出 10 題變化題考我。';
  app.innerHTML=`<h1>📋 錯題清單</h1>
  <div class="sub">複製後貼到 Claude 對話，就能得到量身深入解說</div>
  <div class="card">
    <textarea id="ex" style="width:100%;height:45vh;font-size:.9rem;border:1px solid #e3ddd2;border-radius:8px;padding:10px;font-family:inherit">${t}</textarea>
    <button class="primary" onclick="const x=document.getElementById('ex');x.select();x.setSelectionRange(0,999999);if(navigator.clipboard){navigator.clipboard.writeText(x.value).then(()=>alert('已複製！'))}else{document.execCommand('copy');alert('已複製！')}">全選並複製</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
}

// ================= EPUB =================
function crc32(d){
  let t=crc32.t;
  if(!t){t=crc32.t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}}
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
function zipStore(files){
  const parts=[],central=[];let off=0;
  files.forEach(f=>{
    const nb=f.nameBytes,d=f.data,crc=crc32(d);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0x0800,true);
    lh.setUint32(14,crc,true);lh.setUint32(18,d.length,true);lh.setUint32(22,d.length,true);
    lh.setUint16(26,nb.length,true);
    parts.push(new Uint8Array(lh.buffer),nb,d);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0x0800,true);
    ch.setUint32(16,crc,true);ch.setUint32(20,d.length,true);ch.setUint32(24,d.length,true);
    ch.setUint16(28,nb.length,true);ch.setUint32(42,off,true);
    central.push(new Uint8Array(ch.buffer),nb);
    off+=30+nb.length+d.length;
  });
  let cdSize=0;central.forEach(u=>cdSize+=u.length);
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);eo.setUint16(8,files.length,true);eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true);eo.setUint32(16,off,true);
  const out=new Uint8Array(off+cdSize+22);let p=0;
  parts.concat(central,[new Uint8Array(eo.buffer)]).forEach(u=>{out.set(u,p);p+=u.length});
  return out;
}
function buildEpub(){
  const enc=new TextEncoder();
  const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fix=s=>escq(s).replace(/&lt;(\/)?(u|b)&gt;/g,'<$1$2>').replace(/&lt;br\s*\/?&gt;/g,'<br/>');
  const wrap=(title,body)=>'<?xml version="1.0" encoding="utf-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja"><head><title>'+title+'</title><style>body{line-height:1.8}.q{margin:0 0 1.5em 0}.a{font-size:.9em}aside{font-size:.9em;border-top:1px dotted #999;padding-top:.3em;margin-top:.5em}u{text-decoration:none;border-bottom:2px solid #000;font-weight:bold}</style></head><body>'+body+'</body></html>';
  const chapters=[],files=[];
  cats.forEach((cat,ci)=>{
    const qs=[];Q.forEach((q,i)=>{if(q.t===cat)qs.push({q,i})});
    let body='<h1>'+cat+'（'+qs.length+'題）</h1>',notes='';
    qs.forEach((x,n)=>{
      const ord=shuffle([0,1,2,3]);
      const letter='ABCD'[ord.indexOf(x.q.a)];
      const opts=ord.map((oi,k)=>'ABCD'[k]+'．'+fix(x.q.c[oi])).join('<br/>');
      body+='<div class="q"><p><b>'+(n+1)+'．</b>'+fix(x.q.q)+'</p><p>'+opts+'</p><p class="a" id="r'+x.i+'"><a epub:type="noteref" href="#n'+x.i+'">▶ 答案・解說</a></p></div>';
      notes+='<aside id="n'+x.i+'" epub:type="footnote"><p><b>'+(n+1)+'．正解：'+letter+'．'+fix(x.q.c[x.q.a])+'</b><br/>'+fix(x.q.e)+'　<a href="#r'+x.i+'">↩ 返回第'+(n+1)+'題</a></p></aside>';
    });
    body+='<h2>解答・解説一覧</h2>'+notes;
    chapters.push({href:'c'+ci+'.xhtml',title:cat});
    files.push({name:'OEBPS/c'+ci+'.xhtml',text:wrap(cat,body)});
  });
  const title=document.title;
  const nav=wrap('目次','<nav epub:type="toc"><h1>目次</h1><ol>'+chapters.map(c=>'<li><a href="'+c.href+'">'+c.title+'</a></li>').join('')+'</ol></nav>');
  const opf='<?xml version="1.0" encoding="utf-8"?>\n<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">urn:uuid:jlpt-quiz-'+Date.now()+'</dc:identifier><dc:title>'+title+'</dc:title><dc:language>ja</dc:language><meta property="dcterms:modified">'+new Date().toISOString().replace(/\.\d+Z$/,'Z')+'</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>'+chapters.map((c,i)=>'<item id="c'+i+'" href="'+c.href+'" media-type="application/xhtml+xml"/>').join('')+'</manifest><spine>'+chapters.map((c,i)=>'<itemref idref="c'+i+'"/>').join('')+'</spine></package>';
  const container='<?xml version="1.0" encoding="utf-8"?>\n<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';
  const list=[{name:'mimetype',text:'application/epub+zip'},{name:'META-INF/container.xml',text:container},{name:'OEBPS/content.opf',text:opf},{name:'OEBPS/nav.xhtml',text:nav}].concat(files);
  return zipStore(list.map(f=>({nameBytes:enc.encode(f.name),data:enc.encode(f.text)})));
}
function makeEpub(){
  const blob=new Blob([buildEpub()],{type:'application/epub+zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=document.title.replace(/\s+/g,'')+'.epub';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
}

function end(){
  const s=S.session;
  const pct=Math.round(s.right/s.idx.length*100);
  const byCat={};

  const rows=Object.entries(byCat).map(([c,[r,n]])=>`<div class="stat"><span>${c}</span><span>${r} / ${n}（${Math.round(r/n*100)}%）</span></div>`).join('');
  const msg=pct>=80?'💮 素晴らしい！這個水準上考場沒問題':pct>=60?'👍 及格線附近，把錯題本刷熟就穩了':'💪 先別灰心，錯題就是你的提分空間';
  const due=dueList().length;
  app.innerHTML=`
  <h1>測驗結束</h1>
  <div class="card">
    <div class="big">${pct}<span style="font-size:1.2rem">分</span></div>
    <div style="text-align:center;color:#6b6353">答對 ${s.right} / ${s.idx.length} 題　${msg}</div>
  </div>
  <div class="card"><div class="tag">本次各類正確率</div>${rows}</div>
  <div class="card">
    <button class="warn" onclick="start('due')" ${due?'':'disabled style="opacity:.4"'}>📅 今日複習（${due} 題）</button>
    <button class="secondary" onclick="exportWrong()" ${S.wrong.length?'':'disabled style="opacity:.4"'}>📋 匯出錯題給 AI 解說</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
  S.session=null;save();
}

if(S.session&&S.session.pos<S.session.idx.length){
