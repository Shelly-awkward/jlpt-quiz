<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N1 考前猜題 500</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP","Microsoft JhengHei",sans-serif;background:#f4f1ea;color:#2b2b2b}
#app{max-width:720px;margin:0 auto;padding:16px 16px 48px}
h1{font-size:1.5rem;margin:16px 0 4px}
.sub{color:#8a8378;font-size:.95rem;margin-bottom:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:1.1rem;padding:14px 18px;width:100%;text-align:left;margin:6px 0;background:#fff;border:2px solid #e3ddd2;color:#2b2b2b;line-height:1.5}
button:active{transform:scale(.99)}
.primary{background:#2d6a4f;color:#fff;border-color:#2d6a4f;text-align:center;font-weight:700}
.secondary{background:#fff;text-align:center}
.warn{background:#b5502a;color:#fff;border-color:#b5502a;text-align:center;font-weight:700}
.opt.correct{background:#d8f0e0;border-color:#2d6a4f;font-weight:700}
.opt.wrong{background:#fbe0d8;border-color:#b5502a}
.opt:disabled{cursor:default;opacity:1;color:#2b2b2b}
.opt.dim:disabled{opacity:.55}
.tag{display:inline-block;background:#e9e2d4;color:#6b6353;border-radius:999px;padding:3px 12px;font-size:.85rem;margin-bottom:10px}
.q{font-size:1.3rem;line-height:1.9;margin:6px 0 16px}
.q u{text-decoration:none;border-bottom:3px solid #b5502a;font-weight:700}
.exp{background:#fdf6e3;border-left:4px solid #c9a227;border-radius:8px;padding:12px 14px;font-size:1rem;line-height:1.7;margin-top:12px}
.bar{height:8px;background:#e3ddd2;border-radius:4px;overflow:hidden;margin:8px 0 16px}
.bar>div{height:100%;background:#2d6a4f;transition:width .3s}
.top{display:flex;justify-content:space-between;align-items:center;font-size:.95rem;color:#6b6353}
.big{font-size:2.6rem;font-weight:800;text-align:center;margin:10px 0}
.stat{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #eee7da;font-size:1rem}
.mini{background:none;border:none;color:#8a8378;font-size:.9rem;width:auto;padding:6px 10px;text-decoration:underline}
.row{display:flex;gap:8px}
.chip{flex:1;text-align:center;font-size:1rem;padding:10px;background:#f4f1ea}
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q=[
// ================= 漢字読み =================
{t:"漢字読み",q:"計画は困難の中でも着実に<u>遂行</u>された。",c:["すいこう","ついこう","すいぎょう","せいこう"],a:0,e:"遂行（すいこう）＝執行、完成任務。「遂」讀すい，遂げる（とげる）是訓讀。"},
{t:"漢字読み",q:"新しい委員会が4月に<u>発足</u>した。",c:["ほっそく","はっそく","ほっぞく","はつあし"],a:0,e:"発足（ほっそく）＝成立、開始運作。促音化讀ほっそく是 N1 常考陷阱。"},
{t:"漢字読み",q:"現場の状況を正確に<u>把握</u>しておく必要がある。",c:["はあく","はくあく","ばあく","はおく"],a:0,e:"把握（はあく）＝掌握。"},
{t:"漢字読み",q:"貸し借りを<u>相殺</u>して、支払いはゼロになった。",c:["そうさい","そうさつ","しょうさい","そうせつ"],a:0,e:"相殺（そうさい）＝抵銷。「殺」在此讀さい不讀さつ，是超頻出陷阱。"},
{t:"漢字読み",q:"彼は会社の<u>出納</u>係を任されている。",c:["すいとう","しゅつのう","すいのう","しゅっとう"],a:0,e:"出納（すいとう）＝出納。特殊讀音，整組背下來。"},
{t:"漢字読み",q:"一審の判決は控訴審で<u>覆された</u>。",c:["くつがえされた","ひるがえされた","おおわされた","かえされた"],a:0,e:"覆す（くつがえす）＝推翻。翻す（ひるがえす）是「翻轉、改變（態度）」，不同字。"},
{t:"漢字読み",q:"来月から単身で任地に<u>赴く</u>ことになった。",c:["おもむく","うつむく","おもんじる","つまずく"],a:0,e:"赴く（おもむく）＝前往、赴任。名詞：赴任（ふにん）。"},
{t:"漢字読み",q:"家賃の支払いが3か月も<u>滞って</u>いる。",c:["とどこおって","とどまって","たまって","こおって"],a:0,e:"滞る（とどこおる）＝拖延、積壓。名詞：渋滞（じゅうたい）的滞。"},
{t:"漢字読み",q:"どんな流行もいつかは<u>廃れる</u>ものだ。",c:["すたれる","さびれる","はいれる","つぶれる"],a:0,e:"廃れる（すたれる）＝過時、被淘汰。寂れる（さびれる）＝變蕭條。"},
{t:"漢字読み",q:"人の発言を<u>遮る</u>のは失礼だ。",c:["さえぎる","さまたげる","へだてる","くぎる"],a:0,e:"遮る（さえぎる）＝遮擋、打斷。妨げる（さまたげる）＝妨礙；隔てる（へだてる）＝隔開。"},
{t:"漢字読み",q:"恵みの雨で田畑が<u>潤った</u>。",c:["うるおった","しめった","ひたった","にごった"],a:0,e:"潤う（うるおう）＝滋潤、受惠。名詞：利潤（りじゅん）。"},
{t:"漢字読み",q:"留学経験が国際感覚を<u>培う</u>土台になった。",c:["つちかう","やしなう","たがやす","つくろう"],a:0,e:"培う（つちかう）＝培養（能力、精神）。養う（やしなう）＝扶養；耕す（たがやす）＝耕作。"},
{t:"漢字読み",q:"被災地に医療を<u>施す</u>チームが派遣された。",c:["ほどこす","もよおす","たくす","ほろぼす"],a:0,e:"施す（ほどこす）＝施行、施予。名詞：施設（しせつ）、実施（じっし）。"},
{t:"漢字読み",q:"アルバイト代で生活費を<u>賄って</u>いる。",c:["まかなって","やしなって","おぎなって","ともなって"],a:0,e:"賄う（まかなう）＝籌措、供應。補う（おぎなう）＝補足，字形易混。"},
{t:"漢字読み",q:"父は長年、教育行政に<u>携わって</u>きた。",c:["たずさわって","かかわって","さずかって","こだわって"],a:0,e:"携わる（たずさわる）＝從事、參與。携帯（けいたい）的携。"},
{t:"漢字読み",q:"過去を<u>顧みる</u>余裕もなく働いてきた。",c:["かえりみる","こころみる","かんがみる","あおぎみる"],a:0,e:"顧みる（かえりみる）＝回顧。省みる（かえりみる）＝反省；鑑みる（かんがみる）＝鑑於。"},
{t:"漢字読み",q:"この件は理事会に<u>諮って</u>から決定する。",c:["はかって","さとって","たずねて","いのって"],a:0,e:"諮る（はかる）＝諮詢、提交討論。同訓異字：図る／測る／量る／謀る要靠語境分辨。"},
{t:"漢字読み",q:"彼は経歴を<u>偽って</u>入社していた。",c:["いつわって","あやまって","いろどって","いたわって"],a:0,e:"偽る（いつわる）＝偽造、欺騙。名詞：偽物（にせもの）、偽造（ぎぞう）。"},
{t:"漢字読み",q:"険しい山々が行く手を<u>阻んで</u>いた。",c:["はばんで","こばんで","いどんで","つつしんで"],a:0,e:"阻む（はばむ）＝阻擋。拒む（こばむ）＝拒絕，字形音都易混。"},
{t:"漢字読み",q:"その曲を聞くと当時の記憶が<u>蘇る</u>。",c:["よみがえる","ひるがえる","わきかえる","いきかえる"],a:0,e:"蘇る（よみがえる）＝復甦、重現。"},
{t:"漢字読み",q:"少年をそそのかして万引きを<u>唆した</u>疑いがある。",c:["そそのかした","おどかした","ほのめかした","ちゃかした"],a:0,e:"唆す（そそのかす）＝教唆。名詞：示唆（しさ）＝暗示。"},
{t:"漢字読み",q:"彼女は面会の要求をきっぱりと<u>拒んだ</u>。",c:["こばんだ","はばんだ","つつしんだ","おしんだ"],a:0,e:"拒む（こばむ）＝拒絕。名詞：拒否（きょひ）。阻む（はばむ）＝阻擋。"},
{t:"漢字読み",q:"彼は額の汗を<u>拭って</u>作業を続けた。",c:["ぬぐって","はらって","すくって","こすって"],a:0,e:"拭う（ぬぐう）＝擦拭。拭く（ふく）同字訓讀不同。"},
{t:"漢字読み",q:"その場を<u>繕う</u>ような言い訳はやめなさい。",c:["つくろう","よそおう","やしなう","かばう"],a:0,e:"繕う（つくろう）＝修補、粉飾。取り繕う＝敷衍門面。装う（よそおう）＝裝扮、假裝。"},
{t:"漢字読み",q:"敵を<u>欺く</u>にはまず味方からと言う。",c:["あざむく","あばく","つらぬく","くじく"],a:0,e:"欺く（あざむく）＝欺騙。名詞：詐欺（さぎ）。暴く（あばく）＝揭發。"},
{t:"漢字読み",q:"彼は世界記録に<u>挑む</u>と宣言した。",c:["いどむ","のぞむ","はげむ","からむ"],a:0,e:"挑む（いどむ）＝挑戰。名詞：挑戦（ちょうせん）。"},
{t:"漢字読み",q:"幸い、乗客は全員難を<u>免れた</u>。",c:["まぬがれた","のがれた","はなれた","おそれた"],a:0,e:"免れる（まぬがれる／まぬかれる）＝倖免。逃れる（のがれる）＝逃脫。"},
{t:"漢字読み",q:"彼女は幼い頃から語学に<u>秀でて</u>いた。",c:["ひいでて","すぐれて","ぬきんでて","とがって"],a:0,e:"秀でる（ひいでる）＝傑出。優れる（すぐれる）意思相近但漢字不同。"},
{t:"漢字読み",q:"彼は若くして大企業を<u>率いる</u>立場になった。",c:["ひきいる","もちいる","しいる","ひっぱる"],a:0,e:"率いる（ひきいる）＝率領。用いる（もちいる）＝使用；強いる（しいる）＝強迫。"},
{t:"漢字読み",q:"彼女は自分の信念を最後まで<u>貫いた</u>。",c:["つらぬいた","みちびいた","きずいた","つくした"],a:0,e:"貫く（つらぬく）＝貫徹。名詞：一貫（いっかん）。"},
{t:"漢字読み",q:"会社は深刻な経営難に<u>陥った</u>。",c:["おちいった","へこんだ","くぼんだ","おちこんだ"],a:0,e:"陥る（おちいる）＝陷入。名詞：欠陥（けっかん）。"},
{t:"漢字読み",q:"大臣は前日の発言を<u>翻した</u>。",c:["ひるがえした","くつがえした","むしかえした","とりけした"],a:0,e:"翻す（ひるがえす）＝翻改（前言、態度）。覆す（くつがえす）＝推翻（判決、定論）。"},
{t:"漢字読み",q:"負けを認める<u>潔い</u>態度に好感を持った。",c:["いさぎよい","きよい","こころよい","いちじるしい"],a:0,e:"潔い（いさぎよい）＝乾脆、光明磊落。快い（こころよい）＝舒暢。"},
{t:"漢字読み",q:"祭りの<u>名残</u>で、通りにはまだ屋台が残っている。",c:["なごり","なざん","めいざん","なのこり"],a:0,e:"名残（なごり）＝餘韻、依依不捨。熟字訓，整組背。"},
{t:"漢字読み",q:"事故機の<u>行方</u>は依然として分かっていない。",c:["ゆくえ","いきかた","ゆきほう","こうほう"],a:0,e:"行方（ゆくえ）＝去向、下落。熟字訓。行方不明（ゆくえふめい）。"},
{t:"漢字読み",q:"この<u>老舗</u>の和菓子屋は創業三百年だそうだ。",c:["しにせ","ろうほ","おいみせ","ろうしゃ"],a:0,e:"老舗（しにせ）＝老字號。熟字訓，超頻出。"},
{t:"漢字読み",q:"円安で<u>為替</u>レートが大きく変動した。",c:["かわせ","いたい","ためがえ","かえだか"],a:0,e:"為替（かわせ）＝匯兌、匯率。熟字訓。"},
{t:"漢字読み",q:"日曜の朝、神社の<u>境内</u>を散歩した。",c:["けいだい","きょうない","けいない","きょうだい"],a:0,e:"境内（けいだい）＝神社寺院的院內。「境」讀けい、「内」讀だい，特殊讀音。"},
{t:"漢字読み",q:"彼は<u>体裁</u>ばかり気にして中身がない。",c:["ていさい","たいさい","ていさつ","たいせい"],a:0,e:"体裁（ていさい）＝體面、外表。「体」在此讀てい，如：体温（たいおん）vs 体裁（ていさい）。"},
{t:"漢字読み",q:"政府は一連の<u>措置</u>を発表した。",c:["そち","しょち","そうち","さくち"],a:0,e:"措置（そち）＝措施。処置（しょち）＝處置，是另一個詞。"},
{t:"漢字読み",q:"背後に人の<u>気配</u>を感じて振り返った。",c:["けはい","きはい","けくばり","きくばり"],a:0,e:"気配（けはい）＝跡象、動靜。「気」在此讀け。気配り（きくばり）＝細心關照，不同詞。"},
{t:"漢字読み",q:"発売と同時に注文が<u>殺到</u>した。",c:["さっとう","さつどう","せっとう","さいとう"],a:0,e:"殺到（さっとう）＝蜂擁而至。「殺」促音化讀さっ。"},
{t:"漢字読み",q:"議事は思いのほか<u>円滑</u>に進んだ。",c:["えんかつ","えんこつ","えんきつ","えんごつ"],a:0,e:"円滑（えんかつ）＝順利圓滑。「滑」音讀かつ，訓讀すべる。"},
{t:"漢字読み",q:"祖父はいつも<u>柔和</u>な表情をしている。",c:["にゅうわ","じゅうわ","にゅうか","じゅうなん"],a:0,e:"柔和（にゅうわ）＝溫和。「柔」在此讀にゅう。柔軟（じゅうなん）讀じゅう，兩個都要記。"},
{t:"漢字読み",q:"彼女は<u>華奢</u>な体つきだが力は強い。",c:["きゃしゃ","かしゃ","はなしゃ","きょしゃ"],a:0,e:"華奢（きゃしゃ）＝纖細、苗條。特殊讀音。"},
{t:"漢字読み",q:"この鳥は絶滅が<u>危惧</u>されている。",c:["きぐ","きく","きぎ","きゆう"],a:0,e:"危惧（きぐ）＝憂慮、擔心。絶滅危惧種（ぜつめつきぐしゅ）。"},
{t:"漢字読み",q:"大臣は増税の可能性を<u>示唆</u>した。",c:["しさ","じさ","しすん","しさつ"],a:0,e:"示唆（しさ）＝暗示。「唆」音讀さ，訓讀そそのかす。視察（しさつ）是另一個詞。"},
{t:"漢字読み",q:"新料金は<u>暫定</u>的なもので、来年見直される。",c:["ざんてい","ぜんてい","さんてい","だんてい"],a:0,e:"暫定（ざんてい）＝暫定。暫く（しばらく）同字訓讀。前提（ぜんてい）、断定（だんてい）是別的詞。"},
{t:"漢字読み",q:"金融政策の<u>緩和</u>が続いている。",c:["かんわ","えんわ","かんか","だんわ"],a:0,e:"緩和（かんわ）＝放寬、緩和。緩い（ゆるい）、緩やか（ゆるやか）是訓讀。"},
{t:"漢字読み",q:"彼の<u>緻密</u>な分析には定評がある。",c:["ちみつ","しみつ","きみつ","ちめい"],a:0,e:"緻密（ちみつ）＝縝密。機密（きみつ）是另一個詞。"},
{t:"漢字読み",q:"彼は<u>露骨</u>に嫌な顔をした。",c:["ろこつ","ろうこつ","らこつ","ろけつ"],a:0,e:"露骨（ろこつ）＝露骨、毫不掩飾。「露」讀短音ろ。"},
{t:"漢字読み",q:"新聞に<u>匿名</u>で投書した。",c:["とくめい","どくめい","ちょくめい","じょくめい"],a:0,e:"匿名（とくめい）＝匿名。隠匿（いんとく）的匿。"},
{t:"漢字読み",q:"双方が<u>妥協</u>して、ようやく合意に達した。",c:["だきょう","たきょう","だごう","だけい"],a:0,e:"妥協（だきょう）＝妥協。妥当（だとう）的妥。"},
{t:"漢字読み",q:"最新技術を<u>駆使</u>して制作された映画だ。",c:["くし","くうし","かし","こし"],a:0,e:"駆使（くし）＝運用自如。駆ける（かける）是訓讀。"},
{t:"漢字読み",q:"新年の<u>抱負</u>を一人ずつ発表した。",c:["ほうふ","ぼうふ","ほうぶ","ほふ"],a:0,e:"抱負（ほうふ）＝抱負。豊富（ほうふ）同音，注意文脈。"},
{t:"漢字読み",q:"父は来月、大阪支社に<u>赴任</u>する。",c:["ふにん","ふじん","ほにん","ぶにん"],a:0,e:"赴任（ふにん）＝赴任。動詞：赴く（おもむく）。"},
{t:"漢字読み",q:"利用者の<u>便宜</u>を図って窓口を増やした。",c:["べんぎ","びんぎ","べんせん","びんせん"],a:0,e:"便宜（べんぎ）＝方便。便宜を図る＝提供方便。「宜」讀ぎ。"},
{t:"漢字読み",q:"両案の<u>折衷</u>案が採用された。",c:["せっちゅう","せっしょう","おりちゅう","せつじゅう"],a:0,e:"折衷（せっちゅう）＝折衷。和洋折衷（わようせっちゅう）。"},
{t:"漢字読み",q:"何でも安く済ませようとする<u>風潮</u>がある。",c:["ふうちょう","ふうしお","かぜしお","ふうじょう"],a:0,e:"風潮（ふうちょう）＝風氣、潮流。「潮」音讀ちょう。"},
{t:"漢字読み",q:"相手の<u>思惑</u>を読んで交渉を進める。",c:["おもわく","しわく","おもいわく","しおく"],a:0,e:"思惑（おもわく）＝盤算、意圖。特殊讀音，不讀しわく。"},
{t:"漢字読み",q:"この材質は<u>脆くて</u>加工しにくい。",c:["もろくて","よわくて","ぜいくて","こわくて"],a:0,e:"脆い（もろい）＝脆弱。音讀ぜい：脆弱（ぜいじゃく）。"},
{t:"漢字読み",q:"日々の点検を<u>怠った</u>ことが事故につながった。",c:["おこたった","なまけた","あなどった","とどこおった"],a:0,e:"怠る（おこたる）＝疏忽、懈怠。怠ける（なまける）＝偷懶，同字不同送假名。"},
{t:"漢字読み",q:"市民は政府の対応に<u>憤り</u>を感じている。",c:["いきどおり","いかどおり","ふんまん","はらだち"],a:0,e:"憤る（いきどおる）＝憤慨。名詞形憤り。音讀ふん：憤慨（ふんがい）。"},
{t:"漢字読み",q:"公園は市民の<u>憩い</u>の場になっている。",c:["いこい","やすらい","いきおい","にぎわい"],a:0,e:"憩い（いこい）＝休憩。動詞：憩う（いこう）。休憩（きゅうけい）的憩。"},
{t:"漢字読み",q:"制度の<u>綻び</u>が次々と明らかになった。",c:["ほころび","ほどけび","たんび","ちぎれび"],a:0,e:"綻び（ほころび）＝綻線、破綻之處。動詞：綻びる（ほころびる）。"},
{t:"漢字読み",q:"若いころは手当たり次第に本を読み、知識を<u>貪った</u>。",c:["むさぼった","うばった","おこたった","ほおばった"],a:0,e:"貪る（むさぼる）＝貪婪地追求。音讀どん：貪欲（どんよく）。"},
{t:"漢字読み",q:"彼は一生かけて罪を<u>償う</u>と誓った。",c:["つぐなう","おぎなう","やしなう","うやまう"],a:0,e:"償う（つぐなう）＝賠償、贖罪。名詞：弁償（べんしょう）、補償（ほしょう）。"},
{t:"漢字読み",q:"人を<u>軽蔑</u>するような目で見るな。",c:["けいべつ","けいぶ","きょうべつ","けなし"],a:0,e:"軽蔑（けいべつ）＝輕蔑。動詞：蔑む（さげすむ）。"},
{t:"漢字読み",q:"二つの事件は手口が<u>酷似</u>している。",c:["こくじ","かくじ","こくに","きょくじ"],a:0,e:"酷似（こくじ）＝極為相似。「酷」音讀こく：残酷（ざんこく）。"},
{t:"漢字読み",q:"祖父母は<u>質素</u>な暮らしを続けている。",c:["しっそ","しつそ","しっそう","じっそ"],a:0,e:"質素（しっそ）＝樸素。促音化しっそ。疾走（しっそう）是別的詞。"},
{t:"漢字読み",q:"仕事に見合った<u>報酬</u>を受け取るべきだ。",c:["ほうしゅう","ほうしゅ","ほうこう","ふくしゅう"],a:0,e:"報酬（ほうしゅう）＝報酬。「酬」讀しゅう。復讐（ふくしゅう）別詞。"},
{t:"漢字読み",q:"大統領は側近の閣僚を<u>罷免</u>した。",c:["ひめん","ばめん","ひべん","はいめん"],a:0,e:"罷免（ひめん）＝罷免、免職。「罷」讀ひ。"},
{t:"漢字読み",q:"弁護士は少数者の人権を<u>擁護</u>してきた。",c:["ようご","おうご","ようごう","えいご"],a:0,e:"擁護（ようご）＝維護、聲援。「擁」讀よう：抱擁（ほうよう）。"},
{t:"漢字読み",q:"環境対策を<u>包括</u>的に見直す。",c:["ほうかつ","ほうがつ","ほうかく","ほうけつ"],a:0,e:"包括（ほうかつ）＝包括、總括。「括」讀かつ：一括（いっかつ）。"},
{t:"漢字読み",q:"都市部の市場はすでに<u>飽和</u>状態だ。",c:["ほうわ","ぼうわ","ほうか","あきわ"],a:0,e:"飽和（ほうわ）＝飽和。訓讀：飽きる（あきる）。"},
{t:"漢字読み",q:"事件の<u>経緯</u>を時系列で説明した。",c:["けいい","けいえい","きょうい","けいり"],a:0,e:"経緯（けいい）＝經過、原委。経営（けいえい）是別的詞。"},
{t:"漢字読み",q:"増税は<u>庶民</u>の生活を直撃する。",c:["しょみん","しょうみん","じょみん","そみん"],a:0,e:"庶民（しょみん）＝老百姓。「庶」讀短音しょ。"},
{t:"漢字読み",q:"交渉で一切<u>譲歩</u>しない構えだ。",c:["じょうほ","ゆずりほ","じょうぶ","にょうほ"],a:0,e:"譲歩（じょうほ）＝讓步。訓讀：譲る（ゆずる）。"},
{t:"漢字読み",q:"支払いに1週間の<u>猶予</u>をもらった。",c:["ゆうよ","ゆうにょ","ようよ","ゆうじょ"],a:0,e:"猶予（ゆうよ）＝寬限、猶豫。執行猶予（しっこうゆうよ）＝緩刑。"},
{t:"漢字読み",q:"銀行から事業資金の<u>融資</u>を受けた。",c:["ゆうし","ゆうじ","ようし","ゆし"],a:0,e:"融資（ゆうし）＝融資、貸款。金融（きんゆう）的融。"},
{t:"漢字読み",q:"契約はきちんと<u>履行</u>されなければならない。",c:["りこう","ふくこう","はきこう","りぎょう"],a:0,e:"履行（りこう）＝履行。「履」讀り：履歴書（りれきしょ）。訓讀：履く（はく）。"},
{t:"漢字読み",q:"型落ち品が<u>廉価</u>で販売されている。",c:["れんか","けんか","やすか","れんけ"],a:0,e:"廉価（れんか）＝廉價。「廉」讀れん：清廉（せいれん）。"},
{t:"漢字読み",q:"合格の<u>朗報</u>が届いた。",c:["ろうほう","ろほう","らんぽう","ろうぼう"],a:0,e:"朗報（ろうほう）＝好消息。訓讀：朗らか（ほがらか）。"},
{t:"漢字読み",q:"元知事は<u>賄賂</u>を受け取った罪に問われた。",c:["わいろ","かいろ","まいろ","ゆうろ"],a:0,e:"賄賂（わいろ）＝賄賂。賄う（まかなう）同字訓讀。"},
{t:"漢字読み",q:"最初の起業は資金難で<u>挫折</u>した。",c:["ざせつ","ざぜつ","させつ","くじせつ"],a:0,e:"挫折（ざせつ）＝挫折、失敗。訓讀：挫く（くじく）。"},
{t:"漢字読み",q:"人間心理への鋭い<u>洞察</u>に満ちた小説だ。",c:["どうさつ","とうさつ","どうさい","ほらさつ"],a:0,e:"洞察（どうさつ）＝洞察。「洞」音讀どう，訓讀ほら（山洞）。"},
{t:"漢字読み",q:"未納者に納付を<u>督促</u>する通知を送った。",c:["とくそく","とくしょく","どくそく","かんそく"],a:0,e:"督促（とくそく）＝催繳、催促。監督（かんとく）的督。"},
{t:"漢字読み",q:"請求書に費用の<u>内訳</u>を明記してください。",c:["うちわけ","ないやく","うちやく","ないわけ"],a:0,e:"内訳（うちわけ）＝明細。「訳」訓讀わけ。通訳（つうやく）是音讀。"},
{t:"漢字読み",q:"外国製品を<u>排斥</u>する運動が起きた。",c:["はいせき","はいしゃく","はいちょく","ひせき"],a:0,e:"排斥（はいせき）＝排斥、抵制。「斥」讀せき。"},
{t:"漢字読み",q:"一方的に契約を<u>破棄</u>された。",c:["はき","はいき","はぎ","ばき"],a:0,e:"破棄（はき）＝廢棄、撕毀（契約）。廃棄（はいき）＝廢棄處理，音近義近要分清。"},
{t:"漢字読み",q:"党内の<u>派閥</u>争いが激しくなった。",c:["はばつ","はねつ","はけつ","ばばつ"],a:0,e:"派閥（はばつ）＝派系。「閥」讀ばつ：財閥（ざいばつ）。"},
{t:"漢字読み",q:"手続きが<u>煩雑</u>で、申請をあきらめる人も多い。",c:["はんざつ","ぼんざつ","はんぞう","ふくざつ"],a:0,e:"煩雑（はんざつ）＝繁雜。煩う（わずらう）同字訓讀。複雑（ふくざつ）別詞。"},
{t:"漢字読み",q:"生徒たちは今も恩師を<u>慕って</u>いる。",c:["したって","しのんで","うやまって","なつかしんで"],a:0,e:"慕う（したう）＝仰慕、愛慕。偲ぶ（しのぶ）＝緬懷。"},
{t:"漢字読み",q:"人目を<u>忍んで</u>二人は会い続けた。",c:["しのんで","しんで","こばんで","ひそんで"],a:0,e:"忍ぶ（しのぶ）＝忍耐、躲避（人目）。忍者（にんじゃ）的忍。"},
{t:"漢字読み",q:"ご注文を<u>承りました</u>。",c:["うけたまわりました","うけとりました","かしこまりました","たまわりました"],a:0,e:"承る（うけたまわる）＝「聞く・受ける」的謙讓語。5個假名的長訓讀，超頻出。"},
{t:"漢字読み",q:"彼女は何事もなかったかのように平静を<u>装った</u>。",c:["よそおった","つくろった","かざった","いつわった"],a:0,e:"装う（よそおう）＝裝扮、佯裝。名詞：衣装（いしょう）、装置（そうち）。"},
{t:"漢字読み",q:"祖母は長年、腰痛を<u>患って</u>いる。",c:["わずらって","うれって","いたわって","こじらせて"],a:0,e:"患う（わずらう）＝患病。名詞：患者（かんじゃ）。煩う（わずらう）同音＝煩惱。"},
{t:"漢字読み",q:"近所付き合いを<u>煩わしい</u>と感じる人が増えた。",c:["わずらわしい","まぎらわしい","うたがわしい","けがらわしい"],a:0,e:"煩わしい（わずらわしい）＝麻煩、繁瑣。紛らわしい（まぎらわしい）＝易混淆。"},
{t:"漢字読み",q:"本物と<u>紛らわしい</u>偽札が出回っている。",c:["まぎらわしい","わずらわしい","うたがわしい","にせらわしい"],a:0,e:"紛らわしい（まぎらわしい）＝容易混淆。動詞：紛れる（まぎれる）。"},
{t:"漢字読み",q:"この地域の人口は<u>著しく</u>減少している。",c:["いちじるしく","おびただしく","はなはだしく","めざましく"],a:0,e:"著しい（いちじるしい）＝顯著。夥しい（おびただしい）＝大量；甚だしい（はなはだしい）＝過分。"},
{t:"漢字読み",q:"それは勘違いも<u>甚だしい</u>。",c:["はなはだしい","いちじるしい","おびただしい","そうぞうしい"],a:0,e:"甚だしい（はなはだしい）＝（多用於負面）非常、過分。副詞：甚だ（はなはだ）。"},
{t:"漢字読み",q:"金のために友を売るとは<u>卑しい</u>行いだ。",c:["いやしい","まずしい","あさましい","みぐるしい"],a:0,e:"卑しい（いやしい）＝卑鄙、下賤。名詞：卑怯（ひきょう）。"},
{t:"漢字読み",q:"私は流行にはとんと<u>疎い</u>。",c:["うとい","にぶい","うすい","とぼしい"],a:0,e:"疎い（うとい）＝生疏、不了解。〜に疎い＝對～外行。疎か（おろそか）同字。"},
{t:"漢字読み",q:"式は<u>厳かな</u>雰囲気の中で執り行われた。",c:["おごそかな","きびしかな","おろそかな","すこやかな"],a:0,e:"厳か（おごそか）＝莊嚴。厳しい（きびしい）同字訓讀不同。"},
{t:"漢字読み",q:"子どもの<u>健やかな</u>成長を願う。",c:["すこやかな","おだやかな","さわやかな","しなやかな"],a:0,e:"健やか（すこやか）＝健康茁壯。穏やか（おだやか）＝平穩。"},
{t:"漢字読み",q:"問題が見つかり次第、<u>速やかに</u>報告すること。",c:["すみやかに","はやみやかに","すばやかに","そくやかに"],a:0,e:"速やか（すみやか）＝迅速。書面語，公文頻出。"},
{t:"漢字読み",q:"彼女は<u>朗らかな</u>性格で皆に好かれている。",c:["ほがらかな","なめらかな","おおらかな","あきらかな"],a:0,e:"朗らか（ほがらか）＝開朗。滑らか（なめらか）＝光滑。"},
{t:"漢字読み",q:"この習慣は江戸時代に<u>遡る</u>。",c:["さかのぼる","さかもどる","そじょうる","たどる"],a:0,e:"遡る（さかのぼる）＝追溯、上溯。"},
{t:"漢字読み",q:"全国からボランティアを<u>募った</u>。",c:["つのった","つどった","あつまった","もよおした"],a:0,e:"募る（つのる）＝招募；（思念）加深。名詞：募集（ぼしゅう）。集う（つどう）＝聚集。"},
{t:"漢字読み",q:"相手が新人だからといって<u>侮って</u>はいけない。",c:["あなどって","ののしって","あざわらって","さげすんで"],a:0,e:"侮る（あなどる）＝輕視、小看。名詞：侮辱（ぶじょく）。蔑む（さげすむ）＝鄙視。"},
// ================= 文脈規定 =================
{t:"文脈規定",q:"円安の進行に（　）がかからない。",c:["歯止め","足止め","仕切り","締め切り"],a:0,e:"歯止めがかかる／かける＝煞住、遏止。足止め＝被迫滯留。"},
{t:"文脈規定",q:"応募資格に（　）する方はどなたでも参加できます。",c:["該当","相当","適当","妥当"],a:0,e:"該当（がいとう）する＝符合（條件、項目）。相当する＝相當於。"},
{t:"文脈規定",q:"彼の一言が値上げの動きに（　）をかけた。",c:["拍車","歯車","車輪","馬車"],a:0,e:"拍車をかける（はくしゃをかける）＝加速、推波助瀾。"},
{t:"文脈規定",q:"（　）、彼はまた遅刻してきた。",c:["案の定","不意に","あいにく","いかにも"],a:0,e:"案の定（あんのじょう）＝果然不出所料。あいにく＝不湊巧。"},
{t:"文脈規定",q:"両チームの実力は（　）していて、勝敗の予想がつかない。",c:["拮抗","接近","均等","対抗"],a:0,e:"拮抗（きっこう）する＝勢均力敵。"},
{t:"文脈規定",q:"彼の研究テーマは（　）にわたっている。",c:["多岐","多様","多数","広範"],a:0,e:"多岐（たき）にわたる＝涉及多方面，固定搭配。"},
{t:"文脈規定",q:"日ごろの練習の成果が試合結果に（　）に現れた。",c:["如実","切実","誠実","忠実"],a:0,e:"如実（にょじつ）に＝如實、清楚地（反映）。切実＝迫切。"},
{t:"文脈規定",q:"彼女の（　）の利いた対応で、その場は事なきを得た。",c:["機転","機嫌","機会","機能"],a:0,e:"機転（きてん）が利く＝機靈、反應快。"},
{t:"文脈規定",q:"部長は（　）な人柄で、部下から慕われている。",c:["温厚","温暖","穏便","丹念"],a:0,e:"温厚（おんこう）＝敦厚溫和（人品）。温暖用於氣候；穏便に＝低調處理。"},
{t:"文脈規定",q:"仕事と育児の間で（　）に陥っている。",c:["ジレンマ","スランプ","プレッシャー","コンプレックス"],a:0,e:"ジレンマ＝兩難。スランプ＝低潮；コンプレックス＝自卑感。"},
{t:"文脈規定",q:"エースはようやく長い（　）から抜け出した。",c:["スランプ","ブランク","ピンチ","ショック"],a:0,e:"スランプ＝（表現、成績的）低潮期。ブランク＝空白期。"},
{t:"文脈規定",q:"出産で10年の（　）があったが、職場に復帰した。",c:["ブランク","スペース","インターバル","タイムラグ"],a:0,e:"ブランク＝（職涯的）空白期。インターバル＝間隔。"},
{t:"文脈規定",q:"彼は雨の日も（　）に練習を続けている。",c:["コンスタント","スムーズ","デリケート","シビア"],a:0,e:"コンスタントに＝持續穩定地。シビア＝嚴苛。"},
{t:"文脈規定",q:"彼女は上司の誘いを（　）断った。",c:["きっぱり","うっかり","がっしり","ひっそり"],a:0,e:"きっぱり断る＝斷然拒絕。うっかり＝不小心。"},
{t:"文脈規定",q:"年末の手帳は予定が（　）詰まっている。",c:["ぎっしり","ずっしり","がっちり","うっすら"],a:0,e:"ぎっしり詰まる＝塞得滿滿。ずっしり＝沉甸甸。"},
{t:"文脈規定",q:"同じ話を何度も聞かされて、正直（　）している。",c:["うんざり","がっかり","ぐったり","ひんやり"],a:0,e:"うんざり＝厭煩。がっかり＝失望；ぐったり＝筋疲力盡。"},
{t:"文脈規定",q:"彼は失敗の責任を部下に（　）した。",c:["転嫁","転換","転送","転向"],a:0,e:"責任転嫁（せきにんてんか）＝諉過於人。転換＝轉換（方針）。"},
{t:"文脈規定",q:"この制度は（　）から見直す必要がある。",c:["根本","本場","本音","本格"],a:0,e:"根本（こんぽん）から＝從根本上。本場＝正宗產地。"},
{t:"文脈規定",q:"彼の主張には（　）がなく、誰も賛成しなかった。",c:["説得力","影響力","忍耐力","持久力"],a:0,e:"説得力（せっとくりょく）がある／ない＝有無說服力。"},
{t:"文脈規定",q:"この証人が事件解決の（　）を握っている。",c:["鍵","錠","扉","札"],a:0,e:"鍵（かぎ）を握る＝掌握關鍵。"},
{t:"文脈規定",q:"彼は（　）を切らして、返事を待たずに帰ってしまった。",c:["しびれ","あきれ","いらだち","つかれ"],a:0,e:"しびれを切らす＝等得不耐煩，慣用語。"},
{t:"文脈規定",q:"賃金交渉は（　）に乗り上げたまま、年を越した。",c:["暗礁","岩場","浅瀬","難所"],a:0,e:"暗礁（あんしょう）に乗り上げる＝觸礁、陷入僵局。"},
{t:"文脈規定",q:"彼の改革案は役員会で（　）された。",c:["一蹴","一掃","一新","一変"],a:0,e:"一蹴（いっしゅう）する＝一口回絕。一掃＝掃除一空。"},
{t:"文脈規定",q:"相手の（　）をつく攻撃で先制点を奪った。",c:["意表","意図","意向","意地"],a:0,e:"意表（いひょう）をつく＝出其不意。意地＝固執。"},
{t:"文脈規定",q:"創業者は会社の再建に（　）を注いだ。",c:["心血","心中","心境","心情"],a:0,e:"心血（しんけつ）を注ぐ＝傾注心血。"},
{t:"文脈規定",q:"（　）返上とばかりに、彼は次の試合で大活躍した。",c:["汚名","悪名","不評","恥辱"],a:0,e:"汚名返上（おめいへんじょう）＝洗刷污名。注意「汚名挽回」是誤用。"},
{t:"文脈規定",q:"彼は集めた絵画を（　）もなく美術館に寄贈した。",c:["惜しげ","惜しみ","未練","無念"],a:0,e:"惜しげもなく＝毫不吝惜地，固定形。"},
{t:"文脈規定",q:"会議は結論が出ないまま深夜に（　）。",c:["及んだ","達した","運んだ","極めた"],a:0,e:"深夜に及ぶ＝（時間）持續到深夜。"},
{t:"文脈規定",q:"提出の期限が（　）いるのに、まだ半分しかできていない。",c:["迫って","縮んで","追って","詰めて"],a:0,e:"期限が迫る（せまる）＝期限逼近。"},
{t:"文脈規定",q:"この地方は温泉と豊かな自然に（　）いる。",c:["恵まれて","富んで","満ちて","越えて"],a:0,e:"〜に恵まれる（めぐまれる）＝得天獨厚。変化に富む＝富於變化，搭配不同。"},
{t:"文脈規定",q:"予算案は賛成多数で（　）された。",c:["可決","採決","判決","解決"],a:0,e:"可決（かけつ）＝表決通過。採決＝進行表決這個動作；判決＝法院判決。"},
{t:"文脈規定",q:"誤解を（　）ような曖昧な表現は避けてください。",c:["招く","呼ぶ","誘う","迎える"],a:0,e:"誤解を招く（まねく）＝引起誤解，固定搭配。"},
{t:"文脈規定",q:"兄の話題は（　）株のことばかりだ。",c:["もっぱら","ひたすら","おおむね","ことごとく"],a:0,e:"もっぱら＝專門、淨是。ひたすら＝一味埋頭；ことごとく＝全都。"},
{t:"文脈規定",q:"担当者は（　）を尽くして住民に説明した。",c:["言葉","言論","言語","言い分"],a:0,e:"言葉を尽くす＝苦口婆心、費盡唇舌。言い分＝主張、藉口。"},
{t:"文脈規定",q:"急激な円高の（　）を受けて、輸出企業の倒産が相次いだ。",c:["あおり","はずみ","ゆとり","なごり"],a:0,e:"あおりを受ける＝受到（負面）波及。はずみ＝勢頭、衝勁。"},
{t:"文脈規定",q:"ITの導入で作業効率が（　）に向上した。",c:["飛躍的","躍動的","流動的","突発的"],a:0,e:"飛躍的（ひやくてき）に＝飛躍性地。"},
{t:"文脈規定",q:"卒業後は福祉の仕事に（　）したいと考えている。",c:["従事","就任","着手","加入"],a:0,e:"仕事に従事（じゅうじ）する＝從事。就任＝就任（職位）。"},
{t:"文脈規定",q:"個人情報の取り扱いには細心の（　）を払うべきだ。",c:["注意","用心","油断","感心"],a:0,e:"細心の注意を払う＝萬分小心，固定搭配。用心＝提防；油断＝大意。"},
{t:"文脈規定",q:"彼女は入社一年目から（　）成長を遂げた。",c:["目覚ましい","勇ましい","好ましい","望ましい"],a:0,e:"目覚ましい（めざましい）＝驚人的、出色的（成長、活躍）。勇ましい＝勇猛。"},
{t:"文脈規定",q:"その提案は現実と（　）しているとして退けられた。",c:["乖離","分離","隔離","遊離"],a:0,e:"乖離（かいり）する＝背離、脫節。隔離＝隔離（人、物）。"},
{t:"文脈規定",q:"彼は質問に（　）答えず、話をそらしてばかりいた。",c:["ろくに","じかに","もろに","やけに"],a:0,e:"ろくに〜ない＝沒好好地～。じかに＝直接；もろに＝正面全部；やけに＝格外。"},
{t:"文脈規定",q:"募集人数を大きく（　）応募が殺到した。",c:["上回る","見合う","見込む","上向く"],a:0,e:"上回る（うわまわる）＝超過。反義：下回る。見込む＝預估。"},
{t:"文脈規定",q:"転校した娘は新しい環境にすぐ（　）した。",c:["順応","適用","感応","反応"],a:0,e:"順応（じゅんのう）する＝適應。「適応」也可，但「適用」是套用規則，不能用於人。"},
{t:"文脈規定",q:"彼の主張は（　）に欠けていて、信用できない。",c:["一貫性","一体性","一律性","一面性"],a:0,e:"一貫性（いっかんせい）に欠ける＝前後不一。"},
{t:"文脈規定",q:"給料から社会保険料が（　）される。",c:["控除","削除","排除","解除"],a:0,e:"控除（こうじょ）＝扣除。削除＝刪除（資料）；解除＝解除（契約、警報）。"},
{t:"文脈規定",q:"彼女は涙（　）に当時の様子を語った。",c:["ながら","がち","ぎみ","まみれ"],a:0,e:"涙ながらに＝含著淚（固定用法）。〜まみれ＝沾滿（泥、血）。"},
{t:"文脈規定",q:"政府は事態の（　）を注意深く見守っている。",c:["推移","変遷","移行","移転"],a:0,e:"推移（すいい）＝（事態、數值的）演變。変遷＝（時代的）變遷。"},
{t:"文脈規定",q:"経理担当者が会社の金を（　）していたことが発覚した。",c:["横領","占領","横取り","略奪"],a:0,e:"横領（おうりょう）＝侵占、盜用（公款）。占領＝佔領（土地）。"},
{t:"文脈規定",q:"あの二人は昔から犬猿の（　）だ。",c:["仲","間","縁","組"],a:0,e:"犬猿の仲（けんえんのなか）＝水火不容，慣用語。"},
{t:"文脈規定",q:"難しい交渉だったが、（　）よくまとまった。",c:["首尾","始末","結末","顛末"],a:0,e:"首尾（しゅび）よく＝順利地。顛末（てんまつ）＝始末、原委。"},
{t:"文脈規定",q:"彼は自分の非を（　）認めて謝罪した。",c:["潔く","著しく","快く","等しく"],a:0,e:"潔く（いさぎよく）認める＝乾脆地承認。快く引き受ける＝爽快答應，搭配不同。"},
{t:"文脈規定",q:"仕事が忙しくても、健康管理を（　）にしてはいけない。",c:["おろそか","おおまか","なめらか","ひそか"],a:0,e:"疎か（おろそか）にする＝疏忽、馬虎。"},
{t:"文脈規定",q:"（　）な計画を立てた上で、工事に着手した。",c:["綿密","精密","厳密","過密"],a:0,e:"綿密（めんみつ）な計画＝周密的計畫。精密＝儀器精密；厳密＝嚴謹（區分）。"},
{t:"文脈規定",q:"彼の一言が（　）となって、二人の関係は破局を迎えた。",c:["引き金","仕掛け","手掛かり","糸口"],a:0,e:"引き金（ひきがね）となる＝成為導火線。糸口＝（解決的）線索。"},
{t:"文脈規定",q:"その事件は翌日の新聞に大きく（　）された。",c:["掲載","記載","搭載","連載"],a:0,e:"掲載（けいさい）＝刊登。搭載＝（設備）搭載；連載＝連載。"},
{t:"文脈規定",q:"相手から（　）な値段を吹っかけられた。",c:["法外","破格","特価","例外"],a:0,e:"法外（ほうがい）＝離譜（的價格、要求）。破格＝破例優惠。"},
{t:"文脈規定",q:"注文が急増し、部品の（　）が追いつかない。",c:["供給","支給","配給","給付"],a:0,e:"供給（きょうきゅう）＝供應。支給＝發給（薪資）；給付＝（保險）給付。"},
{t:"文脈規定",q:"彼女は（　）を利かせて、先に会場を押さえておいてくれた。",c:["気","腕","口","足"],a:0,e:"気を利かせる＝機靈體貼地行動。腕を振るう＝大顯身手。"},
{t:"文脈規定",q:"記録的な大雪で、首都圏の交通が（　）した。",c:["麻痺","硬直","失速","窒息"],a:0,e:"交通が麻痺（まひ）する＝交通癱瘓，固定搭配。"},
{t:"文脈規定",q:"彼女は大勢の前でも（　）と自分の意見を言える。",c:["堂々","黙々","悠々","渋々"],a:0,e:"堂々（どうどう）と＝堂堂正正、落落大方。渋々＝不情願地。"},
{t:"文脈規定",q:"彼は（　）働いて、ついに自分の店を持つ夢を実現した。",c:["こつこつ","ぶつぶつ","のろのろ","ぼつぼつ"],a:0,e:"こつこつ＝踏實勤懇地。ぼつぼつ＝差不多該～。"},
{t:"文脈規定",q:"詳細は追って詰めるとして、（　）大枠の方針だけ固めよう。",c:["ひとまず","かねて","いたって","まして"],a:0,e:"ひとまず＝暫且。かねて＝早先；いたって＝極為；まして＝何況。"},
{t:"文脈規定",q:"何度聞いても、彼の説明は（　）要領を得ない。",c:["どうも","どうか","どうにか","どうやら"],a:0,e:"どうも〜ない＝總覺得（不對勁）。要領を得ない＝不得要領。"},
{t:"文脈規定",q:"人身事故の影響で、電車の（　）が大幅に乱れている。",c:["ダイヤ","スケジュール","カレンダー","プログラム"],a:0,e:"ダイヤ＝列車時刻表（ダイヤグラム的略稱），電車誤點新聞必出詞。"},
{t:"文脈規定",q:"顧客の多様な（　）に応える商品づくりを目指す。",c:["ニーズ","ムード","ブーム","マナー"],a:0,e:"ニーズに応える＝回應需求。"},
{t:"文脈規定",q:"両国の間で貿易（　）が激化している。",c:["摩擦","衝撃","葛藤","抗争"],a:0,e:"貿易摩擦（ぼうえきまさつ）＝貿易摩擦。葛藤＝內心糾葛。"},
{t:"文脈規定",q:"祖父は定年後、田舎で（　）の生活を送っている。",c:["悠々自適","右往左往","無我夢中","半信半疑"],a:0,e:"悠々自適（ゆうゆうじてき）＝悠然自得。右往左往＝慌亂奔走。"},
{t:"文脈規定",q:"彼の長年の功績は高い評価に（　）する。",c:["値","価","質","格"],a:0,e:"値する（あたいする）＝值得。評価に値する／賞賛に値する。"},
{t:"文脈規定",q:"議案がすんなり通るよう、事前に各部署へ（　）をしておいた。",c:["根回し","先回り","出回り","顔出し"],a:0,e:"根回し（ねまわし）＝事前疏通、打好招呼。日本職場文化頻出詞。"},
{t:"文脈規定",q:"彼は多額の借金の（　）に追われている。",c:["返済","返却","返還","返品"],a:0,e:"返済（へんさい）＝還債。返却＝歸還（書、物品）；返還＝歸還（領土、獎盃）。"},
{t:"文脈規定",q:"風邪が（　）て、とうとう肺炎になってしまった。",c:["こじれ","もつれ","ねじれ","くずれ"],a:0,e:"こじれる＝（病）惡化、（關係）鬧僵。もつれる＝糾纏不清。"},
{t:"文脈規定",q:"話がすぐ（　）して、会議がなかなか進まない。",c:["脱線","越線","断線","混線"],a:0,e:"話が脱線（だっせん）する＝離題。断線・混線是電線電話用語。"},
{t:"文脈規定",q:"その構想は面白いが、いささか現実（　）している。",c:["離れ","外れ","逃れ","負け"],a:0,e:"現実離れ（げんじつばなれ）する＝脫離現實。いささか＝稍微。"},
{t:"文脈規定",q:"少女は（　）のない笑顔で観光客を迎えた。",c:["屈託","躊躇","匿名","未練"],a:0,e:"屈託（くったく）のない＝無憂無慮的（笑容）。未練＝留戀。"},
{t:"文脈規定",q:"大事な試験を明日に（　）、彼は落ち着かない様子だ。",c:["控えて","備えて","抱えて","構えて"],a:0,e:"〜を（明日に）控える＝（重要日子）在即。備える＝為～做準備。"},
{t:"文脈規定",q:"傘もないのに、（　）の雨に降られてずぶぬれになった。",c:["あいにく","うってつけ","もってこい","なけなし"],a:0,e:"あいにく＝不湊巧。うってつけ／もってこい＝正合適；なけなしの金＝僅有的一點錢。"},
{t:"文脈規定",q:"彼は日頃鍛えた実力を（　）なく発揮した。",c:["遺憾","無念","失念","残念"],a:0,e:"遺憾（いかん）なく発揮する＝淋漓盡致地發揮，固定搭配。"},
{t:"文脈規定",q:"合格発表を前に、期待と不安が（　）する。",c:["交錯","交差","交流","交替"],a:0,e:"交錯（こうさく）する＝（情緒）交織。交差＝（道路）交叉。"},
{t:"文脈規定",q:"何度話し合っても、両者の意見の（　）は埋まらなかった。",c:["隔たり","仕切り","区切り","偏り"],a:0,e:"隔たり（へだたり）＝差距、隔閡。偏り＝偏頗。"},
{t:"文脈規定",q:"彼は若手実業家として世界に（　）を馳せている。",c:["名","評","誉","顔"],a:0,e:"名を馳せる（なをはせる）＝馳名。"},
{t:"文脈規定",q:"出張の日程が決まったら、（　）先方に知らせておいてください。",c:["前もって","かろうじて","おりかえし","さしあたり"],a:0,e:"前もって＝事先。さしあたり＝目前暫且；おりかえし＝（電話）馬上回覆。"},
{t:"文脈規定",q:"全速力で走って、（　）終電に間に合った。",c:["かろうじて","しいて","かえって","まさしく"],a:0,e:"かろうじて＝好不容易、勉強。しいて＝硬要；かえって＝反而。"},
{t:"文脈規定",q:"定期点検は、事故を（　）に防ぐために欠かせない。",c:["未然","無断","不意","突然"],a:0,e:"未然（みぜん）に防ぐ＝防範於未然，固定搭配。"},
{t:"文脈規定",q:"せっかくの旅行が、台風で（　）になってしまった。",c:["台無し","手遅れ","帳消し","棒読み"],a:0,e:"台無し（だいなし）＝泡湯、全毀。帳消し＝一筆勾銷。"},
{t:"文脈規定",q:"久しぶりの休暇で、家族との時間を（　）した。",c:["満喫","満載","満点","満期"],a:0,e:"満喫（まんきつ）する＝盡情享受。満載＝滿載。"},
{t:"文脈規定",q:"売り言葉に（　）で、つい言い返してしまった。",c:["買い言葉","返し言葉","逆さ言葉","捨て言葉"],a:0,e:"売り言葉に買い言葉＝一言不合互不相讓，諺語。"},
{t:"文脈規定",q:"作業中は常に安全を（　）に置いて行動すること。",c:["念頭","脳裏","胸中","眼中"],a:0,e:"念頭（ねんとう）に置く＝放在心上。脳裏に浮かぶ＝浮現腦海。"},
{t:"文脈規定",q:"彼は一度怒り出すと（　）がつかなくなる。",c:["見境","見当","見込み","見出し"],a:0,e:"見境（みさかい）がつかない＝失去分寸、不分青紅皂白。見当がつかない＝無法估計。"},
{t:"文脈規定",q:"根拠のない（　）がSNSで一気に拡散した。",c:["デマ","メディア","データ","テーマ"],a:0,e:"デマ＝謠言（源自德語 Demagogie）。"},
{t:"文脈規定",q:"どんな手術にも、多かれ少なかれ（　）が伴う。",c:["リスク","ダメージ","ロス","ミス"],a:0,e:"リスクが伴う＝伴隨風險。"},
{t:"文脈規定",q:"当社の製品は国内市場で首位の（　）を誇っている。",c:["シェア","ジャンル","レース","スコア"],a:0,e:"シェア＝市占率。ジャンル＝類型。"},
{t:"文脈規定",q:"彼は時間に（　）で、待ち合わせにいつも遅れてくる。",c:["ルーズ","デリケート","ラフ","シック"],a:0,e:"時間にルーズ＝沒時間觀念。ラフ＝隨性；シック＝雅緻。"},
{t:"文脈規定",q:"災害に備えて、水と非常食を（　）しておくとよい。",c:["ストック","セット","パック","ラック"],a:0,e:"ストックする＝儲備。"},
{t:"文脈規定",q:"彼が嘘をついていることには（　）気づいていた。",c:["うすうす","ちょくちょく","ぼつぼつ","つくづく"],a:0,e:"うすうす＝隱約（察覺）。つくづく＝深切地。"},
{t:"文脈規定",q:"参加者の年齢層は（　）で、10代から80代までいる。",c:["まちまち","ちぐはぐ","おのおの","かわるがわる"],a:0,e:"まちまち＝各不相同。ちぐはぐ＝不協調。"},
{t:"文脈規定",q:"彼女は一人娘として（　）されて育てられた。",c:["ちやほや","いやいや","めそめそ","ぺこぺこ"],a:0,e:"ちやほやする＝捧在手心嬌寵。ぺこぺこ＝點頭哈腰。"},
{t:"文脈規定",q:"済んでしまったことを（　）悩んでも仕方がない。",c:["くよくよ","ひやひや","ぺらぺら","ふらふら"],a:0,e:"くよくよ＝耿耿於懷。ひやひや＝捏一把冷汗。"},
{t:"文脈規定",q:"先方に契約延長の意向を（　）してみた。",c:["打診","診断","打開","打撃"],a:0,e:"打診（だしん）する＝試探（對方意願）。打開＝打開（僵局）。"},
{t:"文脈規定",q:"経理部門の長年の不正が（　）した。",c:["発覚","発症","発病","発芽"],a:0,e:"発覚（はっかく）する＝（壞事）敗露。"},
{t:"文脈規定",q:"地域間の教育格差を（　）するための施策が求められる。",c:["是正","訂正","改定","校正"],a:0,e:"是正（ぜせい）＝矯正（不公、偏差）。訂正＝訂正（錯字）；校正＝校對。"},
{t:"文脈規定",q:"警察は違法な取引を水際で（　）した。",c:["阻止","静止","停止","中止"],a:0,e:"阻止（そし）する＝阻止。静止＝靜止不動。"},
{t:"文脈規定",q:"この用語集は業界の専門用語をほぼ（　）している。",c:["網羅","捕獲","収監","封鎖"],a:0,e:"網羅（もうら）する＝網羅、收錄無遺。"},
{t:"文脈規定",q:"彼は目立つことを好まず、常に裏方に（　）した。",c:["徹した","接した","達した","服した"],a:0,e:"〜に徹する（てっする）＝徹底扮演（某角色）。裏方＝幕後人員。"},
{t:"文脈規定",q:"ようやく景気回復の（　）が見え始めた。",c:["兆し","印","証","癖"],a:0,e:"兆し（きざし）＝徵兆、苗頭。"},
{t:"文脈規定",q:"この件は正式発表まで（　）に願います。",c:["内密","隠密","厳密","精密"],a:0,e:"内密（ないみつ）に＝私下保密。隠密＝隱密（行動）。"},
{t:"文脈規定",q:"（　）の休息もつかの間、彼はまた呼び出された。",c:["束の間","咄嗟","不意","矢先"],a:0,e:"束の間（つかのま）＝短暫片刻。咄嗟（とっさ）＝一瞬間。"},
{t:"文脈規定",q:"（　）の判断でハンドルを切り、衝突を避けた。",c:["咄嗟","一途","早急","性急"],a:0,e:"咄嗟（とっさ）の判断＝千鈞一髮的判斷。性急＝急躁。"},
{t:"文脈規定",q:"連休中はどこの会社も警備が（　）になりがちだ。",c:["手薄","手軽","手頃","手短"],a:0,e:"手薄（てうす）＝（人手、防備）薄弱。手頃＝合適；手短＝簡短。"},
{t:"文脈規定",q:"列に（　）のは、どこの国でもマナー違反だ。",c:["割り込む","食い込む","付け込む","溶け込む"],a:0,e:"割り込む＝插隊、插嘴。付け込む＝趁虛而入；溶け込む＝融入。"},
{t:"文脈規定",q:"強風のため、新幹線は運転を（　）ている。",c:["見合わせ","見比べ","見渡し","見落とし"],a:0,e:"運転を見合わせる＝暫停行駛，車站廣播固定用語。"},
{t:"文脈規定",q:"警察は飲酒運転を厳しく（　）方針だ。",c:["取り締まる","取り扱う","取り組む","取り替える"],a:0,e:"取り締まる（とりしまる）＝取締。取り組む＝致力於。"},
{t:"文脈規定",q:"夜更かしは翌日の仕事に（　）から、ほどほどにしなさい。",c:["差し支える","立て替える","突き当たる","行き違う"],a:0,e:"差し支える（さしつかえる）＝妨礙、有影響。立て替える＝代墊（錢）。"},
{t:"文脈規定",q:"期日までに返信がない場合は、欠席と（　）ます。",c:["見なし","見習い","見合わせ","見計らい"],a:0,e:"〜と見なす（みなす）＝視為。通知書面固定用語。"},
{t:"文脈規定",q:"半導体工場の誘致計画が、いよいよ現実味を（　）てきた。",c:["帯び","浴び","滲み","課し"],a:0,e:"現実味を帯びる（おびる）＝越來越有可能實現。注目を浴びる＝受矚目。"},
{t:"文脈規定",q:"相次ぐ不祥事で、経営陣への信頼が（　）でいる。",c:["揺らい","ゆがん","たわん","ひずん"],a:0,e:"信頼が揺らぐ（ゆらぐ）＝信任動搖。"},
{t:"文脈規定",q:"たった一度の不祥事が、長年築いた企業イメージを大きく（　）た。",c:["損なっ","費やし","滅ぼし","荒らし"],a:0,e:"損なう（そこなう）＝損害（信譽、健康）。費やす＝耗費（時間金錢）。"},
{t:"文脈規定",q:"故郷の母は、いつも私の身を（　）てくれている。",c:["案じ","念じ","感じ","禁じ"],a:0,e:"案じる（あんじる）＝擔心掛念。念じる＝祈求默念。"},
{t:"文脈規定",q:"彼は危険を（　）ず、川に飛び込んで子どもを救った。",c:["顧みず","及ばず","限らず","問わず"],a:0,e:"危険を顧みず（かえりみず）＝不顧危險，固定搭配。"},
{t:"文脈規定",q:"登山隊は悪天候を乗り越え、ついに山頂を（　）た。",c:["極め","収め","治め","納め"],a:0,e:"山頂を極める（きわめる）＝登頂。同訓異字：修める／収める／治める／納める要分清。"},
{t:"文脈規定",q:"失業中の今は、わずかな貯金で（　）しかない。",c:["しのぐ","のがれる","まぬがれる","ねばる"],a:0,e:"凌ぐ（しのぐ）＝勉強撐過（難關）。その日をしのぐ＝度日。"},
// ================= 言い換え類義 =================
{t:"言い換え",q:"<u>あらかじめ</u>資料に目を通しておいてください。",c:["前もって","ひととおり","ざっと","念のため"],a:0,e:"あらかじめ＝前もって＝事先。"},
{t:"言い換え",q:"うわさは<u>たちまち</u>学校中に広まった。",c:["あっという間に","こっそり","じわじわ","いつのまにか"],a:0,e:"たちまち＝轉眼間、立刻。じわじわ＝慢慢地。"},
{t:"言い換え",q:"母は弟の将来を<u>案じて</u>いる。",c:["心配して","考えて","期待して","計画して"],a:0,e:"案じる＝擔心。"},
{t:"言い換え",q:"突然指名されて、彼はすっかり<u>うろたえて</u>しまった。",c:["慌てて","疲れて","怒って","黙って"],a:0,e:"うろたえる＝驚慌失措。"},
{t:"言い換え",q:"彼の答えは<u>ありきたりの</u>ものだった。",c:["平凡な","的外れな","大げさな","あいまいな"],a:0,e:"ありきたり＝老套、司空見慣。"},
{t:"言い換え",q:"彼女は親友に悩みを<u>打ち明けた</u>。",c:["隠さずに話した","相談した","報告した","説明した"],a:0,e:"打ち明ける＝坦白說出（心事）。"},
{t:"言い換え",q:"計画は<u>おおむね</u>順調に進んでいる。",c:["だいたい","非常に","予想外に","部分的に"],a:0,e:"概ね（おおむね）＝大致上。"},
{t:"言い換え",q:"大事な場面で<u>しくじって</u>しまった。",c:["失敗して","緊張して","ためらって","油断して"],a:0,e:"しくじる＝搞砸。"},
{t:"言い換え",q:"彼の実力はプロに<u>匹敵する</u>。",c:["同じぐらいだ","及ばない","勝っている","近づいている"],a:0,e:"匹敵する（ひってきする）＝不相上下。"},
{t:"言い換え",q:"彼は<u>不服そうな</u>顔で結果を聞いていた。",c:["不満そうな","不安そうな","眠そうな","退屈そうな"],a:0,e:"不服（ふふく）＝不服氣、不滿。"},
{t:"言い換え",q:"手続きが<u>わずらわしくて</u>、申請をやめた。",c:["面倒で","難しくて","時間がかかって","分かりにくくて"],a:0,e:"煩わしい＝繁瑣麻煩。"},
{t:"言い換え",q:"立ち上がった<u>拍子に</u>、腰を痛めた。",c:["とたんに","ついでに","かわりに","あまり"],a:0,e:"〜た拍子に（ひょうしに）＝就在～的那一瞬間。"},
{t:"言い換え",q:"努力がすべて<u>むなしく</u>感じられた。",c:["無意味に","悲しく","苦しく","恥ずかしく"],a:0,e:"空しい／虚しい（むなしい）＝空虛、徒勞。"},
{t:"言い換え",q:"そんなことは<u>とっくに</u>知っていた。",c:["ずっと前から","なんとなく","たまたま","うすうす"],a:0,e:"とっくに＝早就。"},
{t:"言い換え",q:"<u>かねてから</u>の計画がようやく実現した。",c:["以前から","去年から","このごろ","近々"],a:0,e:"かねてから＝老早以前就。"},
{t:"言い換え",q:"<u>目下</u>、原因を調査中です。",c:["現在","今後","当面","将来"],a:0,e:"目下（もっか）＝目前。書面語。"},
{t:"言い換え",q:"料金が<u>若干</u>変更になる場合があります。",c:["少し","大幅に","頻繁に","一時的に"],a:0,e:"若干（じゃっかん）＝少許。"},
{t:"言い換え",q:"この問題は<u>極めて</u>深刻だ。",c:["非常に","やや","次第に","比較的"],a:0,e:"極めて（きわめて）＝極為。"},
{t:"言い換え",q:"患者の容体は<u>予断を許さない</u>状況だ。",c:["先がどうなるか分からない","回復に向かっている","もう心配いらない","説明できない"],a:0,e:"予断を許さない＝情勢難料、不容樂觀。"},
{t:"言い換え",q:"彼とは<u>気が置けない</u>間柄だ。",c:["遠慮のいらない","油断できない","信用できない","めったに会えない"],a:0,e:"気が置けない＝不必拘束客套。字面易誤解成「不能大意」，N1 經典陷阱。"},
{t:"言い換え",q:"靴を<u>あべこべに</u>履いていた。",c:["反対に","きちんと","無理やり","別々に"],a:0,e:"あべこべ＝顛倒、相反。"},
{t:"言い換え",q:"彼は客の質問に<u>ぞんざいに</u>答えた。",c:["いい加減に","丁寧に","的確に","小声で"],a:0,e:"ぞんざい＝草率、粗魯。"},
{t:"言い換え",q:"提案は<u>ことごとく</u>却下された。",c:["すべて","次々と","あっさり","一部"],a:0,e:"ことごとく＝盡數、全部。"},
{t:"言い換え",q:"休日は<u>存分に</u>体を休めてください。",c:["思う存分","少しだけ","定期的に","早めに"],a:0,e:"存分に（ぞんぶんに）＝盡情地。"},
{t:"言い換え",q:"事故の後、問い合わせが<u>相次いだ</u>。",c:["次々と続いた","ぱったり止まった","ようやく来た","わずかにあった"],a:0,e:"相次ぐ（あいつぐ）＝接連不斷。"},
{t:"言い換え",q:"異常を発見したら<u>直ちに</u>報告すること。",c:["すぐに","慎重に","詳しく","正確に"],a:0,e:"直ちに（ただちに）＝立即。公文用語。"},
{t:"言い換え",q:"<u>ひとまず</u>この件はここまでにしましょう。",c:["とりあえず","完全に","最終的に","改めて"],a:0,e:"ひとまず＝暫且告一段落。"},
{t:"言い換え",q:"結果を聞いて、彼はひどく<u>落胆した</u>。",c:["がっかりした","腹を立てた","動揺した","反省した"],a:0,e:"落胆（らくたん）する＝沮喪。"},
{t:"言い換え",q:"住民たちは役所の対応に<u>憤慨した</u>。",c:["ひどく怒った","深く失望した","強く抗議した","不安になった"],a:0,e:"憤慨（ふんがい）する＝憤慨。"},
{t:"言い換え",q:"それは<u>妥当な</u>判断だと思う。",c:["適切な","大胆な","慎重な","意外な"],a:0,e:"妥当（だとう）＝妥當。"},
{t:"言い換え",q:"その制度は10年前に<u>廃止された</u>。",c:["やめることになった","改められた","縮小された","一時停止された"],a:0,e:"廃止（はいし）＝廢除。"},
{t:"言い換え",q:"彼は遅刻したことを<u>詫びた</u>。",c:["謝った","悔やんだ","ごまかした","弁解した"],a:0,e:"詫びる（わびる）＝道歉。名詞：お詫び。"},
{t:"言い換え",q:"彼は常に手帳を<u>携えて</u>いる。",c:["持ち歩いて","大切にして","気にして","用意して"],a:0,e:"携える（たずさえる）＝隨身攜帶。"},
{t:"言い換え",q:"社長自ら現地に<u>出向いた</u>。",c:["行った","電話した","指示を出した","人を送った"],a:0,e:"出向く（でむく）＝親自前往。"},
{t:"言い換え",q:"開催が<u>危ぶまれて</u>いた大会は、無事に行われた。",c:["難しいと思われて","延期されて","批判されて","期待されて"],a:0,e:"危ぶむ（あやぶむ）＝認為懸乎、擔心（辦不成）。"},
{t:"言い換え",q:"体力は<u>徐々に</u>回復してきた。",c:["少しずつ","完全に","急速に","一時的に"],a:0,e:"徐々に（じょじょに）＝逐漸。"},
{t:"言い換え",q:"<u>不意に</u>後ろから名前を呼ばれた。",c:["突然","何度も","小さな声で","遠くから"],a:0,e:"不意に（ふいに）＝冷不防。"},
{t:"言い換え",q:"財布も携帯もなくして、<u>途方に暮れて</u>しまった。",c:["どうしていいか分からなくなって","あきらめて","腹が立って","泣きたくなって"],a:0,e:"途方に暮れる＝走投無路、不知所措。"},
{t:"言い換え",q:"この素材は<u>しなやかで</u>加工しやすい。",c:["柔軟で","頑丈で","軽くて","なめらかで"],a:0,e:"しなやか＝柔韌。"},
{t:"言い換え",q:"この机は<u>頑丈に</u>できている。",c:["丈夫に","複雑に","精巧に","簡単に"],a:0,e:"頑丈（がんじょう）＝堅固。"},
{t:"言い換え",q:"<u>内心</u>、彼は不安でたまらなかった。",c:["心の中では","表情には","誰が見ても","口では"],a:0,e:"内心（ないしん）＝內心裡。"},
{t:"言い換え",q:"店内の商品は<u>均一</u>価格で売られている。",c:["すべて同じ","半分ほどの","手頃な","特別な"],a:0,e:"均一（きんいつ）＝一律相同。100円均一。"},
{t:"言い換え",q:"このような結果になり、誠に<u>遺憾に</u>思います。",c:["残念に","申し訳なく","不思議に","疑問に"],a:0,e:"遺憾（いかん）＝遺憾。政治家答詢高頻詞，≠道歉。"},
{t:"言い換え",q:"そんなに<u>せかさないで</u>ください。",c:["急がせないで","怒らないで","からかわないで","責めないで"],a:0,e:"急かす（せかす）＝催促。"},
{t:"言い換え",q:"この手続きは<u>ややこしい</u>から、窓口で聞いたほうがいい。",c:["複雑だ","時間がかかる","珍しい","厳しい"],a:0,e:"ややこしい＝複雜難懂。"},
{t:"言い換え",q:"連日の残業ですっかり<u>ばてて</u>しまった。",c:["疲れきって","嫌になって","慣れて","太って"],a:0,e:"ばてる＝累垮。"},
{t:"言い換え",q:"彼はこの仕事のコツを<u>心得て</u>いる。",c:["よく分かって","習って","覚えようとして","人に教えて"],a:0,e:"心得る（こころえる）＝懂得、掌握要領。"},
{t:"言い換え",q:"その知らせを聞いて<u>仰天した</u>。",c:["非常に驚いた","深く感動した","大喜びした","呆れ果てた"],a:0,e:"仰天（ぎょうてん）する＝大吃一驚。びっくり仰天。"},
{t:"言い換え",q:"この装置が動く<u>メカニズム</u>を説明します。",c:["仕組み","目的","特徴","性能"],a:0,e:"メカニズム＝機制、構造原理。"},
{t:"言い換え",q:"コーチの採点は<u>シビアだ</u>。",c:["厳しい","公平だ","細かい","独特だ"],a:0,e:"シビア＝嚴苛。"},
{t:"言い換え",q:"これは<u>デリケートな</u>問題なので、慎重に扱おう。",c:["扱いに注意がいる","答えが出ない","誰も知らない","理解しにくい"],a:0,e:"デリケート＝微妙敏感的。"},
{t:"言い換え",q:"彼は思ったことを<u>ストレートに</u>言う。",c:["率直に","すぐに","大声で","繰り返し"],a:0,e:"ストレートに＝直截了當。"},
{t:"言い換え",q:"今月は予定が<u>タイトだ</u>。",c:["余裕がない","少ない","変わりやすい","未定だ"],a:0,e:"タイト＝（日程）緊湊、（衣服）緊身。"},
{t:"言い換え",q:"資料に<u>ざっと</u>目を通した。",c:["おおまかに","じっくり","何度も","最後まで"],a:0,e:"ざっと＝粗略地。"},
{t:"言い換え",q:"彼の言うことは<u>まるっきり</u>信用できない。",c:["全く","あまり","半分ほど","時々"],a:0,e:"まるっきり〜ない＝完全不～。"},
{t:"言い換え",q:"忙しくて<u>ろくに</u>寝ていない。",c:["十分に","全く","何日も","一人で"],a:0,e:"ろくに〜ない＝沒能好好地～。答案要含否定呼應。"},
{t:"言い換え",q:"彼女は仕事を<u>てきぱきと</u>片付けた。",c:["手際よく","ゆっくり丁寧に","いやいや","黙々と"],a:0,e:"てきぱき＝俐落地。"},
{t:"言い換え",q:"この通りの店は<u>軒並み</u>値上げした。",c:["どこもみな","一部だけ","相次いで","少しずつ"],a:0,e:"軒並み（のきなみ）＝家家戶戶、一律。"},
{t:"言い換え",q:"彼は<u>しきりに</u>時計を気にしていた。",c:["何度も","たまに","こっそり","初めから"],a:0,e:"しきりに＝頻頻。"},
{t:"言い換え",q:"成功できたのは<u>ひとえに</u>皆様のおかげです。",c:["ただただ","おそらく","半分は","結果的に"],a:0,e:"ひとえに＝完全是、全然（歸功於）。"},
{t:"言い換え",q:"<u>無論</u>、費用はこちらで負担します。",c:["もちろん","おそらく","一応","例外的に"],a:0,e:"無論（むろん）＝當然。"},
{t:"言い換え",q:"<u>大方</u>の予想どおり、彼が優勝した。",c:["ほとんどの人","一部の人","専門家","本人"],a:0,e:"大方（おおかた）＝大多數（人）、大致。"},
{t:"言い換え",q:"景気は<u>依然として</u>厳しい状況にある。",c:["相変わらず","予想以上に","ますます","一時的に"],a:0,e:"依然として（いぜんとして）＝依然。"},
{t:"言い換え",q:"こんな量は<u>到底</u>一日では終わらない。",c:["どうしても","なかなか","ほとんど","たぶん"],a:0,e:"到底（とうてい）〜ない＝無論如何也不～。"},
{t:"言い換え",q:"会費は<u>一律に</u>3千円とする。",c:["みな同じように","おおよそ","最低でも","仮に"],a:0,e:"一律（いちりつ）に＝一律。"},
{t:"言い換え",q:"祖父母は<u>質素な</u>生活を送っている。",c:["ぜいたくをしない","不便な","静かな","規則正しい"],a:0,e:"質素（しっそ）＝樸素。"},
{t:"言い換え",q:"彼は<u>露骨に</u>不満な態度を示した。",c:["あからさまに","遠回しに","うっかり","上品に"],a:0,e:"露骨に＝毫不掩飾地。あからさま＝公然、露骨。"},
{t:"言い換え",q:"約束を忘れるとは、<u>面目ない</u>。",c:["恥ずかしくて申し訳ない","悔しくてたまらない","信じられない","もったいない"],a:0,e:"面目ない（めんぼくない）＝沒臉見人。"},
{t:"言い換え",q:"知り合いが一人もいなくて<u>心細かった</u>。",c:["不安だった","悲しかった","退屈だった","悔しかった"],a:0,e:"心細い（こころぼそい）＝心裡沒底、孤單不安。"},
{t:"言い換え",q:"この会社は社員の<u>待遇</u>がいい。",c:["扱い","評判","雰囲気","教育"],a:0,e:"待遇（たいぐう）＝待遇。"},
{t:"言い換え",q:"警察は事件解決の<u>手掛かり</u>をつかんだ。",c:["ヒント","証拠","犯人","動機"],a:0,e:"手掛かり（てがかり）＝線索。"},
{t:"言い換え",q:"完成の<u>見込み</u>は立っていない。",c:["予想","期限","計画","希望"],a:0,e:"見込み（みこみ）＝預估、指望。"},
{t:"言い換え",q:"彼は業界<u>屈指の</u>技術者だ。",c:["有数の","無名の","古参の","異色の"],a:0,e:"屈指（くっし）＝屈指可數。＝有数（ゆうすう）。"},
{t:"言い換え",q:"引っ越しには<u>相当な</u>費用がかかった。",c:["かなりの","予想外の","わずかな","一定の"],a:0,e:"相当な（そうとうな）＝相當可觀的。"},
{t:"言い換え",q:"雨の日は外出するのが<u>億劫だ</u>。",c:["面倒だ","危険だ","不快だ","無理だ"],a:0,e:"億劫（おっくう）＝懶得動、嫌麻煩。"},
{t:"言い換え",q:"試験は<u>案外</u>簡単だった。",c:["意外に","やはり","かなり","最初は"],a:0,e:"案外（あんがい）＝出乎意料。"},
{t:"言い換え",q:"彼は<u>うつむいた</u>まま何も言わなかった。",c:["下を向いた","座り込んだ","黙り込んだ","立ち止まった"],a:0,e:"俯く（うつむく）＝低頭。反義：仰向く。"},
{t:"言い換え",q:"相手が若いからといって<u>見くびって</u>はいけない。",c:["軽く見て","無視して","からかって","疑って"],a:0,e:"見くびる＝小看。＝侮る（あなどる）。"},
{t:"言い換え",q:"父はその話を聞いて<u>立腹した</u>。",c:["怒った","納得した","困惑した","満足した"],a:0,e:"立腹（りっぷく）する＝生氣。腹を立てる的漢語形。"},
{t:"言い換え",q:"祖母は若い頃を<u>回想して</u>楽しそうに話した。",c:["思い出して","想像して","記録して","自慢して"],a:0,e:"回想（かいそう）する＝回憶。"},
{t:"言い換え",q:"店の経営権を息子に<u>譲渡した</u>。",c:["譲り渡した","貸し出した","任せた","売り込んだ"],a:0,e:"譲渡（じょうと）する＝轉讓。"},
{t:"言い換え",q:"システム障害が業務に<u>混乱をきたした</u>。",c:["混乱を引き起こした","混乱を収めた","混乱を防いだ","混乱に乗じた"],a:0,e:"〜をきたす（来す）＝招致（負面結果）。支障をきたす。"},
{t:"言い換え",q:"<u>従来</u>の方法では対応できなくなった。",c:["これまで","最新","海外","独自"],a:0,e:"従来（じゅうらい）＝以往。"},
{t:"言い換え",q:"古いパソコンを<u>廃棄した</u>。",c:["捨てた","修理した","売った","譲った"],a:0,e:"廃棄（はいき）する＝報廢丟棄。"},
{t:"言い換え",q:"<u>早急に</u>対策を講じる必要がある。",c:["できるだけ早く","念入りに","冷静に","定期的に"],a:0,e:"早急（さっきゅう／そうきゅう）に＝火速。対策を講じる＝採取對策。"},
{t:"言い換え",q:"彼は<u>しょっちゅう</u>忘れ物をする。",c:["よく","たまに","わざと","うっかり"],a:0,e:"しょっちゅう＝經常、三天兩頭。"},
{t:"言い換え",q:"彼は<u>風変わりな</u>服装で現れた。",c:["変わった","華やかな","地味な","だらしない"],a:0,e:"風変わり（ふうがわり）＝奇特、與眾不同。"},
{t:"言い換え",q:"彼女は<u>卓越した</u>語学力の持ち主だ。",c:["非常に優れた","人並みの","生まれつきの","幅広い"],a:0,e:"卓越（たくえつ）した＝卓越。"},
{t:"言い換え",q:"将来については、まだ<u>漠然と</u>考えているだけだ。",c:["ぼんやりと","真剣に","具体的に","前向きに"],a:0,e:"漠然と（ばくぜんと）＝籠統模糊地。"},
{t:"言い換え",q:"<u>やむを得ず</u>、計画を中止した。",c:["仕方なく","思い切って","念のため","一時的に"],a:0,e:"やむを得ず＝不得已。"},
// ================= 用法 =================
{t:"用法",q:"「目安」の使い方として最も適切なものは？",c:["学習時間は1日2時間を目安にしている。","地図に目安をつけて場所を覚えた。","彼は目安が高くて、なかなか満足しない。","目安を頼りに暗い山道を歩いた。"],a:0,e:"目安（めやす）＝大致標準。〜を目安に。其他句應用「印」「目が高い」「目印」。"},
{t:"用法",q:"「工面」の使い方として最も適切なものは？",c:["留学の費用をなんとか工面した。","壊れた自転車を自分で工面した。","彼女は工面がいいので誰とでも仲良くなれる。","料理を工面よく皿に並べた。"],a:0,e:"工面（くめん）＝籌措（金錢）。其他句應用「修理」「愛想」「手際」。"},
{t:"用法",q:"「還元」の使い方として最も適切なものは？",c:["企業は利益の一部を社会に還元すべきだ。","会議の内容を上司に還元した。","図書館で借りた本を還元した。","昔の校舎が元の姿に還元された。"],a:0,e:"還元（かんげん）＝回饋、還原。報告→報告する；還書→返却；恢復→復元。"},
{t:"用法",q:"「便乗」の使い方として最も適切なものは？",c:["原料高に便乗して、各社が一斉に値上げした。","駅まで友人の車に便乗をお願いした。","彼は流行に便乗が早い。","この切符は新幹線に便乗できる。"],a:0,e:"便乗（びんじょう）する＝趁機搭順風車（多含貶義）。搭車→同乗；後兩句不成立。"},
{t:"用法",q:"「発散」の使い方として最も適切なものは？",c:["カラオケでストレスを発散した。","会議で自分の意見を発散した。","貯金を旅行で一気に発散した。","うわさが町中に発散した。"],a:0,e:"発散（はっさん）＝發洩（壓力、精力）。發表意見→述べる；花錢→使う；謠言→広まる。"},
{t:"用法",q:"「補充」の使い方として最も適切なものは？",c:["退職者が出たので、人員を補充した。","説明が足りない部分を口頭で補充した。","栄養を補充するためにサプリを飲む。","破れた屋根を補充した。"],a:0,e:"補充（ほじゅう）＝補足（缺額、庫存）。說明→補足；營養→補給；屋頂→修理。※日語「栄養補給」才是慣用搭配。"},
{t:"用法",q:"「まんざらでもない」の使い方として最も適切なものは？",c:["みんなに褒められて、彼はまんざらでもない様子だった。","この料理はまずくて、まんざらでもない。","忙しくて、旅行どころではなくまんざらでもない。","彼の話はまんざらでもないほど面白い。"],a:0,e:"まんざらでもない＝其實並不討厭、暗自得意。只用於「嘴上謙虛心裡高興」的語境。"},
{t:"用法",q:"「心当たり」の使い方として最も適切なものは？",c:["この筆跡に心当たりはありませんか。","彼の優しさに心当たりを感じた。","初対面なのに心当たりがいい人だ。","心当たりを込めてお礼の手紙を書いた。"],a:0,e:"心当たり（こころあたり）＝（對線索）有頭緒。後三句應用「親しみ」「人当たり」「心」。"},
{t:"用法",q:"「打開」の使い方として最も適切なものは？",c:["行き詰まった交渉を打開する策を練った。","缶詰を打開して中身を確かめた。","朝、窓を打開して空気を入れ替えた。","新しい店を駅前に打開した。"],a:0,e:"打開（だかい）＝打開（僵局）。抽象用法限定。開罐→開ける；開店→開く。"},
{t:"用法",q:"「未練」の使い方として最も適切なものは？",c:["彼は辞めた会社にまだ未練があるようだ。","この計画は未練な点が多くて不安だ。","彼女は未練な性格で、決断が早い。","未練の作品がついに完成した。"],a:0,e:"未練（みれん）＝留戀、放不下。後三句應用「不備」「未熟？いいえ—果断」「未完」。"},
{t:"用法",q:"「貫禄」の使い方として最も適切なものは？",c:["彼には20年選手の貫禄が漂っている。","この金庫は貫禄があって壊れない。","彼は貫禄を最後までやり遂げた。","貫禄の努力が実を結んだ。"],a:0,e:"貫禄（かんろく）＝威嚴氣場。堅固→頑丈；貫徹→初志貫徹；長年→長年。"},
{t:"用法",q:"「白紙」の使い方として最も適切なものは？",c:["合併の話は一旦白紙に戻すことになった。","彼は顔が白紙になって倒れた。","白紙な気持ちで新年を迎えた。","事故で記憶が白紙した。"],a:0,e:"白紙（はくし）に戻す＝一切歸零重來。臉色發白→真っ青；坦然→新たな；失憶→白紙になる（要加になる）。"},
{t:"用法",q:"「台頭」の使い方として最も適切なものは？",c:["若手の新勢力が業界で台頭してきた。","朝日が水平線から台頭した。","彼は成績が台頭して表彰された。","ビルの台頭で街の景色が変わった。"],a:0,e:"台頭（たいとう）＝（勢力）抬頭崛起。日出→昇る；成績→向上；大樓→林立。"},
{t:"用法",q:"「妥結」の使い方として最も適切なものは？",c:["労使交渉は深夜になってようやく妥結した。","二人はけんかの後すぐに妥結した。","論文の妥結を書き直した。","彼は問題を一人で妥結した。"],a:0,e:"妥結（だけつ）＝（勞資、外交談判）達成協議。和好→仲直り；結論→結論；解決→解決。"},
{t:"用法",q:"「気掛かり」の使い方として最も適切なものは？",c:["一人暮らしの母のことが気掛かりだ。","彼は気掛かりが利くので重宝される。","気掛かりに勉強した成果が出た。","この服は気掛かりに合わない。"],a:0,e:"気掛かり（きがかり）＝掛心、放心不下。機靈→気が利く；用功→熱心に；不合意→気に入らない。"},
{t:"用法",q:"「手分け」の使い方として最も適切なものは？",c:["みんなで手分けして迷子の犬を探した。","ケーキを人数分に手分けした。","二人は円満に手分けした。","作業の手分けがようやく空いた。"],a:0,e:"手分け（てわけ）＝分頭進行。分切→切り分け；分手→別れ；騰出手→手が空く。"},
{t:"用法",q:"「引き取る」の使い方として最も適切なものは？",c:["飼えなくなった猫を引き取ることにした。","銀行からお金を引き取った。","風邪を引き取って学校を休んだ。","彼の発言を引き取って議事録に載せた。"],a:0,e:"引き取る（ひきとる）＝領回、收養。領錢→引き出す；感冒→風邪を引く；記錄→書き留める。"},
{t:"用法",q:"「見送る」の使い方として最も適切なものは？",c:["予算不足のため、設備の更新は見送ることにした。","彼は約束の時間を見送ってしまった。","窓から景色を見送りながら旅をした。","注意して足元を見送って歩いた。"],a:0,e:"見送る＝送行；（決定）暫緩。錯過時間→過ぎてしまった；眺望→眺める；注意腳下→見て。"},
{t:"用法",q:"「持て余す」の使い方として最も適切なものは？",c:["定年後、彼は時間を持て余している。","両手に荷物を持て余して歩いた。","彼女は三か国語を持て余す才媛だ。","蓄えを持て余して家を買った。"],a:0,e:"持て余す（もてあます）＝多得不知如何處理。拿不動→抱えきれない；精通→操る；動用→充てる。"},
{t:"用法",q:"「食い違う」の使い方として最も適切なものは？",c:["目撃者の証言が互いに食い違っている。","歯車がうまく食い違って機械が動いた。","二人は食い違って協力し合った。","犬が骨に食い違っている。"],a:0,e:"食い違う（くいちがう）＝（說法、認知）不一致。齒輪咬合→かみ合う。"},
{t:"用法",q:"「立て替える」の使い方として最も適切なものは？",c:["財布を忘れた友人の分を立て替えておいた。","古い家を新しく立て替えた。","倒れた看板を立て替えた。","予定を来週に立て替えた。"],a:0,e:"立て替える（たてかえる）＝代墊（錢）。改建→建て替える（同音別字！）；扶正→立て直す；改期→変更。"},
{t:"用法",q:"「割り当てる」の使い方として最も適切なものは？",c:["委員それぞれに担当区域を割り当てた。","りんごを二つに割り当てて食べた。","時間を割り当てて友人の相談に乗った。","ガラスが床に割り当てられていた。"],a:0,e:"割り当てる（わりあてる）＝分配（任務、名額）。切分→切り分ける；騰出時間→割く；散落→散らばる。"},
{t:"用法",q:"「買い占める」の使い方として最も適切なものは？",c:["転売業者が限定品を買い占めて問題になった。","将来のためにこつこつ本を買い占めている。","スーパーで夕食の材料を買い占めた。","彼は毎月雑誌を買い占めて読んでいる。"],a:0,e:"買い占める（かいしめる）＝壟斷式掃貨（含負面語感）。一般購買用「買う」「買いそろえる」即可。"},
{t:"用法",q:"「乗り出す」の使い方として最も適切なものは？",c:["政府は真相の解明に乗り出した。","バスの席に乗り出して眠った。","彼は電車を乗り出して会社に向かった。","荷物を車に乗り出して出発した。"],a:0,e:"乗り出す（のりだす）＝著手介入；探出身子。後三句應用「座って」「乗って」「積んで」。"},
{t:"用法",q:"「打ち切る」の使い方として最も適切なものは？",c:["採算が取れず、サービスの提供を打ち切った。","彼は電話を乱暴に打ち切った。","木の枝を打ち切って燃やした。","彼女は髪を短く打ち切った。"],a:0,e:"打ち切る（うちきる）＝（中途）終止（協商、連載、援助）。掛電話→切る；砍→切り落とす；剪髮→切る。"},
{t:"用法",q:"「冷やかす」の使い方として最も適切なものは？",c:["買う気もないのに夜店を冷やかして歩いた。","スイカを井戸で冷やかしておいた。","彼の熱意を冷やかすつもりはない。","エアコンで部屋を冷やかした。"],a:0,e:"冷やかす（ひやかす）＝逛而不買；調侃。冰鎮→冷やす；潑冷水→水を差す。"},
{t:"用法",q:"「ねだる」の使い方として最も適切なものは？",c:["娘に新しいスマホをねだられた。","彼は上司に昇進をねだった。","客が店員に釣り銭をねだった。","部下に残業をねだんだ。"],a:0,e:"ねだる＝（向親近的人）撒嬌索求。對上司→願い出る；找零→求める；命令→頼んだ。※選項4動詞變化也錯（ねだった才對）。"},
{t:"用法",q:"「かばう」の使い方として最も適切なものは？",c:["彼はミスをした後輩を上司の前でかばった。","強風から帽子をかばって歩いた。","古い写真を大切にかばっている。","彼女は日差しを傘でかばいだ。"],a:0,e:"かばう（庇う）＝袒護、護著（人、傷處）。壓住帽子→押さえて；珍藏→しまって；遮陽→さえぎる。"},
{t:"用法",q:"「とがめる」の使い方として最も適切なものは？",c:["書類の不備を上司にとがめられた。","彼は自分の才能をとがめて努力した。","風邪をとがめてこじらせた。","犯人は警察にとがめられて逃げた。"],a:0,e:"咎める（とがめる）＝責備、盤問。気がとがめる＝於心不安。磨練→磨いて；拖延病情→こじらせて；被追捕→追われて。"},
{t:"用法",q:"「なだめる」の使い方として最も適切なものは？",c:["怒っている客をなんとかなだめた。","痛む足をなだめながら歩いた。","音楽で心をなだめるのが習慣だ。","薬で熱をなだめた。"],a:0,e:"なだめる（宥める）＝安撫（生氣哭鬧的人）。對象是「人的怒氣」。腳→かばい；心→癒す；退燒→下げる。"},
{t:"用法",q:"「こなす」の使い方として最も適切なものは？",c:["彼女は育児と仕事を見事にこなしている。","硬い肉を包丁でこなした。","彼は貯金をすっかりこなしてしまった。","新しい靴をこなすまで時間がかかった。"],a:0,e:"こなす＝熟練處理（工作、任務）。着こなす＝穿得好看；剁碎→刻んだ；花光→使い果たした；穿慣→履き慣らす。"},
{t:"用法",q:"「紛れる」の使い方として最も適切なものは？",c:["犯人は雑踏に紛れて姿を消した。","大事な約束が頭から紛れてしまった。","道が紛れて目的地に着けなかった。","彼の話は本題から紛れてばかりだ。"],a:0,e:"紛れる（まぎれる）＝混入（人群）；気が紛れる＝散心。忘記→抜けて；迷路→分からなくなって；離題→それて。"},
{t:"用法",q:"「秘める」の使い方として最も適切なものは？",c:["彼は胸に大きな野望を秘めている。","宝石を金庫に秘めて保管した。","彼女は帽子を深く秘めて外出した。","会議の内容を社外に秘めた。"],a:0,e:"秘める（ひめる）＝深藏（情感、可能性）於內心。收藏→しまって；壓低→かぶって；保密→伏せた。"},
{t:"用法",q:"「賑わう」の使い方として最も適切なものは？",c:["連休の商店街は買い物客で賑わっていた。","彼の家は家族が多くて賑わいだ性格だ。","パーティーで賑わうな服を着た。","会議は激しい議論で賑わって決裂した。"],a:0,e:"賑わう（にぎわう）＝（場所）熱鬧、人潮多。個性開朗→にぎやかな；華麗→華やかな；爭論激烈→紛糾した。"},
{t:"用法",q:"「芽生える」の使い方として最も適切なものは？",c:["二人の間に淡い恋心が芽生えた。","春になって桜が一斉に芽生えた。","朝早く芽生えて散歩に出た。","新しいビルが次々と芽生えた。"],a:0,e:"芽生える（めばえる）＝（情感、意識）萌芽。開花→咲いた；起床→目覚めて；興建→建った。"},
{t:"用法",q:"「格別」の使い方として最も適切なものは？",c:["仕事の後の一杯は格別だ。","彼は格別な服を着て目立っていた。","この道は格別に曲がっている。","格別な人だけが会員になれる。"],a:0,e:"格別（かくべつ）＝格外、特別好。奇特→奇抜な；特別彎→ひどく；特定→特定の。"},
{t:"用法",q:"「面識」の使い方として最も適切なものは？",c:["彼とは名刺を交換した程度の面識しかない。","この問題については多少の面識がある。","彼女は面識が広くて業界に詳しい。","初めて見る漢字なので面識がない。"],a:0,e:"面識（めんしき）＝（與人）見過面、認識。知識→知識；人脈廣→顔が広い；不認得字→見覚え。"},
{t:"用法",q:"「手腕」の使い方として最も適切なものは？",c:["新社長は再建で経営手腕を発揮した。","彼は手腕が長くてスーツが似合う。","毎朝の体操で手腕を鍛えている。","この時計は職人の手腕で動いている。"],a:0,e:"手腕（しゅわん）＝（管理、辦事）本領。手腕を発揮する／振るう。手臂長→腕が長い。"},
{t:"用法",q:"「素質」の使い方として最も適切なものは？",c:["彼には指導者としての素質がある。","この布は素質がよくて長持ちする。","素質な生活を心がけている。","データの素質を確認してから分析する。"],a:0,e:"素質（そしつ）＝天分、潛質。布料→素材／質；樸素→質素な；資料品質→品質。"},
{t:"用法",q:"「意地」の使い方として最も適切なものは？",c:["彼はつまらない意地を張って謝ろうとしない。","彼女は意地が優しくて人気がある。","その計画には反対する意地はない。","朝から意地が痛くて病院へ行った。"],a:0,e:"意地（いじ）を張る＝賭氣、固執。心地善良→気立て；沒有意圖→つもり；胃痛→胃。"},
{t:"用法",q:"「気品」の使い方として最も適切なものは？",c:["彼女の身のこなしには気品が漂っている。","この部屋は気品がよくて落ち着く。","彼は気品が短くてすぐ怒る。","デパートで気品を買って帰った。"],a:0,e:"気品（きひん）＝高雅氣質。舒適→居心地；性子急→気が短い；禮品→記念品。"},
{t:"用法",q:"「愛着」の使い方として最も適切なものは？",c:["10年乗った車に愛着があって手放せない。","彼は初対面の人にも愛着よく接する。","二人は愛着の末に結婚した。","犬が飼い主に愛着を吠えた。"],a:0,e:"愛着（あいちゃく）＝（對長年事物的）依戀。和藹→愛想よく；相戀→恋愛；第4句不成句。"},
{t:"用法",q:"「執着」の使い方として最も適切なものは？",c:["彼は過去の成功に執着して変化を拒んでいる。","彼女は仕事に執着していて頼りになる。","電車が駅に執着した。","書類に判子を執着した。"],a:0,e:"執着（しゅうちゃく）＝執著、放不下（多含貶義）。敬業→熱心；到站→到着；蓋章→押した。"},
{t:"用法",q:"「円満」の使い方として最も適切なものは？",c:["話し合いの末、争いは円満に解決した。","円満な形の月が空に浮かんでいた。","タイヤの空気が円満になった。","彼は計算が円満で間違いがない。"],a:0,e:"円満（えんまん）＝圓滿、和睦（關係、解決）。滿月→まんまる；打飽氣→ぱんぱん；精確→正確。"},
{t:"用法",q:"「万全」の使い方として最も適切なものは？",c:["台風に備えて万全の対策を取った。","彼の答案は万全で100点だった。","この薬を飲めば万全に治る。","万全な人間などいない。"],a:0,e:"万全（ばんぜん）＝萬無一失（準備、態勢）。満点答案→完璧；痊癒→完全に；完人→完璧な。"},
{t:"用法",q:"「不順」の使い方として最も適切なものは？",c:["天候不順で農作物の生育が遅れている。","彼は不順な態度で注意された。","手続きの不順を係員に聞いた。","この機械は調子が不順だ。"],a:0,e:"不順（ふじゅん）＝不合時令、失調（天候不順、生理不順）。態度→不遜；順序→手順；機器→不調。"},
{t:"用法",q:"「巧妙」の使い方として最も適切なものは？",c:["巧妙な手口の詐欺が増えている。","彼女は手先が巧妙で細工が得意だ。","この料理は味付けが巧妙でおいしい。","巧妙に晴れて遠足日和になった。"],a:0,e:"巧妙（こうみょう）＝巧妙（手法，常用於負面手口）。手巧→器用；調味好→絶妙；湊巧→折よく。"},
{t:"用法",q:"「簡素」の使い方として最も適切なものは？",c:["結婚式は身内だけで簡素に行った。","この問題は簡素だからすぐ解ける。","彼の説明は簡素で分かりやすかった。","操作が簡素なスマホを探している。"],a:0,e:"簡素（かんそ）＝簡樸（儀式、生活）。簡單→簡単；簡潔說明→簡潔；操作簡便→簡単。"},
{t:"用法",q:"「画一的」の使い方として最も適切なものは？",c:["画一的な教育では個性が育たない。","彼は画一的な才能を持つ画家だ。","目標を画一的に達成した。","この絵は画一的で素晴らしい。"],a:0,e:"画一的（かくいつてき）＝千篇一律（貶義）。獨特→類まれな；如期→計画どおり；出色→画期的？いいえ—見事。"},
{t:"用法",q:"「費やす」の使い方として最も適切なものは？",c:["彼は青春のすべてを研究に費やした。","電気を費やさないようにこまめに消す。","貯金がとうとう費やした。","体力を費やして病気になった。"],a:0,e:"費やす（ついやす）＝投入耗費（時間、金錢、心力），他動詞。省電→無駄遣いしない；存款見底→底をついた；累垮→消耗して。"},
{t:"用法",q:"「授かる」の使い方として最も適切なものは？",c:["結婚10年目にして子どもを授かった。","銀行から融資を授かった。","友人から旅行のお土産を授かった。","上司から残業を授かった。"],a:0,e:"授かる（さずかる）＝（從上天、尊長）獲賜（孩子、智慧、獎章）。貸款→受けた；土產→もらった；加班→命じられた。"},
{t:"用法",q:"「遂げる」の使い方として最も適切なものは？",c:["この国の経済は驚異的な発展を遂げた。","マラソンで最後まで遂げて完走した。","彼は借金をすべて遂げた。","夏休みの宿題をやっと遂げた。"],a:0,e:"遂げる（とげる）＝實現、達成（成長、進化、目的）。跑完→走り抜いて；還清→返し終えた；做完→終えた。"},
{t:"用法",q:"「見計らう」の使い方として最も適切なものは？",c:["話が一段落したのを見計らって席を立った。","貯金の残高を見計らってから旅行を決めた。","天気予報を見計らうのが日課だ。","彼の顔色を見計らって薬を出した。"],a:0,e:"見計らう（みはからう）＝瞅準（時機）。頃合いを見計らう。查餘額→確認して；看預報→チェックする；診斷→診て。"},
{t:"用法",q:"「取り次ぐ」の使い方として最も適切なものは？",c:["社長への電話を秘書が取り次いだ。","こぼれた水を雑巾で取り次いだ。","畑の雑草を取り次いだ。","彼の後を取り次いで社長になった。"],a:0,e:"取り次ぐ（とりつぐ）＝轉接（電話）、傳達（口信）。擦拭→拭き取った；除草→取り除いた；接班→継いで。"},
{t:"用法",q:"「打ち込む」の使い方として最も適切なものは？",c:["学生時代は演劇に打ち込んでいた。","釘を壁から打ち込んで外した。","彼は私の話を最後まで打ち込んで聞いた。","口座にお金を打ち込んだ。"],a:0,e:"打ち込む（うちこむ）＝埋頭投入；釘入。拔釘→抜いて；傾聽→身を入れて；匯款→振り込んだ。"},
{t:"用法",q:"「染みる」の使い方として最も適切なものは？",c:["たき火の煙が目に染みて涙が出た。","夕日が空を赤く染みた。","彼はジーンズを紺に染みた。","習字で服にすみを染みた。"],a:0,e:"染みる（しみる）＝滲入、刺痛；深有感觸（身に染みる）。染色（他動詞）→染めた；沾上→つけた。"},
{t:"用法",q:"「障る」の使い方として最も適切なものは？",c:["気に障ったなら謝ります。","展示品に障らないでください。","彼は法律に障って逮捕された。","つり革に障って体を支えた。"],a:0,e:"障る（さわる）＝有妨礙、傷（身體、感情）。気に障る＝觸怒。觸摸→触る（同音別字！）；違法→触れて；抓握→つかまって。"},
{t:"用法",q:"「凝る」の使い方として最も適切なものは？",c:["父は最近そば打ちに凝っている。","長時間の勉強で目が凝った。","彼は約束の時間に凝って必ず守る。","寒さで池の水が凝った。"],a:0,e:"凝る（こる）＝入迷講究；肩頸僵硬（肩が凝る）。眼睛疲勞→疲れた；守時→きちょうめんで；結冰→凍った。"},
{t:"用法",q:"「添える」の使い方として最も適切なものは？",c:["贈り物に手書きのカードを添えた。","倒れないように柱を壁に添えた。","彼は家族を養うために職を添えた。","スープに塩を添えて味を調えた。"],a:0,e:"添える（そえる）＝附上、配上。支撐→立てかけた；兼差→掛け持ちした；加鹽→加えて。"},
{t:"用法",q:"「退く」の使い方として最も適切なものは？",c:["彼は今季限りで監督の座を退くと表明した。","歯が痛むので親知らずを退いた。","朝になって熱がようやく退いた。","車を後ろに退いて駐車した。"],a:0,e:"退く（しりぞく）＝退位、引退。拔牙→抜いた；退燒→引いた；倒車→下げて。"},
{t:"用法",q:"「和らぐ」の使い方として最も適切なものは？",c:["薬のおかげで痛みがだいぶ和らいだ。","彼は性格が和らいでいて怒らない。","固い肉を煮て和らげた。","会場の照明が和らいだ色になった。"],a:0,e:"和らぐ（やわらぐ）＝（痛苦、緊張、寒意）緩和，自動詞。溫和→穏やかで；煮軟→柔らかくした；柔和色→柔らかい。"},
{t:"用法",q:"「半端」の使い方として最も適切なものは？",c:["半端な覚悟では、この仕事は務まらない。","彼は半端が良くて仕事が速い。","時間が半端したのでカフェに入った。","二人の実力は半端だ。"],a:0,e:"半端（はんぱ）＝不徹底、不上不下。中途半端。效率高→手際；時間尷尬→中途半端に空いた；勢均力敵→互角。"},
{t:"用法",q:"「くまなく」の使い方として最も適切なものは？",c:["警察は現場周辺をくまなく捜索した。","彼はくまなく笑って許してくれた。","今日はくまなく晴れて気持ちがいい。","彼女はくまなく席に座った。"],a:0,e:"くまなく＝無一遺漏地、每個角落。快く（こころよく）＝爽快地；雲一つなく＝萬里無雲。"},
{t:"用法",q:"「あえて」の使い方として最も適切なものは？",c:["嫌われるのを承知で、あえて苦言を呈した。","道であえて昔の友人に会った。","あえての努力もむなしく敗れた。","電車があえて動き出した。"],a:0,e:"あえて＝明知不易仍刻意去做。偶遇→偶然；白費力氣→せっかくの；突然→急に。"},
{t:"用法",q:"「いかにも」の使い方として最も適切なものは？",c:["それはいかにも彼が言いそうなせりふだ。","いかにも早く帰りたいが、仕事が残っている。","この橋はいかにも100年前に作られた。","いかにも助かりました。ありがとう。"],a:0,e:"いかにも＝的的確確、活脫脫像。第2句→どうしても；第3句→実に？いいえ—確かに；第4句→本当に。"},
{t:"用法",q:"「ろくに」の使い方として最も適切なものは？",c:["彼はろくに調べもせずに批判する。","今朝はろくに早く起きられた。","ろくに準備したので発表は成功した。","この店はろくにおいしい。"],a:0,e:"ろくに＝後面必接否定，「沒好好～」。其他句改成肯定用法都不成立。"},
{t:"用法",q:"「まして」の使い方として最も適切なものは？",c:["大人でも持てない重さだ。まして子どもには無理だ。","昨日よりましてな天気になった。","彼はましてなお金持ちだ。","急いで、まして間に合った。"],a:0,e:"まして＝何況、更不用說。比較句用「〜より増して」是另一用法，第2句形態錯誤。"},
{t:"用法",q:"「一向に」の使い方として最も適切なものは？",c:["薬を飲んでいるのに、一向に良くならない。","彼は一向に向かって歩き出した。","一向に集中して作業を終えた。","風は一向から吹いてくる。"],a:0,e:"一向に（いっこうに）＋否定＝絲毫不～。方向→目的地；專心→一心に；風向→一方向。"},
{t:"用法",q:"「強いて」の使い方として最も適切なものは？",c:["どれも良かったが、強いて言えば青が好みだ。","彼は強いて体を鍛えている。","強いて雨が降ってきた。","このひもは強いて切れない。"],a:0,e:"強いて（しいて）＝硬要、勉強。強いて言えば＝硬要說的話。鍛鍊→熱心に；突然→急に；結實→丈夫で。"},
{t:"用法",q:"「とりわけ」の使い方として最も適切なものは？",c:["今年の冬はとりわけ寒さが厳しい。","料理を小皿にとりわけお召し上がりください。","会議はとりわけ順調に終わった。","彼はとりわけの人物で誰も逆らえない。"],a:0,e:"とりわけ＝尤其。第2句是動詞「取り分け（分裝）」的連用形，非副詞用法；順利→いたって；大人物→なかなかの。"},
// ================= 文法 =================
{t:"文法",q:"夢を実現せ（　）、彼は故郷を後にした。",c:["んがため","んばかり","んとすれば","んには"],a:0,e:"〜んがため（に）＝為了～（文語）。動詞ない形＋んがため。する→せんがため。"},
{t:"文法",q:"彼女は今にも泣きださ（　）の顔でこちらを見た。",c:["んばかり","んがため","んとする","んとも"],a:0,e:"〜んばかり（に／の）＝簡直就要～似的。泣きださんばかりの顔＝一副快哭出來的臉。"},
{t:"文法",q:"チャイムが鳴る（　）、彼は教室を飛び出していった。",c:["が早いか","が遅いか","が先か","が最後か"],a:0,e:"〜が早いか＝一～就立刻～。類義：や否や、なり。「〜たが最後」是「一旦～就完了」。"},
{t:"文法",q:"玄関のドアを開ける（　）、犬が飛びついてきた。",c:["や否や","とあれば","かたがた","ゆえに"],a:0,e:"〜や否や（やいなや）＝剛一～就～。接辞書形。"},
{t:"文法",q:"片付ける（　）子どもがおもちゃを散らかすので、きりがない。",c:["そばから","うちから","かたわら","ところから"],a:0,e:"〜そばから＝剛～馬上又～（反覆發生、多含無奈）。"},
{t:"文法",q:"彼は家に帰る（　）、かばんも置かずに台所へ直行した。",c:["なり","きり","まま","ほど"],a:0,e:"〜なり＝一～立刻～（同一主語、後接意外性動作）。〜たきり＝～之後就再也沒。"},
{t:"文法",q:"今年は結婚に昇進にと、めでたいこと（　）の一年だった。",c:["ずくめ","まみれ","ぐるみ","がち"],a:0,e:"〜ずくめ＝清一色全是～（いいことずくめ、黒ずくめ）。"},
{t:"文法",q:"子どもたちは泥（　）になるまでサッカーに夢中だった。",c:["まみれ","ずくめ","ぐるみ","びたし"],a:0,e:"〜まみれ＝沾滿（泥、汗、血等髒污）。"},
{t:"文法",q:"村（　）で伝統祭りの復活に取り組んでいる。",c:["ぐるみ","まみれ","ずくめ","なみ"],a:0,e:"〜ぐるみ＝整個～全體（家族ぐるみ、町ぐるみ）。"},
{t:"文法",q:"彼は会社勤めの（　）、週末は農業に励んでいる。",c:["かたわら","かたがた","がてら","そばから"],a:0,e:"〜かたわら＝一邊本業，一邊～（長期兼顧）。"},
{t:"文法",q:"先日のお礼（　）、ご挨拶に伺いました。",c:["かたがた","かたわら","めいた","ばりに"],a:0,e:"〜かたがた＝順便兼作～（書信、正式場合）。お礼かたがた／ご報告かたがた。"},
{t:"文法",q:"散歩（　）、駅前の本屋まで行ってきた。",c:["がてら","かたわら","ながらも","うちに"],a:0,e:"〜がてら＝順便～（口語）。散歩がてら＝散步順便。"},
{t:"文法",q:"お忙しい（　）お越しいただき、恐縮です。",c:["ところを","ものを","ことを","わけを"],a:0,e:"〜ところを＝在～的時候（打擾）。お忙しいところを／お休みのところを。"},
{t:"文法",q:"一言相談してくれれば力になれた（　）、彼は一人で抱え込んでいた。",c:["ものを","ところを","ことを","はずを"],a:0,e:"〜ものを＝明明～卻…（帶惋惜、抱怨）。"},
{t:"文法",q:"ベテランの医師（　）、診断を誤ることはある。",c:["といえども","とすれば","となれば","とばかりに"],a:0,e:"〜といえども＝即使是～也（讓步、文語）。"},
{t:"文法",q:"三連休の初日（　）、空港は朝から大混雑だった。",c:["とあって","といえども","にしては","を問わず"],a:0,e:"〜とあって＝因為是～（特殊狀況）所以。新聞報導文體。"},
{t:"文法",q:"愛する娘のため（　）、どんな苦労もいとわないつもりだ。",c:["とあれば","といえども","ときたら","とばかりに"],a:0,e:"〜とあれば＝如果是（為了）～的話。いとわない＝在所不辭。"},
{t:"文法",q:"うちの息子（　）、休みとなるとゲームばかりしている。",c:["ときたら","とあれば","にあって","を限りに"],a:0,e:"〜ときたら＝說起～（抱怨身邊的人事物）。"},
{t:"文法",q:"祖父は電子メール（　）、電話のかけ方さえ覚えようとしない。",c:["はおろか","をおいて","もさることながら","はさておき"],a:0,e:"〜はおろか＝別說～連…都（後接負面）。もさることながら＝固然～更～。"},
{t:"文法",q:"この難役を演じられるのは、彼女（　）ほかにいないだろう。",c:["をおいて","をもって","をよそに","を限りに"],a:0,e:"〜をおいて（〜ない）＝除了～之外（沒有）。最高評價用法。"},
{t:"文法",q:"本日（　）、当店は閉店させていただきます。",c:["をもって","をおいて","をめぐって","を皮切りに"],a:0,e:"〜をもって＝以（此時點）為界（正式通知）。本日をもって／これをもって。"},
{t:"文法",q:"東京公演（　）、半年に及ぶ全国ツアーの幕が開けた。",c:["を皮切りに","を限りに","を余儀なく","をものともせず"],a:0,e:"〜を皮切りに（かわきりに）＝以～為開端，接連展開。"},
{t:"文法",q:"今日（　）、長年吸ってきたたばこときっぱり縁を切る。",c:["を限りに","を皮切りに","をよそに","をおいて"],a:0,e:"〜を限りに＝以～為最後（就此結束）。今日を限りに／今回を限りに。"},
{t:"文法",q:"周囲の反対（　）、二人は結婚に踏み切った。",c:["をよそに","をおいて","を限りに","をもって"],a:0,e:"〜をよそに＝無視、不顧（他人的擔心反對）。"},
{t:"文法",q:"彼女は足のけが（　）、最後まで走り抜いた。",c:["をものともせず","をひかえて","を皮切りに","をなくして"],a:0,e:"〜をものともせず＝不畏、不當一回事（讚賞語氣）。"},
{t:"文法",q:"記録的な大雪で、主催者は大会の中止（　）された。",c:["を余儀なく","を限りなく","をやむなく","を絶えなく"],a:0,e:"〜を余儀なくされる（よぎなくされる）＝被迫～。中止を余儀なくされた。"},
{t:"文法",q:"彼は生まれ（　）にして、人を引きつける魅力を備えていた。",c:["ながら","つつ","ざる","んばかり"],a:0,e:"生まれながらにして＝與生俱來。〜ながらに（涙ながらに、いつもながら）＝保持～的狀態。"},
{t:"文法",q:"彼は何でも一人で抱え込む（　）がある。",c:["きらい","しまつ","おき","ゆえ"],a:0,e:"〜きらいがある＝有～的（不良）傾向。動詞辞書形／名詞の＋きらいがある。"},
{t:"文法",q:"死者が出る（　）、ようやく行政は重い腰を上げた。",c:["に至って","において","にあって","にかけて"],a:0,e:"〜に至って（いたって）＝事態嚴重到～（才）。事ここに至って。"},
{t:"文法",q:"この学校では、靴下の色から髪型（　）校則で決められている。",c:["に至るまで","に及んで","に沿って","に先立って"],a:0,e:"〜から〜に至るまで＝從～到～鉅細靡遺。"},
{t:"文法",q:"この深い味わいは、創業百年の老舗（　）のものだ。",c:["ならでは","なりに","ながらも","どころか"],a:0,e:"〜ならでは＝唯有～才有的。老舗ならではの味。"},
{t:"文法",q:"新人は新人（　）に、チームへの貢献の仕方があるはずだ。",c:["なり","ならでは","ながら","ごとき"],a:0,e:"〜なりに／なりの＝與～相應的（雖不完美但盡其所能）。"},
{t:"文法",q:"政治家（　）者、私利私欲で動くべきではない。",c:["たる","なる","という","たりとも"],a:0,e:"〜たる者＝身為～的人（就應該）。地位、身分＋たる者。"},
{t:"文法",q:"決勝までの道のりを思えば、一日（　）練習は休めない。",c:["たりとも","なりとも","として","にして"],a:0,e:"最小數量＋たりとも〜ない＝哪怕～也不。一日たりとも、一円たりとも。"},
{t:"文法",q:"会場には、誰一人（　）彼の正体を知る者はいなかった。",c:["として","にして","かぎり","ながら"],a:0,e:"疑問詞＋一＋助数詞＋として〜ない＝無一例外全都不。誰一人として、何一つとして。"},
{t:"文法",q:"就職活動の時期（　）、学生たちの表情も真剣そのものだ。",c:["ともなると","とばかりに","といえども","というと"],a:0,e:"〜ともなると／ともなれば＝一旦到了～（特別的階段），情況就不同。"},
{t:"文法",q:"彼は今がチャンス（　）、一気に反撃に出た。",c:["とばかりに","ともなると","といえども","とみるまに"],a:0,e:"〜とばかりに＝彷彿在說～似地（做出動作）。"},
{t:"文法",q:"今度こそ合格した（　）、また番号の見間違いだった。",c:["と思いきや","とばかりに","ともなしに","といったら"],a:0,e:"〜と思いきや＝本以為～沒想到（出乎意料）。"},
{t:"文法",q:"見る（　）窓の外を眺めていたら、大きな虹に気づいた。",c:["ともなしに","と思いきや","ともなると","とみえて"],a:0,e:"〜ともなしに／ともなく＝無意識地～。見るともなしに見る。"},
{t:"文法",q:"事故の原因を究明す（　）、専門家チームが現地入りした。",c:["べく","まじく","ゆえ","つつ"],a:0,e:"〜べく＝為了～（文語目的）。する→すべく也可。"},
{t:"文法",q:"彼はわが社にとって欠く（　）人材だ。",c:["べからざる","べからず","まじき","ざるをえない"],a:0,e:"欠くべからざる＝不可或缺的（連體修飾用べからざる；べからず用於句尾禁止）。"},
{t:"文法",q:"生徒をだますとは、教師にある（　）行為だ。",c:["まじき","めいた","ごとき","んばかりの"],a:0,e:"〜（に）あるまじき行為＝不該有的行為（強烈譴責）。身分＋にあるまじき。"},
{t:"文法",q:"私（　）者がご挨拶するのは恐縮ですが……。",c:["ごとき","ごとく","ごとし","なみの"],a:0,e:"〜ごとき（者）＝像我這樣（自謙）／像他那種（輕蔑）。ごとく＝副詞用法；ごとし＝句尾。"},
{t:"文法",q:"その映画は、見る者を感動させ（　）だろう。",c:["ずにはおかない","ずにはすまない","ないではとどまらない","ないうちに"],a:0,e:"〜ずにはおかない＝必然使人～（事物具強制力）。使役形＋ずにはおかない頻出。"},
{t:"文法",q:"人の物を壊したのだから、弁償せ（　）だろう。",c:["ずにはすまない","ずにはおかない","ずじまい","ずともよい"],a:0,e:"〜ずにはすまない＝（依社會常理）不～說不過去。する→せずには。"},
{t:"文法",q:"迷っているうちに完売し、結局買え（　）だった。",c:["ずじまい","ずくめ","ずどおし","ずながら"],a:0,e:"〜ずじまい＝（想做）終究沒能做成。言えずじまい、会えずじまい。"},
{t:"文法",q:"テレビをつけ（　）で寝てしまった。",c:["っぱなし","っきり","ったらしい","っこない"],a:0,e:"〜っぱなし＝放著不管、一直～。つけっぱなし、立ちっぱなし。"},
{t:"文法",q:"宝くじなんて、どうせ当たり（　）よ。",c:["っこない","っぱなし","がたい","うる"],a:0,e:"〜っこない＝絕不可能～（口語）。ます形＋っこない。"},
{t:"文法",q:"あの慎重な彼が、そんな危険な投資をし（　）。",c:["かねない","かねる","そびれる","あぐねる"],a:0,e:"〜かねない＝難保不會～（負面可能）。※本題語意：就連謹慎的他也難保會做。"},
{t:"文法",q:"誠に申し訳ございませんが、その件はお答えし（　）ます。",c:["かね","そびれ","あぐね","おき"],a:0,e:"〜かねる＝礙難～（委婉拒絕）。お答えしかねます＝恕難奉告。"},
{t:"文法",q:"タイミングを逃して、退職のことを言い出し（　）てしまった。",c:["そびれ","かね","はて","ぬい"],a:0,e:"〜そびれる＝錯過時機沒能～。言いそびれる、聞きそびれる。"},
{t:"文法",q:"打開策が見つからず、みな考え（　）ている。",c:["あぐね","そびれ","かね","もらし"],a:0,e:"〜あぐねる＝～得一籌莫展。考えあぐねる、探しあぐねる。"},
{t:"文法",q:"被災地の惨状は、まさに見る（　）ものだった。",c:["に堪えない","にすぎない","に相違ない","には及ばない"],a:0,e:"見るに堪えない（たえない）＝慘不忍睹。感謝の念に堪えない＝不勝感激（另一用法）。"},
{t:"文法",q:"彼こそ、この重責を任せる（　）人物だ。",c:["に足る","に堪える","に及ぶ","に至る"],a:0,e:"〜に足る（たる）＝足以～、值得～。信頼に足る、尊敬に足る。"},
{t:"文法",q:"長年の夢を絶たれた彼の無念は、察する（　）。",c:["に難くない","に堪えない","に他ならない","に限らない"],a:0,e:"〜に難くない（かたくない）＝不難～。想像に難くない、察するに難くない。"},
{t:"文法",q:"今日の成功は、地道な積み重ねの結果（　）。",c:["に他ならない","に難くない","に越したことはない","にとどまらない"],a:0,e:"〜に他ならない（ほかならない）＝不外乎是～、正是～（斷定）。"},
{t:"文法",q:"何事も、早めに準備しておく（　）。",c:["に越したことはない","に他ならない","に堪えない","に先立つものはない"],a:0,e:"〜に越したことはない＝再好不過、最為穩妥。"},
{t:"文法",q:"その企業の事業は国内（　）、アジア全域に広がっている。",c:["にとどまらず","にかかわらず","にもまして","にひきかえ"],a:0,e:"〜にとどまらず＝不僅止於～。範圍擴大。"},
{t:"文法",q:"決勝を明日に控え、彼はいつ（　）真剣な表情で練習に励んでいる。",c:["にもまして","にひきかえ","にとどまらず","にかまけて"],a:0,e:"〜にもまして＝比～更加。いつにもまして＝比平時更。"},
{t:"文法",q:"社交的な姉（　）、妹は人前に出るのが苦手だ。",c:["にひきかえ","にもまして","にとどまらず","にかこつけて"],a:0,e:"〜にひきかえ＝與～相反（對比、常含評價）。"},
{t:"文法",q:"彼は趣味（　）、家族サービスをすっかり忘れている。",c:["にかまけて","にかこつけて","にひきかえ","に先立って"],a:0,e:"〜にかまけて＝只顧著～（而疏忽其他）。仕事にかまけて。"},
{t:"文法",q:"彼は出張（　）、足を延ばして温泉を楽しんできたらしい。",c:["にかこつけて","にかまけて","にもまして","に照らして"],a:0,e:"〜にかこつけて＝假借～名義。仕事にかこつけて。"},
{t:"文法",q:"過去の判例（　）、この訴えが認められる可能性は低い。",c:["に照らして","にかこつけて","にひきかえ","にかまけて"],a:0,e:"〜に照らして（てらして）＝對照、依據（法規、經驗）判斷。"},
{t:"文法",q:"危機的な状況（　）、リーダーには冷静さが求められる。",c:["にあって","にいたって","にとって","にわたって"],a:0,e:"〜にあって＝身處～（特殊時期、立場）。文語。"},
{t:"文法",q:"家族の支えがあれ（　）、つらい治療にも耐えられるのだ。",c:["ばこそ","ばかりか","ばそれまで","ばきりがない"],a:0,e:"〜ばこそ＝正因為～才（強調原因，句尾常用のだ）。"},
{t:"文法",q:"金は、あればあった（　）使ってしまうものだ。",c:["で","なり","こそ","まで"],a:0,e:"〜ば〜たで＝有～也有～的（問題）；沒～也有沒～的難處。あればあったで。"},
{t:"文法",q:"どんなに財産を築いても、死んでしまえ（　）だ。",c:["ばそれまで","ばこそ","ばきりがない","ばなにより"],a:0,e:"〜ばそれまでだ＝一旦～就全完了、到此為止。"},
{t:"文法",q:"細かい不満を言い出し（　）きりがない。",c:["たら","つつ","ども","にも"],a:0,e:"〜たらきりがない／〜ばきりがない＝一～起來就沒完沒了。"},
{t:"文法",q:"毎日と（　）、せめて週末ぐらいは運動したほうがいい。",c:["は言わないまでも","は言うまでもなく","は言わんばかりに","は言うに及ばず"],a:0,e:"〜ないまでも＝即使達不到～至少也。毎日とは言わないまでも。"},
{t:"文法",q:"見れば分かることだから、わざわざ説明する（　）。",c:["までもない","よりほかない","にかたくない","といえなくもない"],a:0,e:"〜までもない＝用不著特地～。言うまでもない＝自不待言。"},
{t:"文法",q:"報酬次第では、その仕事を引き受け（　）。",c:["ないものでもない","ないではおかない","ないまでもない","ないことにはならない"],a:0,e:"〜ないものでもない＝也並非不～（消極的肯定）。"},
{t:"文法",q:"人に何と言われ（　）、自分の道を貫くつもりだ。",c:["ようが","ように","ようで","ようなら"],a:0,e:"〜ようが＝無論～都（後接不受影響）。言われようと也同義。"},
{t:"文法",q:"明日は雨が降ろ（　）降るまいが、予定どおり決行する。",c:["うが","うに","うで","うなら"],a:0,e:"〜（よ）うが〜まいが＝不管～還是不～。降ろうが降るまいが。"},
{t:"文法",q:"あんなに強気だった彼も、内心は不安なのでは（　）。",c:["あるまいか","なるまいか","すまいか","いくまいか"],a:0,e:"〜のではあるまいか＝恐怕是～吧（文語推測）。＝のではないだろうか。"},
{t:"文法",q:"たとえ社長の命令（　）、不正には手を貸せない。",c:["であれ","にあれ","とあれ","かあれ"],a:0,e:"たとえ〜であれ＝即使是～。であろうと同義。"},
{t:"文法",q:"観客の声援（　）、あの逆転勝利はなかっただろう。",c:["なくして","なくても","ないでは","なければ"],a:0,e:"〜なくして（は）＝如果沒有～（就不可能）。文語，後接否定推量。"},
{t:"文法",q:"彼は周囲の制止（　）、単身で被災地に向かった。",c:["を振り切って","をおいて","をもって","をあげて"],a:0,e:"制止を振り切る＝掙脫勸阻。※慣用搭配題。"},
{t:"文法",q:"神様（　）、人の心の中まで分かるはずがない。",c:["ではあるまいし","ではないまでも","でもかまわず","ではおかず"],a:0,e:"〜ではあるまいし＝又不是～（責備、勸說）。＝じゃあるまいし。"},
{t:"文法",q:"大見得を切った（　）、いまさら後には引けない。",c:["手前","手先","手元","手際"],a:0,e:"〜手前（てまえ）＝礙於～的面子、既然當著～面（說了）。部下の手前、宣言した手前。"},
{t:"文法",q:"荷造りも済み、あとは引っ越し先へ出発する（　）になっている。",c:["ばかり","ずくめ","がち","おき"],a:0,e:"あとは〜ばかりだ／ばかりになっている＝萬事俱備，只待～。"},

{t:"並べ替え",q:"★に入る語は？<br>台風の ＿＿ <b>★</b> ＿＿ ＿＿ つつある。",c:["伴い","接近に","風雨が","強まり"],a:0,e:"完整句：台風の接近に伴い風雨が強まりつつある。（〜に伴い＝隨著；〜つつある＝正在）"},

const LS='n1quiz_v1';
let S;
try{S=JSON.parse(localStorage.getItem(LS))||{}}catch(e){S={}}
S.wrong=S.wrong||[];S.srs=S.srs||{};S.star=S.star||[];S.stats=S.stats||{d:{},c:{}};
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return fmt(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return fmt(d)}
function dueList(){return S.wrong.filter(i=>!S.srs[i]||S.srs[i].due<=today())}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const app=document.getElementById('app');
const cats=[...new Set(Q.map(x=>x.t))];
if(window.speechSynthesis)speechSynthesis.getVoices();

function speakQ(qi){
  if(!window.speechSynthesis)return;
  const q=Q[qi];let t;
  const m=q.e.match(/完整句：([^（]+)/);
  if(m)t=m[1];
  else if(q.t==='用法')t=q.c[q.a];
  else t=q.q.replace(/<[^>]+>/g,'').replace(/（　）/g,q.c[q.a]);
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.9;
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.indexOf('ja')===0);
  if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function streak(){
  let n=0;
  for(let i=0;i<9999;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(S.stats.d[fmt(d)])n++;
    else if(i===0)continue;
    else break;
  }
  return n;
}

function statHtml(){
  let n=0,ok=0;
  Object.values(S.stats.d).forEach(v=>{ok+=v[0];n+=v[1]});
  if(!n)return '';
  const rows=Object.entries(S.stats.c).map(([c,[r,m]])=>`<div class="stat"><span>${c}</span><span>${r} / ${m}（${Math.round(r/m*100)}%）</span></div>`).join('');
  return `<div class="card"><div class="tag">學習儀表板</div>
  <div style="text-align:center;font-size:1.05rem;margin:6px 0 10px">🔥 連續 ${streak()} 天｜累計 ${n} 題｜正確率 ${Math.round(ok/n*100)}%</div>${rows}</div>`;
}

  S.session=null;save();

function start(mode){
  let idx;
  if(mode==='all')idx=Q.map((_,i)=>i);
  else if(mode==='due')idx=dueList();
  else if(mode==='wrong')idx=[...S.wrong];
  else if(mode==='star')idx=[...S.star];
  else idx=Q.map((_,i)=>i).filter(i=>Q[i].t===mode);
  if(!idx.length)return;
  shuffle(idx);
  S.session={mode,idx,pos:0,right:0,log:[]};
  save();renderQ();
}

const MODENAME={all:'綜合測驗',due:'今日複習',wrong:'錯題複習',star:'不熟收藏'};

function renderQ(){
  const s=S.session;
  if(s.pos>=s.idx.length)return end();
  const qi=s.idx[s.pos],q=Q[qi];
  const order=shuffle([0,1,2,3]);
  const opts=order.map((oi,k)=>`<button class="opt" id="o${k}" onclick="pick(${k})">${'ABCD'[k]}．${q.c[oi]}</button>`).join('');
  app.innerHTML=`
  <div class="top"><span>${MODENAME[s.mode]||s.mode}　${s.pos+1} / ${s.idx.length}</span><span>✔ ${s.right}　✘ ${s.pos-s.right}</span></div>
  <div class="bar"><div style="width:${s.pos/s.idx.length*100}%"></div></div>
  <div class="card">
    <span class="tag">${q.t}</span>
    <div class="q">${q.q}</div>
    ${opts}
    <div id="after"></div>
  </div>
  <button class="mini" onclick="if(confirm('中斷測驗回到首頁？（進度已儲存）')){home()}">回首頁</button>`;
  window._cur={qi,order};
}

function pick(k){
  const {qi,order}=window._cur,q=Q[qi],s=S.session;
  const ok=order[k]===q.a;
  for(let i=0;i<4;i++){
    const b=document.getElementById('o'+i);
    b.disabled=true;
    if(order[i]===q.a)b.classList.add('correct');
    else if(i===k)b.classList.add('wrong');
    else b.classList.add('dim');
  }
  if(ok){
    s.right++;
    if(s.mode==='due'||s.mode==='wrong'){
      const r=S.srs[qi]||{step:0,miss:1};
      r.step=(r.step||0)+1;
      if(r.step>=3){S.wrong=S.wrong.filter(x=>x!==qi);delete S.srs[qi];}
      else{r.due=addDays(r.step===1?3:7);S.srs[qi]=r;}
    }
  }else{
    if(!S.wrong.includes(qi))S.wrong.push(qi);
    const r=S.srs[qi]||{step:0,miss:0};
    r.step=0;r.miss=(r.miss||0)+1;r.due=addDays(1);S.srs[qi]=r;
  }
  const tk=today();
  S.stats.d[tk]=S.stats.d[tk]||[0,0];S.stats.d[tk][1]++;if(ok)S.stats.d[tk][0]++;
  S.stats.c[q.t]=S.stats.c[q.t]||[0,0];S.stats.c[q.t][1]++;if(ok)S.stats.c[q.t][0]++;
  s.log.push({t:q.t,ok});
  s.pos++;save();
  const starred=S.star.includes(qi);
  document.getElementById('after').innerHTML=`
    <div class="exp">${ok?'⭕ 正解！':'❌ 正解是：'+q.c[q.a]}<br>💡 ${q.e}</div>
    <div class="row">
      <button class="chip" onclick="speakQ(${qi})">🔊 聽發音</button>
      <button class="chip" id="star" onclick="toggleStar(${qi})">${starred?'⭐ 已標記':'☆ 標記不熟'}</button>
    </div>
    <button class="primary" onclick="renderQ()">下一題 ▶</button>`;
  document.getElementById('after').scrollIntoView({behavior:'smooth',block:'end'});
}

function toggleStar(qi){
  const i=S.star.indexOf(qi);
  if(i>=0)S.star.splice(i,1);else S.star.push(qi);
  save();
  const b=document.getElementById('star');
  if(b)b.textContent=S.star.includes(qi)?'⭐ 已標記':'☆ 標記不熟';
}

function exportWrong(){
  let t='【N1 錯題清單 '+today()+'】共 '+S.wrong.length+' 題\n\n';
  S.wrong.forEach((qi,n)=>{
    const q=Q[qi],r=S.srs[qi]||{};
    t+=(n+1)+'. ['+q.t+'] '+q.q.replace(/<[^>]+>/g,' ')+'\n   正解：'+q.c[q.a]+(r.miss?'｜錯過 '+r.miss+' 次':'')+'\n';
  });
  t+='\n請針對以上錯題逐題深入解說：詞源或語感、易混淆選項辨析、記憶技巧、各補 2 個例句，最後分析我的弱點模式，並依此出 10 題變化題考我。';
  app.innerHTML=`<h1>📋 錯題清單</h1>
  <div class="sub">複製後貼到 Claude 對話，就能得到量身深入解說</div>
  <div class="card">
    <textarea id="ex" style="width:100%;height:45vh;font-size:.9rem;border:1px solid #e3ddd2;border-radius:8px;padding:10px;font-family:inherit">${t}</textarea>
    <button class="primary" onclick="const x=document.getElementById('ex');x.select();x.setSelectionRange(0,999999);if(navigator.clipboard){navigator.clipboard.writeText(x.value).then(()=>alert('已複製！'))}else{document.execCommand('copy');alert('已複製！')}">全選並複製</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
}

// ================= EPUB =================
function crc32(d){
  let t=crc32.t;
  if(!t){t=crc32.t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}}
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
function zipStore(files){
  const parts=[],central=[];let off=0;
  files.forEach(f=>{
    const nb=f.nameBytes,d=f.data,crc=crc32(d);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0x0800,true);
    lh.setUint32(14,crc,true);lh.setUint32(18,d.length,true);lh.setUint32(22,d.length,true);
    lh.setUint16(26,nb.length,true);
    parts.push(new Uint8Array(lh.buffer),nb,d);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0x0800,true);
    ch.setUint32(16,crc,true);ch.setUint32(20,d.length,true);ch.setUint32(24,d.length,true);
    ch.setUint16(28,nb.length,true);ch.setUint32(42,off,true);
    central.push(new Uint8Array(ch.buffer),nb);
    off+=30+nb.length+d.length;
  });
  let cdSize=0;central.forEach(u=>cdSize+=u.length);
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);eo.setUint16(8,files.length,true);eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true);eo.setUint32(16,off,true);
  const out=new Uint8Array(off+cdSize+22);let p=0;
  parts.concat(central,[new Uint8Array(eo.buffer)]).forEach(u=>{out.set(u,p);p+=u.length});
  return out;
}
function buildEpub(){
  const enc=new TextEncoder();
  const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fix=s=>escq(s).replace(/&lt;(\/)?(u|b)&gt;/g,'<$1$2>').replace(/&lt;br\s*\/?&gt;/g,'<br/>');
  const wrap=(title,body)=>'<?xml version="1.0" encoding="utf-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja"><head><title>'+title+'</title><style>body{line-height:1.8}.q{margin:0 0 1.5em 0}.a{font-size:.9em}aside{font-size:.9em;border-top:1px dotted #999;padding-top:.3em;margin-top:.5em}u{text-decoration:none;border-bottom:2px solid #000;font-weight:bold}</style></head><body>'+body+'</body></html>';
  const chapters=[],files=[];
  cats.forEach((cat,ci)=>{
    const qs=[];Q.forEach((q,i)=>{if(q.t===cat)qs.push({q,i})});
    let body='<h1>'+cat+'（'+qs.length+'題）</h1>',notes='';
    qs.forEach((x,n)=>{
      const ord=shuffle([0,1,2,3]);
      const letter='ABCD'[ord.indexOf(x.q.a)];
      const opts=ord.map((oi,k)=>'ABCD'[k]+'．'+fix(x.q.c[oi])).join('<br/>');
      body+='<div class="q"><p><b>'+(n+1)+'．</b>'+fix(x.q.q)+'</p><p>'+opts+'</p><p class="a" id="r'+x.i+'"><a epub:type="noteref" href="#n'+x.i+'">▶ 答案・解說</a></p></div>';
      notes+='<aside id="n'+x.i+'" epub:type="footnote"><p><b>'+(n+1)+'．正解：'+letter+'．'+fix(x.q.c[x.q.a])+'</b><br/>'+fix(x.q.e)+'　<a href="#r'+x.i+'">↩ 返回第'+(n+1)+'題</a></p></aside>';
    });
    body+='<h2>解答・解説一覧</h2>'+notes;
    chapters.push({href:'c'+ci+'.xhtml',title:cat});
    files.push({name:'OEBPS/c'+ci+'.xhtml',text:wrap(cat,body)});
  });
  const title=document.title;
  const nav=wrap('目次','<nav epub:type="toc"><h1>目次</h1><ol>'+chapters.map(c=>'<li><a href="'+c.href+'">'+c.title+'</a></li>').join('')+'</ol></nav>');
  const opf='<?xml version="1.0" encoding="utf-8"?>\n<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">urn:uuid:jlpt-quiz-'+Date.now()+'</dc:identifier><dc:title>'+title+'</dc:title><dc:language>ja</dc:language><meta property="dcterms:modified">'+new Date().toISOString().replace(/\.\d+Z$/,'Z')+'</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>'+chapters.map((c,i)=>'<item id="c'+i+'" href="'+c.href+'" media-type="application/xhtml+xml"/>').join('')+'</manifest><spine>'+chapters.map((c,i)=>'<itemref idref="c'+i+'"/>').join('')+'</spine></package>';
  const container='<?xml version="1.0" encoding="utf-8"?>\n<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';
  const list=[{name:'mimetype',text:'application/epub+zip'},{name:'META-INF/container.xml',text:container},{name:'OEBPS/content.opf',text:opf},{name:'OEBPS/nav.xhtml',text:nav}].concat(files);
  return zipStore(list.map(f=>({nameBytes:enc.encode(f.name),data:enc.encode(f.text)})));
}
function makeEpub(){
  const blob=new Blob([buildEpub()],{type:'application/epub+zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=document.title.replace(/\s+/g,'')+'.epub';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
}

function end(){
  const s=S.session;
  const pct=Math.round(s.right/s.idx.length*100);
  const byCat={};
  s.log.forEach(l=>{byCat[l.t]=byCat[l.t]||[0,0];byCat[l.t][1]++;if(l.ok)byCat[l.t][0]++});
  const rows=Object.entries(byCat).map(([c,[r,n]])=>`<div class="stat"><span>${c}</span><span>${r} / ${n}（${Math.round(r/n*100)}%）</span></div>`).join('');
  const msg=pct>=80?'💮 素晴らしい！這個水準上考場沒問題':pct>=60?'👍 及格線附近，把錯題本刷熟就穩了':'💪 先別灰心，錯題就是你的提分空間';
  const due=dueList().length;
  app.innerHTML=`
  <h1>測驗結束</h1>
  <div class="card">
    <div class="big">${pct}<span style="font-size:1.2rem">分</span></div>
    <div style="text-align:center;color:#6b6353">答對 ${s.right} / ${s.idx.length} 題　${msg}</div>
  </div>
  <div class="card"><div class="tag">本次各類正確率</div>${rows}</div>
  <div class="card">
    <button class="warn" onclick="start('due')" ${due?'':'disabled style="opacity:.4"'}>📅 今日複習（${due} 題）</button>
    <button class="secondary" onclick="exportWrong()" ${S.wrong.length?'':'disabled style="opacity:.4"'}>📋 匯出錯題給 AI 解說</button>
    <button class="secondary" onclick="home()">回首頁</button>
  </div>`;
  S.session=null;save();
}

if(S.session&&S.session.pos<S.session.idx.length){
  const s=S.session;
  app.innerHTML=`<h1>🎯 N1 考前猜題 500</h1>
  <div class="card">
    <div style="margin-bottom:10px">偵測到上次未完成的測驗（${s.pos} / ${s.idx.length} 題）</div>
    <button class="primary" onclick="renderQ()">▶ 繼續上次測驗</button>
    <button class="secondary" onclick="home()">放棄，回首頁</button>
  </div>`;
}else home();
</script>
</body>
